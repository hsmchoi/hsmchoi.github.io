<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스피치 분석기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #e3f2fd;
            --text-color: #263238;
            --accent-color: #5c6bc0;
            --accent-dark: #3f51b5;
            --success-color: #66bb6a;
            --warning-color: #ffb74d;
            --error-color: #ef5350;
            --border-color: #b0bec5;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --shadow-accent: rgba(92, 107, 192, 0.3);
            --gold-ratio: 1.618;
            --font-sm: 10px;
            --font-base: 16px;
            --font-lg: 26px;
            --font-xl: 42px;
            --spacing-unit: 8px;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: var(--gold-ratio);
        }
        .container {
            max-width: calc(640px * var(--gold-ratio));
            min-height: 100vh;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: calc(1.5rem * var(--gold-ratio));
            box-shadow: 0 10px 15px -3px var(--shadow-color), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .btn {
            height: calc(3rem * 1.618);
            border-radius: 9999px;
            font-weight: 600;
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
            box-shadow: 0 4px 6px -1px var(--shadow-color), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 0 2rem;
        }
        .btn-record {
            background-color: var(--accent-color);
            color: white;
        }
        .btn-record:hover:not(.btn-disabled) {
            background-color: var(--accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 10px -1px var(--shadow-accent), 0 2px 4px -1px var(--shadow-accent);
        }
        .btn-stop {
            background-color: var(--error-color);
            color: white;
        }
        .btn-stop:hover:not(.btn-disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 10px -1px rgba(239, 68, 68, 0.4), 0 2px 4px -1px rgba(239, 68, 68, 0.2);
        }
        .btn-disabled {
            background-color: #d1d5db;
            color: #6b7280;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .compact-bar-container {
            width: calc(100% / var(--gold-ratio));
        }
        .compact-bar {
            height: calc(var(--spacing-unit) * 1.5);
            width: 100%;
            background-color: var(--border-color);
            border-radius: 9999px;
            margin-top: calc(var(--spacing-unit) * 0.5);
            position: relative;
        }
        .compact-bar-goal-line {
            position: absolute;
            height: 100%;
            width: calc(var(--spacing-unit) * 0.25);
            background-color: var(--text-color);
            left: 50%;
            transform: translateX(-50%);
            border-radius: 9999px;
        }
        .compact-bar-indicator {
            position: absolute;
            height: 100%;
            width: calc(var(--spacing-unit) * 1.5);
            background-color: var(--success-color);
            border-radius: 9999px;
            transition: left 0.5s ease-in-out;
            box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.25);
        }
        .result-box {
            background-color: #f9fafb;
            border-radius: calc(1rem * var(--gold-ratio));
            padding: calc(1rem * var(--gold-ratio));
        }
        .gender-btn {
            padding: calc(var(--spacing-unit) * 1.5) calc(var(--spacing-unit) * 3);
            border-radius: calc(var(--spacing-unit) * 1.5);
            border: 1px solid var(--border-color);
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            font-size: var(--font-lg);
            width: calc(6rem * 1.618);
        }
        .gender-btn.selected {
            background-color: var(--accent-color);
            color: #ffffff;
            border-color: var(--accent-color);
            box-shadow: 0 4px 6px -1px var(--shadow-accent), 0 2px 4px -1px rgba(99, 102, 241, 0.1);
        }
        .chart-container {
            margin-top: calc(var(--spacing-unit) * 4);
            border: 1px solid var(--border-color);
            border-radius: calc(1rem * var(--gold-ratio));
            padding: calc(1rem * var(--gold-ratio));
            background-color: #f9fafb;
            position: relative;
        }
        .floating-message-container {
            position: fixed;
            bottom: calc(var(--spacing-unit) * 4);
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }
        .floating-message {
            padding: calc(var(--spacing-unit) * 2) calc(var(--spacing-unit) * 4);
            border-radius: calc(1rem * var(--gold-ratio));
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 10px -1px var(--shadow-accent);
            opacity: 0;
            transform: translateY(20px);
        }
        .feedback-message {
            min-height: calc(var(--spacing-unit) * 3);
            font-size: var(--font-sm);
            text-align: center;
            line-height: 1.25;
            margin-top: calc(var(--spacing-unit) * 1);
        }
        .progress-bar-container {
            width: 100%;
            background-color: #d1d5db;
            border-radius: 9999px;
            height: 1.5rem;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .progress-bar {
            height: 100%;
            background-color: var(--accent-color);
            transition: width 0.5s ease-in-out;
        }
        .mobile-view .container {
            padding: 0.5rem;
        }
        .mobile-view .card {
            border-radius: 1rem;
            padding: 1.5rem;
        }
        .mobile-view .compact-bar-container {
            width: 25%;
        }
        .mobile-view .gender-btn {
            width: 4rem;
            font-size: 1.5rem;
        }
        .mobile-view .target-input, .mobile-view .btn {
            height: 3rem;
        }
        .mobile-view h1 {
            font-size: 2.5rem;
        }
        .mobile-view h2 {
            font-size: 1.5rem;
        }
        .mobile-view .space-y-8 > :not([hidden]) ~ :not([hidden]) {
            --tw-space-y-reverse: 0;
            margin-top: calc(1rem * calc(1 - var(--tw-space-y-reverse)));
            margin-bottom: calc(1rem * var(--tw-space-y-reverse));
        }
        .mobile-view .space-y-12 > :not([hidden]) ~ :not([hidden]) {
            --tw-space-y-reverse: 0;
            margin-top: calc(1.5rem * calc(1 - var(--tw-space-y-reverse)));
            margin-bottom: calc(1.5rem * var(--tw-space-y-reverse));
        }
        .mobile-view-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            background-color: var(--accent-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px var(--shadow-accent), 0 2px 4px -1px rgba(99, 102, 241, 0.1);
            cursor: pointer;
            font-size: 1.5rem;
            transition: transform 0.2s ease-in-out;
        }
        .mobile-view-toggle:hover {
            transform: scale(1.1);
        }
        .target-input-label-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .target-input {
            width: 8rem;
            height: 4rem;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            padding: 0;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <div id="appContainer" class="container mx-auto p-6">
        <div class="card p-8 md:p-12 space-y-8 md:space-y-12">
            <div class="text-center">
                <h1 class="text-3xl md:text-5xl font-extrabold mb-2" style="font-size: var(--font-xl);">스피치 분석기</h1>
                <p class="text-sm md:text-base text-gray-500 max-w-md mx-auto" style="font-size: var(--font-base);">
                    아래 '녹음 시작' 버튼을 눌러 스피치 훈련을 시작하세요.
                </p>
            </div>
            <div id="mainLayout" class="flex flex-col md:flex-row space-y-8 md:space-y-0 md:space-x-8">
                <div id="goalSettings" class="md:w-1/2 space-y-8 md:border-r md:pr-8">
                    <h2 class="text-2xl font-bold text-center" style="font-size: var(--font-lg);">훈련 목표 설정</h2>
                    <div class="flex flex-col items-center gap-4">
                        <p class="text-sm font-medium text-gray-700" style="font-size: var(--font-base);">성별 선택</p>
                        <div class="flex justify-center gap-8">
                            <button id="maleBtn" class="gender-btn" data-gender="male" aria-label="남성 선택">
                                <i class="fas fa-male"></i>
                            </button>
                            <button id="femaleBtn" class="gender-btn" data-gender="female" aria-label="여성 선택">
                                <i class="fas fa-female"></i>
                            </button>
                        </div>
                    </div>
                    <p id="templateHint" class="text-sm text-gray-500 italic text-center" style="font-size: var(--font-sm);">
                        <i class="fas fa-lightbulb"></i> 성별을 선택하고 템플릿을 선택하거나 목표를 직접 입력하세요.
                    </p>
                    <div class="flex flex-wrap justify-center gap-4">
                        <button id="leadershipBtn" class="px-6 py-3 bg-blue-500 text-white font-medium rounded-full hover:bg-blue-600 transition disabled:opacity-50 disabled:cursor-not-allowed" style="font-size: var(--font-base);" disabled>
                            리더십
                        </button>
                        <button id="storytellingBtn" class="px-6 py-3 bg-purple-500 text-white font-medium rounded-full hover:bg-purple-600 transition disabled:opacity-50 disabled:cursor-not-allowed" style="font-size: var(--font-base);" disabled>
                            스토리텔링
                        </button>
                        <button id="persuasionBtn" class="px-6 py-3 bg-yellow-500 text-white font-medium rounded-full hover:bg-yellow-600 transition disabled:opacity-50 disabled:cursor-not-allowed" style="font-size: var(--font-base);" disabled>
                            설득
                        </button>
                    </div>
                </div>
                <div class="md:w-1/2 space-y-8 md:pl-8">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="target-input-label-group">
                            <label for="targetWPM" class="block text-sm font-medium text-gray-700" style="font-size: var(--font-sm);">목표 WPM</label>
                            <input type="number" id="targetWPM" class="target-input" placeholder="120">
                        </div>
                        <div class="target-input-label-group">
                            <label for="targetVolume" class="block text-sm font-medium text-gray-700" style="font-size: var(--font-sm);">목표 음량 (dB)</label>
                            <input type="number" id="targetVolume" class="target-input" placeholder="-15">
                        </div>
                        <div class="target-input-label-group">
                            <label for="targetPitch" class="block text-sm font-medium text-gray-700" style="font-size: var(--font-sm);">목표 피치 (Hz)</label>
                            <input type="number" id="targetPitch" class="target-input" placeholder="150">
                        </div>
                        <div class="target-input-label-group">
                            <label for="targetPauses" class="block text-sm font-medium text-gray-700" style="font-size: var(--font-sm);">목표 일시 정지</label>
                            <input type="number" id="targetPauses" class="target-input" placeholder="5">
                        </div>
                    </div>
                    <div id="controls" class="flex flex-col items-center space-y-4">
                        <button id="recordButton" class="btn btn-record w-full max-w-xs">
                            <i class="fas fa-microphone"></i> 녹음 시작
                        </button>
                        <button id="stopButton" class="btn btn-stop w-full max-w-xs btn-disabled" disabled>
                            <i class="fas fa-stop-circle"></i> 녹음 중지
                        </button>
                        <button id="downloadButton" class="btn bg-gray-500 text-white hover:bg-gray-600 w-full max-w-xs hidden">
                            <i class="fas fa-download"></i> 녹음 다운로드
                        </button>
                        <div id="progressContainer" class="w-full max-w-xs hidden mt-4">
                            <div class="progress-bar-container">
                                <div id="progressBar" class="progress-bar"></div>
                            </div>
                            <p id="progressText" class="text-sm text-gray-500 text-center">00:00 / 00:00</p>
                        </div>
                    </div>
                </div>
            </div>
            <div id="results" class="space-y-8 hidden">
                <h2 class="text-2xl md:text-3xl font-bold text-center" style="font-size: var(--font-lg);">실시간 분석</h2>
                <canvas id="wave-canvas" class="rounded-xl w-full h-20 bg-gray-200"></canvas>
                <div class="flex justify-between items-end gap-2 md:gap-4">
                    <div class="compact-bar-container">
                        <p id="wpmResult" class="text-xl font-extrabold text-center">--</p>
                        <p class="text-sm font-medium text-center" style="font-size: var(--font-sm);">WPM</p>
                        <div class="compact-bar" style="width: 1.618rem; height: 1rem;">
                            <div id="wpmIndicator" class="compact-bar-indicator" style="left: 50%;"></div>
                            <div class="compact-bar-goal-line"></div>
                        </div>
                        <p id="wpmFeedback" class="feedback-message text-gray-600">음성 감지 중...</p>
                    </div>
                    <div class="compact-bar-container">
                        <p id="volumeResult" class="text-xl font-extrabold text-center">--</p>
                        <p class="text-sm font-medium text-center" style="font-size: var(--font-sm);">음량 (dB)</p>
                        <div class="compact-bar" style="width: 1.618rem; height: 1rem;">
                            <div id="volumeIndicator" class="compact-bar-indicator" style="left: 50%;"></div>
                            <div class="compact-bar-goal-line"></div>
                        </div>
                        <p id="volumeFeedback" class="feedback-message text-gray-600">음성 감지 중...</p>
                    </div>
                    <div class="compact-bar-container">
                        <p id="pitchResult" class="text-xl font-extrabold text-center">--</p>
                        <p class="text-sm font-medium text-center" style="font-size: var(--font-sm);">피치 (Hz)</p>
                        <div class="compact-bar" style="width: 1.618rem; height: 1rem;">
                            <div id="pitchIndicator" class="compact-bar-indicator" style="left: 50%;"></div>
                            <div class="compact-bar-goal-line"></div>
                        </div>
                        <p id="pitchFeedback" class="feedback-message text-gray-600">음성 감지 중...</p>
                    </div>
                    <div class="compact-bar-container">
                        <p id="pausesResult" class="text-xl font-extrabold text-center">--</p>
                        <p class="text-sm font-medium text-center" style="font-size: var(--font-sm);">일시 정지</p>
                        <div class="compact-bar" style="width: 1.618rem; height: 1rem;">
                            <div id="pausesIndicator" class="compact-bar-indicator" style="left: 50%;"></div>
                            <div class="compact-bar-goal-line"></div>
                        </div>
                        <p id="pausesFeedback" class="feedback-message text-gray-600">음성 감지 중...</p>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="speechChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    <button id="mobileViewToggle" class="mobile-view-toggle" aria-label="모바일 뷰 전환">
        <i class="fas fa-mobile-alt"></i>
    </button>
    <div id="messageBox" class="floating-message-container">
        <div class="floating-message px-6 py-4 rounded-full text-center hidden">
            <span id="errorMessage"></span>
        </div>
    </div>
    <script type="module">
        const app = {
            els: {},
            mediaRecorder: null,
            audioChunks: [],
            startTime: null,
            audioContext: null,
            audioSource: null,
            workletNode: null,
            analysisSession: null, // 중앙 분석 세션 객체
            selectedGender: null,
            speechChart: null,
            chartData: {
                labels: [],
                datasets: [{
                    label: 'WPM',
                    data: [],
                    borderColor: 'var(--accent-color)',
                    backgroundColor: 'rgba(92, 107, 192, 0.2)',
                    fill: true,
                    tension: 0.3
                }, {
                    label: '음량 (dB)',
                    data: [],
                    borderColor: 'var(--success-color)',
                    backgroundColor: 'rgba(102, 187, 106, 0.2)',
                    fill: true,
                    tension: 0.3
                }, {
                    label: '피치 (Hz)',
                    data: [],
                    borderColor: 'var(--warning-color)',
                    backgroundColor: 'rgba(255, 183, 77, 0.2)',
                    fill: true,
                    tension: 0.3
                }]
            },
            currentMetrics: {
                totalSpeakingTime: 0,
                totalSilentPeriods: 0,
                totalWords: 0,
                totalVolumeSum: 0,
                totalPitchSum: 0,
                speakingFramesCount: 0,
            },
            init() {
                this.els = {
                    recordButton: document.getElementById('recordButton'),
                    stopButton: document.getElementById('stopButton'),
                    downloadButton: document.getElementById('downloadButton'),
                    resultsDiv: document.getElementById('results'),
                    wpmResult: document.getElementById('wpmResult'),
                    volumeResult: document.getElementById('volumeResult'),
                    pitchResult: document.getElementById('pitchResult'),
                    pausesResult: document.getElementById('pausesResult'),
                    wpmIndicator: document.getElementById('wpmIndicator'),
                    volumeIndicator: document.getElementById('volumeIndicator'),
                    pitchIndicator: document.getElementById('pitchIndicator'),
                    pausesIndicator: document.getElementById('pausesIndicator'),
                    maleBtn: document.getElementById('maleBtn'),
                    femaleBtn: document.getElementById('femaleBtn'),
                    leadershipBtn: document.getElementById('leadershipBtn'),
                    storytellingBtn: document.getElementById('storytellingBtn'),
                    persuasionBtn: document.getElementById('persuasionBtn'),
                    targetWPMInput: document.getElementById('targetWPM'),
                    targetVolumeInput: document.getElementById('targetVolume'),
                    targetPitchInput: document.getElementById('targetPitch'),
                    targetPausesInput: document.getElementById('targetPauses'),
                    wpmFeedback: document.getElementById('wpmFeedback'),
                    volumeFeedback: document.getElementById('volumeFeedback'),
                    pitchFeedback: document.getElementById('pitchFeedback'),
                    pausesFeedback: document.getElementById('pausesFeedback'),
                    waveCanvas: document.getElementById('wave-canvas'),
                    speechChartCanvas: document.getElementById('speechChart'),
                    goalSettingsDiv: document.getElementById('goalSettings'),
                    messageBox: document.getElementById('messageBox').querySelector('.floating-message'),
                    errorMessage: document.getElementById('errorMessage'),
                    progressContainer: document.getElementById('progressContainer'),
                    progressBar: document.getElementById('progressBar'),
                    progressText: document.getElementById('progressText'),
                    mobileViewToggle: document.getElementById('mobileViewToggle'),
                    appContainer: document.getElementById('appContainer'),
                    mainLayout: document.getElementById('mainLayout'),
                };
                this.initEventListeners();
                this.initChart();
            },
            initEventListeners() {
                this.els.recordButton.onclick = () => this.startRecording();
                this.els.stopButton.onclick = () => this.stopRecording();
                this.els.downloadButton.onclick = () => this.downloadAudio();
                this.els.maleBtn.onclick = () => this.setGender('male');
                this.els.femaleBtn.onclick = () => this.setGender('female');
                this.els.leadershipBtn.onclick = () => this.setGoalTemplate('leadership');
                this.els.storytellingBtn.onclick = () => this.setGoalTemplate('storytelling');
                this.els.persuasionBtn.onclick = () => this.setGoalTemplate('persuasion');
                this.els.mobileViewToggle.onclick = () => this.toggleMobileView();
            },
            toggleMobileView() {
                this.els.appContainer.classList.toggle('mobile-view');
            },
            async startRecording() {
                try {
                    this.resetState();
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.audioSource = this.audioContext.createMediaStreamSource(stream);
                    await this.audioContext.audioWorklet.addModule('data:text/javascript;base64,' + btoa(this.getAudioWorkletCode()));
                    this.workletNode = new AudioWorkletNode(this.audioContext, 'audio-processor');
                    this.audioSource.connect(this.workletNode);
                    this.workletNode.connect(this.audioContext.destination);
                    this.workletNode.port.onmessage = (event) => {
                        // AudioWorklet에서 받은 프레임 데이터를 history에 저장
                        const frameData = event.data;
                        if (this.analysisSession) {
                            this.analysisSession.history.push(frameData);
                            this.updateResults(); // 새로운 데이터로 UI 업데이트
                            this.drawWaveform(frameData.isSpeaking);
                        }
                    };
                    this.mediaRecorder = new MediaRecorder(stream);
                    this.mediaRecorder.ondataavailable = (e) => this.audioChunks.push(e.data);
                    this.mediaRecorder.start();
                    this.startTime = Date.now();
                    this.updateUIForRecording(true);
                    gsap.to(this.els.goalSettingsDiv, {
                        opacity: 0,
                        y: -20,
                        duration: 0.5,
                        onComplete: () => {
                            this.els.goalSettingsDiv.classList.add('hidden');
                            this.els.resultsDiv.classList.remove('hidden');
                            gsap.fromTo(this.els.resultsDiv, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5 });
                        }
                    });
                } catch (err) {
                    console.error('마이크 접근 오류:', err);
                    this.showMessage('마이크 접근이 거부되었습니다. 페이지를 새로고침하고 권한을 허용해주세요.');
                }
            },
            stopRecording() {
                if (this.mediaRecorder && this.mediaRecorder.state === 'recording') {
                    this.mediaRecorder.stop();
                }
                if (this.workletNode) {
                    this.workletNode.disconnect();
                }
                
                this.finalizeAnalysis(); // 최종 분석 실행
                
                if (this.audioContext) {
                    this.audioContext.close();
                }
                this.updateUIForRecording(false);
                gsap.to(this.els.resultsDiv, {
                    opacity: 0,
                    y: 20,
                    duration: 0.5,
                    onComplete: () => {
                        this.els.resultsDiv.classList.add('hidden');
                        this.els.goalSettingsDiv.classList.remove('hidden');
                        gsap.fromTo(this.els.goalSettingsDiv, { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 0.5 });
                    }
                });
                
                this.els.downloadButton.classList.remove('hidden');
            },
            finalizeAnalysis() {
                if (!this.analysisSession || this.analysisSession.history.length === 0) {
                    this.showMessage('분석할 데이터가 없습니다.');
                    return;
                }
                const history = this.analysisSession.history;
                this.analysisSession.endTime = performance.now();

                const totalDuration = (this.analysisSession.endTime - this.analysisSession.startTime) / 1000;
                const frameDuration = 128 / this.audioContext.sampleRate; 

                const speakingFrames = history.filter(d => d.isSpeaking);
                const speakingDuration = speakingFrames.length * frameDuration;
                const silenceDuration = totalDuration - speakingDuration;

                const avgRms = speakingFrames.length > 0 ? speakingFrames.reduce((sum, d) => sum + d.rms, 0) / speakingFrames.length : 0;
                const avgVolumeDb = avgRms > 0 ? 20 * Math.log10(avgRms) : -100;

                const pitchFrames = speakingFrames.filter(d => d.pitch > 0);
                const avgPitchHz = pitchFrames.length > 0 ? pitchFrames.reduce((sum, d) => sum + d.pitch, 0) / pitchFrames.length : 0;
                
                let numPauses = 0;
                for (let i = 1; i < history.length; i++) {
                    if (history[i-1].isSpeaking && !history[i].isSpeaking && (history[i].timestamp - history[i-1].timestamp > 300)) {
                        numPauses++;
                    }
                }

                let totalSpeechSegments = 0;
                for (let i = 1; i < history.length; i++) {
                    if (!history[i-1].isSpeaking && history[i].isSpeaking) {
                        totalSpeechSegments++;
                    }
                }
                const totalWords = totalSpeechSegments * 1.5;
                const speakingMinutes = speakingDuration / 60;
                const avgWpm = speakingMinutes > 0 ? totalWords / speakingMinutes : 0;

                this.analysisSession.summary = {
                    totalDuration: totalDuration.toFixed(1),
                    speakingDuration: speakingDuration.toFixed(1),
                    silenceDuration: silenceDuration.toFixed(1),
                    numPauses,
                    avgWpm: avgWpm.toFixed(0),
                    avgVolumeDb: avgVolumeDb.toFixed(1),
                    avgPitchHz: avgPitchHz.toFixed(1),
                };

                console.log('Final Analysis Summary:', this.analysisSession.summary);
                this.showMessage('✅ 최종 분석 완료!');
            },
            downloadAudio() {
                if (this.audioChunks.length === 0) {
                    this.showMessage('다운로드할 녹음 파일이 없습니다.');
                    return;
                }
                const audioBlob = new Blob(this.audioChunks, { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(audioBlob);
                const downloadLink = document.createElement('a');
                downloadLink.href = audioUrl;
                downloadLink.download = 'my-speech-recording.wav';
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            },
            resetState() {
                this.audioChunks = [];
                this.chartData.labels = [];
                this.chartData.datasets[0].data = [];
                this.chartData.datasets[1].data = [];
                this.chartData.datasets[2].data = [];
                if (this.speechChart) {
                    this.speechChart.update();
                }
                // 중앙 분석 세션 객체 초기화
                this.analysisSession = {
                    startTime: performance.now(),
                    endTime: null,
                    targetMetrics: {
                        wpm: parseFloat(this.els.targetWPMInput.value) || 120,
                        volume: parseFloat(this.els.targetVolumeInput.value) || -15,
                        pitch: parseFloat(this.els.targetPitchInput.value) || 150,
                        pauses: parseInt(this.els.targetPausesInput.value, 10) || 5,
                    },
                    history: [],
                    summary: {
                        totalDuration: 0,
                        speakingDuration: 0,
                        silenceDuration: 0,
                        numPauses: 0,
                        avgWpm: 0,
                        avgVolumeDb: 0,
                        avgPitchHz: 0,
                    }
                };
            },
            updateUIForRecording(isRecording) {
                this.els.recordButton.disabled = isRecording;
                this.els.recordButton.classList.toggle('btn-disabled', isRecording);
                this.els.stopButton.disabled = !isRecording;
                this.els.stopButton.classList.toggle('btn-disabled', !isRecording);
                this.els.downloadButton.classList.add('hidden');
            },
            updateResults() {
                if (!this.analysisSession || this.analysisSession.history.length < 10) return; // 데이터가 충분히 쌓인 후 분석 시작

                const SLIDING_WINDOW_SECONDS = 3; // 최근 3초간의 데이터를 기반으로 실시간 피드백 계산
                const now = performance.now();
                const history = this.analysisSession.history;

                // 1. 슬라이딩 윈도우에 해당하는 데이터 필터링
                const windowStartTime = now - SLIDING_WINDOW_SECONDS * 1000;
                const windowHistory = history.filter(d => d.timestamp >= windowStartTime);
                if (windowHistory.length === 0) return;

                const speakingInWindow = windowHistory.filter(d => d.isSpeaking);
                const durationSeconds = (now - this.analysisSession.startTime) / 1000;

                // 2. WPM 계산 로직 개선 (음성 시작 횟수 기반 추정)
                let speechSegments = 0;
                for (let i = 1; i < windowHistory.length; i++) {
                    if (!windowHistory[i-1].isSpeaking && windowHistory[i].isSpeaking) {
                        speechSegments++;
                    }
                }
                const wordsInWindow = speechSegments * 1.5; // 한 음절당 평균 1.5 단어로 추정
                const wpm = (wordsInWindow / SLIDING_WINDOW_SECONDS) * 60 || 0;

                // 3. 음량 및 피치 계산 (슬라이딩 윈도우 기준)
                const avgRms = speakingInWindow.length > 0 ? speakingInWindow.reduce((sum, d) => sum + d.rms, 0) / speakingInWindow.length : 0;
                const volumeInDb = avgRms > 0 ? 20 * Math.log10(avgRms) : -100;

                const pitchInWindow = speakingInWindow.filter(d => d.pitch > 0);
                const averagePitch = pitchInWindow.length > 0 ? pitchInWindow.reduce((sum, d) => sum + d.pitch, 0) / pitchInWindow.length : 0;

                // 4. 일시정지 횟수 계산 (전체 녹음 시간 기준)
                let pauses = 0;
                for(let i = 1; i < history.length; i++) {
                    // 300ms 이상 지속되는 침묵을 하나의 '일시정지'로 간주
                    if(history[i-1].isSpeaking && !history[i].isSpeaking && (history[i].timestamp - history[i-1].timestamp > 300)) {
                        pauses++;
                    }
                }

                // 5. UI 업데이트
                this.els.wpmResult.textContent = wpm.toFixed(0);
                this.els.volumeResult.textContent = volumeInDb.toFixed(1);
                this.els.pitchResult.textContent = averagePitch.toFixed(1);
                this.els.pausesResult.textContent = pauses;

                const { targetWPM, targetVolume, targetPitch, targetPauses } = this.analysisSession.targetMetrics;

                this.updateIndicator(this.els.wpmIndicator, wpm, targetWPM, targetWPM * 0.5, targetWPM * 1.5);
                this.updateIndicator(this.els.volumeIndicator, volumeInDb, targetVolume, targetVolume - 10, targetVolume + 10);
                this.updateIndicator(this.els.pitchIndicator, averagePitch, targetPitch, targetPitch * 0.5, targetPitch * 1.5);
                this.updateIndicator(this.els.pausesIndicator, pauses, targetPauses, targetPauses > 3 ? targetPauses - 3: 0, targetPauses + 3);

                this.els.wpmFeedback.textContent = this.getFeedback(wpm, targetWPM, 'wpm');
                this.els.volumeFeedback.textContent = this.getFeedback(volumeInDb, targetVolume, 'volume');
                this.els.pitchFeedback.textContent = this.getFeedback(averagePitch, targetPitch, 'pitch');
                this.els.pausesFeedback.textContent = this.getFeedback(pauses, targetPauses, 'pauses');
                
                // 차트는 1초에 한 번만 업데이트하여 성능 확보
                if (history.length % Math.floor(this.audioContext.sampleRate / 128) === 0) {
                    this.updateChart(wpm, volumeInDb, averagePitch, durationSeconds);
                }
            },
            updateIndicator(indicator, currentValue, targetValue, minBound, maxBound) {
                if (isNaN(targetValue) || targetValue === 0) {
                    indicator.style.left = `50%`;
                    indicator.style.backgroundColor = 'var(--border-color)';
                    return;
                }
                const normalizedValue = Math.min(Math.max(currentValue, minBound), maxBound);
                const range = maxBound - minBound;
                const position = ((normalizedValue - minBound) / range) * 100;
                indicator.style.left = `${position}%`;
                const diff = Math.abs(currentValue - targetValue);
                let color;
                if (diff <= (range * 0.1)) {
                    color = 'var(--success-color)';
                } else if (diff <= (range * 0.2)) {
                    color = 'var(--warning-color)';
                } else {
                    color = 'var(--error-color)';
                }
                indicator.style.backgroundColor = color;
            },
            getFeedback(currentValue, targetValue, metric) {
                if (isNaN(targetValue)) {
                    return "목표치를 설정하면 맞춤형 피드백이 제공됩니다.";
                }
                const diff = currentValue - targetValue;
                if (Math.abs(diff) < Math.abs(targetValue) * 0.1) {
                    return `👏 완벽해요! 목표에 도달했어요.`;
                }
                switch (metric) {
                    case 'wpm':
                        return diff > 0 ? "🚀 속도가 조금 빠릅니다. 여유를 가져보세요." : "🐢 속도가 느려요. 조금 더 활기차게 말해 보세요.";
                    case 'volume':
                        return diff < 0 ? "🤫 음량이 작습니다. 복식호흡을 통해 배에서 소리를 내세요." : "🗣️ 음량이 너무 커요. 목에 힘을 빼고 편안하게 말해 보세요.";
                    case 'pitch':
                        return diff > 0 ? "🗣️ 목소리 톤이 높습니다. 낮은 톤으로 말해 보세요." : "🎵 목소리 톤이 낮아요. 말에 억양을 주어 생동감을 더하세요.";
                    case 'pauses':
                        return diff > 0 ? "⏸️ 일시 정지가 많습니다. 말의 흐름이 끊기지 않도록 연습해 보세요." : "🏃 일시 정지가 적습니다. 중요한 메시지 앞에서 잠시 멈춰보세요.";
                    default:
                        return "";
                }
            },
            initChart() {
                if (this.speechChart) {
                    this.speechChart.destroy();
                }
                const ctx = this.els.speechChartCanvas.getContext('2d');
                this.speechChart = new Chart(ctx, {
                    type: 'line',
                    data: this.chartData,
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top',
                            },
                            title: {
                                display: false,
                            }
                        },
                        scales: {
                            x: {
                                title: {
                                    display: true,
                                    text: '시간'
                                }
                            },
                            y: {
                                beginAtZero: false,
                                title: {
                                    display: true,
                                    text: '수치'
                                }
                            }
                        }
                    }
                });
            },
            updateChart(wpm, volume, pitch, duration) {
                this.chartData.labels.push(`${duration.toFixed(1)}s`);
                this.chartData.datasets[0].data.push(wpm);
                this.chartData.datasets[1].data.push(volume);
                this.chartData.datasets[2].data.push(pitch);
                this.speechChart.update();
            },
            drawWaveform(isSpeaking) {
                const canvas = this.els.waveCanvas;
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;
                ctx.clearRect(0, 0, width, height);
                const barWidth = 3;
                const gap = 1;
                const barCount = Math.floor(width / (barWidth + gap));
                const baseHeight = height * 0.5;
                const maxAmplitude = height * 0.4;
                for (let i = 0; i < barCount; i++) {
                    const x = i * (barWidth + gap);
                    let h;
                    if (isSpeaking) {
                         h = Math.random() * maxAmplitude;
                    } else {
                        h = Math.random() * 5;
                    }
                    ctx.fillStyle = isSpeaking ? 'var(--accent-color)' : 'var(--border-color)';
                    ctx.fillRect(x, baseHeight - h / 2, barWidth, h);
                }
            },
            setGender(gender) {
                this.selectedGender = gender;
                this.els.maleBtn.classList.remove('selected');
                this.els.femaleBtn.classList.remove('selected');
                const selectedBtn = gender === 'male' ? this.els.maleBtn : this.els.femaleBtn;
                selectedBtn.classList.add('selected');
                this.els.leadershipBtn.disabled = false;
                this.els.leadershipBtn.classList.remove('disabled:opacity-50', 'disabled:cursor-not-allowed');
                this.els.storytellingBtn.disabled = false;
                this.els.storytellingBtn.classList.remove('disabled:opacity-50', 'disabled:cursor-not-allowed');
                this.els.persuasionBtn.disabled = false;
                this.els.persuasionBtn.classList.remove('disabled:opacity-50', 'disabled:cursor-not-allowed');
                document.getElementById('templateHint').textContent = '아래 템플릿 중 하나를 선택하거나, 목표를 직접 입력하세요.';
            },
            setGoalTemplate(templateType) {
                if (!this.selectedGender) {
                    this.showMessage('성별을 먼저 선택해 주세요.');
                    return;
                }
                const templates = {
                    male: {
                        leadership: { wpm: 110, volume: -10, pitch: 120, pauses: 3 },
                        storytelling: { wpm: 130, volume: -18, pitch: 140, pauses: 8 },
                        persuasion: { wpm: 140, volume: -12, pitch: 130, pauses: 5 }
                    },
                    female: {
                        leadership: { wpm: 110, volume: -10, pitch: 200, pauses: 3 },
                        storytelling: { wpm: 130, volume: -18, pitch: 220, pauses: 8 },
                        persuasion: { wpm: 140, volume: -12, pitch: 210, pauses: 5 }
                    }
                };
                const template = templates[this.selectedGender][templateType];
                if (template) {
                    this.els.targetWPMInput.value = template.wpm;
                    this.els.targetVolumeInput.value = template.volume;
                    this.els.targetPitchInput.value = template.pitch;
                    this.els.targetPausesInput.value = template.pauses;
                }
            },
            showMessage(message) {
                this.els.messageBox.classList.remove('hidden');
                this.els.errorMessage.textContent = message;
                gsap.fromTo(this.els.messageBox, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5 });
                setTimeout(() => {
                    gsap.to(this.els.messageBox, { opacity: 0, y: -20, duration: 0.5, onComplete: () => this.els.messageBox.classList.add('hidden') });
                }, 5000);
            },
            getAudioWorkletCode() {
                return `
                class AudioProcessor extends AudioWorkletProcessor {
                    static get parameterDescriptors() {
                        return [];
                    }
                    constructor() {
                        super();
                        this.sampleRate = sampleRate; // AudioWorkletGlobalScope.sampleRate
                        this.silenceThreshold = 0.01;
                        // 상태를 관리하는 변수들을 모두 제거
                    }
                    
                    // Autocorrelation-based pitch detection
                    getPitch(buffer) {
                        const bufferSize = buffer.length;
                        let maxCorrelation = 0;
                        let bestLag = -1;

                        // 음성 주파수 범위 (75Hz ~ 300Hz)에 해당하는 lag만 탐색
                        const minLag = Math.floor(this.sampleRate / 300);
                        const maxLag = Math.ceil(this.sampleRate / 75);

                        for (let lag = minLag; lag <= maxLag; lag++) {
                            let correlation = 0;
                            for (let i = 0; i < bufferSize - lag; i++) {
                                correlation += buffer[i] * buffer[i + lag];
                            }
                            if (correlation > maxCorrelation) {
                                maxCorrelation = correlation;
                                bestLag = lag;
                            }
                        }

                        return bestLag > 0 ? this.sampleRate / bestLag : 0;
                    }

                    process(inputs) {
                        const input = inputs[0];
                        if (!input || input.length === 0) return true;
                        
                        const channelData = input[0];
                        let sumOfSquares = 0;
                        for (let i = 0; i < channelData.length; i++) {
                            sumOfSquares += channelData[i] * channelData[i];
                        }
                        
                        const rms = Math.sqrt(sumOfSquares / channelData.length);
                        const isSpeaking = rms > this.silenceThreshold;
                        const pitch = isSpeaking ? this.getPitch(channelData) : 0;
                        
                        // 계산된 프레임별 원시 데이터를 메인 스레드로 전송
                        this.port.postMessage({
                            rms,
                            pitch,
                            isSpeaking,
                            timestamp: performance.now()
                        });
                        
                        return true;
                    }
                }
                registerProcessor('audio-processor', AudioProcessor);
                `;
            }
        };
        document.addEventListener('DOMContentLoaded', () => {
            window.app = app;
            app.init();
        });
    </script>
