<svg width="700" height="800" xmlns="http://www.w3.org/2000/svg" style="background-color:#f8f9fa; font-family: 'Noto Sans KR', sans-serif;">
    <defs>
        <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6642d4;"/>
            <stop offset="100%" style="stop-color:#4c26a5;"/>
        </linearGradient>
    </defs>
    <style>
        .text { font-family: 'Noto Sans KR', sans-serif; }
        .title { font-size: 28px; font-weight: 700; fill: #5a32d1; }
        .subtitle { font-size: 16px; fill: #6c757d; }
        .drop-zone { fill: #ffffff; stroke: #dee2e6; stroke-width: 2; stroke-dasharray: 8 4; rx: 12; ry: 12; transition: all 0.2s ease; }
        .drop-zone-text { font-size: 18px; fill: #495057; }
        .drop-zone.active { fill: #e9ecef; border-color: #5a32d1; }
        .main-button { rx: 8; ry: 8; transition: all 0.2s ease; cursor: pointer; }
        .button-text { fill: white; font-size: 16px; font-weight: 700; text-anchor: middle; pointer-events: none; }
        .button-primary { fill: #5a32d1; }
        .button-primary:hover { fill: #4828a5; }
        .button-disabled { fill: #adb5bd; cursor: not-allowed; }
        .modal-overlay { fill: rgba(0,0,0,0.6); }
        .modal-content { fill: #ffffff; rx: 12; ry: 12; }
        .modal-title { font-size: 24px; font-weight: 700; fill: #212529; }
        .modal-subtitle { font-size: 14px; fill: #6c757d; }
        .table-header { font-weight: 700; }
        .table-cell-input { fill: transparent; stroke: #dee2e6; stroke-width: 1; rx: 4; }
        .prediction-card { fill: url(#cardGradient); }
        .prediction-title { font-size: 16px; fill: white; opacity: 0.8; }
        .prediction-amount { font-size: 40px; font-weight: 700; fill: white; }
        .accordion-header { fill: #ffffff; stroke: #dee2e6; stroke-width: 1; rx: 8; cursor: pointer; }
        .accordion-title { font-size: 18px; font-weight: 700; }
        .accordion-arrow { transition: transform 0.3s ease; }
        .accordion-content { opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .accordion-content.open { opacity: 1; visibility: visible; }
        .bar-bg { fill: #e9ecef; rx: 4; }
        .bar-fg { fill: #d63384; rx: 4; transition: width 0.8s ease-in-out; }
    </style>

    <!-- 1. Welcome Screen -->
    <g id="welcome-screen">
        <text x="350" y="60" text-anchor="middle" class="title text">🔮 미래 예측 가계부</text>
        <text x="350" y="90" text-anchor="middle" class="subtitle text">토스(Toss) 거래내역 PDF 파일을 업로드하여 미래를 확인하세요.</text>
        <rect x="50" y="150" width="600" height="200" class="drop-zone" id="drop-zone-rect"/>
        <text id="drop-zone-text" x="350" y="255" text-anchor="middle" class="drop-zone-text text">여기에 파일을 드래그하거나 클릭하여 업로드</text>
        <rect id="analyze-button-rect" x="275" y="400" width="150" height="50" class="main-button button-disabled"/>
        <text x="350" y="430" class="button-text text">분석 시작</text>
    </g>
    
    <!-- 2. Modal Screen -->
    <g id="modal-screen" display="none">
        <rect x="0" y="0" width="700" height="800" class="modal-overlay"/>
        <rect x="50" y="100" width="600" height="600" class="modal-content"/>
        <text x="350" y="150" text-anchor="middle" class="modal-title text">PDF 추출 결과 확인</text>
        <text x="350" y="175" text-anchor="middle" class="modal-subtitle text">AI가 추출한 내용입니다. 정확한지 확인 후 분석을 시작해주세요.</text>
        
        <g transform="translate(70, 220)">
            <text class="table-header text">거래일시</text>
            <text x="200" class="table-header text">적요</text>
            <text x="450" class="table-header text">거래금액</text>
        </g>
        
        <g id="preview-table-rows" transform="translate(70, 250)">
             <!-- Table rows will be inserted here by JS -->
        </g>
        
        <rect id="confirm-button-rect" x="360" y="630" width="270" height="50" class="main-button button-primary"/>
        <text x="495" y="660" class="button-text text">이 내용으로 분석</text>
    </g>
    
    <!-- 3. Result Screen -->
    <g id="result-screen" display="none">
        <text x="350" y="60" text-anchor="middle" class="title text">분석이 완료되었습니다</text>
        
        <rect x="50" y="100" width="600" height="150" class="prediction-card"/>
        <text x="350" y="140" text-anchor="middle" class="prediction-title text">10년간 예상 총 지출</text>
        <text id="total-spending" x="350" y="195" text-anchor="middle" class="prediction-amount text">... 원</text>
        
        <g id="result-content" transform="translate(0, 280)">
             <text x="350" y="0" text-anchor="middle" class="subtitle text" style="font-weight: 700;">절약하면 가질 수 있는 것들</text>
             <g id="accordion-mobility" class="accordion" transform="translate(50, 40)">
                 <rect width="600" height="50" class="accordion-header"/>
                 <text x="20" y="30" class="accordion-title text">🚗 모빌리티 (2개)</text>
                 <path id="arrow-mobility" d="M10 10 L16 16 L22 10" stroke="#6c757d" stroke-width="2" fill="none" transform="translate(550, 12)" class="accordion-arrow"/>
                 <g id="content-mobility" class="accordion-content" transform="translate(0, 50)">
                     <text x="20" y="25">현대 캐스퍼 (기본형)</text><text x="580" y="25" text-anchor="end">1,400 만원</text>
                     <text x="20" y="55">제네시스 G80</text><text x="580" y="55" text-anchor="end">6,000 만원</text>
                 </g>
             </g>
             <g class="accordion" transform="translate(50, 100)">
                 <rect width="600" height="50" class="accordion-header"/>
                 <text x="20" y="30" class="accordion-title text">💎 사치품/투자 (1개)</text>
                 <path d="M10 10 L16 16 L22 10" stroke="#6c757d" stroke-width="2" fill="none" transform="translate(550, 12)" class="accordion-arrow"/>
             </g>
             
             <text x="350" y="200" text-anchor="middle" class="subtitle text" style="font-weight: 700;">카테고리별 지출 분석</text>
             <g transform="translate(50, 230)">
                <text y="15">🍔 식비</text>
                <rect class="bar-bg" y="0" width="600" height="25"/>
                <rect id="bar-food" class="bar-fg" y="0" width="0" height="25" style="fill:#fd7e14;"/>
             </g>
             <g transform="translate(50, 270)">
                <text y="15">🛍️ 쇼핑</text>
                <rect class="bar-bg" y="0" width="600" height="25"/>
                <rect id="bar-shopping" class="bar-fg" y="0" width="0" height="25" style="fill:#d63384;"/>
             </g>
        </g>
    </g>

    <script>
        const welcomeScreen = document.getElementById('welcome-screen');
        const modalScreen = document.getElementById('modal-screen');
        const resultScreen = document.getElementById('result-screen');
        const dropZoneRect = document.getElementById('drop-zone-rect');
        const dropZoneText = document.getElementById('drop-zone-text');
        const analyzeButtonRect = document.getElementById('analyze-button-rect');
        const previewTableRows = document.getElementById('preview-table-rows');
        const confirmButtonRect = document.getElementById('confirm-button-rect');
        const totalSpending = document.getElementById('total-spending');
        const barFood = document.getElementById('bar-food');
        const barShopping = document.getElementById('bar-shopping');
        const accordionMobility = document.getElementById('accordion-mobility');
        const contentMobility = document.getElementById('content-mobility');
        const arrowMobility = document.getElementById('arrow-mobility');
        
        const dummyData = [
            {date: '2025.09.24 19:27', description: '쿠팡(쿠페이)', amount: '-11,960'},
            {date: '2025.09.24 11:03', description: '쿠팡(와우 멤버십)', amount: '-7,890'},
            {date: '2025.09.22 19:13', description: 'KT 통신요금', amount: '-31,680'},
            {date: '2025.09.15 19:03', description: '맘스터치 전주평화점', amount: '-8,300'}
        ];
        
        function animateFlow() {
            setTimeout(() => {
                dropZoneRect.classList.add('active');
                dropZoneText.textContent = '파일 감지됨!';
            }, 1000);
            
            setTimeout(() => {
                dropZoneText.textContent = '거래내역서.pdf';
                analyzeButtonRect.classList.remove('button-disabled');
                analyzeButtonRect.classList.add('button-primary');
            }, 2000);

            setTimeout(() => {
                welcomeScreen.style.display = 'none';
                modalScreen.style.display = 'block';
                dummyData.forEach((row, i) => {
                    const g = document.createElementNS("http://www.w3.org/2000/svg", 'g');
                    g.setAttribute('transform', `translate(0, ${i * 40})`);
                    g.innerHTML = `
                        <rect class="table-cell-input" width="180" height="30"/>
                        <text x="10" y="20" class="text">${row.date}</text>
                        <rect x="200" class="table-cell-input" width="230" height="30"/>
                        <text x="210" y="20" class="text">${row.description}</text>
                        <rect x="450" class="table-cell-input" width="100" height="30"/>
                        <text x="460" y="20" class="text">${row.amount}</text>
                    `;
                    previewTableRows.appendChild(g);
                });
            }, 3000);
            
            setTimeout(() => {
                 modalScreen.style.display = 'none';
                 resultScreen.style.display = 'block';
                 
                 let currentAmount = 0;
                 const targetAmount = 71808000;
                 const interval = setInterval(() => {
                    currentAmount += targetAmount / 100;
                    if(currentAmount >= targetAmount) {
                       currentAmount = targetAmount;
                       clearInterval(interval);
                    }
                    totalSpending.textContent = `${Math.round(currentAmount).toLocaleString()} 원`;
                 }, 10);

            }, 5000);
            
            setTimeout(() => {
                barFood.setAttribute('width', '550');
                barShopping.setAttribute('width', '480');
            }, 5500);

            setTimeout(() => {
                contentMobility.classList.add('open');
                arrowMobility.style.transform = 'translate(550, 12) rotate(180)';
            }, 6500);
        }

        animateFlow();
    </script>
</svg>
