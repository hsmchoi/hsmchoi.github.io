<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Loop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .panel { transition: all 0.3s ease-in-out; flex-grow: 1; flex-basis: 0; display: flex; flex-direction: column; min-width: 0; }
        .panel.collapsed { flex-grow: 0; min-width: 80px; }
        .panel.collapsed .panel-content, .panel.collapsed .panel-footer, .panel.collapsed .header-text { display: none; }
        .sticky-note-board { position: relative; min-height: 400px; }
        .sticky-note { position: absolute; width: 180px; height: 180px; padding: 20px 12px 12px 12px; background-color: #fffde7; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.1s ease-in-out, box-shadow 0.1s ease-in-out; }
        .sticky-note.draggable { cursor: grab; }
        .sticky-note.draggable:active { cursor: grabbing; transform: scale(1.05); box-shadow: 0 10px 15px rgba(0,0,0,0.15); z-index: 10; }
        .pin { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); width: 24px; height: 24px; }
        .modal-overlay { transition: opacity 0.2s ease-in-out; }
        .note-textarea { background: transparent; border: none; resize: none; width: 100%; height: 100%; font-family: inherit; font-size: inherit; }
        .note-textarea:focus { outline: none; }
        .item-actions { visibility: hidden; opacity: 0; transition: opacity 0.2s ease-in-out; }
        .task-item:hover .item-actions { visibility: visible; opacity: 1; }
        .sticky-note .delete-note-btn { visibility: hidden; opacity: 0; transition: opacity 0.2s ease-in-out; position: absolute; top: -8px; right: -8px; }
        .sticky-note:hover .delete-note-btn { visibility: visible; opacity: 1; }
        .routine-list-item.selected { background-color: #e0e7ff; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 p-4 md:p-8">

    <div id="app" class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-start">
            <div>
                <h1 class="text-4xl font-bold text-gray-900">Daily Loop</h1>
                <p class="text-lg text-gray-600" id="current-date"></p>
            </div>
            <div class="flex gap-2">
                <button id="manage-routines-btn" class="bg-gray-700 hover:bg-gray-800 text-white font-bold py-2 px-4 rounded-lg">루틴 관리</button>
                <button id="import-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg">불러오기</button>
                <button id="export-btn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg">내보내기 & 초기화</button>
                <input type="file" id="import-file" class="hidden" accept="application/json">
            </div>
        </header>
        
        <main id="main-container" class="flex flex-col md:flex-row gap-6"></main>
    </div>

    <div id="input-modal" class="modal-overlay fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden z-40">
        <div class="modal-content bg-white rounded-lg shadow-xl p-6 w-full max-w-md">
            <h3 id="modal-title" class="text-2xl font-bold mb-4"></h3>
            <div class="space-y-4">
                <textarea id="modal-textarea" class="w-full h-24 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="내용을 입력하세요..."></textarea>
                <div id="modal-time-container">
                    <label for="modal-time-input" class="block text-sm font-medium text-gray-700">시간 (선택)</label>
                    <input type="time" id="modal-time-input" class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                </div>
            </div>
            <div class="mt-4 flex justify-end gap-2">
                <button id="modal-cancel-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg">취소</button>
                <button id="modal-save-btn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg">저장</button>
            </div>
        </div>
    </div>

    <div id="evening-modal" class="modal-overlay fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden z-50">
        <div class="modal-content bg-white rounded-lg shadow-xl p-6 w-full max-w-2xl flex flex-col" style="max-height: 90vh;">
            <h3 class="text-2xl font-bold mb-2">내일을 위한 계획</h3>
            <p class="text-gray-600 mb-4">오늘 하루를 돌아보며 내일을 위한 이야기와 할 일을 기록하세요.</p>
            <div class="flex-grow overflow-y-auto pr-2">
                <label for="evening-story" class="block text-lg font-semibold text-gray-700 mb-2">내일의 이야기</label>
                <textarea id="evening-story" class="w-full h-32 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="내일은 어떤 하루가 될까요?"></textarea>
                
                <label class="block text-lg font-semibold text-gray-700 mt-4 mb-2">내일의 할 일</label>
                <div class="space-y-2 mb-2">
                    <div class="flex gap-2">
                        <input type="text" id="evening-task-input" class="flex-grow p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="할 일 내용...">
                        <input type="time" id="evening-time-input" class="p-2 border border-gray-300 rounded-md">
                        <button id="evening-add-task-btn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg">추가</button>
                    </div>
                     <button id="add-diet-plan-btn" class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2 px-4 rounded-lg w-full">식단 계획 추가</button>
                </div>
                <ul id="evening-task-list" class="space-y-1"></ul>
            </div>
            <div class="mt-4 flex justify-end gap-2 flex-shrink-0">
                <button id="evening-cancel-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg">취소</button>
                <button id="evening-save-btn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-lg">저장하고 하루 마무리</button>
            </div>
        </div>
    </div>
    
    <div id="routine-management-modal" class="modal-overlay fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden z-50">
        <div class="modal-content bg-white rounded-lg shadow-xl p-6 w-full max-w-4xl flex flex-col" style="height: 90vh;">
            <h3 class="text-2xl font-bold mb-4">루틴 관리</h3>
            <div class="flex-grow grid grid-cols-3 gap-6 overflow-hidden">
                <div class="col-span-1 flex flex-col border-r pr-4">
                    <ul id="routine-management-list" class="space-y-2 overflow-y-auto flex-grow"></ul>
                    <button id="add-new-routine-btn" class="w-full mt-4 bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg">새 루틴 추가</button>
                </div>
                <div id="routine-details-view" class="col-span-2 flex flex-col hidden">
                    <div class="flex justify-between items-center mb-4">
                        <input type="text" id="routine-name-input" class="text-xl font-bold p-1 border-b-2 border-transparent focus:border-blue-500 focus:outline-none">
                        <button id="delete-routine-btn" class="text-red-500 hover:text-red-700 font-bold">루틴 삭제</button>
                    </div>
                    <div class="flex-grow overflow-y-auto">
                        <ul id="routine-task-list" class="space-y-1"></ul>
                    </div>
                     <div class="flex gap-2 mt-4">
                        <input type="text" id="routine-task-content-input" class="flex-grow p-2 border border-gray-300 rounded-md" placeholder="새 할 일...">
                        <input type="time" id="routine-task-time-input" class="p-2 border border-gray-300 rounded-md">
                        <button id="add-routine-task-btn" class="bg-blue-500 text-white font-bold py-2 px-4 rounded-lg">추가</button>
                    </div>
                </div>
                <div id="no-routine-selected-view" class="col-span-2 flex items-center justify-center text-gray-500">
                    루틴을 선택하여 편집하세요.
                </div>
            </div>
             <div class="mt-4 flex justify-end">
                <button id="routine-management-close-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg">닫기</button>
            </div>
        </div>
    </div>


    <script>
    document.addEventListener('DOMContentLoaded', () => {

        const UIManager = {
            mainContainer: document.getElementById('main-container'),
            currentDateEl: document.getElementById('current-date'),

            init() {
                this.mainContainer.innerHTML = `
                    <section id="yesterday-panel" class="panel bg-white rounded-lg shadow-md"><header class="p-4 border-b border-gray-200 flex justify-between items-center cursor-pointer toggle-header"><div class="flex items-center gap-3 overflow-hidden"><svg class="w-8 h-8 text-gray-600 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0h18M12 14.25h.008v.008H12v-.008z" /><path stroke-linecap="round" stroke-linejoin="round" d="M10.125 18.75l1.125-1.125L15 21l3.75-3.75-1.125-1.125" stroke="green" stroke-width="2"/></svg><div class="header-text"><h2 class="text-xl font-semibold">어제 한 일</h2><span class="text-sm text-gray-500" id="yesterday-counter"></span></div></div></header><div id="yesterday-content" class="panel-content p-4 space-y-3 overflow-y-auto flex-grow"></div></section>
                    <section id="today-panel" class="panel bg-white rounded-lg shadow-md"><header class="p-4 border-b border-gray-200 flex justify-between items-center cursor-pointer toggle-header"><div class="flex items-center gap-3 overflow-hidden"><svg class="w-8 h-8 text-gray-600 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.125 2.25h-4.5c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125v-9M10.125 2.25h.375a9 9 0 019 9v.375M10.125 2.25A3.375 3.375 0 0113.5 5.625v1.5c0 .621.504 1.125 1.125 1.125h1.5a3.375 3.375 0 013.375 3.375M9 15l2.25 2.25L15 12" /></svg><div class="header-text"><h2 class="text-xl font-semibold">오늘 할 일</h2><span class="text-sm text-gray-500" id="today-counter"></span></div></div></header><div id="today-content" class="panel-content p-4 space-y-3 overflow-y-auto flex-grow"></div><footer class="panel-footer p-4 border-t border-gray-200"><div class="space-y-2"><button id="add-task-btn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg flex items-center justify-center">할 일 추가</button><div id="routine-section" class="p-2 bg-gray-50 rounded-md"></div></div></footer></section>
                    <section id="distractions-panel" class="panel bg-white rounded-lg shadow-md"><header class="p-4 border-b border-gray-200 flex justify-between items-center cursor-pointer toggle-header"><div class="flex items-center gap-3 overflow-hidden"><svg class="w-8 h-8 text-gray-600 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18v-5.25m0 0a6.01 6.01 0 001.5-.189m-1.5.189a6.01 6.01 0 01-1.5-.189m3.75 7.478a12.06 12.06 0 01-4.5 0m3.75 2.311a7.5 7.5 0 01-7.5 0c-1.255 0-2.42.232-3.523.654C2.025 16.532 1.5 17.618 1.5 18.749v1.138c0 1.13.525 2.216 1.408 2.923(2.321-1.006 3.032-2.209 3.032-3.483V18.75m2.13-1.604A3.375 3.375 0 0116.5 15h.252m-2.386-2.386a3.375 3.375 0 01-4.243 4.242M21.75 12a9.75 9.75 0 01-9.75 9.75c-3.53 0-6.72-1.89-8.497-4.727" /></svg><div class="header-text"><h2 class="text-xl font-semibold">딴 생각 & 영감</h2><span class="text-sm text-gray-500" id="distractions-counter"></span></div></div></header><div id="distractions-content" class="panel-content p-4 overflow-hidden flex-grow sticky-note-board"></div><footer class="panel-footer p-4 border-t border-gray-200"><button id="add-distraction-btn" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-4 rounded-lg flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>딴 생각 추가</button></footer></section>
                `;
            },
            render(currentLog, yesterdaysLog, routines) {
                if (!currentLog || !yesterdaysLog) {
                    this.mainContainer.innerHTML = `<div class="text-red-500">데이터를 불러올 수 없습니다. 데이터를 불러오거나 앱을 초기화하세요.</div>`; return;
                }
                this.currentDateEl.textContent = new Date(currentLog.date).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
                this.renderPanel('yesterday', yesterdaysLog.executionLog.completedTasks);
                this.renderPanel('today', currentLog.morningPlan.tasks, routines);
                this.renderPanel('distractions', currentLog.executionLog.distractions);
            },
            renderPanel(type, items, routines = {}) {
                const contentEl = document.getElementById(`${type}-content`);
                const counterEl = document.getElementById(`${type}-counter`);
                const footerEl = document.querySelector(`#${type}-panel .panel-footer`);
                contentEl.innerHTML = '';
                
                if (type === 'yesterday') {
                    items.forEach(item => contentEl.innerHTML += `<div class="flex items-center"><input type="checkbox" checked disabled class="h-5 w-5 text-green-500 rounded border-gray-300"><label class="ml-3 text-gray-500 line-through">${item.content}</label></div>`);
                    counterEl.textContent = `달성 ${items.length}`;
                } else if (type === 'today') {
                    const completedCount = items.filter(task => task.isCompleted).length;
                    items.forEach(item => {
                        contentEl.innerHTML += `
                        <div class="task-item flex items-center justify-between p-1 hover:bg-gray-50 rounded-md">
                            <div class="flex items-center flex-grow min-w-0">
                                <input type="checkbox" id="${item.id}" data-task-id="${item.id}" class="task-checkbox h-5 w-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500 flex-shrink-0" ${item.isCompleted ? 'checked' : ''}>
                                ${item.time ? `<span class="ml-3 text-sm font-medium text-blue-600">${item.time}</span>` : ''}
                                <label for="${item.id}" class="ml-2 truncate ${item.isCompleted ? 'line-through text-gray-500' : ''}">${item.content}</label>
                            </div>
                            <div class="item-actions flex-shrink-0 flex gap-2">
                                <button data-task-id="${item.id}" class="edit-task-btn text-gray-400 hover:text-blue-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.5L14.732 3.732z"></path></svg></button>
                                <button data-task-id="${item.id}" class="delete-task-btn text-gray-400 hover:text-red-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                            </div>
                        </div>`;
                    });
                    counterEl.textContent = `달성 ${completedCount} / 목표 ${items.length}`;

                    if (footerEl) {
                        const routineSection = footerEl.querySelector('#routine-section');
                        const routineCheckboxes = Object.keys(routines).map(name => {
                            const routineTasks = routines[name];
                            const isRoutineAdded = routineTasks.every(rt => items.some(t => t.content === rt.content));
                            return `
                                <div class="flex items-center">
                                    <input type="checkbox" id="routine-${name}" data-routine-name="${name}" class="routine-checkbox h-4 w-4 text-indigo-600 border-gray-300 rounded" ${isRoutineAdded ? 'checked' : ''}>
                                    <label for="routine-${name}" class="ml-2 block text-sm text-gray-900">${name}</label>
                                </div>
                            `;
                        }).join('');
                        routineSection.innerHTML = routineCheckboxes;

                        const addTaskBtn = footerEl.querySelector('#add-task-btn');
                        const endDayBtn = footerEl.querySelector('#end-day-btn');
                        if (items.length > 0 && completedCount === items.length) {
                            if (!endDayBtn) {
                                addTaskBtn.style.display = 'none';
                                routineSection.style.display = 'none';
                                const button = document.createElement('button');
                                button.id = 'end-day-btn';
                                button.className = 'w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-lg';
                                button.textContent = '하루 마무리하기';
                                footerEl.insertBefore(button, footerEl.firstChild);
                            }
                        } else {
                            addTaskBtn.style.display = 'flex';
                            routineSection.style.display = 'block';
                            if (endDayBtn) endDayBtn.remove();
                        }
                    }

                } else { // distractions
                    items.forEach(item => {
                        const note = document.createElement('div');
                        note.className = 'sticky-note';
                        note.dataset.id = item.id;
                        note.style.cssText = `top:${item.y}%; left:${item.x}%; transform:rotate(${item.rotation}deg);`;
                        
                        const content = item.content 
                            ? `<p class="note-content text-gray-700 p-2 h-full w-full overflow-y-auto">${item.content}</p>`
                            : `<textarea class="note-textarea p-2" placeholder="클릭해서 입력..."></textarea>`;
                        
                        note.innerHTML = `<div class="pin"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="#ff4b5a" d="M352 256c0-53-43-96-96-96s-96 43-96 96 43 96 96 96 96-43 96-96zm64 0c0 88.38-71.62 160-160 160S96 344.38 96 256 167.62 96 256 96s160 71.62 160 160z"/><path fill="#ff707e" d="M256 416c-88.38 0-160-71.62-160-160S167.62 96 256 96"/><path fill="#ffd15c" d="M256 0C181.71 0 128 53.71 128 128s64 96 64 96h128s64-24.29 64-96S330.29 0 256 0z"/><path fill="#f9b11e" d="M256 0v224h64s64-24.29 64-96S330.29 0 256 0z"/></svg></div>
                                        <button class="delete-note-btn bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center font-bold text-sm">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                                            </svg>
                                        </button>
                                        ${content}`;
                        
                        if (item.content) {
                            note.classList.add('draggable');
                            this.makeDraggable(note);
                        }
                        
                        contentEl.appendChild(note);
                    });
                    counterEl.textContent = `기록 ${items.length}`;
                }
            },
            makeDraggable(element) {
                if (!element.classList.contains('draggable')) return;
                let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
                element.onmousedown = (e) => {
                    if (e.target.tagName === 'P' || e.target.tagName === 'TEXTAREA' || e.target.closest('button')) return;
                    e.preventDefault();
                    pos3 = e.clientX; pos4 = e.clientY;
                    document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
                    document.onmousemove = (ev) => {
                        ev.preventDefault();
                        pos1 = pos3 - ev.clientX;
                        pos2 = pos4 - ev.clientY;
                        pos3 = ev.clientX;
                        pos4 = ev.clientY;
                        
                        const board = element.parentElement;
                        const newTop = Math.max(0, Math.min(board.clientHeight - element.clientHeight, element.offsetTop - pos2));
                        const newLeft = Math.max(0, Math.min(board.clientWidth - element.clientWidth, element.offsetLeft - pos1));

                        element.style.top = newTop + "px";
                        element.style.left = newLeft + "px";
                    };
                };
            }
        };

        const ModalManager = {
            modal: document.getElementById('input-modal'),
            title: document.getElementById('modal-title'),
            textarea: document.getElementById('modal-textarea'),
            timeInput: document.getElementById('modal-time-input'),
            timeContainer: document.getElementById('modal-time-container'),
            saveBtn: document.getElementById('modal-save-btn'),
            cancelBtn: document.getElementById('modal-cancel-btn'),
            resolve: null,

            init() {
                this.cancelBtn.addEventListener('click', () => this.hide());
                this.modal.addEventListener('click', (e) => {
                    if (e.target === this.modal) this.hide();
                });
            },

            show(title, initialValue = { content: '', time: '' }, placeholder = '내용을 입력하세요...', options = { showTime: true }) {
                return new Promise((resolve) => {
                    this.resolve = resolve;
                    this.title.textContent = title;
                    this.textarea.value = initialValue.content;
                    this.textarea.placeholder = placeholder;

                    if (options.showTime) {
                        this.timeContainer.style.display = 'block';
                        this.timeInput.value = initialValue.time;
                    } else {
                        this.timeContainer.style.display = 'none';
                    }
                    
                    this.modal.classList.remove('hidden');
                    this.textarea.focus();

                    this.saveBtn.onclick = () => {
                        const value = {
                            content: this.textarea.value.trim(),
                            time: options.showTime ? this.timeInput.value : null
                        };
                        this.hide(value);
                    };
                });
            },

            hide(value = null) {
                this.modal.classList.add('hidden');
                if (this.resolve) this.resolve(value);
                this.resolve = null;
            }
        };
        
        const EveningModalManager = {
            modal: document.getElementById('evening-modal'),
            storyEl: document.getElementById('evening-story'),
            taskInputEl: document.getElementById('evening-task-input'),
            timeInputEl: document.getElementById('evening-time-input'),
            addTaskBtn: document.getElementById('evening-add-task-btn'),
            addDietPlanBtn: document.getElementById('add-diet-plan-btn'),
            taskListEl: document.getElementById('evening-task-list'),
            saveBtn: document.getElementById('evening-save-btn'),
            cancelBtn: document.getElementById('evening-cancel-btn'),
            tempTasks: [],
            resolve: null,

            init(routines) {
                this.routines = routines;
                this.cancelBtn.addEventListener('click', () => this.hide());
                this.addTaskBtn.addEventListener('click', () => this.addTask());
                this.addDietPlanBtn.addEventListener('click', () => this.addDietPlan());
                this.taskInputEl.addEventListener('keydown', (e) => {
                    if(e.key === 'Enter') {
                        e.preventDefault();
                        this.addTask();
                    }
                });
                this.taskListEl.addEventListener('click', (e) => {
                    const deleteBtn = e.target.closest('.delete-evening-task-btn');
                    if(deleteBtn) {
                        const taskIndex = parseInt(deleteBtn.dataset.taskIndex, 10);
                        this.removeTask(taskIndex);
                    }
                });
            },
            show() {
                return new Promise((resolve) => {
                    this.resolve = resolve;
                    this.tempTasks = [];
                    this.storyEl.value = '';
                    this.taskInputEl.value = '';
                    this.timeInputEl.value = '';
                    this.renderTasks();
                    this.modal.classList.remove('hidden');
                    this.storyEl.focus();

                    this.saveBtn.onclick = () => {
                        const plan = {
                            story: this.storyEl.value.trim(),
                            tasks: this.tempTasks
                        };
                        this.hide(plan);
                    };
                });
            },
            hide(value = null) {
                this.modal.classList.add('hidden');
                if (this.resolve) this.resolve(value);
                this.resolve = null;
            },
            addTask() {
                const content = this.taskInputEl.value.trim();
                const time = this.timeInputEl.value;
                if(content) {
                    this.tempTasks.push({ content, time });
                    this.renderTasks();
                    this.taskInputEl.value = '';
                    this.timeInputEl.value = '';
                }
                this.taskInputEl.focus();
            },
            addDietPlan() {
                const dietTasks = this.routines["건강 루틴"] || [];
                const newTasks = dietTasks.filter(dietTask => !this.tempTasks.some(t => t.content === dietTask.content));
                this.tempTasks.push(...newTasks);
                this.renderTasks();
            },
            removeTask(index) {
                this.tempTasks.splice(index, 1);
                this.renderTasks();
            },
            renderTasks() {
                this.tempTasks.sort((a, b) => {
                    if (a.time && b.time) return a.time.localeCompare(b.time);
                    if (a.time) return -1;
                    if (b.time) return 1;
                    return 0;
                });
                this.taskListEl.innerHTML = this.tempTasks.map((task, index) => `
                    <li class="flex justify-between items-center bg-gray-100 p-2 rounded-md">
                        <div>
                            ${task.time ? `<span class="font-medium text-blue-600 mr-2">${task.time}</span>` : ''}
                            <span>${task.content}</span>
                        </div>
                        <button data-task-index="${index}" class="delete-evening-task-btn font-bold text-red-500 hover:text-red-700">&times;</button>
                    </li>
                `).join('');
            }
        };

        const RoutineManager = {
            modal: document.getElementById('routine-management-modal'),
            listEl: document.getElementById('routine-management-list'),
            detailsView: document.getElementById('routine-details-view'),
            noSelectedView: document.getElementById('no-routine-selected-view'),
            nameInput: document.getElementById('routine-name-input'),
            taskListEl: document.getElementById('routine-task-list'),
            addNewBtn: document.getElementById('add-new-routine-btn'),
            deleteRoutineBtn: document.getElementById('delete-routine-btn'),
            taskContentInput: document.getElementById('routine-task-content-input'),
            taskTimeInput: document.getElementById('routine-task-time-input'),
            addTaskBtn: document.getElementById('add-routine-task-btn'),
            closeBtn: document.getElementById('routine-management-close-btn'),
            
            routines: {},
            selectedRoutine: null,
            onSave: null,

            init(onSaveCallback) {
                this.onSave = onSaveCallback;
                this.closeBtn.addEventListener('click', () => this.hide());
                this.addNewBtn.addEventListener('click', () => this.addNewRoutine());
                this.deleteRoutineBtn.addEventListener('click', () => this.deleteSelectedRoutine());
                this.addTaskBtn.addEventListener('click', () => this.addTaskToSelectedRoutine());
                this.nameInput.addEventListener('change', (e) => this.updateSelectedRoutineName(e.target.value));

                this.listEl.addEventListener('click', (e) => {
                    const item = e.target.closest('.routine-list-item');
                    if (item) this.selectRoutine(item.dataset.name);
                });

                this.taskListEl.addEventListener('click', (e) => {
                    const deleteBtn = e.target.closest('.delete-routine-task-btn');
                    if(deleteBtn) {
                        const index = parseInt(deleteBtn.dataset.index, 10);
                        this.deleteTaskFromSelectedRoutine(index);
                    }
                });
            },
            async addNewRoutine() {
                const result = await ModalManager.show('새 루틴 추가', { content: '' }, '루틴 이름을 입력하세요...', { showTime: false });
                const name = result ? result.content : null;
                if (name && !this.routines[name]) {
                    this.routines[name] = [];
                    this.selectRoutine(name);
                    this.onSave(this.routines);
                }
            },
            show(routines) {
                this.routines = JSON.parse(JSON.stringify(routines)); // Deep copy
                this.selectedRoutine = null;
                this.render();
                this.modal.classList.remove('hidden');
            },
            hide() {
                this.modal.classList.add('hidden');
            },
            render() {
                this.renderRoutineList();
                if (this.selectedRoutine) {
                    this.detailsView.classList.remove('hidden');
                    this.noSelectedView.classList.add('hidden');
                    this.renderRoutineDetails();
                } else {
                    this.detailsView.classList.add('hidden');
                    this.noSelectedView.classList.remove('hidden');
                }
            },
            renderRoutineList() {
                this.listEl.innerHTML = Object.keys(this.routines).map(name => `
                    <li class="routine-list-item p-2 rounded-md cursor-pointer hover:bg-gray-100 ${name === this.selectedRoutine ? 'selected' : ''}" data-name="${name}">
                        ${name}
                    </li>
                `).join('');
            },
            renderRoutineDetails() {
                this.nameInput.value = this.selectedRoutine;
                const tasks = this.routines[this.selectedRoutine];
                tasks.sort((a,b) => {
                    if(a.time && b.time) return a.time.localeCompare(b.time);
                    if(a.time) return -1;
                    if(b.time) return 1;
                    return 0;
                });

                this.taskListEl.innerHTML = tasks.map((task, index) => `
                    <li class="flex justify-between items-center bg-gray-100 p-2 rounded-md">
                        <div>
                            ${task.time ? `<span class="font-medium text-blue-600 mr-2">${task.time}</span>` : ''}
                            <span>${task.content}</span>
                        </div>
                        <button data-index="${index}" class="delete-routine-task-btn font-bold text-red-500 hover:text-red-700">&times;</button>
                    </li>
                `).join('');
            },
            selectRoutine(name) {
                this.selectedRoutine = name;
                this.render();
            },
            deleteSelectedRoutine() {
                if (this.selectedRoutine && confirm(`'${this.selectedRoutine}' 루틴을 정말 삭제하시겠습니까?`)) {
                    delete this.routines[this.selectedRoutine];
                    this.selectedRoutine = null;
                    this.render();
                    this.onSave(this.routines);
                }
            },
            updateSelectedRoutineName(newName) {
                if (!newName || !this.selectedRoutine || newName === this.selectedRoutine) return;
                if (this.routines[newName]) {
                    alert('이미 존재하는 이름입니다.');
                    this.nameInput.value = this.selectedRoutine;
                    return;
                }
                this.routines[newName] = this.routines[this.selectedRoutine];
                delete this.routines[this.selectedRoutine];
                this.selectedRoutine = newName;
                this.render();
                this.onSave(this.routines);
            },
            addTaskToSelectedRoutine() {
                const content = this.taskContentInput.value.trim();
                const time = this.taskTimeInput.value;
                if (content && this.selectedRoutine) {
                    this.routines[this.selectedRoutine].push({ content, time });
                    this.taskContentInput.value = '';
                    this.taskTimeInput.value = '';
                    this.renderRoutineDetails();
                    this.onSave(this.routines);
                }
            },
            deleteTaskFromSelectedRoutine(index) {
                if (this.selectedRoutine) {
                    this.routines[this.selectedRoutine].splice(index, 1);
                    this.renderRoutineDetails();
                    this.onSave(this.routines);
                }
            }
        };

        const StorageManager = {
            KEY: 'DAILY_LOOP_DATA',
            save(data) { try { localStorage.setItem(this.KEY, JSON.stringify(data)); } catch (e) { console.error("Error saving to localStorage", e); } },
            load() { try { const data = localStorage.getItem(this.KEY); return data ? JSON.parse(data) : null; } catch (e) { console.error("Error loading from localStorage", e); return null; } },
            clear() { localStorage.removeItem(this.KEY); }
        };

        const DailyLoopManager = {
            createLog(dateString) { return { date: dateString, morningPlan: { storyFromYesterday: "", tasks: [] }, executionLog: { completedTasks: [], distractions: [] }, eveningPlan: { storyForTomorrow: "", tasksForTomorrow: [] } }; },
            addTask(log, { content, time }) { const newTask = { id: crypto.randomUUID(), content, time, isCompleted: false, priority: log.morningPlan.tasks.length }; return { ...log, morningPlan: { ...log.morningPlan, tasks: [...log.morningPlan.tasks, newTask] } }; },
            toggleRoutine(log, routineName, add, routines) {
                const routineTasks = routines[routineName];
                if (!routineTasks) return log;
                if (add) {
                    const existingContents = new Set(log.morningPlan.tasks.map(t => t.content));
                    const newTasks = routineTasks.filter(rt => !existingContents.has(rt.content)).map(rt => ({ ...rt, id: crypto.randomUUID(), isCompleted: false, priority: log.morningPlan.tasks.length }));
                    return { ...log, morningPlan: { ...log.morningPlan, tasks: [...log.morningPlan.tasks, ...newTasks] } };
                } else {
                    const routineContents = new Set(routineTasks.map(rt => rt.content));
                    const filteredTasks = log.morningPlan.tasks.filter(t => !routineContents.has(t.content));
                    return { ...log, morningPlan: { ...log.morningPlan, tasks: filteredTasks } };
                }
            },
            toggleTask(log, taskId) { const updatedTasks = log.morningPlan.tasks.map(task => task.id === taskId ? { ...task, isCompleted: !task.isCompleted } : task); return { ...log, morningPlan: { ...log.morningPlan, tasks: updatedTasks } }; },
            editTask(log, taskId, { content, time }) { const updatedTasks = log.morningPlan.tasks.map(task => task.id === taskId ? { ...task, content, time } : task); return { ...log, morningPlan: { ...log.morningPlan, tasks: updatedTasks } }; },
            deleteTask(log, taskId) { const updatedTasks = log.morningPlan.tasks.filter(task => task.id !== taskId); return { ...log, morningPlan: { ...log.morningPlan, tasks: updatedTasks } }; },
            addDistraction(log) { const newDistraction = { id: crypto.randomUUID(), content: "", timestamp: new Date(), x: 10, y: 10, rotation: Math.random() * 4 - 2 }; return { ...log, executionLog: { ...log.executionLog, distractions: [...log.executionLog.distractions, newDistraction] } }; },
            updateDistraction(log, id, content) { const updatedDistractions = log.executionLog.distractions.map(d => d.id === id ? { ...d, content } : d); return { ...log, executionLog: { ...log.executionLog, distractions: updatedDistractions } }; },
            deleteDistraction(log, id) { const updatedDistractions = log.executionLog.distractions.filter(d => d.id !== id); return { ...log, executionLog: { ...log.executionLog, distractions: updatedDistractions } }; },
            updateEveningPlan(log, { story, tasks }) {
                const newTasks = tasks.map(({ content, time }, index) => ({ id: crypto.randomUUID(), content, time, isCompleted: false, priority: index }));
                return { ...log, eveningPlan: { storyForTomorrow: story, tasksForTomorrow: newTasks }};
            }
        };
        
        const App = {
            state: { allLogs: {}, routines: {}, today: new Date() },
            
            init() {
                UIManager.init();
                ModalManager.init();
                EveningModalManager.init(this.state.routines);
                RoutineManager.init((newRoutines) => {
                    this.state.routines = newRoutines;
                    this.saveAndRender();
                });
                this.loadState();
                this.addEventListeners();
                this.render();
            },
            
            loadState() {
                const data = StorageManager.load();
                if (data && data.allLogs && data.routines) {
                    this.state.allLogs = data.allLogs;
                    this.state.routines = data.routines;
                } else {
                    this.createInitialData();
                }
                const todayStr = this.getDateString(this.state.today);
                if (!this.state.allLogs[todayStr]) this.createNewDay();
            },

            createNewDay() {
                const todayStr = this.getDateString(this.state.today);
                const yesterdayStr = this.getDateString(new Date(this.state.today.getTime() - 86400000));
                const yesterdaysLog = this.state.allLogs[yesterdayStr];
                
                const newTodayLog = DailyLoopManager.createLog(todayStr);
                if (yesterdaysLog) {
                    newTodayLog.morningPlan = { 
                        storyFromYesterday: yesterdaysLog.eveningPlan.storyForTomorrow, 
                        tasks: yesterdaysLog.eveningPlan.tasksForTomorrow 
                    };
                }
                this.state.allLogs[todayStr] = newTodayLog;
            },

            createInitialData() {
                this.state.routines = {
                    "건강 루틴": [
                        { content: "식단(채움): 올리브유 2숟가락, 모닝너츠 1봉", time: "12:00" },
                        { content: "영양제(핵심): 오메가3, 강황, 비타민D, 코엔자임Q10", time: "12:00" },
                        { content: "식단(조절): 렌틸콩 300g, 올리브유 5, 프로틴, 베리류", time: "18:00" },
                        { content: "생활(기반): 7-8시간 수면 및 스트레스 관리", time: "" },
                        { content: "식단(비움): 16시간 이상 공복 유지", time: "" }
                    ]
                };

                const todayStr = this.getDateString(this.state.today);
                const yesterdayStr = this.getDateString(new Date(this.state.today.getTime() - 86400000));
                
                const mockYesterday = DailyLoopManager.createLog(yesterdayStr);
                mockYesterday.executionLog.completedTasks.push({ id: 'mock-y-1', content: '4대 건강 목표 전략을 수립했습니다', isCompleted: true, priority: 0 });
                mockYesterday.eveningPlan.storyForTomorrow = "린매스업, 항노화, 세포 및 뇌 건강 극대화를 위한 통합 전략 실행 첫날";
                mockYesterday.eveningPlan.tasksForTomorrow = this.state.routines["건강 루틴"].map((task, index) => ({...task, id: `health-task-${index}`, isCompleted: false, priority: index }));
                
                this.state.allLogs = { [yesterdayStr]: mockYesterday };
                this.createNewDay();
                StorageManager.save(this.state);
            },

            saveAndRender() { StorageManager.save(this.state); this.render(); },
            getDateString(date) { return date.toISOString().split('T')[0]; },
            render() {
                const todayStr = this.getDateString(this.state.today);
                const yesterdayStr = this.getDateString(new Date(this.state.today.getTime() - 86400000));
                const currentLog = this.state.allLogs[todayStr];

                if (currentLog) {
                    currentLog.morningPlan.tasks.sort((a, b) => {
                        if (a.time && b.time) return a.time.localeCompare(b.time);
                        if (a.time) return -1;
                        if (b.time) return 1;
                        return a.priority - b.priority;
                    });
                }
                
                UIManager.render(currentLog, this.state.allLogs[yesterdayStr], this.state.routines);
            },

            addEventListeners() {
                document.getElementById('add-task-btn').addEventListener('click', async () => {
                    const result = await ModalManager.show('오늘 할 일 추가', {content: '', time: ''}, '오늘 끝내야 할 일은 무엇인가요?');
                    if (result && result.content) {
                        const todayStr = this.getDateString(this.state.today);
                        this.state.allLogs[todayStr] = DailyLoopManager.addTask(this.state.allLogs[todayStr], result);
                        this.saveAndRender();
                    }
                });
                
                document.getElementById('manage-routines-btn').addEventListener('click', () => {
                    RoutineManager.show(this.state.routines);
                });
                
                document.getElementById('main-container').addEventListener('change', (e) => {
                    if (e.target.matches('.routine-checkbox')) {
                        const routineName = e.target.dataset.routineName;
                        const add = e.target.checked;
                        const todayStr = this.getDateString(this.state.today);
                        this.state.allLogs[todayStr] = DailyLoopManager.toggleRoutine(this.state.allLogs[todayStr], routineName, add, this.state.routines);
                        this.saveAndRender();
                    }
                });

                document.getElementById('add-distraction-btn').addEventListener('click', () => {
                    const todayStr = this.getDateString(this.state.today);
                    this.state.allLogs[todayStr] = DailyLoopManager.addDistraction(this.state.allLogs[todayStr]);
                    this.saveAndRender();
                });

                document.getElementById('distractions-content').addEventListener('focusout', (e) => {
                    if (e.target.matches('.note-textarea')) {
                        const noteEl = e.target.closest('.sticky-note');
                        const id = noteEl.dataset.id;
                        const content = e.target.value.trim();
                        const todayStr = this.getDateString(this.state.today);

                        if (content) {
                           this.state.allLogs[todayStr] = DailyLoopManager.updateDistraction(this.state.allLogs[todayStr], id, content);
                        } else {
                           this.state.allLogs[todayStr] = DailyLoopManager.deleteDistraction(this.state.allLogs[todayStr], id);
                        }
                        this.saveAndRender();
                    }
                });

                document.getElementById('distractions-content').addEventListener('dblclick', (e) => {
                    if(e.target.matches('.note-content')) {
                        const noteEl = e.target.closest('.sticky-note');
                        const id = noteEl.dataset.id;
                        const todayStr = this.getDateString(this.state.today);
                        const distraction = this.state.allLogs[todayStr].executionLog.distractions.find(d => d.id === id);
                        e.target.outerHTML = `<textarea class="note-textarea p-2">${distraction.content}</textarea>`;
                        const textarea = noteEl.querySelector('textarea');
                        textarea.focus();
                        textarea.select();
                    }
                });
                
                document.getElementById('main-container').addEventListener('click', async (e) => {
                    const todayStr = this.getDateString(this.state.today);
                    let stateChanged = false;

                    const taskCheckbox = e.target.closest('.task-checkbox');
                    const editTaskBtn = e.target.closest('.edit-task-btn');
                    const deleteTaskBtn = e.target.closest('.delete-task-btn');
                    const toggleHeader = e.target.closest('.toggle-header');
                    const deleteNoteBtn = e.target.closest('.delete-note-btn');
                    const endDayBtn = e.target.closest('#end-day-btn');

                    if (taskCheckbox) {
                        const taskId = taskCheckbox.dataset.taskId;
                        this.state.allLogs[todayStr] = DailyLoopManager.toggleTask(this.state.allLogs[todayStr], taskId);
                        stateChanged = true;
                    } else if (toggleHeader) {
                        toggleHeader.closest('.panel').classList.toggle('collapsed');
                    } else if (editTaskBtn) {
                        const taskId = editTaskBtn.dataset.taskId;
                        const task = this.state.allLogs[todayStr].morningPlan.tasks.find(t => t.id === taskId);
                        const result = await ModalManager.show('할 일 수정', { content: task.content, time: task.time });
                        if (result && result.content !== undefined) {
                            this.state.allLogs[todayStr] = DailyLoopManager.editTask(this.state.allLogs[todayStr], taskId, result);
                            stateChanged = true;
                        }
                    } else if (deleteTaskBtn) {
                        const taskId = deleteTaskBtn.dataset.taskId;
                        if (confirm('이 할 일을 정말 삭제하시겠습니까?')) {
                            this.state.allLogs[todayStr] = DailyLoopManager.deleteTask(this.state.allLogs[todayStr], taskId);
                            stateChanged = true;
                        }
                    } else if (deleteNoteBtn) {
                        const noteId = deleteNoteBtn.closest('.sticky-note').dataset.id;
                        if (confirm('이 메모를 정말 삭제하시겠습니까?')) {
                             this.state.allLogs[todayStr] = DailyLoopManager.deleteDistraction(this.state.allLogs[todayStr], noteId);
                             stateChanged = true;
                        }
                    } else if (endDayBtn) {
                        const plan = await EveningModalManager.show(this.state.routines);
                        if(plan) {
                            this.state.allLogs[todayStr] = DailyLoopManager.updateEveningPlan(this.state.allLogs[todayStr], plan);
                            alert("오늘도 수고하셨습니다. 내일의 계획이 저장되었습니다.");
                            stateChanged = true;
                        }
                    }
                    if(stateChanged) this.saveAndRender();
                });

                document.getElementById('export-btn').addEventListener('click', () => {
                    const data = StorageManager.load();
                    if (!data) { alert('내보낼 데이터가 없습니다.'); return; }
                    if (confirm('데이터를 파일로 내보내고 브라우저의 모든 기록을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) {
                        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = `daily_loop_backup_${this.getDateString(new Date())}.json`;
                        a.click();
                        URL.revokeObjectURL(a.href);
                        
                        StorageManager.clear();
                        alert('데이터를 내보내고 모든 기록을 삭제했습니다.');
                        location.reload();
                    }
                });
                
                const importFileEl = document.getElementById('import-file');
                document.getElementById('import-btn').addEventListener('click', () => importFileEl.click());
                importFileEl.addEventListener('change', (event) => {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = JSON.parse(e.target.result);
                            if (!data.allLogs || !data.routines) throw new Error('Invalid data format');
                            if (confirm('기존 데이터를 덮어쓰고 불러오시겠습니까?')) {
                                StorageManager.save(data);
                                alert('데이터를 성공적으로 불러왔습니다.');
                                location.reload();
                            }
                        } catch (err) {
                            alert('파일을 읽는 데 실패했습니다. 유효한 JSON 파일인지 확인하세요.');
                        }
                    };
                    reader.readAsText(file);
                });
            },
        };

        App.init();
    });
    </script>
</body>
</html>
