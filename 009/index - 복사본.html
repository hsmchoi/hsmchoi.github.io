<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6;">

  <!-- Definitions for reusable elements -->
  <defs>
    <rect id="panel-bg" width="240" height="380" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <style>
      .title { font-size: 18px; font-weight: bold; fill: #11182c; }
      .task-text { font-size: 14px; fill: #374151; transition: fill 0.3s ease; }
      .strikethrough { text-decoration: line-through; fill: #9ca3af; }
      .narration { font-size: 20px; font-weight: bold; fill: #1f293d; text-anchor: middle; }
      .note { font-size: 12px; fill: #374151; }
      .edit-icon { cursor: pointer; }
    </style>
    <g id="icon-edit">
        <path fill="#9ca3af" d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.13,5.12L18.88,8.87M3,17.25V21H6.75L17.81,9.94L14.06,6.19L3,17.25Z" />
    </g>
  </defs>

  <!-- Panels Layout -->
  <g id="panels">
    <!-- Yesterday Panel -->
    <g transform="translate(20, 50)">
      <use href="#panel-bg"/>
      <text x="120" y="30" text-anchor="middle" class="title">어제 한 일</text>
      <g id="yesterday-tasks">
        <text x="20" y="70" class="task-text strikethrough">✓ 앱 프로토타입 완성</text>
        <text x="20" y="95" class="task-text strikethrough">✓ UI 디자인 구상</text>
      </g>
    </g>
    <!-- Today Panel -->
    <g transform="translate(280, 50)">
      <use href="#panel-bg"/>
      <text x="120" y="30" text-anchor="middle" class="title">오늘 할 일</text>
      <g id="today-tasks">
        <text x="20" y="70" class="task-text">□ SVG 시각화 구상</text>
        <text id="task-to-edit" x="20" y="95" class="task-text">□ 최종 기능 통합</text>
        <use href="#icon-edit" x="220" y="80" width="16" height="16" class="edit-icon" opacity="0">
            <animate id="anim_icon_fadein" attributeName="opacity" from="0" to="1" dur="0.5s" begin="anim_start.end+1.5s" fill="freeze"/>
            <animate attributeName="opacity" from="1" to="0" dur="0.5s" begin="anim_edit_text.end+0.5s" fill="freeze"/>
        </use>
      </g>
    </g>
    <!-- Distractions Panel -->
    <g transform="translate(540, 50)">
      <use href="#panel-bg"/>
      <text x="120" y="30" text-anchor="middle" class="title">딴 생각 & 영감</text>
      <g id="distractions-notes"/>
    </g>
  </g>

  <!-- Narration Text -->
  <text id="narration-text" x="400" y="25" class="narration" opacity="0">
    <animate id="anim_start" attributeName="opacity" from="0" to="1" dur="1s" begin="0s" fill="freeze"/>
    아침: 어제의 성취를 확인하고 오늘을 시작합니다
  </text>
  
  <!-- === ANIMATION SEQUENCE === -->

  <!-- 1. Edit task -->
  <set attributeName="textContent" to="계획은 더 명확하게 다듬을 수 있습니다" begin="anim_icon_fadein.begin" target="#narration-text"/>
  <animate id="anim_edit_text" attributeName="fill" from="#374151" to="#3b82f6" dur="0.5s" begin="anim_icon_fadein.end" repeatCount="2" target="#task-to-edit"/>
  <set attributeName="textContent" to="□ 최종 기능 통합 및 테스트" begin="anim_edit_text.end" target="#task-to-edit"/>
  
  <!-- 2. Start completing tasks -->
  <set attributeName="textContent" to="오후: 계획한 일들을 실행합니다" begin="anim_edit_text.end+1s" target="#narration-text"/>
  <animate id="anim_check1" attributeName="class" to="task-text strikethrough" begin="anim_edit_text.end+1.5s" fill="freeze" target="#today-tasks > text:nth-child(1)"/>
  <set attributeName="textContent" to="✓ SVG 시각화 구상" begin="anim_check1.begin" target="#today-tasks > text:nth-child(1)"/>

  <!-- 3. Distraction appears -->
  <g id="new-distraction" opacity="0" transform="translate(560, 100)">
    <rect width="100" height="60" rx="5" fill="#fffde7" stroke="#fef08a"/>
    <text x="10" y="25" class="note">다음 프로젝트</text>
    <text x="10" y="45" class="note">아이디어 구상</text>
    <animate id="anim_distraction_fadein" attributeName="opacity" from="0" to="1" dur="1s" begin="anim_check1.end+0.5s" fill="freeze"/>
  </g>
  <set attributeName="textContent" to="실행 중 떠오른 영감은 바로 기록합니다" begin="anim_distraction_fadein.begin" target="#narration-text"/>

  <!-- 4. Complete edited task -->
  <animate id="anim_check2" attributeName="class" to="task-text strikethrough" begin="anim_distraction_fadein.end+0.5s" fill="freeze" target="#task-to-edit"/>
  <set attributeName="textContent" to="✓ 최종 기능 통합 및 테스트" begin="anim_check2.begin" target="#task-to-edit"/>

  <!-- 5. Evening plan -->
  <set attributeName="textContent" to="저녁: 오늘을 마무리하고 내일을 준비합니다" begin="anim_check2.end+1s" target="#narration-text"/>
  <g id="evening-plan" opacity="0">
      <rect x="280" y="50" width="240" height="380" fill="#4c51bf" rx="12"/>
      <text x="400" y="80" text-anchor="middle" class="title" fill="white">내일 계획</text>
      <text x="300" y="120" fill="white" class="task-text">새로운 하루를 위한 이야기...</text>
      <text x="300" y="160" fill="white" class="task-text">□ 사용자 피드백 반영</text>
      <text x="300" y="185" fill="white" class="task-text">□ 코드 리팩토링</text>
      <animate id="anim_evening" attributeName="opacity" from="0" to="1" dur="1s" begin="anim_check2.end+2s" fill="freeze"/>
  </g>

  <!-- 6. Loop / Transition to next day -->
  <rect x="0" y="0" width="800" height="450" fill="#f3f4f6" opacity="0">
      <animate id="anim_fadeout" attributeName="opacity" from="0" to="1" dur="1.5s" begin="anim_evening.end+2s" fill="freeze"/>
  </rect>
  <set attributeName="textContent" to="그리고 다음 날, 어제의 성취가 오늘의 기반이 됩니다" begin="anim_fadeout.begin" target="#narration-text"/>

  <!-- 7. Show next day's state -->
  <g opacity="0">
    <!-- New Yesterday Panel -->
    <g transform="translate(20, 50)">
      <use href="#panel-bg"/>
      <text x="120" y="30" text-anchor="middle" class="title">어제 한 일</text>
        <text x="20" y="70" class="task-text strikethrough">✓ SVG 시각화 구상</text>
        <text x="20" y="95" class="task-text strikethrough">✓ 최종 기능 통합 및 테스트</text>
    </g>
    <!-- New Today Panel -->
    <g transform="translate(280, 50)">
      <use href="#panel-bg"/>
      <text x="120" y="30" text-anchor="middle" class="title">오늘 할 일</text>
      <text x="20" y="70" class="task-text">□ 사용자 피드백 반영</text>
      <text x="20" y="95" class="task-text">□ 코드 리팩토링</text>
    </g>
    <!-- New Distractions Panel (empty) -->
    <g transform="translate(540, 50)">
      <use href="#panel-bg"/>
      <text x="120" y="30" text-anchor="middle" class="title">딴 생각 & 영감</text>
    </g>
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="anim_fadeout.end" fill="freeze"/>
  </g>

</svg>
