<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>일상의 저울</title>

    <style>
        :root {
            --bg-primary: #f1f5f9; --bg-secondary: #fff; --text-primary: #1e293b; --text-secondary: #475569;

            --overlay-bg: rgba(0,0,0,0.5); --overlay-shape: #fff; --pulsing-indicator-start: #0f766e;
            --pulsing-indicator-end: #134e4a; --toast-bg: #1e293b; --toast-text: #e2e8f0;
        }
        .dark {
            --bg-primary: #0f172a; --bg-secondary: #1e293b; --text-primary: #e2e8f0; --text-secondary: #94a3b8;
            --text-highlight: #2dd4bf; --success-flash-bg: #15803d; --fail-flash-bg: #b91c1c;
            --overlay-bg: rgba(0,0,0,0.7); --overlay-shape: #e2e8f0; --pulsing-indicator-start: #134e4a;
            --pulsing-indicator-end: #0f766e; --toast-bg: #e2e8f0; --toast-text: #1e293b;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent;
            overflow: hidden; background-color: var(--bg-primary); color: var(--text-primary);
            transition: background-color .3s ease, color .3s ease;
            touch-action: none;
        }
        #game-container { position: relative; background-color: var(--bg-secondary); transition: background-color .3s ease; perspective: 1000px; }
        .text-secondary { color: var(--text-secondary); }
        .text-highlight { color: var(--text-highlight); }
        .game-board { position: relative; width: 100%; max-width: 500px; height: 300px; margin: 20px auto 0; display: flex; justify-content: center; align-items: flex-end; }
        #scale-fulcrum { width: 20px; height: 100px; background-color: #888; clip-path: polygon(0% 100%, 100% 100%, 50% 0%); position: absolute; bottom: 0; z-index: 1; }
        #scale-beam { width: 90%; height: 12px; background-color: #666; border-radius: 6px; position: absolute; bottom: 100px; left: 5%; transform-origin: center center; transition: transform 0.5s cubic-bezier(.4,0,.2,1); display: flex; justify-content: space-between; align-items: center; }
        .scale-pan { width: 120px; height: 80px; border: 4px solid #666; border-top: none; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; position: absolute; bottom: 100%; display: flex; flex-wrap: wrap; align-content: flex-start; justify-content: center; padding: 8px; gap: 4px; background: rgba(0,0,0,0.05); }
        #left-pan { left: -60px; }
        #right-pan { right: -60px; }
        .pan-string { position: absolute; top: 10px; width: 4px; height: 20px; background-color: #666; }
        .pan-string.left { left: 10px; }
        .pan-string.right { right: 10px; }
        .draggable-item { width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; cursor: grab; user-select: none; position: absolute; z-index: 10; transition: transform 0.1s ease; }
        .draggable-item.dragging { transform: scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 100; cursor: grabbing; }
        .item-x { background-color: #fb7185; }
        .item-1 { background-color: #38bdf8; }
        .item-fixed { background-color: #a8a29e; cursor: not-allowed; }
        #inventory { display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; border: 2px dashed #cbd5e1; border-radius: 1rem; padding: 1rem; min-height: 80px; position: relative; }
        .inventory-slot { position: relative; width: 60px; height: 60px; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; color: white; }
        @keyframes shake-horizontal { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake-horizontal { animation: shake-horizontal .3s ease-in-out; }
        @keyframes success-flash { 0%, 100% { background-color: var(--bg-primary); } 50% { background-color: var(--success-flash-bg); } }
        .success-flash { animation: success-flash .4s ease-in-out; }
        @keyframes gameOverFlash { 0%, 100% { background-color: var(--bg-primary); } 50% { background-color: var(--fail-flash-bg); } }
        .game-over-flash { animation: gameOverFlash .4s ease-in-out; }
        @keyframes levelUp { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); color: #fde047; } }
        .level-up { animation: levelUp .5s ease-in-out; }
        #toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .toast { display: flex; align-items: center; gap: 10px; padding: 12px 20px; background-color: var(--toast-bg); color: var(--toast-text); border-radius: 9999px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1); animation: toast-in .5s cubic-bezier(.25,.46,.45,.94) both; }
        @keyframes toast-in { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .achievement-progress-bar { height: 6px; background-color: #e5e7eb; border-radius: 3px; overflow: hidden; }
        .achievement-progress { height: 100%; background-color: var(--text-highlight); transition: width .5s ease; }
        .achievement-locked { filter: grayscale(1); opacity: 0.6; }
    </style>
</head>

    <script>
