    <style>
        :root {

            --rhythm-bg: #e2e8f0; --rhythm-line: #475569; --rhythm-playhead: #ef4444;
            --hp-bg: #e5e7eb; --hp-fill: #22c55e; --hp-damage: #ef4444;
        }
        .dark {
            --bg-primary: #0f172a; --bg-secondary: #1e293b; --text-primary: #e2e8f0; --text-secondary: #94a3b8;
            --text-highlight: #2dd4bf; --success-flash-bg: #15803d; --fail-flash-bg: #b91c1c; --overlay-bg: rgba(0, 0, 0, 0.7);
            --rhythm-bg: #334155; --rhythm-line: #94a3b8; --rhythm-playhead: #f87171;

        .game-button { position: relative; display: flex; align-items: center; justify-content: center; border-radius: 0.75rem; cursor: pointer; transition: transform 0.1s ease, box-shadow 0.2s ease, background-color 0.5s ease, filter 0.2s ease-in-out, opacity 0.2s ease-in-out; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
        .game-button:active { transform: scale(0.96); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .game-button.active { transform: scale(1.03); filter: brightness(1.25); }
        .disabled { pointer-events: none; }
        .game-button-symbol { width: 60%; height: 60%; fill: rgba(255, 255, 255, 0.7); pointer-events: none; transition: transform 0.2s ease; }
        .game-button.active .game-button-symbol { transform: scale(1.1); }
        @keyframes shake-vertical { 0%, 100% { transform: translateY(0); } 25% { transform: translateY(-3px); } 75% { transform: translateY(3px); } }
        .shake-vertical { animation: shake-vertical 0.2s ease-in-out; }
        @keyframes success-flash { 0%, 100% { background-color: var(--bg-primary); } 50% { background-color: var(--success-flash-bg); } }
        .success-flash { animation: success-flash 0.4s ease-in-out; }
        @keyframes gameOverFlash { 0%, 100% { background-color: var(--bg-primary); } 50% { background-color: var(--fail-flash-bg); } }
        .game-over-flash { animation: gameOverFlash 0.4s ease-in-out; }
        @keyframes shrink-out { from { transform: scale(1); opacity: 0.7; } to { transform: scale(0); opacity: 0; } }
        .shrinking-circle { animation: shrink-out 1.5s cubic-bezier(0.7, 0, 0.3, 1) forwards; }
        @keyframes pulse { 0% { filter: brightness(1.2); } 100% { filter: brightness(1); } }
        .pulse { animation: pulse 0.4s ease-in-out; }
        @keyframes get-ready-pulse { 0%, 100% { background-color: var(--bg-secondary); } 50% { background-color: var(--bg-primary); } }
        .get-ready-pulse { animation: get-ready-pulse 1.5s ease-in-out; }
        @keyframes pulsing-indicator { 0% { background-color: var(--text-highlight); } 50% { filter: brightness(0.8); } 100% { background-color: var(--text-highlight); } }
        #in-progress-indicator { animation: pulsing-indicator 2s infinite ease-in-out; }
        #countdown-overlay { background-color: var(--overlay-bg); pointer-events: none; }
        #countdown-shape { width: 80%; padding-bottom: 80%; border-radius: 50%; border: 6px solid var(--overlay-shape); }
        .desaturated { filter: saturate(40%); opacity: 0.6; }
        @keyframes announcer-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        #announcer { animation: announcer-float 3s ease-in-out infinite; }
        @keyframes text-focus-in { 0% { filter: blur(12px); opacity: 0; } 100% { filter: blur(0px); opacity: 1; } }
        .text-focus-in { animation: text-focus-in 1s cubic-bezier(0.550, 0.085, 0.680, 0.530) both; }
        @keyframes text-fade-in { from { opacity: 0; } to { opacity: 1; } }
        .text-fade-in { animation: text-fade-in 1.2s cubic-bezier(0.390, 0.575, 0.565, 1.000) 0.5s both; }
        @keyframes fragment-lost-text { 0% { transform: translateY(0) scale(1); opacity: 1; color: #ef4444; } 100% { transform: translateY(-50px) scale(0.8); opacity: 0; } }
        .fragment-lost-animation { animation: fragment-lost-text 1.5s ease-out forwards; }
        @keyframes timing-feedback-anim { 0% { transform: translateY(0) scale(0.8); opacity: 1; } 80% { transform: translateY(-30px) scale(1.1); opacity: 1; } 100% { transform: translateY(-40px) scale(1); opacity: 0; } }
        #timing-feedback { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); font-size: 1.5rem; font-weight: 800; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .feedback-perfect { color: #84cc16; } .feedback-great { color: #22d3ee; } .feedback-good { color: #a8a29e; } .feedback-miss, .feedback-wrong { color: #ef4444; }
        .timing-feedback-animation { animation: timing-feedback-anim 0.5s ease-out forwards; }
        #rhythm-display { background-color: var(--rhythm-bg); transition: background-color 0.3s ease; }
        @keyframes heart-break { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); } 100% { transform: scale(0.5) rotate(45deg); opacity: 0; } }
        .heart-break { animation: heart-break 0.5s ease-in-out forwards; }
        @keyframes camp-flash { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); color: #fde047; } }
        .camp-flash { animation: camp-flash 0.6s ease-in-out; }
        .spark { position: absolute; background-color: var(--text-highlight); border-radius: 50%; }
        .symbol-face { transition: opacity 0.2s; }
        .mouth { transition: d 0.2s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        @keyframes dance {
            0%, 100% { transform: translate(0, 0) rotate(0); }
            25% { transform: translate(var(--dance-x, 1px), var(--dance-y, -2px)) rotate(-1deg); }
            75% { transform: translate(calc(var(--dance-x, 1px) * -1), calc(var(--dance-y, -2px) * -0.5)) rotate(1deg); }
        }
        .dancing .game-button-symbol { animation: dance 1s infinite ease-in-out; }
        .combo-1 { --dance-x: 1px; --dance-y: -2px; }
        .combo-2 { --dance-x: 2px; --dance-y: -4px; }
        .combo-3 { --dance-x: 4px; --dance-y: -6px; }
        .bestiary-clear-mark {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-highlight);
            background-color: var(--bg-secondary);
            padding: 0.1rem 0.4rem;
            border-radius: 9999px;
            border: 1px solid var(--text-highlight);
        }
        .game-board {
            width: 100%;
            max-width: 280px;
            aspect-ratio: 1 / 1;
        }
        #monster-hp-bar-bg { background-color: var(--hp-bg); }
        #monster-hp-bar-fill { background-color: var(--hp-fill); transition: width 0.3s ease-out; }
        #monster-hp-bar-damage { background-color: var(--hp-damage); transition: width 0.3s ease-out 0.2s; }
        @keyframes boss-warning {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(239, 68, 68, 0.5); }
        }
        .boss-warning-flash { animation: boss-warning 0.5s ease-in-out 3; }
        @keyframes monster-hit {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-1deg); }
            75% { transform: translateX(5px) rotate(1deg); }
        }
        .monster-hit-animation { animation: monster-hit 0.2s ease-in-out; }
        #main-container.paused {
            filter: grayscale(100%);
            transition: filter 0.3s ease-in-out;
        }
        @keyframes idle-bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .idle .game-button-symbol {
            animation: idle-bob 2s infinite ease-in-out;
        }
        #monster-icon.dancing {
            animation: idle-bob 1.5s infinite ease-in-out;
        }
    </style>

                updateUI();

                c++;
                 if (c > 15) {
                    gBd.classList.add('combo-3');
                    monsterIcon.classList.add('dancing');
                } else if (c > 8) {
                    gBd.classList.add('combo-2');
                } else if (c > 3) {
                    gBd.classList.add('combo-1');
                }

                if (pP.length === gP.length) {
                    iP = false;
                    lCS();
                } else {
                    iPC = false;
                }
            }

            function showTimingFeedback(judgement){const j=timingJudgement[judgement]||{text:"MISS",scoreMultiplier:0};timingFeedback.textContent=j.text;timingFeedback.className=`feedback-${judgement.toLowerCase()}`;timingFeedback.classList.add('timing-feedback-animation');timingFeedback.onanimationend=()=>{timingFeedback.classList.remove('timing-feedback-animation');timingFeedback.textContent=''}}
            
            async function lCS() {
                iP = false;
                gBd.classList.remove('dancing', 'idle', 'combo-1', 'combo-2', 'combo-3');
                monsterIcon.classList.remove('dancing');
                if (animationState.id) { cancelAnimationFrame(animationState.id); animationState.isRunning = false; }
                if (l === lostFragments.level) {
                    const recoveredAmount = lostFragments.amount;
                    unbankedFragments += recoveredAmount;
                    lostFragments = { amount: 0, level: -1 };
                }
                
                if (currentAntagonist.type === 'boss') {
                    let cleared = JSON.parse(localStorage.getItem('clearedBosses')) || [];
                    if (!cleared.includes(currentAntagonist.key)) {
                        cleared.push(currentAntagonist.key);
                        localStorage.setItem('clearedBosses', JSON.stringify(cleared));
                    }
                }

                updateUI();
                await sl(1200);
                
                if (roundCounter % 4 === 0) { // Boss cleared, now it's a checkpoint
                    sBC();
                    await sRS(true);
                    await nL();
                } else {
                    ssI.triggerAttackRelease('C5', '8n');
                    b.classList.add('success-flash');
                    gBd.classList.add('shake-vertical');
                    setTimeout(() => {
                        b.classList.remove('success-flash');
                        gBd.classList.remove('shake-vertical')
                    }, 400);
                    await sl(800);
                    await nL();
                }
            }
            
            async function playerFail() {
                iP = false;
                gBd.classList.remove('dancing', 'idle', 'combo-1', 'combo-2', 'combo-3');
                monsterIcon.classList.remove('dancing');
                if (animationState.id) { cancelAnimationFrame(animationState.id); animationState.isRunning = false; }
                
                let encountered = JSON.parse(localStorage.getItem('encounteredAntagonists')) || [];
                if (!encountered.includes(currentAntagonist.key)) {
                    encountered.push(currentAntagonist.key);
                    localStorage.setItem('encounteredAntagonists', JSON.stringify(encountered));
                }

                const heartToBreak = livesDisplay.lastChild;
                if (heartToBreak) {
                    heartToBreak.classList.add('heart-break');
                    heartToBreak.addEventListener('animationend', () => heartToBreak.remove(), { once: true });
                }
                lives--;
                eS.triggerAttackRelease(['C3', 'C#3'], '4n');
                b.classList.add('game-over-flash');
                setTimeout(() => b.classList.remove('game-over-flash'), 400);
                if (unbankedFragments > 0) {
                    lostFragments = { amount: unbankedFragments, level: l };
                    const lostText = document.createElement('div');
                    lostText.textContent = `-${unbankedFragments}`;
                    lostText.className = 'absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-4xl font-bold fragment-lost-animation pointer-events-none';
                    gBd.appendChild(lostText);
                    setTimeout(() => lostText.remove(), 1500);
                    unbankedFragments = 0;
                }
                updateUI();
                if (lives > 0) {
                    await sl(1500);
                    bD.classList.add('camp-flash');
                    bD.addEventListener('animationend', () => bD.classList.remove('camp-flash'), { once: true });
                    
                    await sGRS();
                    
                    l = bCL;
                    roundCounter = bCL;
                    gP = [];
                    for(let i=1; i<=bCL; i++){
                        selectNewAntagonist((i % 4) === 0);
                        for(let j=0; j < currentAntagonist.maxHp; j++) gP.push(getNextStep(gP));
                    }
                    pP = [];
                    c = 0;

                    await sl(1000);
                    await nL();
                } else {
                    trueGameOver();
                }
            }

            function trueGameOver(){
                if (animationState.id) { cancelAnimationFrame(animationState.id); animationState.isRunning = false; }
                mC.classList.remove('game-started');
                sHS();
                pB('gameover');
                unbankedFragmentsDisplay.textContent=`최종 점수: ${totalScore.toLocaleString()}`;
                iPI.classList.add('hidden');
                sB.classList.remove('hidden','disabled');
                sB.textContent='다시 시작';
                pauseBtn.classList.add('hidden');
                iP=false;iPC=false
            }
            
            function cTP(tL) {
                return tL;
            }

            async function sRS(isBossClear){return new Promise(async resolve=>{
                const announcer = document.getElementById('announcer');
                const title = document.getElementById('rest-title');
                const subtitle = document.getElementById('rest-subtitle');

                if (isBossClear) {
                    title.textContent = "보스 처치!";
                    subtitle.textContent = "화톳불에서 다음 도전을 준비합니다.";
                    announcer.innerHTML = `<svg viewBox="0 0 100 100"><path d="M50 10 L60 40 L90 40 L65 60 L75 90 L50 70 L25 90 L35 60 L10 40 L40 40 Z" fill="gold"/></svg>`;
                } else {
                    title.textContent = `다음 상대: ${currentAntagonist.name}`;
                    subtitle.textContent = currentAntagonist.description;
                    announcer.innerHTML = currentAntagonist.icon;
                    announcer.style.color = currentAntagonist.color;
                }
                
                rSM.classList.remove('hidden');
                
                const cB_rest=document.getElementById('rest-continue-btn');
                cB_rest.onclick=()=>{rSM.classList.add('hidden');resolve()}
            })}
            async function sGRS(){await sl(500);gBd.classList.add('get-ready-pulse');const n=Tone.now();sBS.triggerAttackRelease("C5","16n",n);sBS.triggerAttackRelease("C5","16n",n+0.4);sBS.triggerAttackRelease("C5","16n",n+0.8);sBS.triggerAttackRelease("G5","8n",n+1.2);await sl(1500);gBd.classList.remove('get-ready-pulse');await sl(500)}
            
            function createSpark(color) {
                const container = sparkSide === 'left' ? sparkEffectLeft : sparkEffectRight;
                for (let i = 0; i < 5; i++) {
                    const spark = document.createElement('div');
                    spark.className = 'spark';
                    const size = Math.random() * 8 + 4;
                    spark.style.width = `${size}px`;
                    spark.style.height = `${size}px`;
                    spark.style.backgroundColor = color;
                    const startY = 50 + (Math.random() * 40 - 20);
                    spark.style.top = `${startY}%`;
                    const duration = Math.random() * 0.4 + 0.4;
                    if (sparkSide === 'left') {
                        spark.style.left = '90%';
                        const endX = Math.random() * -100 - 50;
                        const endY = (Math.random() * 200) - 100;
                        spark.animate([{ transform: 'translate(0, 0) scale(1)', opacity: 1 },{ transform: `translate(${endX}px, ${endY}px) scale(0)`, opacity: 0 }],{ duration: duration * 1000, easing: 'ease-out' });
                    } else {
                        spark.style.right = '90%';
                        const endX = Math.random() * 100 + 50;
                        const endY = (Math.random() * 200) - 100;
                        spark.animate([{ transform: 'translate(0, 0) scale(1)', opacity: 1 },{ transform: `translate(${endX}px, ${endY}px) scale(0)`, opacity: 0 }],{ duration: duration * 1000, easing: 'ease-out' });
                    }
                    container.appendChild(spark);
                    setTimeout(() => spark.remove(), duration * 1000);
                }
                sparkSide = sparkSide === 'left' ? 'right' : 'left';
            }

            const ns=['C4','E4','G4','A4'];
            function aB(buttonIndex,isP){
                const btn = gBs[buttonIndex];
                const originalId = buttonMapping[buttonIndex];
                if(!isP){btn.classList.remove('desaturated')}
                btn.classList.add('active');
                const gS=15+c*4;const gSp=2+c*1;
                btn.style.boxShadow=`0 0 ${gS}px ${gSp}px var(--glow-color)`;
                if(isP){
                    const n=Tone.Frequency(ns[originalId]).transpose(c*1);
                    s.triggerAttackRelease(n,'8n');
                    createSpark(buttonProperties[originalId].color);
                }else{
                    s.triggerAttackRelease(ns[originalId],'8n')
                }
                setTimeout(()=>{btn.classList.remove('active');btn.style.boxShadow='';if(!isP){btn.classList.add('desaturated')}},300)
            }

            function sC(isHS){confetti({particleCount:isHS?300:150,spread:isHS?180:90,origin:{y:0.6},gravity:0.8,ticks:300,scalar:1.2})}
            
            bestiaryBtn.addEventListener('click', () => {
                populateBestiary();
                bestiaryModal.classList.remove('hidden');
            });
            closeBestiaryBtn.addEventListener('click', () => {
                bestiaryModal.classList.add('hidden');
            });

            function populateBestiary() {
                bestiaryList.innerHTML = '';
                const encountered = JSON.parse(localStorage.getItem('encounteredAntagonists')) || [];
                const cleared = JSON.parse(localStorage.getItem('clearedBosses')) || [];

                for (const key in antagonistProfiles) {
                    const profile = antagonistProfiles[key];
                    const isEncountered = encountered.includes(profile.key);
                    const isCleared = profile.type === 'boss' && cleared.includes(profile.key);
                    
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-lg flex items-start gap-4 relative ${isEncountered ? 'bg-slate-100 dark:bg-slate-700' : 'bg-slate-200 dark:bg-slate-900 filter grayscale opacity-60'}`;
                    
                    const iconContainer = document.createElement('div');
                    iconContainer.className = 'w-16 h-16 flex-shrink-0';
                    iconContainer.style.color = isEncountered ? profile.color : 'gray';
                    iconContainer.innerHTML = isEncountered ? profile.icon : `<svg viewBox="0 0 100 100"><text x="50" y="65" font-size="50" text-anchor="middle" fill="currentColor">?</text></svg>`;

                    const textContainer = document.createElement('div');
                    textContainer.className = 'text-left';
                    
                    const name = document.createElement('h3');
                    name.className = 'font-bold text-lg';
                    name.textContent = isEncountered ? profile.name : '???';
                    
                    const description = document.createElement('p');
                    description.className = 'text-sm text-secondary mt-1';
                    description.textContent = isEncountered ? profile.description : '이 적과 마주쳐 패배하면 정보를 얻을 수 있습니다.';

                    textContainer.appendChild(name);
                    textContainer.appendChild(description);
                    card.appendChild(iconContainer);
                    card.appendChild(textContainer);

                    if(isCleared) {
                        const clearMark = document.createElement('div');
                        clearMark.className = 'bestiary-clear-mark';
                        clearMark.textContent = 'CLEAR';
                        card.appendChild(clearMark);
                    }

                    bestiaryList.appendChild(card);
                }
            }

            settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
            closeSettingsBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));
            bgmVolumeSlider.addEventListener('input', (e) => {
                bgmVolume.volume.value = e.target.value;
                localStorage.setItem('bgmVolume', e.target.value);
            });
            sfxVolumeSlider.addEventListener('input', (e) => {
                sfxVolume.volume.value = e.target.value;
                localStorage.setItem('sfxVolume', e.target.value);
            });

            pauseBtn.addEventListener('click', () => {
                if (!iP) return;
                isPaused = true;
                pauseStartTime = performance.now();
                Tone.Transport.pause();
                gBd.classList.remove('dancing', 'idle');
                mC.classList.add('paused');
                pauseModal.style.display = 'flex';
            });

            resumeBtn.addEventListener('click', () => {
                if (!isPaused) return;
                const pauseDuration = performance.now() - pauseStartTime;
                patternStartTime += pauseDuration;
                animationState.startTime += pauseDuration;
                isPaused = false;
                Tone.Transport.start();
                gBd.classList.add('idle');
                mC.classList.remove('paused');
                pauseModal.style.display = 'none';
                requestAnimationFrame(animate);
            });

            function animate(){
                if (isPaused || !animationState.isRunning) return;
                
                const W=rhythmCanvas.offsetWidth;const H=rhythmCanvas.offsetHeight;
                const elapsedTime=performance.now()-animationState.startTime;
                let progress=elapsedTime/currentPatternDuration;

                if(animationState.mode==='input'){progress%=1.0}else{progress=Math.min(progress,1)}
                rhythmCtx.clearRect(0,0,W,H);
                rhythmCtx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--rhythm-line')+'30';
                rhythmCtx.lineWidth=1;
                for(let i=0;i<8;i++){const y=(H/8)*i;rhythmCtx.beginPath();rhythmCtx.moveTo(0,y);rhythmCtx.lineTo(W,y);rhythmCtx.stroke()}
                rhythmCtx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--rhythm-line');
                rhythmCtx.lineWidth=2;
                rhythmCtx.beginPath();
                rhythmCtx.moveTo(0,H/2);
                for(let i=0;i<gameTimings.length;i++){const time=gameTimings[i];const prevTime=i>0?gameTimings[i-1]:0;const x=(time/currentPatternDuration)*W;const prevX=(prevTime/currentPatternDuration)*W;rhythmCtx.lineTo(prevX,H/2);rhythmCtx.lineTo(x,H/2);rhythmCtx.lineTo(x,H/4);rhythmCtx.lineTo(x,H*3/4);rhythmCtx.lineTo(x,H/2)}
                rhythmCtx.lineTo(W,H/2);
                rhythmCtx.stroke();
                for(let i=0;i<gameTimings.length;i++){const x=(gameTimings[i]/currentPatternDuration)*W;rhythmCtx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--rhythm-line');rhythmCtx.lineWidth=4;rhythmCtx.beginPath();rhythmCtx.moveTo(x,H/4);rhythmCtx.lineTo(x,H*3/4);rhythmCtx.stroke()}
                if(animationState.mode==='input'){for(let i=0;i<playerTimings.length;i++){const x=(playerTimings[i]%currentPatternDuration/currentPatternDuration)*W;rhythmCtx.fillStyle='#ffffff';rhythmCtx.beginPath();rhythmCtx.arc(x,H/2,5,0,Math.PI*2);rhythmCtx.fill()}}
                const playheadX=progress*W;
                rhythmCtx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--rhythm-playhead');
                rhythmCtx.lineWidth=2;
                rhythmCtx.beginPath();
                rhythmCtx.moveTo(playheadX,0);
                rhythmCtx.lineTo(playheadX,H);
                rhythmCtx.stroke();
                
                if((animationState.mode === 'playback' && progress >= 1)) {
                    animationState.isRunning = false;
                } else {
                    animationState.id = requestAnimationFrame(animate);
                }
            }

            function startRhythmAnimation(mode, totalDuration) {
                animationState.startTime = performance.now();
                animationState.isRunning = true;
                animationState.mode = mode;
                currentPatternDuration = totalDuration;
                if (animationState.id) cancelAnimationFrame(animationState.id);
                animate();
            }

        });
    </script>
