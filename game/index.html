<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>패턴 기억 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem; /* 24px */
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
        }
        .game-button {
            border-radius: 1rem; /* 16px */
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        .game-button:active {
            transform: scale(0.95);
        }
        .game-button.active {
            transform: scale(1.05);
            box-shadow: 0 0 20px 5px var(--glow-color);
            filter: brightness(1.2);
        }
        .disabled {
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body class="bg-stone-100 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md text-center">
        <h1 class="text-4xl font-bold text-stone-800 mb-2">패턴 기억 게임</h1>
        <p class="text-stone-600 mb-6">집중력을 기르고, 뇌를 훈련하세요. 빛나는 순서를 기억하고 따라 해보세요.</p>

        <div id="game-container" class="bg-white p-6 rounded-2xl shadow-lg">
            <div class="flex justify-between items-center mb-6">
                <div id="level-display" class="text-xl font-bold text-stone-700">레벨: 0</div>
                <button id="start-btn" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-6 rounded-lg transition-colors">시작</button>
            </div>

            <div class="game-board mx-auto">
                <div id="button-0" class="game-button bg-red-400" style="--glow-color: rgba(248, 113, 113, 0.7);"></div>
                <div id="button-1" class="game-button bg-blue-400" style="--glow-color: rgba(96, 165, 250, 0.7);"></div>
                <div id="button-2" class="game-button bg-yellow-400" style="--glow-color: rgba(250, 204, 21, 0.7);"></div>
                <div id="button-3" class="game-button bg-green-400" style="--glow-color: rgba(74, 222, 128, 0.7);"></div>
            </div>
            
            <div id="message-display" class="mt-6 text-lg font-medium text-stone-500 h-7"></div>
        </div>
        
        <footer class="mt-8 text-sm text-stone-500">
            <p>이 게임은 '도파민 항상성 복원 프로토콜'의 원칙에 따라 설계되었습니다.</p>
        </footer>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const levelDisplay = document.getElementById('level-display');
        const messageDisplay = document.getElementById('message-display');
        const gameButtons = document.querySelectorAll('.game-button');

        let gamePattern = [];
        let playerPattern = [];
        let level = 0;
        let isPlayerTurn = false;
        let synth;

        // Initialize Tone.js synth
        function createSynth() {
            if (!synth) {
                synth = new Tone.Synth({
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 }
                }).toDestination();
            }
        }

        const notes = ['C4', 'E4', 'G4', 'A4'];

        startBtn.addEventListener('click', () => {
            createSynth();
            // Start audio context on user interaction
            if (Tone.context.state !== 'running') {
                Tone.context.resume();
            }
            startGame();
        });

        gameButtons.forEach(button => {
            button.addEventListener('click', (event) => {
                if (!isPlayerTurn) return;
                const clickedButtonId = parseInt(event.target.id.split('-')[1]);
                playerTurn(clickedButtonId);
            });
        });

        function startGame() {
            gamePattern = [];
            level = 0;
            startBtn.classList.add('disabled');
            messageDisplay.textContent = '';
            nextLevel();
        }

        function nextLevel() {
            playerPattern = [];
            level++;
            levelDisplay.textContent = `레벨: ${level}`;
            isPlayerTurn = false;
            
            const nextButton = Math.floor(Math.random() * 4);
            gamePattern.push(nextButton);

            playPattern();
        }

        function playPattern() {
            messageDisplay.textContent = '패턴을 기억하세요...';
            let delay = 0;
            gamePattern.forEach((buttonId, index) => {
                setTimeout(() => {
                    activateButton(buttonId);
                }, delay);
                delay += 700; // Time between flashes
            });

            setTimeout(() => {
                isPlayerTurn = true;
                messageDisplay.textContent = '당신 차례입니다!';
            }, delay);
        }

        function activateButton(id) {
            const button = document.getElementById(`button-${id}`);
            button.classList.add('active');
            synth.triggerAttackRelease(notes[id], '8n');
            setTimeout(() => {
                button.classList.remove('active');
            }, 350); // Flash duration
        }

        function playerTurn(id) {
            activateButton(id);
            playerPattern.push(id);
            checkAnswer(playerPattern.length - 1);
        }

        function checkAnswer(currentIndex) {
            if (playerPattern[currentIndex] !== gamePattern[currentIndex]) {
                gameOver();
                return;
            }

            if (playerPattern.length === gamePattern.length) {
                if (isPlayerTurn) { // Ensure we don't trigger next level multiple times
                    isPlayerTurn = false;
                    messageDisplay.textContent = '성공!';
                    setTimeout(nextLevel, 1000);
                }
            }
        }

        function gameOver() {
            messageDisplay.textContent = `게임 오버! 최종 레벨: ${level - 1}`;
            startBtn.classList.remove('disabled');
            startBtn.textContent = '다시 시작';
            isPlayerTurn = false;
            // Play a dissonant chord for game over
            const dissonantSynth = new Tone.PolySynth(Tone.Synth).toDestination();
            dissonantSynth.triggerAttackRelease(['C3', 'C#3'], '4n');
        }
    </script>
</body>
</html>
