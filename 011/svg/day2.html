<svg width="340" height="600" viewBox="0 0 340 600" style="background-color: #ffffff; border: 1px solid #ccc; border-radius: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
<rect x="0" y="0" width="340" height="70" fill="#F8F8F8"/>
<path d="M15 35 L25 25 M15 35 L25 45" stroke="#6C63FF" stroke-width="2" stroke-linecap="round"/>
<text x="170" y="42" font-size="16" fill="#333" text-anchor="middle" font-weight="bold">Mission: #weekly-challenge</text>
<line x1="0" y1="70" x2="340" y2="70" stroke="#EAEAEA"/>

<foreignObject x="20" y="80" width="300" height="120">
    <div xmlns="[http://www.w3.org/1999/xhtml](http://www.w3.org/1999/xhtml)" style="color: #333; font-size: 14px; line-height: 1.5;">
        <p style="margin: 0; font-weight: bold; font-size: 18px; color: #1c1e21;">Challenge Day 2</p>
        <p style="margin: 5px 0 0 0; font-size: 15px; color: #606770;"><strong>테마:</strong> 사회적 연결: 동료의 의견에 공감하고 확장하기</p>
    </div>
</foreignObject>

<rect x="20" y="170" width="280" height="90" rx="15" fill="#F0F2F5"/>
<circle cx="40" cy="190" r="12" fill="#FFA726"/>
<text x="36" y="195" font-size="12" fill="white" font-weight="bold">C</text>
<text x="60" y="188" font-size="13" fill="#333" font-weight="bold">Chloe</text>
<foreignObject x="30" y="200" width="260" height="60">
    <p xmlns="[http://www.w3.org/1999/xhtml](http://www.w3.org/1999/xhtml)" style="font-size: 14px; color: #1c1e21; line-height: 1.4; margin: 0;">
        Hey team, for the new campaign, what if we focus on short-form video challenges on TikTok? I think it could create some real buzz.
    </p>
</foreignObject>

<foreignObject x="20" y="280" width="300" height="80">
    <div xmlns="[http://www.w3.org/1999/xhtml](http://www.w3.org/1999/xhtml)" style="color: #333; font-size: 14px; line-height: 1.5;">
        <p style="margin: 0; font-weight: bold;">Your Mission:</p>
        <p style="margin: 5px 0 0 0;">Chloe의 아이디어에 긍정적으로 반응하고, 당신의 생각을 덧붙여 건설적인 답변을 영어로 작성해보세요.</p>
    </div>
</foreignObject>

<rect x="0" y="520" width="340" height="80" fill="#F8F8F8"/>
<foreignObject x="20" y="535" width="250" height="50">
    <textarea id="replyText" placeholder="Write your reply here..." style="width: 100%; height: 30px; border: 1px solid #ddd; border-radius: 15px; padding: 5px 10px; font-size: 14px; resize: none;"></textarea>
</foreignObject>
<circle id="sendBtn" cx="300" cy="555" r="18" fill="#6C63FF" style="cursor: pointer;">
    <path d="M295 550 L305 555 L295 560 Z" fill="white"/>
</circle>

<script>
    const sendBtn = document.getElementById('sendBtn');
    const replyText = document.getElementById('replyText');

    sendBtn.addEventListener('click', () => {
        if (replyText.value.trim() !== "") {
            alert('Reply sent! Great job connecting with your teammate.');
            // In a real scenario, this would clear the textarea and show the sent message.
        } else {
            alert('Please write a reply first.');
        }
    });
</script>
</svg>
