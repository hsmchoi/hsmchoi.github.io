<svg width="340" height="700" viewBox="0 0 340 700" style="background-color: #ffffff; border: 1px solid #e0e0f0; border-radius: 25px; font-family: 'Pretendard', sans-serif;">
<defs>
<style>
.highlight-grammar { border-bottom: 2px solid #8BC34A; cursor: pointer; font-weight: 500;}
.highlight-style { border-bottom: 2px solid #ADA0FF; cursor: pointer; font-weight: 500;}
.card {
background-color: #F8F8FF; border-radius: 12px; padding: 12px; margin-bottom: 10px;
box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 13px;
}
.card-header { font-weight: bold; color: #5A5A7A; margin-bottom: 5px; }
.card-body { color: #4A4A6A; font-weight: 500; font-size: 14px;}
.card-reason { color: #7A7AB0; font-size: 12px; margin-top: 6px; border-top: 1px solid #EAEAEA; padding-top: 6px;}
.card-action {
background-color: #6C63FF; color: white; border: none; padding: 5px 10px;
border-radius: 7px; font-size: 12px; cursor: pointer; float: right;
}
</style>
</defs>

<rect x="0" y="0" width="340" height="60" fill="#F8F8FF" />
<text x="170" y="38" font-size="16" fill="#4A4A6A" text-anchor="middle" font-weight="bold">AI 피드백 조수 (AI Assistant)</text>
<line x1="0" y1="60" x2="340" y2="60" stroke="#EAEAEA"/>

<foreignObject x="15" y="75" width="150" height="610">
    <div xmlns="[http://www.w3.org/1999/xhtml](http://www.w3.org/1999/xhtml)" style="color: #4A4A6A; font-size: 15px; line-height: 1.8;">
        <p style="font-weight: bold; font-size: 16px; margin-bottom: 15px; color: #5A5A7A;">나의 포스팅</p>
        <p id="userText">
            I just read <span class="highlight-style">a article</span> on Forbes. I <span class="highlight-grammar">thinks</span> the author's point about team cohesion is very important. In my experience, <span class="highlight-grammar">flexible hours is</span> good for productivity.
        </p>
    </div>
</foreignObject>

<line x1="170" y1="60" x2="170" y2="700" stroke="#EAEAEA"/>

<foreignObject x="180" y="75" width="150" height="610">
    <div xmlns="[http://www.w3.org/1999/xhtml](http://www.w3.org/1999/xhtml)">
        <p style="font-weight: bold; font-size: 16px; margin-bottom: 15px; color: #5A5A7A;">수정 제안 (3)</p>
        
        <div class="card">
            <div class="card-header">Style</div>
            <div class="card-body">"a article" → "an article"</div>
            <div class="card-reason">Reason: 모음(a, e, i, o, u) 소리로 시작하는 단어 앞에는 'an'을 사용합니다.</div>
            <button class="card-action">적용</button>
        </div>

        <div class="card">
            <div class="card-header">Grammar</div>
            <div class="card-body">"thinks" → "think"</div>
            <div class="card-reason">Reason: 주어 'I'는 1인칭 단수이므로 동사 원형을 사용합니다.</div>
            <button class="card-action">적용</button>
        </div>

        <div class="card">
            <div class="card-header">Grammar</div>
            <div class="card-body">"hours is" → "hours are"</div>
             <div class="card-reason">Reason: 주어 'hours'가 복수이므로, 동사도 복수형 'are'를 사용해야 합니다.</div>
            <button class="card-action">적용</button>
        </div>

    </div>
</foreignObject>
</svg>
