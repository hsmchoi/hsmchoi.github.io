<svg width="340" height="680" viewBox="0 0 340 680" style="background-color: #ffffff; border: 1px solid #e0e0f0; border-radius: 25px; font-family: 'Pretendard', sans-serif;">
<rect x="0" y="0" width="340" height="60" fill="#F8F8FF" />
<text x="170" y="38" font-size="16" fill="#4A4A6A" text-anchor="middle" font-weight="bold">Challenge Day 4: 문제 해결</text>
<line x1="0" y1="60" x2="340" y2="60" stroke="#EAEAEA"/>

<foreignObject x="20" y="75" width="300" height="600">
    <div xmlns="[http://www.w3.org/1999/xhtml](http://www.w3.org/1999/xhtml)" style="color: #4A4A6A; font-size: 15px; line-height: 1.6;">
        <p style="font-weight: bold; font-size: 18px; margin-bottom: 15px; color: #5A5A7A;">📨 New Email Received</p>
        
        <div style="background-color: #F8F8FF; border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.05);">
            <p style="margin:0; font-size: 13px; color: #7A7AB0;">From: John Smith &lt;john.s@clientcorp.com&gt;</p>
            <p style="margin:0; font-size: 13px; color: #7A7AB0;">To: You</p>
            <p style="margin:5px 0 15px 0; font-weight: bold; font-size: 16px; color: #5A5A7A;">Subject: Quick question about the proposal</p>
            <p style="font-size: 14px; color: #4A4A6A; line-height: 1.5; margin-bottom: 10px;">
                Hi there,<br/><br/>
                Thanks for sending over the proposal. It looks great, but we were wondering if you could offer a 20% discount. A competitor offered us a similar price reduction.<br/><br/>
                Let me know what you can do.<br/><br/>
                Best,<br/>
                John
            </p>
        </div>

        <p style="font-weight: bold; font-size: 18px; margin-bottom: 10px; color: #5A5A7A;">🤔 Your Mission:</p>
        <p style="margin-bottom: 20px;">John에게 정중하지만 단호하게 할인이 어렵다는 답변을 보내세요. 동시에 좋은 관계를 유지하는 것이 중요합니다.</p>
        
        <textarea id="replyText" placeholder="Craft your reply email here..." style="width: 290px; height: 150px; border: 2px dashed #DADAFA; border-radius: 12px; padding: 12px; font-size: 14px; resize: none; color: #5A5A7A; background-color: #FFFAFE;"></textarea>
        
        <button id="sendBtn" style="width: 300px; padding: 15px; margin-top: 15px; background-color: #6C63FF; color: white; border: none; border-radius: 15px; font-size: 17px; font-weight: bold; cursor: pointer;">✈️ Send Reply</button>
    </div>
</foreignObject>

<script>
    const sendBtn = document.getElementById('sendBtn');
    const replyText = document.getElementById('replyText');

    sendBtn.addEventListener('click', () => {
        if (replyText.value.trim() !== "") {
            sendBtn.textContent = '✅ Reply Sent!';
            sendBtn.style.backgroundColor = '#4CAF50';
        } else {
            alert('Please write your reply first.');
        }
    });
</script>
</svg>
