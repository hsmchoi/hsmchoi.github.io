<svg width="340" height="620" viewBox="0 0 340 620" style="background-color: #ffffff; border: 1px solid #ccc; border-radius: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
<rect x="0" y="0" width="340" height="200" fill="#000000"/>
<image href="https://images.unsplash.com/photo-1517430816045-df4b7de11d1d?ixlib=rb-4.0.3&q=85&fm=jpg&crop=entropy&cs=srgb&w=600" x="0" y="0" width="340" height="200" opacity="0.5"/>
<text x="170" y="80" font-size="18" fill="white" text-anchor="middle" font-weight="bold">The Vibe Exchange</text>
<text x="170" y="115" font-size="22" fill="white" text-anchor="middle" font-weight="bold">Challenge Day 3</text>
<text x="170" y="140" font-size="16" fill="white" text-anchor="middle" opacity="0.9">콘텐츠 창작: 당신의 관점 더하기</text>

<foreignObject x="20" y="220" width="300" height="400">
    <div xmlns="http://www.w3.1999/xhtml" style="color: #333; font-size: 15px; line-height: 1.6;">
        <p style="font-weight: bold; font-size: 18px; margin-bottom: 10px; color: #1c1e21;">📰 Today's Article:</p>
        <div style="padding: 15px; background-color: #f0f2f5; border-radius: 8px; margin-bottom: 20px;">
            <p style="font-weight: bold; margin: 0 0 5px 0;">"Is Remote Work Here to Stay? A Deep Dive into the Future of Work"</p>
            <p style="font-size: 13px; color: #606770; margin: 0;">Source: Forbes</p>
        </div>

        <p style="font-weight: bold; font-size: 18px; margin-bottom: 10px; color: #1c1e21;">✍️ Your Mission:</p>
        <p style="margin-bottom: 20px;">위 아티클을 읽고, 당신의 생각이나 경험을 덧붙여 소셜 미디어(인스타그램, 블로그 등)에 공유할 짧은 영문 포스팅을 작성해보세요.</p>
        
        <textarea id="postText" placeholder="Craft your social media post here..." style="width: 290px; height: 120px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 14px; resize: none;"></textarea>
        
        <button id="createBtn" style="width: 300px; padding: 12px; margin-top: 15px; background-color: #6C63FF; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">Create My Post!</button>
    </div>
</foreignObject>

<script>
    const createBtn = document.getElementById('createBtn');
    const postText = document.getElementById('postText');

    createBtn.addEventListener('click', () => {
        if (postText.value.trim() !== "") {
            createBtn.textContent = 'Successfully Created!';
            createBtn.style.backgroundColor = '#4CAF50';
        } else {
            alert('Please write your post first.');
        }
    });
</script>
