<svg width="340" height="550" viewBox="0 0 340 550" style="background-color: #f0f2f5; border: 1px solid #ccc; border-radius: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
<rect x="0" y="0" width="340" height="550" rx="20" fill="#FFFFFF"/>
<rect x="0" y="0" width="340" height="160" fill="#6C63FF"/>

<text x="170" y="95" font-size="24" fill="white" text-anchor="middle" font-weight="bold">Daily Challenge: Day 1</text>
<text x="170" y="125" font-size="16" fill="white" text-anchor="middle" opacity="0.9">자아 표현: 나의 전문성 소개하기</text>

<foreignObject x="20" y="180" width="300" height="350">
    <div xmlns="[http://www.w3.org/1999/xhtml](http://www.w3.org/1999/xhtml)" style="color: #333; font-size: 15px; line-height: 1.6;">
        <p style="font-weight: bold; font-size: 18px; margin-bottom: 10px; color: #1c1e21;">🚀 Mission: 나만의 '15초 엘리베이터 피치' 만들기</p>
        <p style="margin-bottom: 20px;">링크드인이나 네트워킹 행사에서 처음 만난 해외 파트너에게 자신을 소개한다고 상상해보세요. 당신의 전문성을 15초 안에 전달할 수 있는 3~4 문장의 영어 자기소개를 작성하여 아래에 제출해주세요.</p>
        
        <p style="font-weight: bold; font-size: 16px; margin-bottom: 10px; color: #1c1e21;">💡 Inspirations (Click to View)</p>

            <p style="margin: 5px 0; padding: 8px; background-color: #f0f2f5; border-radius: 8px;">📄 Article: 실리콘밸리 자기소개 패턴 3가지</p>

        <button id="submitBtn" style="width: 300px; padding: 12px; margin-top: 10px; background-color: #6C63FF; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">Mission Complete!</button>

<script>
    const links = document.getElementById('links');
    const submitBtn = document.getElementById('submitBtn');

    links.addEventListener('click', () => {
        alert('Inspiration 링크를 확인합니다.');
    });
    
    submitBtn.addEventListener('click', () => {
        submitBtn.textContent = 'Submitted! Waiting for feedback...';
        submitBtn.style.backgroundColor = '#4CAF50';
    });
</script>
