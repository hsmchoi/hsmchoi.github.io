<!DOCTYPE html>
<html lang="ko" data-theme="golden-hour">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Momentum: Daily Life Logger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.iife.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css"/>
    
    <style>
        :root {
            --phi: 1.618;
            --font-size-base: 1rem;
            --font-size-s: calc(var(--font-size-base) / var(--phi));
            --font-size-m: var(--font-size-base);
            --font-size-l: calc(var(--font-size-base) * var(--phi));
            --font-size-xl: calc(var(--font-size-base) * var(--phi) * var(--phi));
            --space-unit: 8px;
            --space-xs: calc(var(--space-unit) / var(--phi));
            --space-s: var(--space-unit);
            --space-m: calc(var(--space-unit) * var(--phi));
            --space-l: calc(var(--space-unit) * var(--phi) * var(--phi));
            --space-xl: calc(var(--space-unit) * var(--phi) * var(--phi) * var(--phi));
            --space-xxl: calc(var(--space-unit) * var(--phi) * var(--phi) * var(--phi) * var(--phi));
            --radius-s: var(--space-s);
            --radius-m: var(--space-m);
            --radius-l: var(--space-l);
            --radius-full: 9999px; 
            --anim-dur-fast: 0.15s; 
            --anim-dur-norm: 0.25s; 
            --anim-dur-slow: 0.4s;
        }
        
        [data-theme="minimal-ink"] { --c-bg-primary: #FFFFFF; --c-bg-secondary: #F0F0F0; --c-bg-tertiary: #E0E0E0; --c-text-primary: #000000; --c-text-secondary: #555555; --c-accent-primary: #000000; --c-accent-secondary: #000000; --c-accent-tertiary: #000000; --c-accent-push: #000000; --c-accent-pull: #000000; --c-accent-leg: #000000; --c-border: #DDDDDD; --c-green: #000000; --c-shadow: rgba(0,0,0,0.1); --c-modal-backdrop: rgba(255, 255, 255, 0.8); --c-particle: #000000; --c-positive-glow: #757575; }
        [data-theme="material-expressive"] { --c-bg-primary: #1D1B20; --c-bg-secondary: #302D33; --c-bg-tertiary: #49454F; --c-text-primary: #F7F2FA; --c-text-secondary: #CAC4D0; --c-accent-primary: #BEA4F3; --c-accent-secondary: #F392B0; --c-accent-tertiary: #FFB593; --c-accent-push: var(--c-accent-secondary); --c-accent-pull: var(--c-accent-tertiary); --c-accent-leg: #97D7E4; --c-border: #49454F; --c-green: #81C784; --c-shadow: rgba(0,0,0,0.4); --c-modal-backdrop: rgba(29, 27, 32, 0.8); --c-particle: var(--c-accent-primary); --c-positive-glow: #FFE082; }
        [data-theme="material-you"] { --c-bg-primary: #1C1B1F; --c-bg-secondary: #49454E; --c-bg-tertiary: #36343B; --c-text-primary: #E6E1E5; --c-text-secondary: #CAC4CF; --c-accent-primary: #6750A4; --c-accent-push: #B3261E; --c-accent-pull: #625B71; --c-accent-leg: #7D5260; --c-border: #948F99; --c-green: #66BB6A; --c-shadow: rgba(0,0,0,0.3); --c-modal-backdrop: rgba(0,0,0,0.6); --c-particle: #D0BCFF; --c-positive-glow: #FFD700; }
        [data-theme="golden-hour"] { --c-bg-primary: #1C1B1A; --c-bg-secondary: #2C2A29; --c-bg-tertiary: #413E3C; --c-text-primary: #FDE8C9; --c-text-secondary: #A99F91; --c-accent-primary: #FF9500; --c-accent-push: #FF453A; --c-accent-pull: #00A9FF; --c-accent-leg: #AF52DE; --c-border: #524F4C; --c-green: #32D74B; --c-shadow: rgba(0,0,0,0.3); --c-modal-backdrop: rgba(0,0,0,0.85); --c-particle: var(--c-accent-primary); --c-positive-glow: #FFD700; }
        [data-theme="blueprint"] { --c-bg-primary: #0A192F; --c-bg-secondary: #172A46; --c-bg-tertiary: #303C55; --c-text-primary: #CCD6F6; --c-text-secondary: #8892B0; --c-accent-primary: #64FFDA; --c-accent-push: #FF6B6B; --c-accent-pull: #4EC9B0; --c-accent-leg: #C586C0; --c-border: #233554; --c-green: #64FFDA; --c-shadow: rgba(2,12,27,0.7); --c-modal-backdrop: rgba(10, 25, 47, 0.85); --c-particle: var(--c-accent-primary); --c-positive-glow: #FFFF00; }
        [data-theme="zen-ink"] { --c-bg-primary: #F5F5F5; --c-bg-secondary: #FFFFFF; --c-bg-tertiary: #E8E8E8; --c-text-primary: #1E1E1E; --c-text-secondary: #7A7A7A; --c-accent-primary: #B71C1C; --c-accent-push: #D32F2F; --c-accent-pull: #1976D2; --c-accent-leg: #388E3C; --c-border: #D1D1D1; --c-green: #43A047; --c-shadow: rgba(0,0,0,0.1); --c-modal-backdrop: rgba(255, 255, 255, 0.85); --c-particle: #424242; --c-positive-glow: #B71C1C; }
        [data-theme="evergreen"] { --c-bg-primary: #1A2E28; --c-bg-secondary: #244038; --c-bg-tertiary: #36594C; --c-text-primary: #E6EBE9; --c-text-secondary: #A2B5AD; --c-accent-primary: #A3BF60; --c-accent-push: #E87D3E; --c-accent-pull: #5E9887; --c-accent-leg: #C7A58F; --c-border: #3F6B5C; --c-green: #A3BF60; --c-shadow: rgba(0,0,0,0.3); --c-modal-backdrop: rgba(26, 46, 40, 0.85); --c-particle: var(--c-accent-primary); --c-positive-glow: #E6EBE9; }
        [data-theme="dopamine-rush"] { --c-bg-primary: #101010; --c-bg-secondary: #1F1F1F; --c-bg-tertiary: #333333; --c-text-primary: #EAEAEA; --c-text-secondary: #AAAAAA; --c-accent-primary: #F000B8; --c-accent-push: #FF005C; --c-accent-pull: #00F6FF; --c-accent-leg: #00FF94; --c-border: #444444; --c-green: #00FF94; --c-shadow: rgba(0,0,0,0.5); --c-modal-backdrop: rgba(16, 16, 16, 0.9); --c-particle: #FFFFFF; --c-positive-glow: #F000B8; }

        * { box-sizing: border-box; }
        html, body { overscroll-behavior: none; width: 100%; height: 100%; overflow: hidden; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: var(--c-bg-primary); color: var(--c-text-primary); -webkit-tap-highlight-color: transparent; transition: background-color var(--anim-dur-norm), color var(--anim-dur-norm); font-size: var(--font-size-base); }
        h1, h2, h3, h4, .modal-headline { font-family: 'Poppins', 'Inter', 'Noto Sans KR', sans-serif; margin: 0; font-weight: 700; }
        p { margin: 0; }
        input, button, textarea { font-family: inherit; font-size: inherit; }
        button { background: none; border: none; padding: 0; cursor: pointer; }

        #background-canvas { position: fixed; top: 0; left: 0; z-index: 0; width: 100%; height: 100%; }
        #app-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; perspective: 1000px; display: flex; flex-direction: column; }
        .view-container { flex-grow: 1; position: relative; }
        .day-pair { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--space-l); padding: var(--space-l); }
        
        .day-card-content { width: 100%; max-width: 480px; min-height: calc(480px * 0.618); margin: 0 auto; background-color: var(--c-bg-secondary); padding: var(--space-l); border-radius: var(--radius-l); box-shadow: none; border: 1px solid var(--c-border); display: flex; flex-direction: column; transition: all var(--anim-dur-norm); touch-action: none; position: relative; }
        .today-card .day-card-content { height: auto; max-height: calc(100vh - (var(--space-xl) * 2)); overflow-y: auto; cursor: grab; }
        .date-picker-trigger h2 { font-size: var(--font-size-xl); line-height: 1; }
        .date-picker-trigger p { font-size: var(--font-size-s); }
        .card-inner-content { display: flex; flex-direction: column; flex-grow: 1; }

        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--c-modal-backdrop); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity var(--anim-dur-norm); }
        .modal-backdrop.visible { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--c-bg-secondary); border: 1px solid var(--c-border); padding: var(--space-xl); border-radius: var(--radius-l); width: 90%; max-width: 400px; box-shadow: 0 10px 25px -5px var(--c-shadow); display: flex; flex-direction: column; transform: scale(0.95); opacity: 0; }
        .modal-backdrop.visible .modal-content { animation: fadeInScale var(--anim-dur-slow) cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes fadeInScale { to { transform: scale(1); opacity: 1; } }
        .modal-headline { font-size: var(--font-size-l); text-align: center; color: var(--c-text-primary); margin-bottom: var(--space-l); }
        .modal-actions { display: flex; justify-content: flex-end; gap: var(--space-s); margin-top: auto; }

        .action-button { background-color: var(--c-accent-primary); color: var(--c-bg-primary); font-weight: 700; font-size: var(--font-size-m); border: none; border-radius: var(--radius-full); padding: var(--space-m) var(--space-l); cursor: pointer; transition: all var(--anim-dur-fast) ease; display: inline-flex; align-items: center; justify-content: center; gap: var(--space-s); }
        .action-button:hover { transform: scale(1.05); filter: brightness(1.1); }
        .action-button.tertiary { background-color: var(--c-bg-tertiary); color: var(--c-text-primary); }
        .icon-button { background: none; border: none; padding: var(--space-xs); border-radius: 50%; cursor: pointer; color: var(--c-text-secondary); transition: background-color 0.2s, color 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .icon-button:hover { background-color: var(--c-bg-tertiary); color: var(--c-text-primary); }
        .input-field { width: 100%; padding: var(--space-m); border-radius: var(--radius-s); background-color: var(--c-bg-tertiary); border: 1px solid var(--c-border); transition: all var(--anim-dur-fast); }
        .input-field:focus { outline: none; ruby-align: 2px; border-color: var(--c-accent-primary); box-shadow: 0 0 0 2px var(--c-accent-primary); }
        .form-group { display: flex; flex-direction: column; gap: var(--space-s); }
        .form-label { font-size: var(--font-size-s); font-weight: 500; color: var(--c-text-secondary); }

        #bottom-app-bar { position: fixed; bottom: var(--space-l); left: 50%; transform: translateX(-50%); width: calc(100% - var(--space-l)*2); max-width: 480px; background-color: var(--c-bg-secondary); border-radius: var(--radius-l); padding: var(--space-s); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 4px 12px var(--c-shadow); z-index: 500; transition: transform var(--anim-dur-slow) cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #bottom-app-bar.hidden { transform: translateX(-50%) translateY(150%); }
        #bottom-app-bar .menu-button { display: flex; flex-direction: column; align-items: center; color: var(--c-text-secondary); font-size: var(--font-size-s); padding: var(--space-xs); border-radius: var(--radius-s); flex-grow: 1; gap: var(--space-xs); }
        #bottom-app-bar .menu-button.active { color: var(--c-accent-primary); }
        #bottom-app-bar .menu-button .material-symbols-outlined { transition: transform var(--anim-dur-slow) cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: calc(var(--font-size-l) * 0.9); }
        
        #retrospective-modal .modal-content { max-width: 800px; display: flex; flex-direction: column; height: 85vh; max-height: 700px; }
        .retrospective-body { display: flex; flex-grow: 1; gap: var(--space-l); min-height: 0; }
        .retrospective-sidebar { flex-basis: 38.2%; display: flex; flex-direction: column; gap: var(--space-m); }
        .retrospective-main { flex-basis: 61.8%; display: flex; flex-direction: column; min-width: 0; }
        #retro-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: var(--space-s); padding: var(--space-s); background-color: var(--c-bg-primary); border-radius: var(--radius-m); }
        #retro-month-nav { display: flex; justify-content: space-between; align-items: center; gap: var(--space-m); }
        #retro-current-month { font-size: var(--font-size-l); font-weight: 700; text-align: center; flex-grow: 1; }
        #retro-type-filter { display: flex; flex-direction: column; align-items: stretch; gap: var(--space-s); }
        .retro-filter-btn { opacity: 0.5; transition: opacity 0.2s; display: flex; justify-content: flex-start; align-items: center; gap: var(--space-s); padding: var(--space-m); border-radius: var(--radius-s); }
        .retro-filter-btn.active { opacity: 1; background-color: var(--c-bg-tertiary); }
        .retrospective-list-item { background-color: var(--c-bg-tertiary); border-left-width: 4px; cursor: pointer; transition: background-color var(--anim-dur-fast); padding: var(--space-m); border-radius: var(--radius-s); display: flex; align-items: center; gap: var(--space-m); }
        .retrospective-list-item:hover { background-color: var(--c-border); }
        .retrospective-list-item .date-indicator { font-weight: 700; font-size: var(--font-size-m); }
        .retrospective-list-item .text-content p:first-child { font-weight: 500; color: var(--c-text-primary); }
        .retrospective-list-item .text-content p:last-child { font-size: var(--font-size-s); color: var(--c-text-secondary); }

        .completion-stats-container { width: 100%; margin-top: var(--space-l); display: flex; flex-direction: column; gap: var(--space-xs); }
        .stat-bar-wrapper { display: flex; align-items: center; gap: var(--space-sm); position: relative; }
        .stat-bar { height: 24px; border-radius: var(--radius-sm); background-color: var(--c-bg-tertiary); transition: width var(--anim-dur-slow) ease-in-out; }
        .stat-bar-label { position: absolute; left: var(--space-sm); color: var(--c-text-primary); font-size: var(--font-sm); font-weight: 500; text-shadow: 0 1px 2px rgba(0,0,0,0.3); pointer-events: none; }
        .stat-bar-tooltip { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background-color: var(--c-bg-primary); color: var(--c-text-primary); padding: var(--space-xs) var(--space-sm); border-radius: var(--radius-sm); font-size: var(--font-sm); opacity: 0; visibility: hidden; transition: all var(--anim-dur-fast); white-space: nowrap; z-index: 10; }
        .stat-bar-wrapper:hover .stat-bar-tooltip { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(var(--space-xs)); }

        .lottie-container { width: 80px; height: 80px; cursor: pointer; }
        .driver-popover { background-color: var(--c-bg-secondary); color: var(--c-text-primary); border-radius: var(--radius-l); }
        .driver-popover-title { font-size: var(--font-size-l); font-weight: bold; color: var(--c-accent-primary); }
        .driver-popover-arrow-side-left .driver-popover-arrow { border-left-color: var(--c-bg-secondary); }
        .driver-popover-arrow-side-right .driver-popover-arrow { border-right-color: var(--c-bg-secondary); }
        .driver-popover-arrow-side-top .driver-popover-arrow { border-top-color: var(--c-bg-secondary); }
        .driver-popover-arrow-side-bottom .driver-popover-arrow { border-bottom-color: var(--c-bg-secondary); }
        .driver-popover-navigation-btns button { text-shadow: none; background-color: var(--c-bg-tertiary); color: var(--c-text-primary); border-radius: var(--radius-m); }
        .driver-popover-navigation-btns .driver-popover-next-btn { background-color: var(--c-accent-primary); color: var(--c-bg-primary); }

        @media (max-width: 768px) {
            #retrospective-modal .modal-content {
                height: 90vh;
                max-height: 800px;
                padding: var(--space-m);
            }
            .retrospective-body {
                flex-direction: column;
                overflow-y: auto;
            }
            .retrospective-sidebar, .retrospective-main {
                flex-basis: auto;
            }
            #retro-type-filter {
                flex-direction: row;
                overflow-x: auto;
                padding-bottom: var(--space-s);
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            #retro-type-filter::-webkit-scrollbar {
                display: none;
            }
            .retro-filter-btn {
                flex-direction: column;
                flex: 0 0 auto;
                width: 90px;
            }
        }

    </style>
</head>
<body>
    <canvas id="background-canvas"></canvas>
    <div id="app-container">
        <div id="pair-view-container" class="view-container"></div>
        
        <div id="bottom-app-bar">
            <button data-menu-action="retrospective" class="menu-button"><span class="material-symbols-outlined">history</span><span>회고록</span></button>
            <button data-menu-action="today" class="menu-button"><span class="material-symbols-outlined">today</span><span>오늘로</span></button>
            <button data-menu-action="theme" class="menu-button"><span class="material-symbols-outlined">palette</span><span>테마</span></button>
        </div>
    </div>
    
    <div id="event-modal" class="modal-backdrop">
         <div class="modal-content">
            <h3 class="modal-headline">인생의 특별한 순간을 조각하세요</h3>
            <p style="text-align: center; font-weight: 500; font-size: var(--font-size-m); color: var(--c-text-secondary); margin-top: calc(-1 * var(--space-m)); margin-bottom: var(--space-m);">기억하고 싶은 그날을 표시해두세요.</p>
            <div style="display: flex; flex-direction: column; gap: var(--space-l);">
                 <input type="text" id="event-name" placeholder="이벤트 이름 (예: 친구와 약속)" class="input-field">
                 <input type="date" id="event-date" class="input-field" style="text-align: center;">
                 <div style="display: flex; align-items: center; gap: var(--space-s);"><input type="time" id="event-time" class="input-field" style="text-align: center;"><label style="display: flex; align-items: center; gap: var(--space-s); font-size: var(--font-size-s); color: var(--c-text-secondary);"><input type="checkbox" id="event-time-later"><span>나중에</span></label></div>
                 <div style="font-size: var(--font-size-s); text-align: center; color: var(--c-text-secondary);">모양 선택</div><div id="event-shape-palette" style="display: flex; justify-content: center; flex-wrap: wrap; gap: var(--space-m);"></div>
                 <div style="font-size: var(--font-size-s); text-align: center; color: var(--c-text-secondary);">색상 선택</div><div id="event-color-palette" style="display: flex; justify-content: center; flex-wrap: wrap; gap: var(--space-m);"></div>
            </div>
            <div class="modal-actions"><button class="action-button tertiary" style="padding: var(--space-s) var(--space-m);" data-action="close"><span class="material-symbols-outlined">close</span></button><button class="action-button" data-action="save">저장</button></div>
        </div>
    </div>

    <div id="retrospective-modal" class="modal-backdrop">
         <div class="modal-content">
            <h3 class="modal-headline">회고록</h3>
            <div class="retrospective-body">
                <div class="retrospective-sidebar">
                    <div id="retro-month-nav">
                        <button id="retro-prev-month" class="icon-button"><span class="material-symbols-outlined">chevron_left</span></button>
                        <h4 id="retro-current-month"></h4>
                        <button id="retro-next-month" class="icon-button"><span class="material-symbols-outlined">chevron_right</span></button>
                    </div>
                    <div id="retro-type-filter">
                        <button data-filter="all" class="retro-filter-btn active"><span class="material-symbols-outlined">select_all</span><span>모두 보기</span></button>
                        <button data-filter="event" class="retro-filter-btn"><span class="material-symbols-outlined">celebration</span><span>이벤트</span></button>
                        <button data-filter="routine" class="retro-filter-btn"><span class="material-symbols-outlined">routine</span><span>반복 행동</span></button>
                        <button data-filter="memo" class="retro-filter-btn"><span class="material-symbols-outlined">edit_note</span><span>메모</span></button>
                        <button data-filter="workout" class="retro-filter-btn"><span class="material-symbols-outlined">fitness_center</span><span>운동 기록</span></button>
                    </div>
                    <button data-action="show_filter_help" class="icon-button" style="margin-top: auto; align-self: center; color: var(--c-accent-primary);"><span class="material-symbols-outlined">help_outline</span></button>
                </div>
                <div class="retrospective-main">
                    <div id="retro-list"></div>
                </div>
            </div>
            <div class="modal-actions" style="margin-top: var(--space-l);"><button class="action-button tertiary" style="padding: var(--space-s) var(--space-m);" data-action="close"><span class="material-symbols-outlined">close</span></button></div>
        </div>
    </div>

    <div id="memo-modal" class="modal-backdrop">
        <div class="modal-content">
            <h3 class="modal-headline">Memo</h3>
            <textarea id="memo-input" rows="3" class="input-field" style="resize: none;"></textarea>
            <div class="modal-actions"><button class="action-button tertiary" style="padding: var(--space-s) var(--space-m);" data-action="close"><span class="material-symbols-outlined">close</span></button><button class="action-button" data-action="save">저장</button></div>
        </div>
    </div>
    
    <div id="memo-feed-modal" class="modal-backdrop">
        <div class="modal-content" style="max-width: 800px; height: 83.33%;">
            <h3 class="modal-headline">메모 모아보기</h3>
            <div id="memo-feed-list" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: var(--space-s); padding: var(--space-s); background-color: var(--c-bg-primary); border-radius: var(--radius-m);"></div>
            <div class="modal-actions"><button class="action-button tertiary" style="padding: var(--space-s) var(--space-m);" data-action="close"><span class="material-symbols-outlined">close</span></button></div>
        </div>
    </div>
    
    <div id="theme-picker-modal" class="modal-backdrop">
        <div class="modal-content">
            <h3 class="modal-headline">테마 선택</h3>
            <div class="theme-options-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: var(--space-l); padding: var(--space-m); width: 100%;"></div>
            <div class="modal-actions">
                <button data-action="close" class="action-button tertiary">닫기</button>
            </div>
        </div>
    </div>
    
    <div id="settings-modal" class="modal-backdrop">
        <div class="modal-content">
            <h3 class="modal-headline">표시 설정</h3>
            <div style="display: flex; flex-direction: column; gap: var(--space-xl); padding-top: var(--space-s);">
                <div>
                    <label for="font-size-slider" style="display: block; font-size: var(--font-size-s); font-weight: 500; color: var(--c-text-secondary); margin-bottom: var(--space-s);">글자 크기</label>
                    <input id="font-size-slider" type="range" min="12" max="20" step="1" style="width: 100%; height: 8px; background-color: var(--c-bg-tertiary); border-radius: var(--radius-full); appearance: none; cursor: pointer;">
                </div>
                <div>
                    <label for="spacing-slider" style="display: block; font-size: var(--font-size-s); font-weight: 500; color: var(--c-text-secondary); margin-bottom: var(--space-s);">여백 크기</label>
                    <input id="spacing-slider" type="range" min="6" max="12" step="1" style="width: 100%; height: 8px; background-color: var(--c-bg-tertiary); border-radius: var(--radius-full); appearance: none; cursor: pointer;">
                </div>
            </div>
            <div class="modal-actions">
                <button data-action="close" class="action-button tertiary">닫기</button>
                <button data-action="save" class="action-button">저장</button>
            </div>
        </div>
    </div>

    <script>
        gsap.registerPlugin(Draggable, Flip);
        const REAL_TODAY = new Date(); 
        REAL_TODAY.setHours(0, 0, 0, 0);
        const CYCLE_ANCHOR_DATE = new Date('2025-09-08T00:00:00');

        const AppState = { 
            currentDate: new Date(REAL_TODAY), 
            draggableInstance: null, 
            activeLotties: {}, 
            activeTimers: {},
            retrospective: {
                currentMonth: new Date(REAL_TODAY.getFullYear(), REAL_TODAY.getMonth(), 1),
                activeFilter: 'all',
            },
            palettes: {
                routine: ['#82B1FF', '#C792EA', '#FF5252', '#40C4FF', '#FFD740', '#9CCC65'],
                eventShapes: ['star', 'diamond', 'favorite', 'verified', 'rocket_launch', 'emoji_events'],
                eventColors: ['#FF8A80', '#FFD180', '#FFFF8D', '#A7FFEB', '#80D8FF', '#B388FF']
            },
            animSpeeds: {},
            quickTo: {}
        };

        const DOMElements = {}; 

        const WORKOUT_DEFINITIONS = { 
            push: { title: 'Push Day', type: 'push', icon: 'upload', exercises: [ { name: '푸쉬업' }, { name: '딥스' }, { name: '오버헤드 덤벨 익스텐션' }, { name: '모아서 푸쉬업' } ] },
            pull: { title: 'Pull & Core', type: 'pull', icon: 'download', exercises: [ { name: '턱걸이' }, { name: '주먹쥐고 푸쉬업' }, { name: '덤벨로우' }, { name: '원암덤벨로우' }, { name: '바벨컬' }, { name: '컴파운드 세트 (컬)', description: '해머컬 → 외전 → 버티면서 내리기 → 덤벨컬 → 내전 → 버티면서 내리기' } ] },
            leg:  { title: 'Leg Day', type: 'leg', icon: 'fitness_center', exercises: [ { name: '어깨 근력 강화 루틴', description: '사이드 레터럴 레이즈 → 프론트 레이즈 → 리어 델토이드 플라이 → 숄더 프레스 (각 10회 3세트)' }, { name: 'AB 롤아웃' }, { name: '맨몸 스쿼트' }, { name: '계단 오르기' } ] },
            rest: { title: '휴식일', type: 'rest', icon: 'self_improvement', exercises: [] }
        };
        const WORKOUT_CYCLE = ['push', 'pull', 'leg', 'rest'];

        const formatDate = date => `${date.getFullYear()}-${(date.getMonth() + 1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')}`;
        const safeJSONParse = (key, defaultValue) => { try { return JSON.parse(localStorage.getItem(key)) || defaultValue; } catch (e) { return defaultValue; } };

        function getWorkoutTypeForDate(targetDate) {
            const cleanTargetDate = new Date(targetDate);
            cleanTargetDate.setHours(0, 0, 0, 0);
            const diffTime = cleanTargetDate.getTime() - CYCLE_ANCHOR_DATE.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const workoutIndex = (diffDays % WORKOUT_CYCLE.length + WORKOUT_CYCLE.length) % WORKOUT_CYCLE.length;
            return WORKOUT_CYCLE[workoutIndex];
        }

        const Data = {
            getWorkoutLog: (date) => safeJSONParse(`workout_log_${formatDate(date)}`, []),
            saveWorkoutLog: (date, log) => localStorage.setItem(`workout_log_${formatDate(date)}`, JSON.stringify(log)),
            getMemos: (date) => safeJSONParse(`memos_${formatDate(date)}`, []),
            saveMemos: (date, log) => localStorage.setItem(`memos_${formatDate(date)}`, JSON.stringify(log)),
            getEvents: () => safeJSONParse('user-events', []),
            saveEvents: (events) => localStorage.setItem('user-events', JSON.stringify(events)),
            getSettings: () => safeJSONParse('user-settings', { fontSize: 16, spacing: 8 }),
            saveSettings: (settings) => localStorage.setItem('user-settings', JSON.stringify(settings)),
        };

        const SettingsManager = {
            init() {
                const settings = Data.getSettings();
                this.apply(settings);
            },
            apply(settings) {
                document.documentElement.style.setProperty('--font-size-base', `${settings.fontSize}px`);
                document.documentElement.style.setProperty('--space-unit', `${settings.spacing}px`);
            },
            show() {
                const settings = Data.getSettings();
                DOMElements.modals.settings.querySelector('#font-size-slider').value = settings.fontSize;
                DOMElements.modals.settings.querySelector('#spacing-slider').value = settings.spacing;
                DOMElements.modals.settings.classList.add('visible');
            },
            save() {
                const newSettings = {
                    fontSize: DOMElements.modals.settings.querySelector('#font-size-slider').value,
                    spacing: DOMElements.modals.settings.querySelector('#spacing-slider').value,
                };
                Data.saveSettings(newSettings);
                this.apply(newSettings);
                DOMElements.modals.settings.classList.remove('visible');
            }
        };

        const ThemeManager = { 
            themes: { 
                'golden-hour': { name: '골든 아워', colors: ['#1C1B1A', '#FF9500', '#FDE8C9'] }, 
                'material-expressive': { name: 'Expressive', colors: ['#1D1B20', '#BEA4F3', '#F392B0'] },
                'minimal-ink': { name: '미니멀 잉크', colors: ['#FFFFFF', '#000000', '#AAAAAA'] },
                'material-you': { name: 'Material You', colors: ['#1C1B1F', '#6750A4', '#D0BCFF'] }, 
                'blueprint': { name: '블루프린트', colors: ['#0A192F', '#64FFDA', '#CCD6F6'] }, 
                'zen-ink': { name: '젠 잉크', colors: ['#F5F5F5', '#B71C1C', '#1E1E1E'] }, 
                'evergreen': { name: '에버그린', colors: ['#1A2E28', '#A3BF60', '#E6EBE9'] }, 
                'dopamine-rush': { name: '도파민 러시', colors: ['#101010', '#F000B8', '#00F6FF'] } 
            }, 
            apply(themeName) { 
                if (!this.themes[themeName]) return;
                document.documentElement.dataset.theme = themeName; 
                localStorage.setItem('app-theme', themeName);
                setTimeout(() => {
                    const newParticleColor = getComputedStyle(document.documentElement).getPropertyValue('--c-particle').trim();
                    if (bgAnimation && typeof bgAnimation.startColorTransition === 'function') {
                         bgAnimation.startColorTransition(newParticleColor);
                    }
                }, 100);
            }, 
            load() { this.apply(localStorage.getItem('app-theme') || 'golden-hour'); },
            showModal() {
                const optionsContainer = DOMElements.modals.themePicker.querySelector('.theme-options-grid');
                optionsContainer.innerHTML = '';
                Object.entries(this.themes).forEach(([id, theme]) => {
                    const item = document.createElement('div');
                    item.className = 'theme-palette-item';
                    item.style.cssText = 'display: flex; flex-direction: column; align-items: center; gap: var(--space-s); cursor: pointer; text-align: center;';
                    item.addEventListener('click', () => { 
                        this.apply(id); 
                        DOMElements.modals.themePicker.classList.remove('visible');
                    });
                    
                    const circle = document.createElement('div');
                    circle.className = 'theme-palette-circle';
                    circle.style.cssText = 'width: 80px; height: 80px; border-radius: 50%; border: 3px solid transparent; transition: all var(--anim-dur-fast) ease-in-out; box-shadow: 0 4px 8px var(--c-shadow);';
                    circle.style.background = `conic-gradient(from 90deg, ${theme.colors[0]} 0% 33.3%, ${theme.colors[1]} 33.3% 66.6%, ${theme.colors[2]} 66.6% 100%)`;
                    
                    const name = document.createElement('span');
                    name.className = 'theme-palette-name';
                    name.style.cssText = 'font-size: var(--font-size-s); font-weight: 500; color: var(--c-text-secondary);';
                    name.textContent = theme.name;
                    
                    item.appendChild(circle);
                    item.appendChild(name);
                    optionsContainer.appendChild(item);
                });
                DOMElements.modals.themePicker.classList.add('visible');
            }
        }

        const bgAnimation = { 
            ctx: null, particles: [], canvas: null,
            init() { this.canvas = DOMElements.backgroundCanvas; this.ctx = this.canvas.getContext('2d'); this.resizeCanvas(); const initialColor = getComputedStyle(document.documentElement).getPropertyValue('--c-particle').trim(); this.createParticles(150, initialColor); this.animate(); window.addEventListener('resize', this.resizeCanvas.bind(this)); },
            resizeCanvas() { this.canvas.width = window.innerWidth * window.devicePixelRatio; this.canvas.height = window.innerHeight * window.devicePixelRatio; this.ctx.scale(window.devicePixelRatio, window.devicePixelRatio); },
            createParticles(count, color) { this.particles = []; for (let i = 0; i < count; i++) { this.particles.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, radius: Math.random() * 1.5 + 0.5, vx: Math.random() * 0.2 - 0.1, vy: Math.random() * 0.2 - 0.1, life: -1, color: color, targetColor: color }); } },
            animate() { if (!this.ctx) return; this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); this.particles.forEach((p, index) => { p.x += p.vx; p.y += p.vy; if(p.life > 0) { p.life -= 0.02; if(p.life <= 0) { this.particles.splice(index, 1); return; } p.radius = p.life * 2; } if ((p.x < 0 || p.x > window.innerWidth) && p.life < 0) p.vx *= -1; if ((p.y < 0 || p.y > window.innerHeight) && p.life < 0) p.vy *= -1; this.ctx.fillStyle = p.color; this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); this.ctx.fill(); }); requestAnimationFrame(this.animate.bind(this)); },
            startColorTransition(newColor) { const centerX = window.innerWidth / 2; const centerY = window.innerHeight / 2; const maxDist = Math.sqrt(centerX*centerX + centerY*centerY); this.particles.forEach(p => { p.targetColor = newColor; const dist = Math.sqrt(Math.pow(p.x - centerX, 2) + Math.pow(p.y - centerY, 2)); const delay = (dist / maxDist) * 0.5; gsap.to(p, { color: p.targetColor, duration: 1.0, delay: delay, ease: "power2.inOut" }); }); },
            burst(x, y, color = null) { const burstColor = color || getComputedStyle(document.documentElement).getPropertyValue('--c-particle').trim(); for(let i = 0; i < 30; i++) { const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 3 + 1; this.particles.push({ x, y, radius: 2, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, color: burstColor }); } } 
        }

        const TimerManager = {
            format(ms) {
                if (isNaN(ms) || ms < 0) return "00:00:00";
                const totalSeconds = Math.floor(ms / 1000);
                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;
                return [hours, minutes, seconds].map(v => v.toString().padStart(2, '0')).join(':');
            },
            clearTimersForCard(dateStr) {
                Object.keys(AppState.activeTimers).forEach(key => {
                    if (key.startsWith(dateStr)) {
                        clearInterval(AppState.activeTimers[key]);
                        delete AppState.activeTimers[key];
                    }
                });
            },
            startTimersForCard(cardWrapper) {
                const dateStr = cardWrapper.dataset.date;
                this.clearTimersForCard(dateStr); 

                cardWrapper.querySelectorAll('.exercise-timer').forEach(timerEl => {
                    const startTime = timerEl.dataset.startTime;
                    const exerciseName = timerEl.dataset.exerciseName;
                    const timerKey = `${dateStr}-${exerciseName}`;

                    if (startTime && !AppState.activeTimers[timerKey]) {
                        const update = () => {
                            const elapsedMs = new Date() - new Date(startTime);
                            timerEl.textContent = this.format(elapsedMs);
                        };
                        
                        AppState.activeTimers[timerKey] = setInterval(update, 1000);
                        update(); 
                    }
                });
            }
        };
        
        const CertificateGenerator = {
            async generate(date, workout) {
                const canvas = document.createElement('canvas');
                canvas.width = 1200;
                canvas.height = 630; 
                const ctx = canvas.getContext('2d');

                const getStyle = (variable) => getComputedStyle(document.documentElement).getPropertyValue(variable).trim();

                ctx.fillStyle = getStyle('--c-bg-primary');
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = getStyle('--c-accent-primary');
                ctx.lineWidth = 20;
                ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

                ctx.fillStyle = getStyle('--c-text-primary');
                ctx.font = 'bold 80px Poppins';
                ctx.textAlign = 'center';
                ctx.fillText('WORKOUT COMPLETE', canvas.width / 2, 150);
                
                ctx.fillStyle = getStyle(`--c-accent-${workout.type}`);
                ctx.font = '60px Poppins';
                ctx.fillText(workout.title, canvas.width / 2, 240);
                
                ctx.fillStyle = getStyle('--c-text-secondary');
                ctx.font = '40px Inter';
                const dateString = `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일`;
                ctx.fillText(dateString, canvas.width / 2, 320);

                ctx.textAlign = 'left';
                ctx.fillStyle = getStyle('--c-text-primary');
                ctx.font = '32px Inter';
                const exercises = workout.exercises;
                const startY = 380;
                const lineHeight = 50;
                exercises.forEach((ex, index) => {
                    ctx.fillText(`✓ ${ex.name}`, 100, startY + (index * lineHeight));
                });

                ctx.fillStyle = getStyle('--c-text-secondary');
                ctx.font = '24px Inter';
                ctx.textAlign = 'right';
                ctx.fillText('Momentum App', canvas.width - 50, canvas.height - 40);

                return canvas.toDataURL('image/png');
            }
        };

        function createTodayCard(date) { 
            const cardWrapper = document.createElement('div'); 
            cardWrapper.className = `today-card`; 
            cardWrapper.style.cssText = "width: 100%; max-width: 480px;"; 
            cardWrapper.dataset.date = formatDate(date); 
            const isRealToday = formatDate(date) === formatDate(REAL_TODAY); 
            cardWrapper.innerHTML = `<div class="day-card-content" data-flip-id="card-${formatDate(date)}"><div style="display: flex; justify-content: space-between; align-items: center;"><div class="date-picker-trigger" style="text-align: left; cursor: pointer;"><h2 style="font-weight: 700;">${date.getDate()}</h2><p style="color: ${isRealToday ? 'var(--c-accent-primary)' : 'var(--c-text-secondary)'}; font-weight: ${isRealToday ? '700' : '400'};">${date.toLocaleString('ko-KR', { weekday: 'long' })}</p></div></div><div style="border-top: 1px solid var(--c-border); margin: var(--space-m) 0;"></div><div class="card-inner-content" style="flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 350px;"></div></div>`; 
            updateTodayCard(cardWrapper); 
            return cardWrapper; 
        }

        function updateTodayCard(cardWrapper) {
            const dateStr = cardWrapper.dataset.date;
            const date = new Date(dateStr);
            
            TimerManager.clearTimersForCard(dateStr);

            const innerContent = cardWrapper.querySelector('.card-inner-content');
            const cardContent = cardWrapper.querySelector('.day-card-content');
            cardContent.removeAttribute('data-workout-type');

            const workoutType = getWorkoutTypeForDate(new Date(date));
            const workout = WORKOUT_DEFINITIONS[workoutType];
            cardContent.dataset.workoutType = workoutType;
            renderPlanView(innerContent, date, workout);
            
            TimerManager.startTimersForCard(cardWrapper);
        }

        function renderPlanView(container, date, workout) {
            const logData = Data.getWorkoutLog(date);
            const allExercises = workout.exercises || [];
            const completedExercises = logData.filter(log => log.endTime);
            const allDone = allExercises.length > 0 && completedExercises.length === allExercises.length;


            const exercisesHTML = allExercises.map(ex => {
                const exerciseLog = logData.find(log => log.name === ex.name);
                let status = 'pending';
                let durationHTML = '';

                if (exerciseLog) {
                    if (exerciseLog.endTime) {
                        status = 'completed';
                        const duration = new Date(exerciseLog.endTime) - new Date(exerciseLog.startTime);
                        const totalSeconds = Math.floor(duration / 1000);
                        const minutes = Math.floor(totalSeconds / 60);
                        const seconds = totalSeconds % 60;
                        durationHTML = `<span>${minutes}분 ${seconds}초</span>`;
                    } else {
                        status = 'ongoing';
                        durationHTML = `<span class="exercise-timer" data-start-time="${exerciseLog.startTime}" data-exercise-name="${ex.name}">00:00:00</span>`;
                    }
                } else {
                     durationHTML = `<span></span>`;
                }

                const styles = {
                    pending: `background-color: var(--c-bg-tertiary); color: var(--c-text-primary);`,
                    ongoing: `background-color: var(--c-accent-primary); color: var(--c-bg-primary); font-weight: 700;`,
                    completed: `background-color: var(--c-green); color: var(--c-bg-primary); opacity: 0.8;`
                };

                return `
                    <button 
                        class="exercise-item-btn" 
                        data-action="toggle-exercise" 
                        data-exercise-name="${ex.name}"
                        style="width: 100%; padding: var(--space-m); border-radius: var(--radius-m); text-align: left; transition: all 0.2s; ${styles[status]}"
                    >
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-weight: 500;">${ex.name}</span>
                            ${durationHTML}
                        </div>
                        ${ex.description ? `<p style="font-size: var(--font-size-s); color: var(--c-text-secondary); margin-top: var(--space-xs); text-align: left;">${ex.description}</p>` : ''}
                    </button>
                `;
            }).join('');
            
            let downloadButtonHTML = '';
            if (allDone) {
                downloadButtonHTML = `
                    <button
                        data-action="download-certificate"
                        class="action-button"
                        style="width: 100%; margin-top: var(--space-l);"
                    >
                        <span class="material-symbols-outlined">military_tech</span>
                        <span>완료 인증서 다운로드</span>
                    </button>
                `;
            }

            container.innerHTML = `
                <div style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; position: relative;">
                    <div style="display: flex; align-items: center; gap: var(--space-s); margin-bottom: var(--space-m); align-self: flex-start;">
                        <span class="material-symbols-outlined" style="font-size: var(--font-size-l); color: var(--c-accent-${workout.type});">${workout.icon}</span>
                        <h3 style="font-weight: 700; font-size: var(--font-size-l);">${workout.title}</h3>
                    </div>
                    <div style="width: 100%; flex-grow: 1; display: flex; flex-direction: column; gap: var(--space-s);">${exercisesHTML}</div>
                    ${downloadButtonHTML}
                </div>`;
        }
        
        function createDayPair(date) { 
            const pairWrapper = document.createElement('div'); 
            pairWrapper.className = 'day-pair'; 
            pairWrapper.dataset.date = formatDate(date); 
            pairWrapper.appendChild(createTodayCard(date)); 
            return pairWrapper; 
        }

        function renderView(container, createElFn) { 
            container.innerHTML = ''; 
            Object.values(AppState.activeTimers).forEach(clearInterval); 
            AppState.activeTimers = {}; 
            container.appendChild(createElFn(AppState.currentDate)); 
        }

        function renderCurrentView() { 
            DOMElements.pairViewContainer.innerHTML = ''; 
            renderView(DOMElements.pairViewContainer, createDayPair); 
            setupDraggable(); 
        }
        
        function setupDraggable() {
            if (AppState.draggableInstance) AppState.draggableInstance.kill();
            const card = DOMElements.pairViewContainer.querySelector(`[data-date="${formatDate(AppState.currentDate)}"] .day-card-content`);
            if (!card) return;
            const thresholdX = window.innerWidth / 4;
            const thresholdY = window.innerHeight / 5;
            AppState.draggableInstance = Draggable.create(card, {
                type: 'x,y',
                edgeResistance: 0.85,
                dragClickables: false,
                onDrag: function() {
                    const rX = Math.abs(this.x) / (window.innerWidth / 2);
                    const rY = Math.abs(this.y) / (window.innerHeight / 2);
                    gsap.set(this.target, {
                        rotation: this.x / 40,
                        scale: 1 - (rX * 0.1) - (rY * 0.1)
                    });
                },
                onDragEnd: function() {
                    const target = this.target;
                    const resetAnimation = () => gsap.to(target, {
                        x: 0,
                        y: 0,
                        rotation: 0,
                        scale: 1,
                        duration: AppState.animSpeeds.norm,
                        ease: 'power2.out'
                    });
                    if (Math.abs(this.x) > Math.abs(this.y)) {
                        if (this.x > thresholdX) {
                            gsap.to(target, {
                                x: window.innerWidth,
                                rotation: 20,
                                duration: AppState.animSpeeds.norm,
                                ease: 'power2.in',
                                onComplete: () => {
                                    AppState.currentDate.setDate(AppState.currentDate.getDate() - 1);
                                    renderCurrentView();
                                }
                            });
                        } else if (this.x < -thresholdX) {
                             gsap.to(target, {
                                x: -window.innerWidth,
                                rotation: -20,
                                duration: AppState.animSpeeds.norm,
                                ease: 'power2.in',
                                onComplete: () => {
                                    AppState.currentDate.setDate(AppState.currentDate.getDate() + 1);
                                    renderCurrentView();
                                }
                            });
                        } else {
                            resetAnimation();
                        }
                    } else {
                        if (this.y > thresholdY) {
                            resetAnimation().then(() => {
                                DOMElements.modals.memo.classList.add('visible');
                                DOMElements.memoInput.focus();
                            });
                        } else {
                            resetAnimation();
                        }
                    }
                }
            })[0];
        }

        function init() { 
            DOMElements.modals = { event: document.getElementById('event-modal'), retrospective: document.getElementById('retrospective-modal'), memo: document.getElementById('memo-modal'), memoFeed: document.getElementById('memo-feed-modal'), themePicker: document.getElementById('theme-picker-modal'), settings: document.getElementById('settings-modal') }; 
            DOMElements.pairViewContainer = document.getElementById('pair-view-container'); 
            DOMElements.eventTimeLaterCheckbox = document.getElementById('event-time-later'); 
            DOMElements.eventTimeInput = document.getElementById('event-time'); 
            DOMElements.memoInput = document.getElementById('memo-input'); 
            DOMElements.backgroundCanvas = document.getElementById('background-canvas'); 
            DOMElements.bottomAppBar = document.getElementById('bottom-app-bar'); 
            const rootStyle = getComputedStyle(document.documentElement); 
            AppState.animSpeeds = { fast: parseFloat(rootStyle.getPropertyValue('--anim-dur-fast')), norm: parseFloat(rootStyle.getPropertyValue('--anim-dur-norm')), slow: parseFloat(rootStyle.getPropertyValue('--anim-dur-slow')) }; 
            SettingsManager.init(); 
            ThemeManager.load(); 
            bgAnimation.init(); 
            setupPalettes(); 
            setupEventListeners(); 
            
            if (!localStorage.getItem('v2_tutorial_completed')) { 
                setTimeout(TutorialManager.start, 1000); 
            } 
            renderCurrentView(); 
        }
        function setupPalettes() { 
            const createSwatches = (container, items, type, contentFn) => { 
                const containerEl = document.getElementById(container); 
                if (!containerEl) return;
                containerEl.innerHTML = ''; 
                items.forEach(item => { 
                    const swatch = document.createElement('div'); 
                    swatch.className = `${type}-swatch`; 
                    swatch.style.cssText = 'width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; font-family: "Material Symbols Outlined"; font-size: 24px; user-select: none;'; 
                    swatch.dataset.value = item; swatch.innerHTML = contentFn(item); 
                    containerEl.appendChild(swatch); 
                }); 
            }; 
            createSwatches('event-shape-palette', AppState.palettes.eventShapes, 'shape', shape => `<span>${shape}</span>`); 
            createSwatches('event-color-palette', AppState.palettes.eventColors, 'color', color => `<div style="width: 100%; height: 100%; border-radius: 50%; background-color: ${color}"></div>`); 
        }
        function setupEventListeners() { 
            document.body.addEventListener('click', (e) => { 
                const button = e.target.closest('[data-action]'); 
                const swatch = e.target.closest('.color-swatch, .shape-swatch'); 
                if (button) handleAction(button.dataset.action, button); 
                if (swatch) handleSwatchClick(swatch); 
            }); 
            DOMElements.bottomAppBar.addEventListener('click', (e) => { 
                const menuButton = e.target.closest('[data-menu-action]'); 
                if (menuButton) handleMenuAction(menuButton.dataset.menuAction, menuButton); 
            }); 
            DOMElements.eventTimeLaterCheckbox.addEventListener('change', (e) => { 
                DOMElements.eventTimeInput.disabled = e.target.checked; 
                if (e.target.checked) DOMElements.eventTimeInput.value = ''; 
            }); 
        }
        async function handleAction(action, element) {
            const cardWrapper = element.closest('.today-card');
            const dateStr = cardWrapper?.dataset.date;
            
            switch(action) {
                case 'close':
                    const modal = element.closest('.modal-backdrop');
                    modal.classList.remove('visible');
                    break;
                case 'save':
                    handleSave(element.closest('.modal-backdrop').id);
                    break;
                case 'show_filter_help':
                    TutorialManager.startFilterHelp();
                    break;
                case 'toggle-exercise': {
                    const exerciseName = element.dataset.exerciseName;
                    const date = new Date(dateStr);
                    let logs = Data.getWorkoutLog(date);
                    const existingLog = logs.find(log => log.name === exerciseName);

                    if (!existingLog) {
                        logs.push({ name: exerciseName, startTime: new Date().toISOString(), endTime: null });
                    } else if (existingLog.endTime === null) {
                        existingLog.endTime = new Date().toISOString();
                    } else {
                        logs = logs.filter(log => log.name !== exerciseName);
                        logs.push({ name: exerciseName, startTime: new Date().toISOString(), endTime: null });
                    }

                    Data.saveWorkoutLog(date, logs);
                    updateTodayCard(cardWrapper);
                    break;
                }
                case 'download-certificate': {
                    const date = new Date(dateStr);
                    const workoutType = getWorkoutTypeForDate(date);
                    const workout = WORKOUT_DEFINITIONS[workoutType];
                    const dataUrl = await CertificateGenerator.generate(date, workout);
                    const link = document.createElement('a');
                    link.href = dataUrl;
                    link.download = `Momentum-Workout-${formatDate(date)}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    break;
                }
            }
        }
        function handleMenuAction(action, element) { 
            const icon = element.querySelector('.material-symbols-outlined'); 
            gsap.fromTo(icon, { y: 0 }, { y: -5, duration: 0.1, yoyo: true, repeat: 1, ease: 'power2.out' }); 
            Object.values(DOMElements.modals).forEach(modal => modal.classList.remove('visible')); 
            switch (action) { 
                case 'retrospective': 
                    RetrospectiveManager.show(); 
                    break; 
                case 'theme': 
                    ThemeManager.showModal(); 
                    break; 
                case 'today': 
                    if (formatDate(AppState.currentDate) !== formatDate(REAL_TODAY)) { 
                        AppState.currentDate = new Date(REAL_TODAY); renderCurrentView(); 
                    } 
                    break; 
            } 
        }
        function handleSwatchClick(swatch) { 
            const parent = swatch.parentElement; 
            parent.querySelectorAll('.selected').forEach(el => { 
                el.classList.remove('selected'); 
                el.style.borderColor = 'transparent'; 
                el.style.transform = 'scale(1)'; 
            }); 
            swatch.classList.add('selected'); 
            swatch.style.borderColor = 'var(--c-accent-primary)'; 
            swatch.style.transform = 'scale(1.1)';
        }
        function handleSave(modalId) { 
            switch(modalId) { 
                case 'event-modal': 
                    const events = Data.getEvents(); 
                    const newEvent = { id: Date.now(), name: document.getElementById('event-name').value, date: document.getElementById('event-date').value, time: DOMElements.eventTimeInput.disabled ? null : DOMElements.eventTimeInput.value, shape: document.querySelector('#event-shape-palette .selected')?.dataset.value, color: document.querySelector('#event-color-palette .selected')?.dataset.value, }; 
                    if (newEvent.name && newEvent.date) { 
                        events.push(newEvent); 
                        Data.saveEvents(events); 
                        document.getElementById(modalId).classList.remove('visible'); 
                    } 
                    break; 
                case 'memo-modal': 
                    const text = DOMElements.memoInput.value.trim(); 
                    const modal = document.getElementById(modalId); 
                    const input = DOMElements.memoInput; 
                    if(text) { 
                        const logs = Data.getMemos(AppState.currentDate); 
                        logs.push({ time: new Date().toISOString(), text: text }); 
                        Data.saveMemos(AppState.currentDate, logs); 
                        const rect = input.getBoundingClientRect(); 
                        const particle = document.createElement('div'); 
                        particle.style.position = 'fixed'; 
                        particle.style.left = `${rect.left + rect.width / 2}px`; 
                        particle.style.top = `${rect.top + rect.height / 2}px`; 
                        particle.style.width = '10px'; 
                        particle.style.height = '10px'; 
                        particle.style.borderRadius = '50%'; 
                        particle.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue('--c-positive-glow'); 
                        particle.style.zIndex = '2000'; 
                        document.body.appendChild(particle); 
                        gsap.to(particle, { x: (window.innerWidth / 2) - (rect.left + rect.width / 2), y: 30 - (rect.top + rect.height / 2), scale: 0, duration: 1, ease: 'power2.inOut', onComplete: () => particle.remove() }); 
                        DOMElements.memoInput.value = ''; 
                    } 
                    modal.classList.remove('visible'); 
                    break; 
                case 'settings-modal': 
                    SettingsManager.save(); 
                    break; 
            } 
        }
        
        const RetrospectiveManager = { 
            show() { 
                DOMElements.modals.retrospective.classList.add('visible'); 
                this.updateView(); 
                this.addEventListeners(); 
            }, 
            updateView() { 
                const { currentMonth, activeFilter } = AppState.retrospective; 
                document.getElementById('retro-current-month').textContent = `${currentMonth.getFullYear()}년 ${currentMonth.getMonth() + 1}월`; 
                document.querySelectorAll('#retro-type-filter button').forEach(btn => btn.classList.toggle('active', btn.dataset.filter === activeFilter)); 
                this.renderList(); 
            }, 
            renderList() {
                const listEl = document.getElementById('retro-list');
                listEl.innerHTML = '';
                const { currentMonth, activeFilter } = AppState.retrospective;
                const year = currentMonth.getFullYear();
                const month = currentMonth.getMonth();
                let allLogs = [];

                if (activeFilter === 'all' || activeFilter === 'event') {
                    const events = Data.getEvents().filter(e => {
                        const eventDate = new Date(e.date);
                        return eventDate.getMonth() === month && eventDate.getFullYear() === year;
                    });
                    events.forEach(e => allLogs.push({ type: '이벤트', text: e.name, date: e.date, color: e.color || 'var(--c-accent-primary)' }));
                }

                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    let logDate;

                    try {
                        if (key.startsWith('workout_log_')) {
                            logDate = new Date(key.substring(12));
                        } else if (key.startsWith('memos_')) {
                            logDate = new Date(key.substring(6));
                        } else {
                            continue;
                        }
                    } catch(e) { continue; }

                    if (logDate && !isNaN(logDate.getTime()) && logDate.getFullYear() === year && logDate.getMonth() === month) {
                        const logData = safeJSONParse(key, null);
                        if (!logData) continue;

                        if (key.startsWith('workout_log_') && (activeFilter === 'all' || activeFilter === 'workout')) {
                            if (Array.isArray(logData) && logData.length > 0) {
                                const workoutType = getWorkoutTypeForDate(logDate);
                                
                                logData.forEach(exerciseLog => {
                                    if (exerciseLog.endTime) {
                                        allLogs.push({
                                            type: '운동',
                                            text: exerciseLog.name,
                                            date: formatDate(logDate),
                                            color: `var(--c-accent-${workoutType})`
                                        });
                                    }
                                });
                            }
                        } else if (key.startsWith('memos_') && (activeFilter === 'all' || activeFilter === 'memo')) {
                            logData.forEach(log => {
                                allLogs.push({ type: '메모', text: log.text, date: formatDate(logDate), color: 'var(--c-positive-glow)' });
                            });
                        }
                    }
                }

                if (allLogs.length === 0) {
                    listEl.innerHTML = `<p style="text-align: center; color: var(--c-text-secondary); padding: var(--space-l);">이 달의 기록이 없습니다.</p>`;
                    return;
                }

                allLogs.sort((a,b) => new Date(a.date) - new Date(b.date));
                allLogs.forEach(log => {
                    const item = document.createElement('div');
                    item.className = 'retrospective-list-item';
                    item.style.borderColor = log.color || 'var(--c-border)';
                    item.innerHTML = `<div class="date-indicator">${new Date(log.date).getDate()}일</div><div class="text-content"><p>${log.text}</p><p>${log.type}</p></div>`;
                    listEl.appendChild(item);
                });
            },
            addEventListeners() { 
                if (this.listenersAdded) return; 
                document.getElementById('retro-prev-month').addEventListener('click', () => { 
                    AppState.retrospective.currentMonth.setMonth(AppState.retrospective.currentMonth.getMonth() - 1); 
                    this.updateView(); 
                }); 
                document.getElementById('retro-next-month').addEventListener('click', () => { 
                    AppState.retrospective.currentMonth.setMonth(AppState.retrospective.currentMonth.getMonth() + 1); 
                    this.updateView(); 
                }); 
                document.getElementById('retro-type-filter').addEventListener('click', (e) => { 
                    const filter = e.target.closest('button')?.dataset.filter; 
                    if(filter) { 
                        AppState.retrospective.activeFilter = filter; 
                        this.updateView(); 
                    } 
                }); 
                this.listenersAdded = true; 
            } 
        }
        const TutorialManager = { 
            start() { 
                const driver = window.driver.js.driver; 
                const driverObj = driver({ 
                    showProgress: true, 
                    steps: [ 
                        { element: '.today-card .day-card-content', popover: { title: '오늘의 카드', description: '이곳에서 오늘의 활동을 확인하고 시작합니다.' } }, 
                        { popover: { title: '운동 시작하기', description: '운동 항목을 바로 클릭하여 기록을 시작하고, 다시 클릭하여 종료하세요!' } },
                        { element: '[data-menu-action="retrospective"]', popover: { title: '회고록', description: '과거의 모든 활동 기록을 이곳에서 확인하세요.' } }, 
                        { popover: { title: '스와이프', description: '카드를 좌우로 스와이프하여 날짜를 변경하고, 아래로 스와이프하여 메모를 추가할 수 있습니다.' } } 
                    ], 
                    onClose: () => { 
                        localStorage.setItem('v2_tutorial_completed', 'true'); 
                    } 
                }); 
                driverObj.drive(); 
            }, 
            startFilterHelp() { 
                const driver = window.driver.js.driver; 
                const driverObj = driver({ 
                    showProgress: true, 
                    steps: [ 
                        { element: '[data-filter="all"]', popover: { title: '모두 보기', description: '모든 종류의 기록을 함께 봅니다.' } }, 
                        { element: '[data-filter="event"]', popover: { title: '이벤트', description: '생일, 기념일 등 특별한 이벤트를 필터링합니다.' } }, 
                        { element: '[data-filter="routine"]', popover: { title: '반복 행동', description: '매일 설정한 루틴 달성 기록을 모아봅니다.' } }, 
                        { element: '[data-filter="memo"]', popover: { title: '메모', description: '하루의 순간적인 생각들만 따로 볼 수 있습니다.' } }, 
                        { element: '[data-filter="workout"]', popover: { title: '운동 기록', description: '완료한 운동 기록만 필터링하여 확인합니다.' } }, 
                    ] 
                }); 
                driverObj.drive(); 
            } 
        }
        const MemoFeedManager = { 
            show() { 
                DOMElements.modals.memoFeed.classList.add('visible'); 
                this.renderList(); 
            }, 
            renderList() { 
                const listEl = document.getElementById('memo-feed-list'); 
                listEl.innerHTML = ''; 
                let allLogs = []; 
                for (let i = 0; i < localStorage.length; i++) { 
                    const key = localStorage.key(i); 
                    if (key.startsWith('memos_')) { 
                        const dateStr = key.substring(6); 
                        const logs = safeJSONParse(key, []); 
                        logs.forEach(log => { 
                            allLogs.push({ ...log, date: new Date(dateStr) }); 
                        }); 
                    } 
                } 
                allLogs.sort((a, b) => new Date(b.time) - new Date(a.time)); 
                if (allLogs.length === 0) { 
                    listEl.innerHTML = `<p style="text-align: center; color: var(--c-text-secondary); padding: var(--space-l);">아직 기록된 메모가 없습니다.</p>`; 
                    return; 
                } 
                allLogs.forEach(log => { 
                    const item = document.createElement('div'); 
                    const logDate = new Date(log.time); 
                    item.style.cssText = 'padding: var(--space-m); border-radius: var(--radius-m); background-color: var(--c-bg-tertiary);'; 
                    item.innerHTML = `<p style="font-weight: 500; color: var(--c-text-primary);">${log.text}</p><p style="font-size: var(--font-size-s); text-align: right; color: var(--c-text-secondary); margin-top: var(--space-xs);">${logDate.getFullYear()}년 ${logDate.getMonth() + 1}월 ${logDate.getDate()}일</p>`; 
                    listEl.appendChild(item); 
                }); 
            } 
        }
        
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
