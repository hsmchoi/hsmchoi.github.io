<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="몬스터의 공격 패턴을 기억하고 받아치는 리듬 기억력 게임입니다.">
    <title>도전! 패턴 격파</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <main id="main-container" class="w-full max-w-md h-full flex flex-col p-4 gap-4 relative">
        <div id="spark-effect-left" class="absolute top-1/4 left-0 w-1/5 h-1/2 pointer-events-none z-10"></div>

        <section id="monster-view" aria-labelledby="monster-name" class="flex-1 flex flex-col items-center justify-center p-4 relative bg-white dark:bg-slate-800 rounded-2xl shadow-xl">
            <header class="absolute top-2 right-2 flex items-center gap-2">
                <button id="pause-btn" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 hidden" aria-label="Pause game"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></button>
                <button id="settings-btn" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="Open settings"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0 3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 0118 0z"></path></svg></button>
                <button id="bestiary-btn" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="적대자 도감 보기"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v11.494m-5.247-8.494H6.253a2 2 0 00-2 2v4.494a2 2 0 002 2h.494m10.493 0h.494a2 2 0 002-2V9.253a2 2 0 00-2-2h-.494M12 6.253V4.753m0 14.494V20.25m-5.247-1.494l-1.494-1.494m10.493 0l1.494-1.494M6.253 9.253l-1.494 1.494m13-1.494l1.494 1.494" /></svg></button>
            </header>
            
            <div class="flex flex-col items-center">
                <div id="monster-icon" class="w-24 h-24 mb-2"></div>
                <h2 id="monster-name" class="text-xl font-bold"></h2>
                <div id="monster-hp-bar-bg" class="w-48 h-4 rounded-full overflow-hidden mt-2">
                    <div id="monster-hp-bar-damage" class="h-full w-full">
                        <div id="monster-hp-bar-fill" class="h-full w-full"></div>
                    </div>
                </div>
                <p id="monster-desc" class="text-sm text-secondary mt-2 text-center px-4"></p>
            </div>
        </section>
        
        <section id="control-panel" aria-label="게임 컨트롤 패널" class="flex-1 bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-4 flex flex-col justify-center">
             <div class="flex justify-between items-center mb-2 h-8 px-2">
                <div id="lives-display" class="flex items-center gap-1" aria-label="남은 생명"></div>
                <div class="text-center">
                    <div id="total-score-display" class="text-2xl font-bold text-highlight">0</div>
                    <div id="unbanked-fragments-display" class="text-sm text-amber-500 font-semibold h-4"></div>
                </div>
                <div id="basecamp-display" class="text-lg font-bold text-secondary flex items-center gap-2 opacity-0 transition-opacity">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M3 6a3 3 0 013-3h10a1 1 0 01.8 1.6L14.25 8l2.55 3.4A1 1 0 0116 13H6a1 1 0 01-1-1V6z" clip-rule="evenodd" /></svg>
                    <span>0</span>
                </div>
            </div>
            
            <canvas id="rhythm-display" class="w-full h-10 mb-2 rounded-lg" aria-hidden="true"></canvas>

            <div class="w-full max-w-[280px] mx-auto h-8 mb-2">
                <button id="use-memory-flash-btn" class="hidden w-full h-full bg-amber-400 hover:bg-amber-500 text-slate-800 font-bold rounded-md flex items-center justify-center gap-2 transition-all shadow">
                     <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M11 3a1 1 0 100 2h.01a1 1 0 100-2H11zM12 2.251A7.962 7.962 0 0120 10a7.962 7.962 0 01-7.749 7.749A7.962 7.962 0 014 10a7.962 7.962 0 017.749-7.749A7.994 7.994 0 0112 2.251zM12 10a1 1 0 100-2 1 1 0 000 2z" /><path fill-rule="evenodd" d="M12 16a1 1 0 100-2 1 1 0 000 2zM12 6a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" /></svg>
                    힌트 보기 (탐험가 보너스 포기)
                </button>
            </div>

            <div class="game-board mx-auto relative grid grid-cols-2 gap-4">
                <div id="timing-feedback" aria-live="polite"></div>
                <div id="memory-flash-title">기억의 섬광</div>
                <div id="button-0" class="game-button"></div>
                <div id="button-1" class="game-button"></div>
                <div id="button-2" class="game-button"></div>
                <div id="button-3" class="game-button"></div>
            </div>
            
            <div id="button-container" class="w-full mt-4 relative h-10">
                <div class="absolute inset-0 flex items-center gap-4">
                    <button id="start-btn" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-5 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg">게임 시작</button>
                </div>
                <div id="in-progress-indicator" class="absolute inset-0 bg-teal-800 rounded-lg hidden" aria-hidden="true"></div>
                <p id="basecamp-timer-display" class="absolute top-full w-full text-center text-xs text-secondary mt-2"></p>
            </div>
        </section>
        <div id="spark-effect-right" class="absolute top-1/4 right-0 w-1/5 h-1/2 pointer-events-none z-10"></div>
    </main>

    <div id="bestiary-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-20" role="dialog" aria-modal="true" aria-labelledby="bestiary-title">
        <div class="p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-lg mx-4 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200">
            <div class="flex justify-between items-center mb-4">
                <h2 id="bestiary-title" class="text-2xl font-bold">적대자 도감</h2>
                <button id="close-bestiary-btn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700" aria-label="도감 닫기">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="bestiary-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4 overflow-y-auto pr-2" style="max-height: 60vh;"></div>
        </div>
    </div>
    
    <div id="rest-stage-modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden z-20" role="dialog" aria-modal="true" aria-labelledby="rest-title">
        <div class="p-8 rounded-2xl shadow-xl w-full max-w-sm mx-4 bg-slate-800 text-slate-200 text-center">
            <div id="announcer" class="w-24 h-24 mx-auto mb-4"></div>
            <h2 id="rest-title" class="text-2xl font-bold mb-2 text-focus-in"></h2>
            <p id="rest-subtitle" class="text-slate-400 mb-6 text-fade-in"></p>
            <button id="rest-continue-btn" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-5 rounded-lg transition-all duration-200">도전하기</button>
        </div>
    </div>
    
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-20" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-lg mx-4 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200">
            <div class="flex justify-between items-center mb-6">
                <h2 id="settings-title" class="text-2xl font-bold">설정</h2>
                <button id="close-settings-btn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700" aria-label="설정 닫기">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="space-y-6">
                <div>
                    <label for="bgm-volume-slider" class="block mb-2 text-sm font-medium">배경음악 볼륨</label>
                    <input id="bgm-volume-slider" type="range" min="-40" max="10" value="0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer dark:bg-gray-700">
                </div>
                <div>
                    <label for="sfx-volume-slider" class="block mb-2 text-sm font-medium">효과음 볼륨</label>
                    <input id="sfx-volume-slider" type="range" min="-20" max="10" value="0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer dark:bg-gray-700">
                </div>
                <div class="flex items-center justify-between">
                    <span id="bgm-label" class="text-sm font-medium">배경음악</span>
                    <button id="bgm-toggle" type="button" class="bg-gray-200 relative inline-flex flex-shrink-0 h-6 w-11 border-2 border-transparent rounded-full cursor-pointer transition-colors ease-in-out duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 dark:bg-slate-600" role="switch" aria-checked="false" aria-labelledby="bgm-label">
                        <span aria-hidden="true" class="translate-x-0 pointer-events-none inline-block h-5 w-5 rounded-full bg-white shadow transform ring-0 transition ease-in-out duration-200"></span>
                    </button>
                </div>
                <div class="flex items-center justify-between">
                    <span id="theme-label" class="text-sm font-medium">다크 모드</span>
                    <button id="theme-toggle" type="button" class="bg-gray-200 relative inline-flex flex-shrink-0 h-6 w-11 border-2 border-transparent rounded-full cursor-pointer transition-colors ease-in-out duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 dark:bg-slate-600" role="switch" aria-checked="false" aria-labelledby="theme-label">
                        <span aria-hidden="true" class="translate-x-0 pointer-events-none inline-block h-5 w-5 rounded-full bg-white shadow transform ring-0 transition ease-in-out duration-200"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="pause-modal" class="fixed inset-0 bg-black bg-opacity-70 flex-col items-center justify-center hidden z-30" role="dialog" aria-modal="true">
        <svg class="w-24 h-24 text-white mb-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.25 9v6m-4.5 0V9M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <button id="resume-btn" class="bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-8 rounded-lg transition-all duration-200 text-lg">계속하기</button>
    </div>

    <script src="rewards.js"></script>
    <script src="monsters.js"></script>
    <script src="script.js" defer></script>
</body>
</html>
