<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pro Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #121212;
      color: #E0E0E0;
    }
    .pro-mode-card { background-color: #2C2C2C; }
    .pro-mode-input {
      background-color: #1E1E1E;
      border-color: #4A4A4A;
      color: #E0E0E0;
    }
    .pro-mode-input::placeholder { color: #6B6B6B; }
    .pro-mode-btn {
      background-color: #3E3E3E;
      color: #FFFFFF;
      transition: background-color 0.3s;
    }
    .pro-mode-btn:hover { background-color: #5A5A5A; }
    .tool-card {
      background-color: #2C2C2C;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .tool-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
    }
    .lyrics-line {
        transition: color 0.3s, transform 0.3s;
        padding: 0.25rem 0.5rem;
        border-radius: 0.5rem;
        transform: scale(1);
    }
    .lyrics-line.clickable {
        cursor: pointer;
    }
    .lyrics-line.current {
        color: white;
        transform: scale(1.05);
    }
    .lyrics-line.next {
        color: #a7f3d0; /* emerald-200 */
    }
     .lyrics-line.past {
        color: #6b7280; /* gray-500 */
    }
    .highlight-char {
        background-color: #4CAF50;
        color: white;
        padding: 0 0.1rem;
        border-radius: 0.2rem;
    }
    .slider-thumb::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 20px; height: 20px;
        background: #4CAF50; border-radius: 50%;
        cursor: pointer;
    }
    .breath-countdown {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 10rem;
        font-weight: bold;
        color: rgba(236, 72, 153, 0.5); /* pink-500 with opacity */
        z-index: 10;
        pointer-events: none;
        animation: pop-in 0.5s forwards;
    }
    @keyframes pop-in {
        0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
    }
     .toast-notification {
        position: fixed;
        top: 20px;
        right: 20px;
        background-color: #4CAF50;
        color: white;
        padding: 1rem;
        border-radius: 0.5rem;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        z-index: 1000;
        animation: fadeInOut 3s forwards;
    }
    @keyframes fadeInOut {
        0%, 100% { opacity: 0; transform: translateY(-20px); }
        10%, 90% { opacity: 1; transform: translateY(0); }
    }
    .learner-body { background-color: #f3f4f6; color: #1f2937; }
    .learner-card { background-color: white; }
    .learner-tab.active { border-color: #3b82f6; background-color: #3b82f6; color: white; }
    .learner-tab { transition: all 0.2s; }
  </style>
</head>
<body class="pro-mode-bg">
  <div id="root"></div>

  <!-- React App -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    // --- Lyrics Memorization Component ---
    function LyricsApp({ onNavigate }) {
        const [lyrics, setLyrics] = useState("");
        const [mode, setMode] = useState('full');
        const [blankDifficulty, setBlankDifficulty] = useState(0.3);

        const processedLyrics = useMemo(() => {
            if (!lyrics) return "가사를 입력해주세요.";
            if (mode === 'full') return lyrics;
            if (mode === 'first') return lyrics.replace(/[가-힣a-zA-Z0-9]+/g, match => match[0] + '＿'.repeat(match.length > 1 ? match.length - 1 : 0));
            if (mode === 'blank') return lyrics.split('\n').map(line => line.split(/(\s+)/).map(word => (word.trim() === '' || Math.random() >= blankDifficulty) ? word : '＿'.repeat(word.length)).join('')).join('\n');
            return lyrics;
        }, [lyrics, mode, blankDifficulty]);

        return (
            <div className="w-full max-w-4xl mx-auto">
                 <header className="text-center mb-8 flex items-center justify-between">
                    <button onClick={() => onNavigate('vocal_tools_home')} className="pro-mode-btn px-4 py-2 rounded-lg hover:bg-red-600"><i className="fas fa-arrow-left mr-2"></i>뒤로</button>
                    <h1 className="text-3xl sm:text-4xl font-bold text-white tracking-tight"><i className="fas fa-microphone-alt mr-3 text-green-400"></i>가사 암기 도우미</h1>
                    <div className="w-24"></div>
                </header>
                <main className="pro-mode-card rounded-xl shadow-2xl p-8">
                    <div className="mb-6">
                        <label className="block text-lg font-semibold mb-2 text-green-300">가사 입력</label>
                        <textarea value={lyrics} onChange={(e) => setLyrics(e.target.value)} placeholder="이곳에 연습할 가사를 입력하세요." className="w-full h-48 p-4 pro-mode-input rounded-lg resize-none"></textarea>
                    </div>
                     <div className="mb-6 p-4 bg-gray-900/50 rounded-lg">
                        <div className="flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex space-x-2 sm:space-x-3" role="group">
                                <button onClick={() => setMode('full')} className={`px-4 py-2 rounded-md font-semibold ${mode === 'full' ? 'bg-green-600' : 'pro-mode-btn'}`}>전체 보기</button>
                                <button onClick={() => setMode('blank')} className={`px-4 py-2 rounded-md font-semibold ${mode === 'blank' ? 'bg-green-600' : 'pro-mode-btn'}`}>빈칸 채우기</button>
                                <button onClick={() => setMode('first')} className={`px-4 py-2 rounded-md font-semibold ${mode === 'first' ? 'bg-green-600' : 'pro-mode-btn'}`}>첫 글자 보기</button>
                            </div>
                            {mode === 'blank' && (
                                <div className="w-full sm:w-auto flex items-center gap-3 text-sm">
                                    <span className="text-gray-300">쉬움</span>
                                    <input type="range" min="0.1" max="0.9" step="0.05" value={blankDifficulty} onChange={(e) => setBlankDifficulty(parseFloat(e.target.value))} className="w-32 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer slider-thumb" />
                                    <span className="text-gray-300">어려움</span>
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="p-6 bg-black/30 rounded-lg min-h-[300px] whitespace-pre-wrap text-2xl leading-loose">
                        {processedLyrics}
                    </div>
                </main>
            </div>
        );
    }
    
    // --- Breath Analyzer Component ---
    function BreathAnalyzerApp({ onNavigate }) {
        const [step, setStep] = useState('input');
        const [lyrics, setLyrics] = useState("");
        const [timedLines, setTimedLines] = useState([]);
        const [breathMarks, setBreathMarks] = useState([]);
        const [isPlaying, setIsPlaying] = useState(false);
        const [elapsedTime, setElapsedTime] = useState(0);
        const [currentTimingLine, setCurrentTimingLine] = useState(0);
        const [finalLyrics, setFinalLyrics] = useState('');
        const [bpm, setBpm] = useState(120);
        const [avgBpm, setAvgBpm] = useState(null);
        const [isMetronomePlaying, setIsMetronomePlaying] = useState(false);
        const [toastMessage, setToastMessage] = useState('');

        const timerRef = useRef(null);
        const metronomeTimerRef = useRef(null);
        const audioContextRef = useRef(null);
        const startTimeRef = useRef(null);
        const fileInputRef = useRef(null);
        const activeLineRef = useRef(null);
        
        const lyricsLines = useMemo(() => lyrics.split('\n').filter(line => line.trim() !== ''), [lyrics]);

        const formatTime = (ms) => {
            const minutes = Math.floor(ms / 60000);
            const seconds = Math.floor((ms % 60000) / 1000);
            const milliseconds = Math.floor((ms % 1000) / 10);
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(milliseconds).padStart(2, '0')}`;
        };

        useEffect(() => {
            if (toastMessage) {
                const timer = setTimeout(() => setToastMessage(''), 3000);
                return () => clearTimeout(timer);
            }
        }, [toastMessage]);

        useEffect(() => {
            if (isPlaying) {
                startTimeRef.current = Date.now() - elapsedTime;
                timerRef.current = requestAnimationFrame(animate);
            } else { cancelAnimationFrame(timerRef.current); }
            return () => cancelAnimationFrame(timerRef.current);
        }, [isPlaying]);
        
        useEffect(() => {
            if (activeLineRef.current) {
                activeLineRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, [currentTimingLine, isPlaying]);

        const animate = () => {
            setElapsedTime(Date.now() - startTimeRef.current);
            timerRef.current = requestAnimationFrame(animate);
        };

        const handleReset = () => {
            setIsPlaying(false); setIsMetronomePlaying(false);
            setElapsedTime(0); setStep('input');
            setLyrics(''); setTimedLines([]); setBreathMarks([]);
            setCurrentTimingLine(0); setAvgBpm(null); setBpm(120);
        };

        const handleReady = () => lyrics.trim() ? setStep('ready') : alert("분석을 시작하려면 가사를 입력해주세요.");
        const handleStartTiming = () => { setStep('timing'); setIsPlaying(true); };

        const calculateAndSetBPM = (totalDuration, lines) => {
            const totalBeats = lines.length * 4;
            if (totalDuration > 0 && totalBeats > 0) {
                const calculatedBpm = Math.round((totalBeats / totalDuration) * 60000);
                setAvgBpm(calculatedBpm); setBpm(calculatedBpm);
            }
        };

        const handleMarkLineEnd = () => {
            const newTimedLine = { text: lyricsLines[currentTimingLine], endTime: elapsedTime };
            const updatedTimedLines = [...timedLines, newTimedLine];
            setTimedLines(updatedTimedLines);
            if (currentTimingLine + 1 >= lyricsLines.length) {
                setIsPlaying(false);
                calculateAndSetBPM(elapsedTime, updatedTimedLines);
                setStep('breathing'); setElapsedTime(0);
            } else {
                setCurrentTimingLine(prev => prev + 1);
            }
        };

        const handleRecordBreath = () => {
             if (!isPlaying) return;
            let lineStartTime = 0;
            for(let i=0; i<timedLines.length; i++) {
                const line = timedLines[i];
                if(elapsedTime <= line.endTime) {
                    const lineDuration = line.endTime - lineStartTime;
                    const progressInLine = lineDuration > 0 ? (elapsedTime - lineStartTime) / lineDuration : 1;
                    const charIndex = Math.floor(progressInLine * line.text.length);
                    if (!breathMarks.some(m => m.lineIndex === i && m.charIndex === charIndex)) {
                        setBreathMarks(prev => [...prev, { time: elapsedTime, lineIndex: i, charIndex }].sort((a, b) => a.time - b.time));
                    }
                    return;
                }
                lineStartTime = line.endTime;
            }
        };

        useEffect(() => {
            const generateFinalText = () => lyricsLines.map((line, lineIndex) => {
                const breathsInLine = breathMarks.filter(m => m.lineIndex === lineIndex).map(m => m.charIndex).sort((a,b) => b-a);
                let lineWithBreaths = line;
                breathsInLine.forEach(charIndex => {
                    lineWithBreaths = `${lineWithBreaths.slice(0, charIndex + 1)}^${lineWithBreaths.slice(charIndex + 1)}`;
                });
                return lineWithBreaths;
            }).join('\n');
            setFinalLyrics(generateFinalText());
        }, [lyricsLines, breathMarks]);
        
        const renderKaraokeLyrics = () => {
            let lineStartTime = 0;
            for(let i=0; i < timedLines.length; i++) {
                 const line = timedLines[i];
                 if(elapsedTime <= line.endTime) {
                    const lineDuration = line.endTime - lineStartTime;
                    const progressInLine = lineDuration > 0 ? (elapsedTime - lineStartTime) / lineDuration : 1;
                    const highlightUpTo = Math.floor(progressInLine * line.text.length);
                    return lyricsLines.map((text, idx) => (
                        <p key={idx} ref={idx === i ? activeLineRef : null} className={`lyrics-line text-2xl my-2 ${idx === i ? 'text-white' : 'text-gray-500'}`}>
                            {idx === i ? (<><span className="highlight-char">{text.substring(0, highlightUpTo)}</span><span>{text.substring(highlightUpTo)}</span></>) : text }
                        </p>
                    ));
                 }
                 lineStartTime = line.endTime;
            }
            if (timedLines.length > 0 && elapsedTime > timedLines[timedLines.length - 1].endTime) {
                 if (isPlaying) setIsPlaying(false);
                 return <p className="lyrics-line text-2xl my-2 text-green-400">분석 완료!</p>;
            }
            return null;
        };
        
        const playBeep = useCallback(() => {
            if (!audioContextRef.current) return;
            const context = audioContextRef.current;
            const oscillator = context.createOscillator();
            const gainNode = context.createGain();
            oscillator.frequency.setValueAtTime(880, context.currentTime);
            gainNode.gain.setValueAtTime(0.5, context.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.05);
            oscillator.connect(gainNode); gainNode.connect(context.destination);
            oscillator.start(context.currentTime); oscillator.stop(context.currentTime + 0.05);
        }, []);

        useEffect(() => {
            if (isMetronomePlaying) {
                if (!audioContextRef.current) audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContextRef.current.state === 'suspended') audioContextRef.current.resume();
                clearInterval(metronomeTimerRef.current);
                metronomeTimerRef.current = setInterval(playBeep, (60 / bpm) * 1000);
            } else {
                clearInterval(metronomeTimerRef.current);
            }
            return () => clearInterval(metronomeTimerRef.current);
        }, [isMetronomePlaying, bpm, playBeep]);

        const handleExport = () => {
            const data = { lyrics, timedLines, breathMarks, avgBpm };
            const jsonString = `data:text/json;charset=utf-8,${encodeURIComponent(JSON.stringify(data, null, 2))}`;
            const link = document.createElement("a");
            link.href = jsonString; link.download = "breath-analysis.json";
            link.click();
        };

        const handleFileImport = (event) => {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.lyrics && data.timedLines) {
                        setLyrics(data.lyrics); setTimedLines(data.timedLines);
                        setBreathMarks(data.breathMarks || []);
                        if (data.avgBpm) { 
                            setAvgBpm(data.avgBpm); 
                            setBpm(data.avgBpm);
                            setToastMessage(`분석 파일에서 감지된 평균 ${data.avgBpm} BPM을 메트로놈에 자동 설정했습니다.`);
                        }
                        setStep('breathing');
                    } else alert("잘못된 파일 형식입니다.");
                } catch (error) { alert("파일을 읽는 중 오류가 발생했습니다."); }
            };
            reader.readAsText(file);
        };
        
        return (
             <div className="w-full max-w-4xl mx-auto">
                {toastMessage && <div className="toast-notification">{toastMessage}</div>}
                 <header className="text-center mb-8 flex items-center justify-between">
                    <button onClick={() => step === 'input' ? onNavigate('vocal_tools_home') : handleReset()} className="pro-mode-btn px-4 py-2 rounded-lg hover:bg-red-600"><i className={`fas ${step === 'input' ? 'fa-arrow-left' : 'fa-undo'} mr-2`}></i>{step === 'input' ? '뒤로' : '초기화'}</button>
                    <h1 className="text-3xl sm:text-4xl font-bold text-white tracking-tight"><i className="fas fa-chart-line mr-3 text-green-400"></i>호흡 분석기</h1>
                    <div className="w-24"></div>
                </header>
                {step === 'input' && (
                    <main className="pro-mode-card rounded-xl shadow-2xl p-8 flex flex-col items-center gap-6">
                        <label className="w-full text-lg font-semibold mb-2 text-green-300">1단계: 분석할 노래 가사 입력</label>
                        <textarea value={lyrics} onChange={(e) => setLyrics(e.target.value)} placeholder="이곳에 가사를 붙여넣으세요." className="w-full h-64 p-4 pro-mode-input rounded-lg"></textarea>
                        <div className="w-full grid grid-cols-2 gap-4">
                            <input type="file" ref={fileInputRef} onChange={handleFileImport} accept=".json" className="hidden" />
                            <button onClick={() => fileInputRef.current.click()} className="w-full py-3 font-bold text-lg rounded-lg pro-mode-btn bg-gray-500 hover:bg-gray-600"><i className="fas fa-upload mr-2"></i> 파일 불러오기</button>
                            <button onClick={handleReady} disabled={!lyrics.trim()} className="w-full py-3 font-bold text-lg rounded-lg pro-mode-btn bg-green-600 hover:bg-green-700 disabled:bg-gray-500">준비 완료</button>
                        </div>
                    </main>
                )}
                {step === 'ready' && (
                     <main className="pro-mode-card rounded-xl shadow-2xl p-8">
                        <h2 className="text-xl font-semibold mb-2 text-amber-300">준비 단계</h2>
                        <div className="h-64 overflow-y-auto bg-black/30 p-4 rounded-lg mb-6">{lyricsLines.map((line, index) => (<p key={index} className="text-xl my-1">{line}</p>))}</div>
                        <button onClick={handleStartTiming} className="w-full py-4 font-bold text-xl rounded-lg pro-mode-btn bg-green-500 hover:bg-green-600"><i className="fas fa-play mr-2"></i>타이밍 기록 시작</button>
                    </main>
                )}
                {step === 'timing' && (
                     <main className="pro-mode-card rounded-xl shadow-2xl p-8">
                        <h2 className="text-xl font-semibold mb-2 text-amber-300">2단계: 문장 타이밍 기록</h2>
                        <p className="font-mono text-5xl text-white my-4 text-center">{formatTime(elapsedTime)}</p>
                        <div className="h-64 overflow-y-auto bg-black/30 p-4 rounded-lg mb-6">{lyricsLines.map((line, index) => (<p key={index} ref={index === currentTimingLine ? activeLineRef : null} className={`lyrics-line text-xl my-1 ${index === currentTimingLine ? 'timing-active' : ''}`}>{line}</p>))}</div>
                        <button onClick={handleMarkLineEnd} className="w-full py-4 font-bold text-xl rounded-lg pro-mode-btn bg-amber-500 hover:bg-amber-600"><i className="fas fa-stopwatch mr-2"></i>"{lyricsLines[currentTimingLine]?.substring(0,10)}..." 라인 종료 기록</button>
                    </main>
                )}
                {step === 'breathing' && (
                    <div className="grid md:grid-cols-2 gap-8">
                        <main className="pro-mode-card rounded-xl shadow-2xl p-8">
                             <h2 className="text-xl font-semibold mb-2 text-cyan-300">3단계: 호흡 위치 기록</h2>
                             <p className="font-mono text-5xl text-white my-4 text-center">{formatTime(elapsedTime)}</p>
                             <div className="h-64 overflow-y-auto bg-black/30 p-4 rounded-lg mb-6">{renderKaraokeLyrics()}</div>
                             <div className="flex gap-4">
                                <button onClick={() => setIsPlaying(!isPlaying)} className={`w-1/2 py-3 font-bold text-lg rounded-lg pro-mode-btn ${isPlaying ? 'bg-yellow-500 hover:bg-yellow-600' : 'bg-green-600 hover:bg-green-700'}`}>{isPlaying ? '일시정지' : '재생'}</button>
                                <button onClick={handleRecordBreath} disabled={!isPlaying} className="w-1/2 py-3 font-bold text-lg rounded-lg pro-mode-btn bg-cyan-600 hover:bg-cyan-500 disabled:bg-gray-500"><i className="fas fa-lungs mr-2"></i>호흡 기록</button>
                            </div>
                        </main>
                        <aside className="pro-mode-card rounded-xl shadow-2xl p-8 flex flex-col">
                             <h2 className="text-xl font-semibold mb-2 text-green-300">최종 결과 (수정 가능)</h2>
                             <textarea value={finalLyrics} onChange={(e) => setFinalLyrics(e.target.value)} className="w-full flex-grow p-4 pro-mode-input rounded-lg resize-none"></textarea>
                             <div className="mt-4">
                                <h3 className="text-lg font-semibold mb-2 text-white">메트로놈</h3>
                                <div className="flex items-center gap-4">
                                    <button onClick={()=> setIsMetronomePlaying(!isMetronomePlaying)} className="w-16 h-12 text-2xl rounded-lg pro-mode-btn">{isMetronomePlaying ? <i className="fas fa-pause"></i> : <i className="fas fa-play"></i>}</button>
                                    <div className="flex-grow">
                                        <input type="range" min="40" max="220" value={bpm} onChange={(e) => setBpm(Number(e.target.value))} className="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer slider-thumb" />
                                        <div className="text-center mt-1 text-white">{bpm} BPM {avgBpm && `(자동: ${avgBpm})`}</div>
                                    </div>
                                </div>
                             </div>
                             <button onClick={handleExport} className="w-full mt-4 py-3 font-bold text-lg rounded-lg pro-mode-btn bg-blue-600 hover:bg-blue-700"><i className="fas fa-download mr-2"></i> 분석 파일 내보내기</button>
                        </aside>
                    </div>
                )}
            </div>
        );
    }

    // --- Song Practice Component ---
    function SongPracticeApp({ onNavigate }) {
        const [step, setStep] = useState('import');
        const [lyrics, setLyrics] = useState("");
        const [timedLines, setTimedLines] = useState([]);
        const [breathMarks, setBreathMarks] = useState([]);
        const [isPlaying, setIsPlaying] = useState(false);
        const [elapsedTime, setElapsedTime] = useState(0);
        const [bpm, setBpm] = useState(120);
        const [avgBpm, setAvgBpm] = useState(null);
        const [isMetronomePlaying, setIsMetronomePlaying] = useState(false);
        const [breathCountdown, setBreathCountdown] = useState(null);

        const timerRef = useRef(null);
        const metronomeTimerRef = useRef(null);
        const audioContextRef = useRef(null);
        const startTimeRef = useRef(null);
        const fileInputRef = useRef(null);
        const lyricsContainerRef = useRef(null);

        const lyricsLines = useMemo(() => lyrics.split('\n').filter(line => line.trim() !== ''), [lyrics]);
        
        const finalLyrics = useMemo(() => {
             return lyricsLines.map((line, lineIndex) => {
                const breathsInLine = (breathMarks || []).filter(m => m.lineIndex === lineIndex).map(m => m.charIndex).sort((a,b) => b-a);
                let lineWithBreaths = line;
                breathsInLine.forEach(charIndex => {
                    lineWithBreaths = `${lineWithBreaths.slice(0, charIndex + 1)}^${lineWithBreaths.slice(charIndex + 1)}`;
                });
                return lineWithBreaths;
            }).join('\n');
        }, [lyricsLines, breathMarks]);

        const allBreathTimes = useMemo(() => (breathMarks || []).map(mark => mark.time).sort((a, b) => a - b), [breathMarks]);
        const totalBreathCount = allBreathTimes.length;

        const passedBreathCount = useMemo(() => {
            return allBreathTimes.filter(time => time < elapsedTime).length;
        }, [allBreathTimes, elapsedTime]);

        const formatTime = (ms) => {
            const minutes = Math.floor(ms / 60000);
            const seconds = Math.floor((ms % 60000) / 1000);
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        };
        
        const handleReset = () => {
            setStep('import'); setLyrics(""); setTimedLines([]); setBreathMarks([]);
            setIsPlaying(false); setElapsedTime(0);
            setBpm(120); setAvgBpm(null); setIsMetronomePlaying(false);
            if (metronomeTimerRef.current) clearInterval(metronomeTimerRef.current);
        };

        useEffect(() => {
            if (isPlaying) {
                startTimeRef.current = Date.now() - elapsedTime;
                timerRef.current = requestAnimationFrame(animate);
            } else { cancelAnimationFrame(timerRef.current); }
            return () => cancelAnimationFrame(timerRef.current);
        }, [isPlaying]);

        const animate = () => {
            const newElapsedTime = Date.now() - startTimeRef.current;
            setElapsedTime(newElapsedTime);
            
            const nextBreathTime = allBreathTimes.find(time => time > newElapsedTime);
            if (nextBreathTime) {
                const timeToBreath = nextBreathTime - newElapsedTime;
                if (timeToBreath <= 3000 && timeToBreath > 2000) setBreathCountdown(3);
                else if (timeToBreath <= 2000 && timeToBreath > 1000) setBreathCountdown(2);
                else if (timeToBreath <= 1000 && timeToBreath > 0) setBreathCountdown(1);
                else setBreathCountdown(null);
            } else {
                setBreathCountdown(null);
            }

            timerRef.current = requestAnimationFrame(animate);
        };

        const currentLineIndex = useMemo(() => {
            if (!timedLines || timedLines.length === 0) return -1;
            for(let i=0; i < timedLines.length; i++) {
                if(elapsedTime <= timedLines[i].endTime) {
                    return i;
                }
            }
            return -1;
        }, [elapsedTime, timedLines]);
        
        useEffect(() => {
            if (currentLineIndex !== -1 && lyricsContainerRef.current) {
                const activeElement = lyricsContainerRef.current.querySelector(`.lyrics-line-practice-${currentLineIndex}`);
                if (activeElement) {
                    activeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }, [currentLineIndex]);
        
        const handleFileImport = (event) => {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.lyrics && data.timedLines) {
                        setLyrics(data.lyrics); setTimedLines(data.timedLines);
                        setBreathMarks(data.breathMarks || []);
                        if (data.avgBpm) { setAvgBpm(data.avgBpm); setBpm(data.avgBpm); }
                        setStep('practice');
                    } else alert("잘못된 파일 형식입니다.");
                } catch (error) { alert("파일을 읽는 중 오류가 발생했습니다."); }
            };
            reader.readAsText(file);
        };
        
        const handleLineClick = (lineIndex) => {
            const targetTime = lineIndex === 0 ? 0 : timedLines[lineIndex - 1].endTime;
            setElapsedTime(targetTime);
        };

        const renderKaraokeLyrics = () => {
            let lineStartTime = 0;
            if (currentLineIndex > 0) {
                 lineStartTime = timedLines[currentLineIndex - 1].endTime;
            }

            if (currentLineIndex === -1 && timedLines.length > 0 && elapsedTime > timedLines[timedLines.length - 1].endTime) {
                 if (isPlaying) { setIsPlaying(false); setIsMetronomePlaying(false); }
                 return <p className="lyrics-line text-2xl my-2 text-green-400 text-center">연습 완료!</p>;
            }

            return lyricsLines.map((text, idx) => {
                let className = 'lyrics-line text-xl my-2 past clickable';
                if (idx === currentLineIndex) className = 'lyrics-line text-2xl my-2 current clickable';
                else if (idx === currentLineIndex + 1) className = 'lyrics-line text-xl my-2 next clickable';
                
                if(idx === currentLineIndex) {
                    const lineDuration = timedLines[idx].endTime - lineStartTime;
                    const progressInLine = lineDuration > 0 ? (elapsedTime - lineStartTime) / lineDuration : 1;
                    const highlightUpTo = Math.floor(progressInLine * text.length);
                    return (
                        <p key={idx} className={`${className} lyrics-line-practice-${idx}`} onClick={() => handleLineClick(idx)}>
                            <span className="highlight-char">{text.substring(0, highlightUpTo)}</span>
                            <span>{text.substring(highlightUpTo)}</span>
                        </p>
                    )
                }
                return <p key={idx} className={`${className} lyrics-line-practice-${idx}`} onClick={() => handleLineClick(idx)}>{text}</p>;
            });
        };

        const playBeep = useCallback(() => { /* ... metronome beep logic ... */ }, []);
        useEffect(() => { /* ... metronome timer logic ... */ }, [isMetronomePlaying, bpm, playBeep]);

        const handleResetPractice = () => {
            setIsPlaying(false);
            setIsMetronomePlaying(false);
            setElapsedTime(0);
        }

        if (step === 'import') {
            return (
                <div className="w-full max-w-2xl mx-auto">
                    <header className="text-center mb-8 flex items-center justify-between">
                         <button onClick={() => onNavigate('vocal_tools_home')} className="pro-mode-btn px-4 py-2 rounded-lg hover:bg-red-600"><i className="fas fa-arrow-left mr-2"></i>뒤로</button>
                         <h1 className="text-3xl sm:text-4xl font-bold text-white tracking-tight"><i className="fas fa-music mr-3 text-green-400"></i>노래 연습</h1>
                         <div className="w-24"></div>
                    </header>
                    <main className="pro-mode-card rounded-xl shadow-2xl p-8 flex flex-col items-center gap-6 text-center">
                        <i className="fas fa-upload text-6xl text-gray-500 mb-4"></i>
                        <h2 className="text-2xl font-bold">연습 파일 불러오기</h2>
                        <p className="text-gray-400">호흡 분석기에서 내보낸 `.json` 파일을 불러와 연습을 시작하세요.</p>
                        <input type="file" ref={fileInputRef} onChange={handleFileImport} accept=".json" className="hidden" />
                        <button onClick={() => fileInputRef.current.click()} className="w-full max-w-xs mt-4 py-3 font-bold text-lg rounded-lg pro-mode-btn bg-green-600 hover:bg-green-700">파일 선택</button>
                    </main>
                </div>
            );
        }

        return (
            <div className="w-full max-w-4xl mx-auto">
                 <header className="text-center mb-8 flex items-center justify-between">
                    <button onClick={handleReset} className="pro-mode-btn px-4 py-2 rounded-lg hover:bg-red-600"><i className="fas fa-undo mr-2"></i>파일 다시 선택</button>
                    <h1 className="text-3xl sm:text-4xl font-bold text-white tracking-tight"><i className="fas fa-music mr-3 text-green-400"></i>노래 연습</h1>
                    <button onClick={handleResetPractice} className="pro-mode-btn px-4 py-2 rounded-lg hover:bg-yellow-600"><i className="fas fa-redo mr-2"></i>다시하기</button>
                </header>
                <div className="grid md:grid-cols-2 gap-8">
                    <main className="pro-mode-card rounded-xl shadow-2xl p-8 relative">
                         {breathCountdown && <div className="breath-countdown">{breathCountdown}</div>}
                         <div className="flex justify-between items-center mb-4">
                            <p className="font-mono text-5xl text-white text-left">{formatTime(elapsedTime)}</p>
                            <div className="text-right">
                                <p className="text-lg text-gray-400">남은 호흡</p>
                                <p className="text-3xl font-bold text-cyan-400">{totalBreathCount - passedBreathCount} / {totalBreathCount}</p>
                            </div>
                         </div>
                         <div ref={lyricsContainerRef} className="h-72 overflow-y-auto bg-black/30 p-4 rounded-lg mb-6">{renderKaraokeLyrics()}</div>
                         <div className="flex items-center gap-4">
                            <button onClick={()=> { setIsPlaying(!isPlaying); if(!isPlaying) {setIsMetronomePlaying(true)} else {setIsMetronomePlaying(false)} }} className="w-full py-3 font-bold text-lg rounded-lg pro-mode-btn bg-green-600 hover:bg-green-700">{isPlaying ? '일시정지' : '연습 시작'}</button>
                         </div>
                         <div className="mt-4">
                            <h3 className="text-lg font-semibold mb-2 text-white">메트로놈</h3>
                            <div className="flex items-center gap-4">
                               <button onClick={()=> setIsMetronomePlaying(!isMetronomePlaying)} className="w-16 h-12 text-2xl rounded-lg pro-mode-btn">{isMetronomePlaying ? <i className="fas fa-pause"></i> : <i className="fas fa-play"></i>}</button>
                                <div className="flex-grow">
                                    <input type="range" min="40" max="220" value={bpm} onChange={(e) => setBpm(Number(e.target.value))} className="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer slider-thumb" />
                                    <div className="text-center mt-1 text-white">{bpm} BPM {avgBpm && `(자동: ${avgBpm})`}</div>
                                </div>
                            </div>
                         </div>
                    </main>
                    <aside className="pro-mode-card rounded-xl shadow-2xl p-8 flex flex-col">
                         <h2 className="text-xl font-semibold mb-2 text-green-300">전체 가사 (호흡 포함)</h2>
                         <div className="w-full flex-grow p-4 bg-black/30 rounded-lg resize-none whitespace-pre-wrap overflow-y-auto">
                            {finalLyrics}
                         </div>
                    </aside>
                </div>
            </div>
        );
    }
    
    // --- LectureNoteLearner Component ---
    function LectureNoteLearner({ onNavigate }) {
        const [notes, setNotes] = useState('');
        const [summary, setSummary] = useState(null);
        const [keywords, setKeywords] = useState([]);
        const [quiz, setQuiz] = useState([]);
        const [incorrectNotes, setIncorrectNotes] = useState([]);
        const [activeTab, setActiveTab] = useState('summary');
        const [selectedKeywords, setSelectedKeywords] = useState(new Set());
        const fileInputRef = useRef(null);
        const quizContainerRef = useRef(null);

        const stopWords = new Set(['이', '가', '을', '를', '은', '는', '의', '에', '에서', '에게', '께', '로', '으로', '과', '와', '고', '하다', '그리고', '그러나', '그래서', '그런데', '하지만', '및', '또는', '등', '것', '수', '그', '저', '이것', '입니다', '저것', '그것', '있다', '없다', '되다', '이다', '습니다', '합니다', '하고', '하며', '하는', '해서', '위해', '위한', '때문에', '대한', '관련', '경우', '통해', '따라', '바로', '더', '등등', '어떤', '우리', '우리가', '많이', '어떻게', '있는', '없는', '된다', '했다', '할수', '있게', '나타내는', '있습니다', '됩니다', '알수', '대해서']);

        const processLecture = () => {
            if (!notes.trim()) return alert('내용을 입력해주세요.');
            
            const lines = notes.split('\n').map(line => {
                const trimmed = line.trim();
                if (trimmed.startsWith('-') || trimmed.startsWith('*')) return { type: 'li', content: trimmed.substring(1).trim() };
                if (trimmed.length > 0 && trimmed.length < 20 && !trimmed.endsWith('.')) return { type: 'h3', content: trimmed };
                if (trimmed.length > 0) return { type: 'p', content: trimmed };
                return null;
            }).filter(Boolean);
            setSummary(lines);

            const words = notes.split(/[\s\.,\?!:"'()\[\]]+/).filter(word => word.length > 1);
            const wordFrequencies = {};
            words.forEach(word => {
                const lowerCaseWord = word.toLowerCase();
                if (!stopWords.has(lowerCaseWord) && isNaN(lowerCaseWord)) {
                    wordFrequencies[lowerCaseWord] = (wordFrequencies[lowerCaseWord] || 0) + 1;
                }
            });
            const topKeywords = Object.entries(wordFrequencies).sort((a, b) => b[1] - a[1]).slice(0, 30);
            setKeywords(topKeywords);
            
            setQuiz([]);
            setIncorrectNotes([]);
            setSelectedKeywords(new Set());
            setActiveTab('summary');
        };

        const handleKeywordToggle = (keyword) => {
            const newSelection = new Set(selectedKeywords);
            if (newSelection.has(keyword)) newSelection.delete(keyword);
            else newSelection.add(keyword);
            setSelectedKeywords(newSelection);
        };

        const generateQuiz = (isReview = false, reviewData = []) => {
            let newQuiz = [];

            if (isReview) {
                newQuiz = reviewData.map(item => ({...item, userAnswer: ''}));
            } else {
                if (selectedKeywords.size === 0) return alert('키워드를 하나 이상 선택해주세요.');
                const sentences = notes.match(/[^.!?]+[.!?]+/g) || [];
                const usedSentences = new Set();
                
                for (const keyword of selectedKeywords) {
                     for (const sentence of sentences) {
                        if (sentence.includes(keyword) && !usedSentences.has(sentence)) {
                             newQuiz.push({
                                 type: 'fill',
                                 questionHTML: sentence.replace(new RegExp(keyword, 'g'), `<span class="font-bold text-blue-400">[ 빈칸 ]</span>`),
                                 answer: keyword,
                                 userAnswer: ''
                             });
                             usedSentences.add(sentence);
                             break;
                        }
                    }
                }
                selectedKeywords.forEach(keyword => {
                    newQuiz.push({
                        type: 'hint',
                        questionHTML: keyword[0] + ' _'.repeat(keyword.length - 1),
                        answer: keyword,
                        userAnswer: ''
                    });
                });
            }
            
            setQuiz(newQuiz);
            if (!isReview) {
                setIncorrectNotes([]);
            }
            setActiveTab('quiz');
        };
        
        const handleQuizAnswerChange = (index, value) => {
            const updatedQuiz = [...quiz];
            updatedQuiz[index].userAnswer = value;
            setQuiz(updatedQuiz);
        };

        const gradeQuiz = () => {
            const incorrect = quiz.filter(q => q.userAnswer.trim().toLowerCase() !== q.answer.toLowerCase());
            setIncorrectNotes(incorrect);
            alert(`채점 완료! 총 ${quiz.length}문제 중 ${quiz.length - incorrect.length}문제를 맞혔습니다.`);
            setActiveTab('note');
        };
        
        const reviewIncorrectProblems = () => {
            if (incorrectNotes.length === 0) return alert("복습할 오답 문제가 없습니다.");
            generateQuiz(true, incorrectNotes);
        };

        const exportIncorrectNotes = () => {
            if (incorrectNotes.length === 0) return alert("내보낼 오답 문제가 없습니다.");
            const dataStr = JSON.stringify(incorrectNotes, null, 2);
            const dataBlob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(dataBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '오답노트.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        const importIncorrectNotes = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const importedNotes = JSON.parse(e.target.result);
                    if (!Array.isArray(importedNotes) || importedNotes.length === 0 || !importedNotes[0].answer) {
                        throw new Error('Invalid file format');
                    }
                    clearAll();
                    setIncorrectNotes(importedNotes);
                    generateQuiz(true, importedNotes);
                } catch (error) {
                    alert('잘못된 오답노트 파일입니다.');
                    console.error("Import Error:", error);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        };

        const clearAll = () => {
            setNotes(''); setSummary(null); setKeywords([]); setQuiz([]);
            setIncorrectNotes([]); setSelectedKeywords(new Set());
        };

        return (
             <div className="w-full max-w-4xl mx-auto">
                <header className="text-center mb-8 flex items-center justify-between">
                    <button onClick={() => onNavigate('utilities_home')} className="pro-mode-btn px-4 py-2 rounded-lg hover:bg-gray-600"><i className="fas fa-arrow-left mr-2"></i>뒤로</button>
                    <h1 className="text-3xl sm:text-4xl font-bold text-white tracking-tight"><i className="fas fa-book-reader mr-3 text-blue-400"></i>강의노트 학습기</h1>
                     <div className="w-24"></div>
                </header>
                <main className="pro-mode-card rounded-xl shadow-2xl p-6 md:p-8">
                    <div className="mb-6">
                        <textarea value={notes} onChange={(e) => setNotes(e.target.value)} className="w-full h-32 p-4 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 pro-mode-input" placeholder="이곳에 강의 내용을 붙여넣으세요..."></textarea>
                    </div>
                    
                    <div className="flex flex-wrap justify-center items-center gap-4 mb-6">
                        <button onClick={processLecture} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-md">분석 및 생성</button>
                        <input type="file" ref={fileInputRef} onChange={importIncorrectNotes} accept=".json" className="hidden" />
                        <button onClick={() => fileInputRef.current.click()} className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg shadow-md">오답노트 불러오기</button>
                        <button onClick={clearAll} className="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-lg shadow-md">초기화</button>
                    </div>
                    
                    <div className="border-b border-gray-700 mb-4">
                        <nav className="flex space-x-2" aria-label="Tabs">
                            <button onClick={() => setActiveTab('summary')} className={`learner-tab pro-mode-btn font-semibold px-4 py-2 text-sm rounded-t-lg border-b-2 border-transparent ${activeTab === 'summary' ? 'active bg-blue-600' : ''}`}>요약</button>
                            <button onClick={() => setActiveTab('keyword')} className={`learner-tab pro-mode-btn font-semibold px-4 py-2 text-sm rounded-t-lg border-b-2 border-transparent ${activeTab === 'keyword' ? 'active bg-blue-600' : ''}`}>키워드 선택</button>
                            <button onClick={() => setActiveTab('quiz')} className={`learner-tab pro-mode-btn font-semibold px-4 py-2 text-sm rounded-t-lg border-b-2 border-transparent ${activeTab === 'quiz' ? 'active bg-blue-600' : ''}`}>연습 문제</button>
                            <button onClick={() => setActiveTab('note')} className={`learner-tab pro-mode-btn font-semibold px-4 py-2 text-sm rounded-t-lg border-b-2 border-transparent ${activeTab === 'note' ? 'active bg-blue-600' : ''}`}>오답노트</button>
                        </nav>
                    </div>
                    
                    <div className="w-full h-[500px] bg-black/30 border-2 border-dashed border-gray-700 rounded-lg p-4 overflow-y-auto">
                        {activeTab === 'summary' && (summary ? <div className="prose prose-invert max-w-none">{summary.map((line, i) => {
                            if(line.type === 'li') return <li key={i}>{line.content}</li>;
                            if(line.type === 'h3') return <h3 key={i} className="font-bold mt-4 mb-2 text-blue-300">{line.content}</h3>;
                            return <p key={i}>{line.content}</p>;
                        })}</div> : <div className="flex items-center justify-center h-full text-gray-400">정리된 내용이 여기에 표시됩니다.</div>)}
                        
                        {activeTab === 'keyword' && (keywords.length > 0 ? (
                            <div>
                                 <h3 className='font-bold mb-4 text-lg text-blue-300'>학습할 키워드를 선택하세요 (빈도순)</h3>
                                 <div className='grid grid-cols-2 md:grid-cols-3 gap-x-8 gap-y-2'>
                                    {keywords.map(([word, count]) => (
                                        <div key={word} className="flex items-center">
                                            <input type="checkbox" id={`cb-${word}`} checked={selectedKeywords.has(word)} onChange={() => handleKeywordToggle(word)} className="w-4 h-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-600"/>
                                            <label htmlFor={`cb-${word}`} className="ml-2 cursor-pointer">{word} ({count}회)</label>
                                        </div>
                                    ))}
                                 </div>
                                 <button onClick={() => generateQuiz(false)} className='mt-8 w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-md'>선택한 단어로 연습문제 만들기</button>
                            </div>
                        ) : <div className="flex items-center justify-center h-full text-gray-400">키워드 목록이 여기에 표시됩니다.</div>)}
                        
                        {activeTab === 'quiz' && (quiz.length > 0 ? (
                            <div ref={quizContainerRef}>
                                {quiz.map((q, i) => (
                                    <div key={i} className="mb-4 p-4 bg-gray-800 rounded-md shadow-sm">
                                        <p className="mb-2" dangerouslySetInnerHTML={{ __html: q.questionHTML }}></p>
                                        <input type="text" value={q.userAnswer} onChange={(e) => handleQuizAnswerChange(i, e.target.value)} className="mt-1 block w-full px-3 py-2 pro-mode-input border border-gray-600 rounded-md text-sm shadow-sm"/>
                                    </div>
                                ))}
                                <button onClick={gradeQuiz} className="w-full mt-8 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-md">채점하기</button>
                            </div>
                        ) : <div className="flex items-center justify-center h-full text-gray-400">키워드를 선택하고 문제 생성 버튼을 누르세요.</div>)}

                        {activeTab === 'note' && (incorrectNotes.length > 0 ? (
                            <div>
                                 <div className="flex gap-4 mb-4">
                                    <button onClick={reviewIncorrectProblems} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg">틀린 문제 다시 풀기</button>
                                    <button onClick={exportIncorrectNotes} className="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-lg">오답노트 내보내기</button>
                                </div>
                                {incorrectNotes.map((q, i) => (
                                     <div key={i} className="mb-4 p-4 bg-gray-800 rounded-md shadow-sm">
                                        <p className="mb-2" dangerouslySetInnerHTML={{ __html: q.questionHTML }}></p>
                                        <p className="text-sm text-red-400">나의 오답: {q.userAnswer || '미입력'}</p>
                                        <p className="text-sm text-green-400">정답: {q.answer}</p>
                                    </div>
                                ))}
                            </div>
                        ) : <div className="flex items-center justify-center h-full text-gray-400">채점 후 틀린 문제가 여기에 표시됩니다.</div>)}
                    </div>
                </main>
            </div>
        );
    }
    
    // --- Home/Landing Page Components ---
    
    function LandingPage({ onNavigate }) {
      return (

              <h2 className="text-2xl font-bold text-white">일반 유틸리티</h2>
              <p className="text-gray-400 mt-2">일상 생활을 위한 다양한 편의 기능</p>
            </div>
          </main>
        </div>

    }

    function VocalToolsHomePage({ onNavigate }) {
      return (
        <div className="w-full max-w-4xl mx-auto">
          <header className="text-center mb-12 flex items-center">
             <button onClick={() => onNavigate('landing')} className="pro-mode-btn p-3 rounded-full hover:bg-gray-600">
                <i className="fas fa-arrow-left"></i>
            </button>
            <div className="flex-grow">
                <h1 className="text-4xl sm:text-5xl font-bold text-white tracking-tight"><i className="fas fa-tools mr-4 text-green-400"></i>Pro-Vocal Tools</h1>
                <p className="text-gray-400 mt-3 text-lg">프로페셔널을 위한 모든 도구</p>
            </div>
          </header>
          <main>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <div className="tool-card rounded-xl shadow-2xl p-6 flex flex-col items-center justify-center text-center cursor-pointer aspect-square" onClick={() => onNavigate('lyrics-helper')}>
                    <i className="fas fa-microphone-alt text-6xl text-green-400 mb-4"></i>
                    <h2 className="text-xl font-bold text-white">가사 암기 도우미</h2>
                    <p className="text-gray-400 mt-2 text-sm">완벽한 무대를 위한 필수 연습 도구</p>
                </div>
                <div className="tool-card rounded-xl shadow-2xl p-6 flex flex-col items-center justify-center text-center cursor-pointer aspect-square" onClick={() => onNavigate('breath-analyzer')}>
                    <i className="fas fa-chart-line text-6xl text-green-400 mb-4"></i>
                    <h2 className="text-xl font-bold text-white">호흡 분석기</h2>
                    <p className="text-gray-400 mt-2 text-sm">호흡 타이밍을 기록하고 분석합니다.</p>
                </div>
                <div className="tool-card rounded-xl shadow-2xl p-6 flex flex-col items-center justify-center text-center cursor-pointer aspect-square" onClick={() => onNavigate('song-practice')}>
                    <i className="fas fa-music text-6xl text-green-400 mb-4"></i>
                    <h2 className="text-xl font-bold text-white">노래 연습</h2>
                    <p className="text-gray-400 mt-2 text-sm">분석 파일을 기반으로 노래를 연습합니다.</p>
                </div>
            </div>
          </main>
        </div>
      );
    }

    function UtilitiesHomePage({ onNavigate }) {
        return (
            <div className="w-full max-w-4xl mx-auto">
                <header className="text-center mb-12 flex items-center">
                     <button onClick={() => onNavigate('landing')} className="pro-mode-btn p-3 rounded-full hover:bg-gray-600"><i className="fas fa-arrow-left"></i></button>

                        <h1 className="text-4xl sm:text-5xl font-bold text-white tracking-tight"><i className="fas fa-box mr-3 text-blue-400"></i>일반 유틸리티</h1>
                        <p className="text-gray-400 mt-3 text-lg">일상 생활을 위한 다양한 편의 기능</p>
                     </div>
                </header>
                <main className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">

                        <h2 className="text-xl font-bold text-white">강의노트 학습기</h2>
                        <p className="text-gray-400 mt-2 text-sm">강의 노트를 분석하고 문제를 풀어보세요.</p>

                     <div className="tool-card bg-gray-800/50 rounded-xl shadow-lg p-6 flex flex-col items-center justify-center text-center aspect-square border-2 border-dashed border-gray-600">
                        <i className="fas fa-plus text-5xl text-gray-500 mb-4"></i>
                        <h2 className="text-xl font-bold text-gray-400">다음 기능 준비중</h2>
                    </div>
                </main>
            </div>
        );
    }
    
    function App() {
      const [currentPage, setCurrentPage] = useState('landing');
      const navigate = (page) => setCurrentPage(page);
      
      const renderPage = () => {
        switch (currentPage) {
          case 'lyrics-helper': return <LyricsApp onNavigate={navigate} />;
          case 'breath-analyzer': return <BreathAnalyzerApp onNavigate={navigate} />;
          case 'song-practice': return <SongPracticeApp onNavigate={navigate} />;
          case 'vocal_tools_home': return <VocalToolsHomePage onNavigate={navigate} />;
          case 'utilities_home': return <UtilitiesHomePage onNavigate={navigate} />;
          case 'lecture-note-learner': return <LectureNoteLearner onNavigate={navigate} />;
          case 'landing':
          default:
            return <LandingPage onNavigate={navigate} />;
        }
      };

      return (
        <div className="min-h-screen p-4 sm:p-6 md:p-8 flex flex-col items-center justify-center">
          {renderPage()}
          <footer className="text-center mt-12 text-gray-500 text-sm"><p>© 2024 Pro Tools. All rights reserved.</p></footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
