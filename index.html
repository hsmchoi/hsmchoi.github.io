<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도전! 패턴 기억 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f1f5f9; --bg-secondary: #ffffff; --text-primary: #1e293b; --text-secondary: #475569;
            --text-highlight: #0f766e; --success-flash-bg: #dcfce7; --fail-flash-bg: #fecaca;
            --overlay-bg: rgba(0, 0, 0, 0.5); --overlay-shape: #ffffff;
        }
        .dark {
            --bg-primary: #0f172a; --bg-secondary: #1e293b; --text-primary: #e2e8f0; --text-secondary: #94a3b8;
            --text-highlight: #2dd4bf; --success-flash-bg: #15803d; --fail-flash-bg: #b91c1c;
            --overlay-bg: rgba(0, 0, 0, 0.7); --overlay-shape: #e2e8f0;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden;
            background-color: var(--bg-primary); color: var(--text-primary); transition: background-color 0.3s ease, color 0.3s ease;
        }
        #game-container, #dashboard-modal { background-color: var(--bg-secondary); transition: background-color 0.3s ease; }
        .text-secondary { color: var(--text-secondary); }
        .text-highlight { color: var(--text-highlight); }
        .game-board {
            position: relative; display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem;
            width: 100%; max-width: 400px; aspect-ratio: 1 / 1;
            transition: transform 1.5s, opacity 0.3s, filter 0.8s ease-in-out; transform-style: preserve-3d;
        }
        .game-button {
            position: relative; border-radius: 0.75rem; cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease, background-color 0.5s ease;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        .game-button:active { transform: scale(0.96); }
        .game-button.active { transform: scale(1.03); filter: brightness(1.25); }
        .disabled { pointer-events: none; opacity: 0.6; }
        
        @keyframes shake-vertical { 0%, 100% { transform: translateY(0); } 25% { transform: translateY(-3px); } 75% { transform: translateY(3px); } }
        .shake-vertical { animation: shake-vertical 0.2s ease-in-out; }
        @keyframes success-flash { 0%, 100% { background-color: var(--bg-primary); } 50% { background-color: var(--success-flash-bg); } }
        .success-flash { animation: success-flash 0.4s ease-in-out; }
        @keyframes gameOverFlash { 0%, 100% { background-color: var(--bg-primary); } 50% { background-color: var(--fail-flash-bg); } }
        .game-over-flash { animation: gameOverFlash 0.4s ease-in-out; }
        @keyframes levelUp { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); color: #fde047; } }
        .level-up { animation: levelUp 0.5s ease-in-out; }
        @keyframes shrink-out { from { transform: scale(1); opacity: 0.7; } to { transform: scale(0); opacity: 0; } }
        .shrinking-circle { animation: shrink-out 1.5s cubic-bezier(0.7, 0, 0.3, 1) forwards; }
        @keyframes pulse { 0% { filter: brightness(1.2); } 100% { filter: brightness(1); } }
        .pulse { animation: pulse 0.4s ease-in-out; }
        .cube-rotate { transform: rotateY(180deg); }
        .inverted { filter: invert(1); }
        @keyframes get-ready-pulse { 0%, 100% { background-color: var(--bg-secondary); } 50% { background-color: var(--bg-primary); } }
        .get-ready-pulse { animation: get-ready-pulse 1.5s ease-in-out; }
        #countdown-overlay { background-color: var(--overlay-bg); pointer-events: none; }
        #countdown-shape { width: 80%; padding-bottom: 80%; border-radius: 50%; border: 6px solid var(--overlay-shape); }
        .computer-turn { opacity: 0.7; }
        .answer-number {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem; font-weight: bold; color: white; text-shadow: 0 0 5px black;
            pointer-events: none; opacity: 0; transition: opacity 0.2s ease-in-out;
        }
        .answer-number.visible { opacity: 1; }
        #title-header {
            transition: max-height 0.5s ease-in-out, opacity 0.3s ease-in-out, margin-bottom 0.5s ease-in-out;
            max-height: 200px; opacity: 1; overflow: hidden;
        }
        #game-wrapper { transition: transform 0.5s ease-in-out; transform-origin: top; }
        #highscore-display { transition: opacity 0.5s ease-in-out; }
        .game-started #title-header { max-height: 0; opacity: 0; margin-bottom: 0 !important; }
        .game-started #game-wrapper { transform: scale(1.05); }
        .game-started #highscore-display { opacity: 0; }
        #dashboard-modal { z-index: 50; }
        #dashboard-modal-content { max-height: 70vh; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="main-container" class="w-full max-w-lg text-center relative">
        <div class="absolute top-0 right-4 mt-2 z-10 flex items-center gap-2"> <!-- Changed from right-0 and pr-2 to right-4 -->
            <!-- 도전 로그 버튼 -->
            <button id="dashboard-btn" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="Show challenge log">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            </button>
            <button id="bgm-toggle" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="Toggle background music">
                <svg id="bgm-on-icon" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                <svg id="bgm-off-icon" class="w-6 h-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>
            </button>
            <button id="theme-toggle" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="Toggle dark mode">
                <svg id="theme-toggle-sun-icon" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg id="theme-toggle-moon-icon" class="w-6 h-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </div>

        <div id="title-header">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 leading-tight pt-8">도전! 패턴 기억 게임</h1>
            <p class="text-secondary text-base mb-6">최고 기록에 도전하고, 당신의 한계를 시험하세요!</p>
        </div>
        
        <div id="game-wrapper">
            <div id="game-container" class="p-6 md:p-8 rounded-2xl shadow-xl">
                <div class="flex justify-center items-center mb-5 h-7">
                    <div class="text-lg font-bold text-highlight">
                        <span id="highscore-display">최고 기록: 0</span>
                    </div>
                </div>

                <div class="game-board mx-auto">
                    <div id="button-0" class="game-button bg-rose-400" style="--glow-color: rgba(251, 113, 133, 0.7);"></div>
                    <div id="button-1" class="game-button bg-sky-400" style="--glow-color: rgba(56, 189, 248, 0.7);"></div>
                    <div id="button-2" class="game-button bg-amber-400" style="--glow-color: rgba(251, 191, 36, 0.7);"></div>
                    <div id="button-3" class="game-button bg-emerald-400" style="--glow-color: rgba(52, 211, 153, 0.7);"></div>
                </div>
                
                <div id="message-display" class="mt-5 text-base font-medium text-secondary h-6"></div>
                <div id="button-container" class="w-full mt-6 relative h-12">
                    <div class="absolute inset-0 flex items-center gap-4">
                        <button id="show-answer-btn" class="w-1/3 bg-slate-500 hover:bg-slate-600 text-white font-bold py-3 px-5 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg hidden">정답 보기</button>
                        <button id="start-btn" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-5 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg">게임 시작</button>
                    </div>
                    <div id="in-progress-indicator" class="absolute inset-0 bg-teal-800 rounded-lg hidden"></div>
                </div>
                
                <div id="countdown-overlay" class="absolute inset-0 flex items-center justify-center rounded-2xl hidden">
                    <div id="countdown-shape"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 도전 로그 대시보드 모달 -->
    <div id="dashboard-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
        <div id="dashboard-modal-content" class="p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-lg mx-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">도전 로그</h2>
                <button id="close-dashboard-btn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="log-chart-container" class="w-full h-40 mb-4"></div>
            <div id="log-list" class="overflow-y-auto pr-2" style="max-height: 40vh;">
                <!-- 로그 항목이 여기에 추가됩니다. -->
            </div>
            <button id="clear-log-btn" class="w-full mt-4 bg-rose-500 hover:bg-rose-600 text-white font-bold py-2 px-4 rounded-lg">기록 삭제</button>
        </div>
    </div>

    <script>
        // 개발자 도구 감지 및 차단 (완벽하지 않음)
        (function() {
            let d = new Date();
            let i = 0;
            function c() {
                try {
                    // 디버거 문자를 사용하여 개발자 도구 열림 감지
                    // 개발자 도구가 열리면 이 함수가 호출될 때마다 콘솔이 지워짐
                    // 이는 사용자를 방해하여 개발자 도구 사용을 어렵게 함
                    // console.clear()는 일부 브라우저에서만 작동하며, 지속적인 호출은 성능에 영향을 줄 수 있음
                    (function() {
                        if (new Date() - d > 100) {
                            // 개발자 도구 열림 감지 시 페이지 새로고침
                            window.location.reload(); 
                        }
                        d = new Date();
                        // debugger; // 디버거를 강제로 실행하여 개발자 도구 열림을 유도
                        // console.log(i++); // 콘솔에 지속적으로 로그를 찍어 콘솔을 지우는 효과
                    }).toString().indexOf('debugger') !== -1;
                } catch (e) {}
                setTimeout(c, 100);
            }
            c();

            // F12 키 및 Ctrl+Shift+I (개발자 도구 단축키) 비활성화
            document.addEventListener('keydown', function(e) {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                    e.preventDefault(); // 기본 동작 차단
                    // 선택적으로 사용자에게 메시지 표시
                    // alert('개발자 도구는 허용되지 않습니다.'); 
                }
            });

            // 우클릭 메뉴 비활성화 (소스 보기 방지)
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault(); // 기본 동작 차단
                // alert('우클릭은 허용되지 않습니다.');
            });
        })();

        // --- 다크모드 로직 (변수명 최소화) ---
        const tB = document.getElementById('theme-toggle');
        const sI = document.getElementById('theme-toggle-sun-icon');
        const mI = document.getElementById('theme-toggle-moon-icon');

        const tT = (isD) => {
            document.documentElement.classList.toggle('dark', isD);
            sI.classList.toggle('hidden', isD);
            mI.classList.toggle('hidden', !isD);
        };

        const sT = localStorage.getItem('theme');
        const pD = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (sT === 'dark' || (!sT && pD)) {
            tT(true);
        } else {
            tT(false);
        }

        tB.addEventListener('click', () => {
            const isD = !document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isD ? 'dark' : 'light');
            tT(isD);
        });

        // --- 게임 로직 (변수명 최소화 및 주석 제거) ---
        const mC = document.getElementById('main-container');
        const sB = document.getElementById('start-btn');
        const sAB = document.getElementById('show-answer-btn');
        const hD = document.getElementById('highscore-display');
        const mD = document.getElementById('message-display');
        const gBs = document.querySelectorAll('.game-button');
        const gBd = document.querySelector('.game-board');
        const cO = document.getElementById('countdown-overlay');
        const cS = document.getElementById('countdown-shape');
        const b = document.body;
        const bT = document.getElementById('bgm-toggle');
        const bOI = document.getElementById('bgm-on-icon');
        const bFI = document.getElementById('bgm-off-icon');
        const iPI = document.getElementById('in-progress-indicator');
        const dB = document.getElementById('dashboard-btn');
        const dM = document.getElementById('dashboard-modal');
        const cDB = document.getElementById('close-dashboard-btn');
        const lL = document.getElementById('log-list');
        const lCC = document.getElementById('log-chart-container');
        const cLB = document.getElementById('clear-log-btn');

        // 전역 변수 선언 (sS 대신 ssI 추가)
        let gP = [];
        let pP = [];
        let l = 0;
        let hS = 0;
        let iP = false;
        let c = 0;
        let iBP = false; // Added initialization
        let cB = 'waiting';
        let iMM = false;

        let s, ssI, eS, tUS, sBS, shS, iS, mS;
        let bPs = {};
        
        const sl = ms => new Promise(res => setTimeout(res, ms));

        document.addEventListener('DOMContentLoaded', () => {
            lHS();
            sS(); // setupSynths 함수 호출
            const sBS = localStorage.getItem('bgmState');
            if (sBS === 'on') {
                iBP = true;
                uBI(true);
                pB(cB);
            }
            gBs.forEach(btn => {
                const nE = document.createElement('span');
                nE.className = 'answer-number';
                btn.appendChild(nE);
            });
        });

        // setupSynths 함수 (난독화된 sS)
        function sS() {
            s = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 } }).toDestination();
            ssI = new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.01, decay: 0.2, sustain: 0.2, release: 0.2 } }).toDestination(); // sS 대신 ssI 사용
            eS = new Tone.PolySynth(Tone.Synth, { oscillator: { type: 'square' }, envelope: { attack: 0.01, decay: 0.4, sustain: 0, release: 0.4 } }).toDestination();
            const r = new Tone.Reverb(1.5).toDestination();
            tUS = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.01, decay: 0.3, sustain: 0.1, release: 0.7 } }).connect(r);
            sBS = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.01, decay: 0.2, release: 0.2 } }).toDestination();
            sBS.volume.value = -6;
            shS = new Tone.NoiseSynth({ noise: { type: 'brown' }, envelope: { attack: 0.1, decay: 1.4, sustain: 0 } }).toDestination();
            shS.volume.value = -15;
            iS = new Tone.Synth({ oscillator: { type: 'sawtooth' }, envelope: { attack: 0.01, decay: 0.8, sustain: 0.1, release: 1 } }).toDestination();
            iS.volume.value = -18;
            mS = new Tone.Synth({ oscillator: { type: 'triangle8' }, envelope: { attack: 0.01, decay: 0.5, sustain: 0.1, release: 1 } }).connect(r);
            mS.volume.value = -15;

            const bV = -20;
            const wS = new Tone.PluckSynth({ attackNoise: 0.5, dampening: 4000, resonance: 0.7 }).toDestination();
            wS.volume.value = bV + 8;
            bPs.waiting = new Tone.Sequence((t, n) => {
                wS.triggerAttack(n, t);
            }, ["C4", "E4", "G4", "C5", "E5", "G4"], "8n");

            const nB = new Tone.MonoSynth({ oscillator: { type: "fmsine" }, envelope: { attack: 0.01, decay: 0.3, sustain: 0.1, release: 0.5 } }).toDestination();
            nB.volume.value = bV;
            bPs.normal = new Tone.Sequence((t, n) => {
                wS.triggerAttack(n.melody, t);
                if (n.bass) {
                    nB.triggerAttackRelease(n.bass, "8n", t);
                }
            }, [
                { melody: "C4", bass: "C2" }, { melody: "E4", bass: null }, { melody: "G4", bass: "C2" },
                { melody: "G4", bass: "G1" }, { melody: "E4", bass: null }, { melody: "C4", bass: "G1" }
            ], "8n");

            const hK = new Tone.MembraneSynth({ octaves: 4, pitchDecay: 0.1 }).toDestination();
            hK.volume.value = bV + 2;
            const hB = new Tone.MonoSynth({ oscillator: { type: "sawtooth" }, envelope: { attack: 0.01, decay: 0.3, sustain: 0.1, release: 0.5 } }).toDestination();
            hB.volume.value = bV - 4;
            bPs.hard = new Tone.Part((t, v) => {
                if (v.kick) hK.triggerAttackRelease("C1", "8n", t);
                if (v.bass) hB.triggerAttackRelease(v.bass, "8n", t);
            }, [
                { time: "0:0", kick: true, bass: "C2" }, { time: "0:2", bass: "C2" }, { time: "0:3", kick: true },
                { time: "0:5", bass: "G1" }, { time: "0:6", kick: true }, { time: "0:8", bass: "G1" },
                { time: "0:9", kick: true }, { time: "0:11", bass: "F1" }
            ]);
            bPs.hard.loop = true;
            bPs.hard.loopEnd = "1m";

            const vHK = new Tone.MembraneSynth({ octaves: 6, pitchDecay: 0.05 }).toDestination();
            vHK.volume.value = bV;
            const vHH = new Tone.MetalSynth({ frequency: 300, envelope: { attack: 0.001, decay: 0.05, release: 0.01 }, harmonicity: 4.1, modulationIndex: 22, resonance: 3000, octaves: 1.5 }).toDestination();
            vHH.volume.value = bV - 10;
            bPs.veryHard = new Tone.Sequence((t, n) => {
                vHK.triggerAttackRelease("C1", "8n", t);
                if (n === 'CH') vHH.triggerAttackRelease("C6", "16n", t);
            }, ['C1', 'CH', 'C1', 'CH'], '4n');

            const gOS = new Tone.AMSynth({ harmonicity: 1.5, envelope: { attack: 0.01, decay: 2, sustain: 0.1, release: 2 } }).toDestination();
            gOS.volume.value = bV - 5;
            bPs.gameover = new Tone.Sequence((t, n) => {
                gOS.triggerAttackRelease(n, "1n", t);
            }, [["C3", "E3"], ["G3", "B3"], ["F3", "A3"]], "1m");
        }

        function pB(s) {
            if (!iBP) return;
            Object.values(bPs).forEach(p => p.stop(0));
            
            cB = s;
            
            if (s === 'waiting') {
                Tone.Transport.timeSignature = [6, 8];
                Tone.Transport.bpm.value = 90;
                bPs.waiting.start(0);
            } else if (s === 'normal') {
                Tone.Transport.timeSignature = [6, 8];
                Tone.Transport.bpm.value = 100;
                bPs.normal.start(0);
            } else if (s === 'hard') {
                Tone.Transport.timeSignature = [12, 8];
                Tone.Transport.bpm.value = 120;
                bPs.hard.start(0);
            } else if (s === 'veryHard') {
                Tone.Transport.timeSignature = [4, 4];
                Tone.Transport.bpm.value = 140;
                bPs.veryHard.start(0);
            } else if (s === 'gameover') {
                Tone.Transport.timeSignature = [6, 8];
                Tone.Transport.bpm.value = 70;
                bPs.gameover.start(0);
            }
            
            if (Tone.Transport.state !== 'started') {
                   Tone.Transport.start();
            }
        }
        
        function sBgm() {
            if (Tone.Transport.state === 'started') {
                Tone.Transport.stop();
            }
            Object.values(bPs).forEach(p => p.stop(0));
        }

        function lHS() {
            hS = parseInt(localStorage.getItem('patternGameHighScore')) || 0;
            uHSD();
        }

        function uHSD() {
            hD.textContent = `최고 기록: ${hS}`;
        }

        function sHS() {
            const fL = l > 0 ? l - 1 : 0;
            if (fL > hS) {
                hS = fL;
                localStorage.setItem('patternGameHighScore', fL);
                sC(true);
                hD.classList.add('level-up');
                setTimeout(() => hD.classList.remove('level-up'), 500);
            }
            sCL(fL);
        }

        sB.addEventListener('click', async () => {
            await Tone.start();
            sG();
        });

        bT.addEventListener('click', async () => {
            await Tone.start();
            iBP = !iBP;
            localStorage.setItem('bgmState', iBP ? 'on' : 'off');
            uBI(iBP);

            if (iBP) {
                pB(cB || 'waiting');
            } else {
                sBgm();
            }
        });

        sAB.addEventListener('click', async () => {
            sAB.classList.add('disabled');
            sB.classList.add('disabled');
            await sAP();
            sAB.textContent = '다시 보기';
            sAB.classList.remove('disabled');
            sB.classList.remove('disabled');
        });

        function uBI(isPlaying) {
            bOI.classList.toggle('hidden', !isPlaying);
            bFI.classList.toggle('hidden', isPlaying);
        }

        gBs.forEach(button => {
            button.addEventListener('click', (event) => {
                if (!iP) return;
                const cBI = parseInt(event.target.id.split('-')[1]);
                pT(cBI);
            });
        });
        
        async function sG() {
            mC.classList.add('game-started');
            gBd.classList.remove('inverted');
            iMM = false;
            gP = [];
            l = 0;
            sB.classList.add('hidden');
            sAB.classList.add('hidden');
            iPI.classList.remove('hidden');
            mD.textContent = '';
            
            await sl(500);

            cO.classList.remove('hidden');
            cS.classList.remove('shrinking-circle');
            void cS.offsetWidth;
            cS.classList.add('shrinking-circle');
            
            await sl(1500);
            
            cO.classList.add('hidden');
            nL();
        }

        function nL() {
            pP = [];
            c = 0;
            l++;
            iP = false;

            if (l >= 1 && l <= 4) pB('normal');
            else if (l >= 5 && l <= 8) pB('hard');
            else if (l >= 9) pB('veryHard');
            
            const pTA = Math.floor((l - 1) / 5) + 1;
            const nPL = gP.length + pTA;
            
            gP = [];
            for (let i = 0; i < nPL; i++) {
                let cs = [0, 1, 2, 3];
                if (gP.length > 0) {
                    const lB = gP[gP.length - 1];
                    cs = cs.filter(ch => ch !== lB);
                }
                const nB = cs[Math.floor(Math.random() * cs.length)];
                gP.push(nB);
            }
            
            pPtt();
        }

        function pPtt() {
            gBd.classList.add('computer-turn');
            let d = 0;
            const bS = 700;
            const sDP = 80;
            const mS = 150;
            const sL = Math.floor((l - 1) / 4);
            const pI = Math.max(mS, bS - (sL * sDP));
            
            gP.forEach((bI) => {
                setTimeout(() => aB(bI, false), d);
                d += pI;
            });

            setTimeout(() => {
                iP = true;
                gBd.classList.remove('computer-turn');
                gBs.forEach(btn => {
                    btn.classList.add('pulse');
                    setTimeout(() => btn.classList.remove('pulse'), 400);
                });
            }, d + 100);
        }

        function pT(id) {
            aB(id, true);
            pP.push(id);
            cA(pP.length - 1);
        }

        function cA(cI) {
            let cBI = gP[cI];
            if (iMM) {
                const mM = { 0: 1, 1: 0, 2: 3, 3: 2 };
                cBI = mM[cBI];
            }

            if (pP[cI] !== cBI) {
                gO();
                return;
            }
            c++;
            if (pP.length === gP.length) {
                iP = false;
                lCS();
            }
        }
        
        async function lCS() {
            await sl(350); 
            
            if (l > 0 && l % 4 === 0) {
                const e = [sCE, iCE, aMM];
                let eTR;

                if (l === 4) eTR = sCE;
                else if (l === 8) eTR = iCE;
                else if (l === 12) eTR = aMM;
                else {
                    eTR = e[Math.floor(Math.random() * e.length)];
                }
                
                await eTR();
                await sGRS();
            } else {
                ssI.triggerAttackRelease('C5', '8n'); // sS 대신 ssI 사용
                b.classList.add('success-flash');
                gBd.classList.add('shake-vertical');
                setTimeout(() => {
                    b.classList.remove('success-flash');
                    gBd.classList.remove('shake-vertical');
                }, 400);
                await sl(800);
            }
            
            nL();
        }
        
        async function sCE() {
            shS.triggerAttackRelease("1n");
            gBd.classList.add('cube-rotate');
            await sl(750);

            const cD = [];
            gBs.forEach(btn => {
                const bC = Array.from(btn.classList).find(cl => cl.startsWith('bg-'));
                cD.push({
                    bg: bC,
                    glow: btn.style.getPropertyValue('--glow-color')
                });
            });

            for (let i = cD.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cD[i], cD[j]] = [cD[j], cD[i]];
            }

            gBs.forEach((btn, i) => {
                const oBC = Array.from(btn.classList).find(cl => cl.startsWith('bg-'));
                btn.classList.remove(oBC);
                btn.classList.add(cD[i].bg);
                btn.style.setProperty('--glow-color', cD[i].glow);
            });

            await sl(750);
            gBd.classList.remove('cube-rotate');
        }

        async function iCE() {
            iS.triggerAttackRelease("C3", "1s");
            gBd.classList.add('inverted');
            await sl(1500);
        }

        async function aMM() {
            mS.triggerAttackRelease("C5", "1s");
            iMM = true;
            mD.textContent = "좌우 반전!";
            await sl(1500);
            mD.textContent = "";
        }
        
        async function sGRS() {
            await sl(500); 
            gBd.classList.add('get-ready-pulse');
            const n = Tone.now();
            sBS.triggerAttackRelease("C5", "16n", n);
            sBS.triggerAttackRelease("C5", "16n", n + 0.4);
            sBS.triggerAttackRelease("C5", "16n", n + 0.8);
            sBS.triggerAttackRelease("G5", "8n", n + 1.2);
            await sl(1500);
            gBd.classList.remove('get-ready-pulse');
            await sl(500);
        }

        async function gO() {
            mC.classList.remove('game-started');
            sHS();
            uHSD();
            
            pB('gameover');

            const fL = l > 0 ? l - 1 : 0;
            mD.textContent = `게임 오버! 최종 레벨: ${fL}`;
            
            eS.triggerAttackRelease(['C3', 'C#3'], '4n');
            b.classList.add('game-over-flash');
            setTimeout(() => b.classList.remove('game-over-flash'), 400);
            
            iPI.classList.add('hidden');
            sB.classList.remove('hidden', 'disabled');
            sB.textContent = '다시 시작';
            iP = false;

            sAB.textContent = '정답 보기';
            sAB.classList.remove('hidden', 'disabled');
            sB.classList.replace('w-full', 'w-2/3');
        }

        async function sAP() {
            mD.textContent = '정답 확인...';
            await sl(500);
            
            for (let i = 0; i < gP.length; i++) {
                const bI = gP[i];
                const btn = document.getElementById(`button-${bI}`);
                const nE = btn.querySelector('.answer-number');

                nE.textContent = i + 1;
                nE.classList.add('visible');
                aB(bI, false);
                await sl(600);
            }
            
            await sl(1000);
            
            gBs.forEach(btn => {
                btn.querySelector('.answer-number').classList.remove('visible');
            });
            mD.textContent = '';
        }

        const ns = ['C4', 'E4', 'G4', 'A4'];
        function aB(id, isP) {
            const btn = document.getElementById(`button-${id}`);
            btn.classList.add('active');
            
            const gS = 15 + c * 4;
            const gSp = 2 + c * 1;
            btn.style.boxShadow = `0 0 ${gS}px ${gSp}px var(--glow-color)`;

            if (isP) {
                const n = Tone.Frequency(ns[id]).transpose(c * 1);
                s.triggerAttackRelease(n, '8n');
            } else {
                s.triggerAttackRelease(ns[id], '8n');
            }

            setTimeout(() => {
                btn.classList.remove('active');
                btn.style.boxShadow = '';
            }, 300);
        }

        function sC(isHS) {
            confetti({
                particleCount: isHS ? 300 : 150,
                spread: isHS ? 180 : 90,
                origin: { y: 0.6 },
                gravity: 0.8,
                ticks: 300,
                scalar: 1.2
            });
        }

        // --- 대시보드 로직 (변수명 최소화) ---
        dB.addEventListener('click', () => {
            rD();
            dM.classList.remove('hidden');
        });

        cDB.addEventListener('click', () => {
            dM.classList.add('hidden');
        });

        cLB.addEventListener('click', () => {
            if (confirm('정말로 모든 기록을 삭제하시겠습니까?')) {
                localStorage.removeItem('challengeLog');
                rD();
            }
        });

        function sCL(s) {
            let ls = JSON.parse(localStorage.getItem('challengeLog')) || [];
            const n = new Date();
            const nL = {
                id: n.getTime(),
                date: n.toLocaleString('ko-KR'),
                score: s
            };
            ls.unshift(nL);
            localStorage.setItem('challengeLog', JSON.stringify(ls));
        }

        function rD() {
            const ls = JSON.parse(localStorage.getItem('challengeLog')) || [];
            lL.innerHTML = '';
            lCC.innerHTML = '';

            if (ls.length === 0) {
                lL.innerHTML = '<p class="text-center text-secondary">아직 도전 기록이 없습니다.</p>';
                return;
            }

            ls.forEach(log => {
                const lI = document.createElement('div');
                lI.className = 'flex justify-between items-center p-2 border-b border-slate-200 dark:border-slate-700';
                lI.innerHTML = `
                    <span class="text-sm text-secondary">${new Date(log.id).toLocaleDateString('ko-KR')}</span>
                    <span class="font-bold">레벨 ${log.score}</span>
                `;
                lL.appendChild(lI);
            });

            rC(ls.slice(0, 10).reverse());
        }

        function rC(ls) {
            const sNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(sNS, "svg");
            svg.setAttribute("width", "100%");
            svg.setAttribute("height", "100%");
            svg.setAttribute("viewBox", "0 0 100 50");

            if (ls.length < 2) return;

            const mS = Math.max(...ls.map(l => l.score), 1);
            const pts = ls.map((log, i) => {
                const x = (i / (ls.length - 1)) * 90 + 5;
                const y = 45 - (log.score / mS) * 40;
                return `${x},${y}`;
            }).join(' ');

            const pL = document.createElementNS(sNS, "polyline");
            pL.setAttribute("points", pts);
            pL.setAttribute("fill", "none");
            pL.setAttribute("stroke", "var(--text-highlight)");
            pL.setAttribute("stroke-width", "1");
            svg.appendChild(pL);

            ls.forEach((log, i) => {
                const x = (i / (ls.length - 1)) * 90 + 5;
                const y = 45 - (log.score / mS) * 40;
                const circ = document.createElementNS(sNS, "circle");
                circ.setAttribute("cx", x);
                circ.setAttribute("cy", y);
                circ.setAttribute("r", "1.5");
                circ.setAttribute("fill", "var(--text-highlight)");
                svg.appendChild(circ);
            });

            lCC.appendChild(svg);
        }
    </script>
</body>
</html>
