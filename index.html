    <div id="main-container" class="w-full max-w-lg text-center relative">
        <div class="absolute top-0 right-0 mt-2 mr-2 z-10 flex items-center space-x-2">
            <button id="dashboard-btn" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="Show challenge log">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            </button>
            <button id="bgm-toggle" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="Toggle background music">

                <svg id="bgm-off-icon" class="w-6 h-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>
            </button>
            <button id="theme-toggle" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="Toggle dark mode">
                <svg id="theme-toggle-sun-icon" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>

            </button>
        </div>

        <div id="title-header">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 leading-tight pt-8">도전! 패턴 기억 게임</h1>
            <p class="text-secondary text-base mb-6">최고 기록에 도전하고, 당신의 한계를 시험하세요!</p>
        </div>
        
        <div id="game-wrapper">
            <div id="game-container" class="p-6 md:p-8 rounded-2xl shadow-xl">
                <div class="flex justify-center items-center mb-5 h-7 space-x-4">
                    <div id="basecamp-display" class="text-lg font-bold text-secondary flex items-center gap-2 hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 6a3 3 0 013-3h10a1 1 0 01.8 1.6L14.25 8l2.55 3.4A1 1 0 0116 13H6a1 1 0 01-1-1V6z" clip-rule="evenodd" />
                        </svg>
                        <span>캠프: 0</span>
                    </div>
                    <div class="text-lg font-bold text-highlight">
                        <span id="highscore-display">최고 기록: 0</span>
                    </div>
                </div>

                <div class="game-board mx-auto">
                    <div id="button-0" class="game-button bg-rose-400" style="--glow-color: rgba(251, 113, 133, 0.7);"></div>
                    <div id="button-1" class="game-button bg-sky-400" style="--glow-color: rgba(56, 189, 248, 0.7);"></div>
                    <div id="button-2" class="game-button bg-amber-400" style="--glow-color: rgba(251, 191, 36, 0.7);"></div>
                    <div id="button-3" class="game-button bg-emerald-400" style="--glow-color: rgba(52, 211, 153, 0.7);"></div>
                </div>
                
                <div id="message-display" class="mt-5 text-base font-medium text-secondary h-6"></div>
                <div id="button-container" class="w-full mt-6 relative h-12">
                    <div class="absolute inset-0 flex items-center gap-4">
                        <button id="show-answer-btn" class="w-1/3 bg-slate-500 hover:bg-slate-600 text-white font-bold py-3 px-5 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg hidden">정답 보기</button>
                        <button id="start-btn" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-5 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg">게임 시작</button>
                    </div>
                    <div id="in-progress-indicator" class="absolute inset-0 bg-teal-800 rounded-lg hidden"></div>
                </div>
                
                <div id="countdown-overlay" class="absolute inset-0 flex items-center justify-center rounded-2xl hidden">
                    <div id="countdown-shape"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 도전 로그 대시보드 모달 -->
    <div id="dashboard-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-20">
        <div class="p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-lg mx-4 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">도전 로그</h2>
                <button id="close-dashboard-btn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="log-chart-container" class="w-full h-40 mb-4"></div>
            <div id="log-list" class="overflow-y-auto pr-2" style="max-height: 40vh;">
            </div>
            <button id="clear-log-btn" class="w-full mt-4 bg-rose-500 hover:bg-rose-600 text-white font-bold py-2 px-4 rounded-lg">기록 삭제</button>
        </div>
    </div>

    <!-- 휴식 단계 모달 -->
    <div id="rest-stage-modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden z-20">
        <div class="p-8 rounded-2xl shadow-xl w-full max-w-sm mx-4 bg-slate-800 text-slate-200 text-center">
            <div id="announcer" class="w-24 h-24 mx-auto mb-4">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 90C27.9 90 10 72.1 10 50S27.9 10 50 10s40 17.9 40 40-17.9 40-40 40z" fill="#2dd4bf"/>
                    <circle cx="38" cy="45" r="5" fill="#0f172a"/>
                    <circle cx="62" cy="45" r="5" fill="#0f172a"/>
                    <path d="M35 65q15 10 30 0" stroke="#0f172a" stroke-width="4" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-2 text-focus-in">베이스캠프 도착!</h2>
            <p class="text-slate-400 mb-4 text-fade-in">다음 베이스캠프까지의 여정입니다.</p>
            <p id="rest-timer-display" class="text-xs text-slate-500 mb-4 text-fade-in" style="animation-delay: 0.7s;"></p>
            <div id="rest-level-guide" class="space-y-3 my-6">
            </div>
            <button id="rest-continue-btn" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-5 rounded-lg transition-all duration-200">계속하기</button>
        </div>
    </div>
