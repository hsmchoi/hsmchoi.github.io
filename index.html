<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>끄적끄적, 나의 개발 여정</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Poor+Story&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gaegu', cursive;
            background-color: #FFFAF0;
            color: #2D3748;
        }
        .font-title { font-family: 'Poor Story', cursive; }
        .grid-card {
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .grid-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            z-index: 1000;
        }
        .modal-overlay.is-open {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            transform: scale(0.9);
            transition: transform 0.4s ease;
        }
        .modal-overlay.is-open .modal-content {
            transform: scale(1);
        }
    </style>
</head>
<body class="antialiased">

    <div class="container mx-auto px-4 py-12 text-center">
        <h1 class="text-6xl md:text-7xl font-title font-bold text-amber-600">끄적끄적, 나의 개발 여정</h1>
        <p class="mt-4 text-2xl md:text-3xl text-gray-600">"각각의 이야기가 담긴, 스크린샷을 위한 포트폴리오"</p>
    </div>

    <main id="portfolio-grid" class="container mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-12">
    </main>

    <footer class="text-center py-12">
        <p class="text-xl text-gray-600">이야기를 나눠요</p>
        <p class="mt-2 text-lg text-gray-500">@eoeolmin.mk</p>
    </footer>

    <div id="carousel-modal" class="modal-overlay">
        <div id="modal-body" class="modal-content">
        </div>
    </div>

    <script src="./appStories.js"></script>
    <script>
        const portfolioGrid = document.getElementById('portfolio-grid');
        const modal = document.getElementById('carousel-modal');
        const modalBody = document.getElementById('modal-body');

        const createCoverSVG = (app) => `
            <svg viewBox="0 0 400 400" class="w-full h-full rounded-lg border-2 border-gray-700 bg-floralwhite grid-card" style="background-color: #FFFAF0;">
                <style>.title { font-family: 'Poor Story', cursive; font-size: 48px; font-weight: bold; fill: #2D3748; } .concept { font-size: 22px; font-style: italic; fill: #4A5568; } .pagination { font-size: 18px; fill: #A0AEC0; }</style>
                <text x="200" y="150" text-anchor="middle" class="title">${app.name}</text>
                <foreignObject x="30" y="180" width="340" height="100"><p xmlns="http://www.w3.org/1999/xhtml" class="concept" style="text-align: center;">${app.concept}</p></foreignObject>
                <text x="370" y="380" text-anchor="end" class="pagination">Click to see more &gt;</text>
            </svg>
        `;

        const createCarouselSVG = (app) => {
            let updatesHTML = '';
            const updateCount = app.updates.length;
            if (updateCount === 1) {
                updatesHTML = `<g transform="translate(120, 0)"><circle r="7" fill="#4A5568"/><text y="-15" text-anchor="middle" font-size="18px" font-weight="bold" fill="#2D3748">${app.updates[0].version}</text><text y="25" text-anchor="middle" font-size="16px" fill="#718096">${app.updates[0].description}</text></g>`;
            } else if (updateCount > 1) {
                const step = 240 / (updateCount - 1);
                updatesHTML = app.updates.map((upd, i) => `
                    <g transform="translate(${i * step}, 0)">
                        <circle r="7" fill="#4A5568"/>
                        <text y="-15" text-anchor="middle" font-size="18px" font-weight="bold" fill="#2D3748">${upd.version}</text>
                        <text y="25" text-anchor="middle" font-size="16px" fill="#718096">${upd.description}</text>
                    </g>
                `).join('');
            }
            
            const launchButtonHTML = app.appUrl ? `
                <a href="${app.appUrl}" target="_blank">
                    <g transform="translate(100, 270)" style="cursor: pointer;">
                        <rect fill="#FBBF24" width="200" height="50" rx="15" style="transition: fill 0.2s ease;" onmouseover="this.style.fill='#F59E0B'" onmouseout="this.style.fill='#FBBF24'"/>
                        <text x="100" y="32" text-anchor="middle" font-size="18px" font-weight="bold" fill="#422006">🚀 앱 실행하기</text>
                    </g>
                </a>
            ` : `
                <foreignObject x="50" y="220" width="300" height="150"><p xmlns="http://www.w3.org/1999/xhtml" style="font-size: 20px; fill: #718096; text-align: center;">작은 아이디어에서 시작해,<br/>꾸준히 성장하고 있습니다.</p></foreignObject>
            `;

            return `
            <svg width="1230" height="420" viewBox="0 0 1230 420" style="font-family: 'Gaegu', cursive;">
                <defs><style>.card-bg { fill: #FFFAF0; } .title { font-family: 'Poor Story', cursive; font-size: 48px; font-weight: bold; fill: #2D3748; } .concept { font-size: 22px; font-style: italic; fill: #4A5568; } .subtitle { font-size: 28px; font-weight: bold; fill: #4A5568; } .body { font-size: 20px; fill: #718096; } .pagination { font-size: 18px; fill: #A0AEC0; }</style></defs>
                <g transform="translate(10, 10)">
                    <rect width="400" height="400" rx="20" class="card-bg" stroke="#4A5568" stroke-width="3"/>
                    <text x="200" y="150" text-anchor="middle" class="title">${app.name}</text>
                    <foreignObject x="30" y="180" width="340" height="100"><p xmlns="http://www.w3.org/1999/xhtml" class="concept" style="text-align: center;">${app.concept}</p></foreignObject>
                    <text x="370" y="380" text-anchor="end" class="pagination">&lt; 1/3 &gt;</text>
                </g>
                <g transform="translate(420, 10)">
                    <rect width="400" height="400" rx="20" class="card-bg" stroke="#4A5568" stroke-width="3"/>
                    <text x="50" y="70" class="subtitle">탄생 스토리</text>
                    <foreignObject x="50" y="110" width="300" height="250"><p xmlns="http://www.w3.org/1999/xhtml" class="body">${app.story}</p></foreignObject>
                    <text x="370" y="380" text-anchor="end" class="pagination">&lt; 2/3 &gt;</text>
                </g>
                <g transform="translate(830, 10)">
                    <rect width="400" height="400" rx="20" class="card-bg" stroke="#4A5568" stroke-width="3"/>
                    <text x="50" y="70" class="subtitle">성장 기록</text>
                    <g transform="translate(80, 140)">
                        <line x1="0" y1="0" x2="240" y2="0" stroke="#A0AEC0" stroke-width="3"/>
                        ${updatesHTML}
                    </g>
                    ${launchButtonHTML}
                    <text x="370" y="380" text-anchor="end" class="pagination">&lt; 3/3 &gt;</text>
                </g>
            </svg>
        `};

        function renderGrid() {
            const gridHTML = appStories.map(app => `
                <div class="grid-card-container" data-app-id="${app.id}">
                    ${createCoverSVG(app)}
                </div>
            `).join('');
            portfolioGrid.innerHTML = gridHTML;
        }

        const openModal = (appId) => {
            const app = appStories.find(a => a.id === appId);
            if (app) {
                modalBody.innerHTML = createCarouselSVG(app);
                modal.classList.add('is-open');
            }
        };

        const closeModal = () => {
            modal.classList.remove('is-open');
            modalBody.innerHTML = '';
        };

        portfolioGrid.addEventListener('click', (e) => {
            const cardContainer = e.target.closest('.grid-card-container');
            if (cardContainer) {
                openModal(cardContainer.dataset.appId);
            }
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('is-open')) {
                closeModal();
            }
        });

        document.addEventListener('DOMContentLoaded', renderGrid);
    </script>
</body>
</html>
