<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>컴퓨터 과학 학습 웹툰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #111827;
            color: #f3f4f6;
        }
        #webtoon-container {
            background-color: #1f2937;
            border-radius: 1rem;
            padding: 1rem;
            height: 70vh;
            overflow-y: auto;
            border: 1px solid #374151;
        }
        /* 스크롤바 스타일 */
        #webtoon-container::-webkit-scrollbar {
            width: 8px;
        }
        #webtoon-container::-webkit-scrollbar-track {
            background: #1f2937;
        }
        #webtoon-container::-webkit-scrollbar-thumb {
            background-color: #4b5563;
            border-radius: 20px;
        }

        .cut {
            display: flex;
            margin-bottom: 1.5rem;
            align-items: flex-start;
        }
        .cut.noa {
            justify-content: flex-end;
        }
        .cut.eli {
            justify-content: flex-start;
        }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #4b5563;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            user-select: none;
        }
        .noa .avatar {
            margin-left: 0.75rem;
        }
        .eli .avatar {
            margin-right: 0.75rem;
        }
        .speech-bubble {
            max-width: 75%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            position: relative;
        }
        .noa .speech-bubble {
            background-color: #3b82f6;
            color: white;
            border-bottom-right-radius: 0.25rem;
        }
        .eli .speech-bubble {
            background-color: #f9fafb;
            color: #1f2937;
            border-bottom-left-radius: 0.25rem;
        }
        .cut.narration .speech-bubble {
            background-color: transparent;
            color: #9ca3af;
            width: 100%;
            max-width: 100%;
            text-align: center;
            font-style: italic;
        }
        .illustration {
            background-color: #374151;
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 1rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            text-align: center;
            color: #d1d5db;
        }
        .mission-box {
            border: 2px dashed #4b5563;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 1rem;
            background-color: rgba(107, 114, 128, 0.1);
        }
        .mission-box h4 {
            font-weight: 700;
            color: #a5b4fc;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-2xl mx-auto">
        <h1 class="text-3xl md:text-4xl font-bold text-center text-white mb-2">컴퓨터 과학 학습 웹툰</h1>
        <p class="text-center text-gray-400 mb-6">컴퓨터의 비밀을 파헤치는 노아와 엘리의 이야기</p>

        <!-- 웹툰 컨테이너 -->
        <div id="webtoon-container">
            <!-- 웹툰 내용은 JS로 동적 생성 -->
        </div>

        <!-- 네비게이션 버튼 -->
        <div class="flex justify-between items-center w-full max-w-md mx-auto mt-6">
            <button id="prevBtn" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded-lg transition-colors duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
                이전 화
            </button>
            <span id="chapter-indicator" class="text-lg font-semibold text-gray-300">제 1화</span>
            <button id="nextBtn" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded-lg transition-colors duration-300">
                다음 화
            </button>
        </div>
    </div>

    <script>
        const chapters = [
            // Chapters 1-8 (previous content)
            {
                title: "논리 게이트 만들기",
                content: [
                    { type: 'narration', text: '수많은 회로로 가득 찬 컴퓨터의 심장부. 노아가 혼란스러운 표정으로 서 있다.' },
                    { type: 'noa', text: '엘리, 이 복잡한 컴퓨터는 대체 어떻게 생각을 하는 거야? 그냥 전기 덩어리 아니었어?' },
                    { type: 'eli', text: '좋은 질문이야, 노아! 모든 건 이 아주 작은 \'문\'에서 시작돼. 이름은 \'논리 게이트\'라고 해.' },
                    { type: 'eli', text: '컴퓨터의 언어는 0과 1, 두 가지 뿐이거든. 이 게이트는 바로 그 0과 1을 다루는 규칙을 가진 문이야.' },
                    { type: 'illustration', content: `AND 게이트: 입력 A와 B가 모두 1일 때만 출력 1<br>OR 게이트: 입력 A 또는 B 둘 중 하나라도 1이면 출력 1` },
                    { type: 'eli', text: '이런 단순한 규칙들이 수백만, 수십억 개 모여서 엄청난 계산을 해내는 거야.'},
                    { type: 'noa', text: '아하! 그럼 이 작은 문들이 모여서 게임도 하고, 그림도 그리는 거구나!'},
                    { type: 'mission', 
                      practice: 'Logisim 같은 시뮬레이터로 AND, OR 게이트를 직접 만들어봐. 스위치를 켜고 끌 때마다 출력이 어떻게 바뀌는지 관찰해봐!',
                      action: '매일 7개의 기본 게이트 기호를 백지에 그려봐. 마스터했다면, NAND 게이트만으로 다른 모든 게이트를 만들어보는 도전에 나서봐!'
                    }
                ]
            },
            {
                title: "트랜지스터 기초",
                content: [
                    { type: 'noa', text: '엘리, 그럼 그 \'논리 게이트\'라는 문은 대체 무엇으로 만드는 거야? 실제로 나무랑 경첩이 있는 건 아닐 테고...' },
                    { type: 'eli', text: '하하, 맞아. 그 문의 재료가 바로 20세기 최고의 발명품, \'트랜지스터\'야. 전기 신호로 작동하는 초소형 스위치지.' },
                    { type: 'illustration', content: `트랜지스터: 작은 제어 신호(베이스)로 큰 전류(컬렉터->이미터)의 흐름을 켜거나(ON/1) 끌 수(OFF/0) 있다.` },
                    { type: 'eli', text: '베이스에 작은 전류를 흘려주면, 큰 전류가 흐르게 할 수 있어. 신호를 증폭시키거나, 전류를 완전히 켜고(1) 끄는(0) 스위치 역할을 하는 거지.' },
                    { type: 'noa', text: '와! 그럼 트랜지스터 두세 개를 잘 연결하면 AND 게이트나 OR 게이트를 만들 수 있는 거구나! 이제야 연결이 돼!' },
                    { type: 'eli', text: '바로 그거야. 컴퓨터의 성능이 계속 좋아지는 건, 이 작은 트랜지스터를 얼마나 더 작게, 더 많이 칩 하나에 넣을 수 있는지에 달려있어.'},
                     { type: 'mission', 
                      practice: '브레드보드에 트랜지스터와 LED로 간단한 스위칭 회로를 만들어봐. 베이스에 전기를 연결했을 때 LED가 켜지는 걸 보면 감이 올 거야!',
                      action: 'BJT와 MOSFET의 구조와 기호를 직접 그려봐. 그리고 광센서와 조합해서 "어두워지면 저절로 LED가 켜지는 회로"를 만들어보는 건 어때?'
                    }
                ]
            },
            {
                title: "디지털 논리 회로",
                content: [
                    { type: 'noa', text: '게이트들을 모아서 회로를 만든다는 건 알겠는데, 종류가 있다면서? 조합? 순차?' },
                    { type: 'eli', text: '정확해. 디지털 논리 회로는 크게 두 종류로 나뉘어. 컴퓨터의 \'계산\'과 \'기억\'을 담당하는 팀이라고 생각하면 쉬워.' },
                    { type: 'eli', text: '먼저 \'조합 논리 회로\'는 현재 들어온 입력값만 보고 바로 결과를 계산해내. 덧셈기나 뺄셈기처럼 정직한 계산기 같은 녀석이야. 과거는 신경 쓰지 않아.' },
                    { type: 'illustration', content: `조합 논리 (계산기): 입력 -> [ 게이트 조합 ] -> 출력<br><br>순차 논리 (기억장치): 입력 + 과거상태 -> [ 게이트 조합 + 메모리 ] -> 출력`},
                    { type: 'eli', text: '반면 \'순차 논리 회로\'는 달라. 현재 입력값과 함께 \'과거의 결과\'를 함께 고려해서 다음 결과를 만들어내. 이게 바로 컴퓨터가 정보를 \'기억\'하는 방법이야. 플립플롭이나 레지스터가 대표적이지.'},
                    { type: 'noa', text: '아! 조합 회로가 계산을 하고, 순차 회로가 그 결과를 기억했다가 다음 계산에 써먹는 거구나!'},
                    { type: 'mission', 
                      practice: '시뮬레이터에서 1비트 덧셈기(반가산기)를 만들어봐. 이게 바로 조합 논리야. 그 다음엔 D 플립플롭을 만들어봐. 클럭 신호에 따라 0 또는 1을 저장하는 걸 보면서 순차 논리의 \'기억\'을 체험해봐.',
                      action: '\'조합 논리\'와 \'순차 논리\'의 차이점을 키워드 중심으로 요약해봐. (예: 조합-메모리X, 순차-메모리O)'
                    }
                ]
            },
            {
                title: "컴퓨터 아키텍처",
                content: [
                    { type: 'noa', text: '엘리, 이제 부품들은 알겠는데 이걸 다 모아서 어떻게 컴퓨터를 만드는 거야? 설계도가 필요할 것 같아.' },
                    { type: 'eli', text: '빙고! 그 거대한 설계도가 바로 \'컴퓨터 아키텍처\'야. 건물을 지을 때 청사진이 필요한 것과 똑같아.' },
                    { type: 'eli', text: '아키텍처는 CPU, 메모리, 주변장치들이 서로 어떻게 연결되고, 어떤 규칙으로 대화할지 정하는 큰 그림이야. 예를 들어 "명령어는 이런 형식으로 줘!", "메모리는 이런 방식으로 찾아가!" 같은 약속들이지.'},
                    { type: 'noa', text: '건축가처럼 컴퓨터 전체의 뼈대를 설계하는 거구나!'},
                    { type: 'mission', 
                      practice: '대표적인 컴퓨터 아키텍처인 \'폰 노이만 구조\'와 \'하버드 구조\'의 다이어그램을 찾아보고 비교해봐. 무엇이 가장 큰 차이점일까?',
                      action: '일상 속 물건(예: 스마트폰, 자동차)을 보고, 이것의 \'아키텍처\'는 무엇일지 생각해보는 연습을 해봐. (예: 자동차 아키텍처 = 엔진+변속기+바퀴+차체의 연결 구조)'
                    }
                ]
            },
            {
                title: "폰노이만 구조",
                content: [
                    { type: 'noa', text: '방금 말한 폰 노이만 구조가 그렇게 중요해? 왜 대부분의 컴퓨터가 이 방식을 써?' },
                    { type: 'eli', text: '천재 수학자 폰 노이만의 아이디어 덕분에 지금의 컴퓨터가 있는 거야. 핵심은 딱 하나, "명령어(프로그램)와 데이터를 같은 장소(메모리)에 저장한다"는 거야.' },
                    { type: 'illustration', content: `CPU <---> 중앙 버스 <---> 메모리 (프로그램 + 데이터)`},
                    { type: 'eli', text: '이전에는 계산기와 프로그램이 분리돼 있었어. 하지만 폰 노이만 구조 덕분에 우리는 메모리에 있는 프로그램만 바꾸면 컴퓨터가 완전히 다른 작업을 하게 만들 수 있게 됐지. 워드프로세서가 게임기로 변신하는 마법이야!'},
                    { type: 'noa', text: '아! 그래서 우리가 소프트웨어를 설치해서 쓰는 거구나. 하드웨어를 바꿀 필요 없이!'},
                    { type: 'eli', text: '맞아. 하지만 단점도 있어. CPU가 명령어와 데이터를 같은 통로(버스)로 가져와야 해서 길이 막힐 때가 있는데, 이걸 \'폰 노이만 병목 현상\'이라고 불러.'},
                    { type: 'mission', 
                      practice: '내가 "A=B+C"라는 코드를 실행한다고 상상해봐. 폰 노이만 구조에서 CPU와 메모리가 어떤 순서로 데이터를 주고받을지 순서도를 그려보자.',
                      action: '일상에서 \'폰 노이만 병목 현상\'과 비슷한 걸 찾아봐. (예: 좁은 문 하나로 모든 사람이 드나드는 영화관)'
                    }
                ]
            },
            {
                title: "명령어 집합 구조(ISA)",
                content: [
                    { type: 'noa', text: 'CPU가 0과 1로 된 명령어를 처리한다는 건 알겠어. 근데 어떤 0101이 \'더하기\'고, 어떤 0101이 \'저장하기\'인지 어떻게 알아? 무슨 사전이라도 있어?' },
                    { type: 'eli', text: '바로 그거야! 그 사전이 바로 \'명령어 집합 구조\', 줄여서 ISA(Instruction Set Architecture)라고 불러.' },
                    { type: 'eli', text: 'ISA는 CPU가 알아들을 수 있는 모든 명령어들의 목록과 그 형식을 정의한 약속이야. "이런 비트 패턴은 덧셈이야", "저런 패턴은 메모리에서 데이터를 가져오는 거야" 하고 정해놓은 거지.' },
                    { type: 'illustration', content: `사람: "두 수를 더해줘" <br> ↕ <br> ISA 약속: "ADD 명령어는 001101 이야" <br> ↕ <br> CPU: "001101? 알았어, 덧셈을 실행하지!"` },
                    { type: 'noa', text: '아하! 마치 우리가 강아지에게 "앉아", "손" 같은 명령어를 가르치는 것과 같구나. CPU도 자기가 배운 명령어만 알아듣는 거네!'},
                    { type: 'eli', text: '정확한 비유야. 그래서 CPU 종류(Intel, ARM 등)마다 ISA가 조금씩 달라서, 한 CPU용으로 만들어진 프로그램이 다른 CPU에서 바로 실행되지 않는 경우도 있어.'},
                    { type: 'mission', 
                      practice: '대표적인 개방형 ISA인 \'RISC-V\'의 기본 명령어 몇 개를 인터넷에서 찾아봐. `add`, `sub`, `lw` 같은 명령어가 무슨 뜻인지 알아보는 거야.',
                      action: '내가 쓰는 스마트폰이나 컴퓨터의 CPU 종류를 찾아보고, 그 CPU가 어떤 ISA(x86, ARM 등)를 사용하는지 조사해봐. 우리 주변의 모든 기기가 이런 약속 위에서 움직이고 있다는 걸 알게 될 거야.'
                    }
                ]
            },
            {
                title: "어셈블리어 배우기",
                content: [
                    { type: 'noa', text: '엘리, 그럼 프로그래머들이 정말 0과 1로 된 명령어를 직접 쓰는 거야? 그건 너무 끔찍한데...' },
                    { type: 'eli', text: '하하, 다행히 그렇진 않아. 그 기계어(0과 1)와 우리가 쓰는 프로그래밍 언어 사이에 다리가 하나 있거든. 그게 바로 \'어셈블리어\'야.' },
                    { type: 'eli', text: '어셈블리어는 0101 같은 기계어 명령어에 `ADD`(더하기), `MOV`(이동하기)처럼 사람이 읽을 수 있는 이름을 붙여준 거야. 기계어와 거의 1대1로 대응되는, 가장 낮은 수준의 언어지.' },
                    { type: 'illustration', content: `<b>[C언어]</b> c = a + b;<br><b>[어셈블리어]</b><br>LOAD R1, a<br>LOAD R2, b<br>ADD R3, R1, R2<br>STORE R3, c<br><b>[기계어]</b><br>01011001...<br>01011010...<br>00110111...<br>10100101...` },
                    { type: 'noa', text: '와! 훨씬 알아보기 쉽다! 기계어보다는 훨씬 인간 친화적이네. 그럼 우리는 어셈블리어를 쓰는 거야?' },

        function updateUI() {
            renderChapter(currentChapterIndex);
            chapterIndicator.textContent = `제 ${currentChapterIndex + 1}화: ${chapters[currentChapterIndex].title}`;
            prevBtn.disabled = currentChapterIndex === 0;
            nextBtn.disabled = currentChapterIndex === chapters.length - 1;
        }

        prevBtn.addEventListener('click', () => {
            if (currentChapterIndex > 0) {
                currentChapterIndex--;
                updateUI();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentChapterIndex < chapters.length - 1) {
                currentChapterIndex++;
                updateUI();
            }
        });

        // 초기화
        populateChapters();
        updateUI();

    </script>
</body>
</html>
