<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>끄적끄적, 끄적 공간</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Poor+Story&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gaegu', cursive;
            background-color: #FFFAF0;
            color: #2D3748;
            overflow-x: hidden;
        }
        .blog-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 4rem 2rem;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1.2s ease-out, transform 1.2s ease-out;
        }
        .blog-section.is-visible {
            opacity: 1;
            transform: translateY(0);
        }
        .font-title {
            font-family: 'Poor Story', cursive;
        }
        .post-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            border: 3px solid #4A5568;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .post-card:hover {
            transform: translateY(-10px) rotate(1deg);
            box-shadow: 0 12px 35px rgba(0,0,0,0.12);
        }
        .new-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #EF4444;
            color: white;
            padding: 8px 16px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 1.5rem;
            transform: rotate(15deg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            z-index: 1000;
        }
        .modal-overlay.is-open {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: #FFFAF0;
            padding: 2.5rem;
            border-radius: 1.5rem;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.4s ease;
            border: 3px solid #2D3748;
        }
        .modal-overlay.is-open .modal-content {
            transform: scale(1);
        }
        .modal-close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: #2D3748;
        }
    </style>
</head>
<body class="antialiased">

    <section class="blog-section is-visible" id="intro">
        <div class="text-center">
            <h1 class="text-6xl md:text-8xl font-title font-bold text-amber-500">끄적끄적, 끄적 공간</h1>
            <p class="mt-8 text-xl animate-bounce">👇</p>
        </div>
    </section>

    <section class="blog-section" id="posts">
        <div class="w-full max-w-5xl mx-auto">
            <h2 class="text-4xl md:text-5xl font-title text-center mb-12">최근 이야기</h2>
            <div id="post-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- 게시물 카드가 여기에 동적으로 생성됩니다. -->
            </div>
        </div>
    </section>
    
    <section class="blog-section" id="contact">
        <div class="text-center">
            <h2 class="text-4xl md:text-5xl font-title mb-4">이야기를 나눠요</h2>
            <p class="text-2xl md:text-3xl max-w-2xl mx-auto mb-12">
                당신의 이야기도 궁금해요.<br>언제든지 편하게 연락 주세요!
            </p>
            <div class="flex justify-center items-center space-x-8">
                 <a href="mailto:your-email@example.com" class="transition transform hover:scale-110">
                     <div class="w-24 h-24 bg-red-100 rounded-full flex items-center justify-center border-2 border-red-300">
                         <span class="text-4xl">💌</span>
                     </div>
                 </a>
                 <a href="#" class="transition transform hover:scale-110">
                     <div class="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center border-2 border-blue-300">
                           <span class="text-4xl">💬</span>
                     </div>
                 </a>
            </div>
        </div>
    </section>

    <div id="post-modal" class="modal-overlay">
        <div class="modal-content relative">
            <span id="modal-close" class="modal-close-btn">&times;</span>
            <h2 id="modal-title" class="text-4xl font-bold font-title mb-2"></h2>
            <p id="modal-date" class="text-gray-500 mb-6"></p>
            <div id="modal-body" class="text-xl leading-relaxed"></div>
            <div class="mt-8 text-center">
                <a id="modal-launch-app-btn" href="#" target="_blank" class="hidden inline-block bg-amber-400 text-gray-800 font-bold py-3 px-8 rounded-full text-xl hover:bg-amber-500 transition transform hover:scale-105">
                    🚀 앱 실행하기
                </a>
            </div>
        </div>
    </div>

    <script src="./postsData.js"></script>
    <script>
        // --- DOM 요소 ---
        const postGrid = document.getElementById('post-grid');
        const modal = document.getElementById('post-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalDate = document.getElementById('modal-date');
        const modalBody = document.getElementById('modal-body');
        const closeModalBtn = document.getElementById('modal-close');
        const modalLaunchBtn = document.getElementById('modal-launch-app-btn');

        // --- 함수 ---

        /**
         * 'postsData' 배열을 기반으로 게시물 카드를 렌더링합니다.
         * 예약된 시간(publishDate)이 지난 게시물만 표시합니다.
         */
        function renderPosts() {
            if (!postGrid) return;
            
            const now = new Date();
            const today = new Date();
            const todayString = `${today.getFullYear()}년 ${today.getMonth() + 1}월 ${today.getDate()}일`;

            const visiblePosts = postsData.filter(post => {
                // publishDate가 없거나, 과거 시간이면 true를 반환하여 게시물을 보이게 합니다.
                if (!post.publishDate) return true;
                return new Date(post.publishDate) <= now;
            });

            if (visiblePosts.length === 0) {
                postGrid.innerHTML = `<p class="text-center col-span-full text-2xl text-gray-500">아직 이야기가 없어요!</p>`;
                return;
            }

            const postElements = visiblePosts.map(post => {
                const cardClasses = `post-card ${post.isApp ? 'app-card' : ''}`;
                const appUrlData = post.isApp ? `data-app-url="${post.appUrl}"` : '';
                const isNew = post.date.trim() === todayString;

                return `
                    <div class="${cardClasses}"
                         data-title="${post.title}"
                         data-date="${post.date}" 
                         data-content='${post.content}'
                         ${appUrlData}>
                        <h3 class="text-2xl font-bold font-title">${post.title}</h3>
                        <p class="text-gray-500 mt-2">${post.date}</p>
                        <p class="mt-4">${post.summary}</p>
                        ${isNew ? '<span class="new-badge">NEW</span>' : ''}
                    </div>
                `;
            }).join('');
            
            postGrid.innerHTML = postElements;
        }

        /**
         * 모달을 엽니다.
         */
        function openModal(card) {
            const title = card.dataset.title;
            const date = card.dataset.date;
            const content = card.dataset.content;
            
            modalTitle.textContent = title;
            modalDate.textContent = date;
            modalBody.innerHTML = content;

            if (card.classList.contains('app-card')) {
                modalLaunchBtn.href = card.dataset.appUrl;
                modalLaunchBtn.classList.remove('hidden');
            } else {
                modalLaunchBtn.classList.add('hidden');
            }
            modal.classList.add('is-open');
        }

        /**
         * 모달을 닫습니다.
         */
        const closeModal = () => {
            modal.classList.remove('is-open');
        };

        /**
         * 스크롤에 따라 섹션을 나타나게 합니다.
         */
        function setupScrollAnimations() {
            const sections = document.querySelectorAll('.blog-section');
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    }
                });
            }, {
                threshold: 0.2
            });
            sections.forEach(section => observer.observe(section));
        }


        // --- 이벤트 리스너 ---
        postGrid.addEventListener('click', (e) => {
            const card = e.target.closest('.post-card');
            if (card) {
                openModal(card);
            }
        });

        closeModalBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('is-open')) {
                closeModal();
            }
        });

        // --- 앱 초기화 ---
        document.addEventListener('DOMContentLoaded', () => {
            renderPosts();
            setupScrollAnimations();
        });
    </script>
</body>
</html>
