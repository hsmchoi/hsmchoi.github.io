<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>황금비 패턴 기억 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 기본 단위: u = 4px, 기본 폰트 크기: S = 16px */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            /* 간격: 20px (u * 5, 피보나치) */
            gap: 1.25rem; /* 20px */
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
        }
        .game-button {
            /* border-radius: 12px (u * 3, 피보나치) */
            border-radius: 0.75rem; /* 12px */
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        .game-button:active {
            transform: scale(0.96);
        }
        .game-button.active {
            transform: scale(1.03);
            box-shadow: 0 0 25px 3px var(--glow-color);
            filter: brightness(1.25);
        }
        .disabled {
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body class="bg-slate-100 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-lg text-center">
        <h1 class="text-[42px] font-bold text-slate-800 mb-5 leading-tight">패턴 기억 게임</h1>
        <p class="text-slate-600 text-base mb-8">빛나는 순서를 기억하고 따라하며, 당신의 뇌를 훈련하세요.</p>

        <div id="game-container" class="bg-white p-8 rounded-[20px] shadow-xl">
            <div class="flex justify-between items-center mb-5">
                <div id="level-display" class="text-base font-bold text-slate-700">레벨: 0</div>
                <button id="start-btn" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-5 rounded-lg transition-colors shadow-md hover:shadow-lg">시작</button>
            </div>

            <div class="game-board mx-auto">
                <div id="button-0" class="game-button bg-rose-400" style="--glow-color: rgba(251, 113, 133, 0.7);"></div>
                <div id="button-1" class="game-button bg-sky-400" style="--glow-color: rgba(56, 189, 248, 0.7);"></div>
                <div id="button-2" class="game-button bg-amber-400" style="--glow-color: rgba(251, 191, 36, 0.7);"></div>
                <div id="button-3" class="game-button bg-emerald-400" style="--glow-color: rgba(52, 211, 153, 0.7);"></div>
            </div>
            
            <div id="message-display" class="mt-5 text-base font-medium text-slate-500 h-6"></div>
        </div>
        
        <footer class="mt-8 text-sm text-slate-500">
            <p>황금비율 원칙에 따라 새롭게 디자인되었습니다.</p>
        </footer>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const levelDisplay = document.getElementById('level-display');
        const messageDisplay = document.getElementById('message-display');
        const gameButtons = document.querySelectorAll('.game-button');

        let gamePattern = [];
        let playerPattern = [];
        let level = 0;
        let isPlayerTurn = false;
        let synth;

        function createSynth() {
            if (!synth) {
                synth = new Tone.Synth({
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 }
                }).toDestination();
            }
        }

        const notes = ['C4', 'E4', 'G4', 'A4'];

        startBtn.addEventListener('click', () => {
            createSynth();
            if (Tone.context.state !== 'running') {
                Tone.context.resume();
            }
            startGame();
        });

        gameButtons.forEach(button => {
            button.addEventListener('click', (event) => {
                if (!isPlayerTurn) return;
                const clickedButtonId = parseInt(event.target.id.split('-')[1]);
                playerTurn(clickedButtonId);
            });
        });

        function startGame() {
            gamePattern = [];
            level = 0;
            startBtn.classList.add('disabled');
            startBtn.textContent = '시작';
            messageDisplay.textContent = '';
            nextLevel();
        }

        function nextLevel() {
            playerPattern = [];
            level++;
            levelDisplay.textContent = `레벨: ${level}`;
            isPlayerTurn = false;
            
            const patternsToAdd = Math.floor((level - 1) / 5) + 1;

            for (let i = 0; i < patternsToAdd; i++) {
                let choices = [0, 1, 2, 3];
                if (gamePattern.length > 0) {
                    const lastButton = gamePattern[gamePattern.length - 1];
                    choices = choices.filter(choice => choice !== lastButton);
                }
                const nextButton = choices[Math.floor(Math.random() * choices.length)];
                gamePattern.push(nextButton);
            }

            playPattern();
        }

        function playPattern() {
            messageDisplay.textContent = '패턴을 기억하세요...';
            let delay = 0;
            
            // --- 여기가 수정된 부분 ---
            // 4 레벨 단위로 속도 증가
            const baseSpeed = 700; // 시작 속도 (ms)
            const speedDecrementPerTier = 80; // 단계별 속도 감소량 (ms)
            const minSpeed = 150; // 최대 속도 (ms)
            const speedLevel = Math.floor((level - 1) / 4); // 4 레벨마다 1씩 증가
            
            const patternInterval = Math.max(minSpeed, baseSpeed - (speedLevel * speedDecrementPerTier));
            // --- 수정 끝 ---
            
            gamePattern.forEach((buttonId) => {
                setTimeout(() => {
                    activateButton(buttonId);
                }, delay);
                delay += patternInterval;
            });

            setTimeout(() => {
                isPlayerTurn = true;
                messageDisplay.textContent = '당신 차례입니다!';
            }, delay + 100);
        }

        function activateButton(id) {
            const button = document.getElementById(`button-${id}`);
            button.classList.add('active');
            synth.triggerAttackRelease(notes[id], '8n');
            setTimeout(() => {
                button.classList.remove('active');
            }, 300);
        }

        function playerTurn(id) {
            activateButton(id);
            playerPattern.push(id);
            checkAnswer(playerPattern.length - 1);
        }

        function checkAnswer(currentIndex) {
            if (playerPattern[currentIndex] !== gamePattern[currentIndex]) {
                gameOver();
                return;
            }

            if (playerPattern.length === gamePattern.length) {
                if (isPlayerTurn) {
                    isPlayerTurn = false;
                    messageDisplay.textContent = '성공!';
                    
                    if (level > 0 && level % 5 === 0) {
                        showConfetti();
                    }
                    
                    setTimeout(nextLevel, 1200);
                }
            }
        }

        function gameOver() {
            const finalLevel = level > 0 ? level - 1 : 0;
            messageDisplay.textContent = `게임 오버! 최종 레벨: ${finalLevel}`;

            startBtn.classList.remove('disabled');
            startBtn.textContent = '다시 시작';
            isPlayerTurn = false;
            const dissonantSynth = new Tone.PolySynth(Tone.Synth).toDestination();
            dissonantSynth.triggerAttackRelease(['C3', 'C#3'], '4n');
        }

        function showConfetti() {
            confetti({
                particleCount: 150,
                spread: 90,
                origin: { y: 0.6 }
            });
        }
    </script>
</body>
</html>
