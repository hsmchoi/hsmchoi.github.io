<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도전! 패턴 기억 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f1f5f9; --bg-secondary: #ffffff; --text-primary: #1e293b; --text-secondary: #475569;
            --text-highlight: #0f766e; --success-flash-bg: #dcfce7; --fail-flash-bg: #fecaca; --overlay-bg: rgba(0, 0, 0, 0.5);
            --rhythm-bg: #e2e8f0; --rhythm-line: #475569; --rhythm-playhead: #ef4444;
            --hp-bg: #e5e7eb; --hp-fill: #22c55e; --hp-damage: #ef4444;
            --skill-bg: #e5e7eb; --skill-fill: #3b82f6;
            --essence-color: #f59e0b;
        }
        .dark {
            --bg-primary: #0f172a; --bg-secondary: #1e293b; --text-primary: #e2e8f0; --text-secondary: #94a3b8;
            --text-highlight: #2dd4bf; --success-flash-bg: #15803d; --fail-flash-bg: #b91c1c; --overlay-bg: rgba(0, 0, 0, 0.7);
            --rhythm-bg: #334155; --rhythm-line: #94a3b8; --rhythm-playhead: #f87171;
            --hp-bg: #4b5563; --hp-fill: #4ade80; --hp-damage: #f87171;
            --skill-bg: #4b5563; --skill-fill: #60a5fa;
            --essence-color: #fcd34d;
        }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; background-color: var(--bg-primary); color: var(--text-primary); transition: background-color 0.3s ease, color 0.3s ease; }
        .game-button { position: relative; display: flex; align-items: center; justify-content: center; border-radius: 0.75rem; cursor: pointer; transition: transform 0.1s ease, box-shadow 0.2s ease, background-color 0.5s ease, filter 0.2s ease-in-out, opacity 0.2s ease-in-out; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
        .game-button:active { transform: scale(0.96); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .game-button.active { transform: scale(1.03); filter: brightness(1.25); }
        .disabled { pointer-events: none; }
        .game-button-symbol { width: 60%; height: 60%; fill: rgba(255, 255, 255, 0.7); pointer-events: none; transition: transform 0.2s ease; }
        .game-button.active .game-button-symbol { transform: scale(1.1); }
        @keyframes shake-vertical { 0%, 100% { transform: translateY(0); } 25% { transform: translateY(-3px); } 75% { transform: translateY(3px); } }
        .shake-vertical { animation: shake-vertical 0.2s ease-in-out; }
        @keyframes success-flash { 0%, 100% { background-color: var(--bg-primary); } 50% { background-color: var(--success-flash-bg); } }
        .success-flash { animation: success-flash 0.4s ease-in-out; }
        @keyframes gameOverFlash { 0%, 100% { background-color: var(--bg-primary); } 50% { background-color: var(--fail-flash-bg); } }
        .game-over-flash { animation: gameOverFlash 0.4s ease-in-out; }
        @keyframes shrink-out { from { transform: scale(1); opacity: 0.7; } to { transform: scale(0); opacity: 0; } }
        .shrinking-circle { animation: shrink-out 1.5s cubic-bezier(0.7, 0, 0.3, 1) forwards; }
        @keyframes pulse { 0% { filter: brightness(1.2); } 100% { filter: brightness(1); } }
        .pulse { animation: pulse 0.4s ease-in-out; }
        @keyframes get-ready-pulse { 0%, 100% { background-color: var(--bg-secondary); } 50% { background-color: var(--bg-primary); } }
        .get-ready-pulse { animation: get-ready-pulse 1.5s ease-in-out; }
        @keyframes pulsing-indicator { 0% { background-color: var(--text-highlight); } 50% { filter: brightness(0.8); } 100% { background-color: var(--text-highlight); } }
        #in-progress-indicator { animation: pulsing-indicator 2s infinite ease-in-out; }
        .desaturated { filter: saturate(40%); opacity: 0.6; }
        @keyframes announcer-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        #announcer { animation: announcer-float 3s ease-in-out infinite; }
        @keyframes text-focus-in { 0% { filter: blur(12px); opacity: 0; } 100% { filter: blur(0px); opacity: 1; } }
        .text-focus-in { animation: text-focus-in 1s cubic-bezier(0.550, 0.085, 0.680, 0.530) both; }
        @keyframes text-fade-in { from { opacity: 0; } to { opacity: 1; } }
        .text-fade-in { animation: text-fade-in 1.2s cubic-bezier(0.390, 0.575, 0.565, 1.000) 0.5s both; }
        @keyframes fragment-lost-text { 0% { transform: translateY(0) scale(1); opacity: 1; color: #ef4444; } 100% { transform: translateY(-50px) scale(0.8); opacity: 0; } }
        .fragment-lost-animation { animation: fragment-lost-text 1.5s ease-out forwards; }
        @keyframes timing-feedback-anim { 0% { transform: translateY(0) scale(0.8); opacity: 1; } 80% { transform: translateY(-30px) scale(1.1); opacity: 1; } 100% { transform: translateY(-40px) scale(1); opacity: 0; } }
        #timing-feedback { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); font-size: 1.5rem; font-weight: 800; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .feedback-perfect { color: #84cc16; } .feedback-great { color: #22d3ee; } .feedback-good { color: #a8a29e; } .feedback-miss, .feedback-wrong { color: #ef4444; }
        .timing-feedback-animation { animation: timing-feedback-anim 0.5s ease-out forwards; }
        #rhythm-display { background-color: var(--rhythm-bg); transition: background-color 0.3s ease; }
        @keyframes heart-break { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); } 100% { transform: scale(0.5) rotate(45deg); opacity: 0; } }
        .heart-break { animation: heart-break 0.5s ease-in-out forwards; }
        @keyframes camp-flash { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); color: #fde047; } }
        .camp-flash { animation: camp-flash 0.6s ease-in-out; }
        .spark { position: absolute; background-color: var(--text-highlight); border-radius: 50%; }
        .symbol-face { transition: opacity 0.2s; }
        .mouth { transition: d 0.2s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        @keyframes dance {
            0%, 100% { transform: translate(0, 0) rotate(0); }
            25% { transform: translate(var(--dance-x, 1px), var(--dance-y, -2px)) rotate(-1deg); }
            75% { transform: translate(calc(var(--dance-x, 1px) * -1), calc(var(--dance-y, -2px) * -0.5)) rotate(1deg); }
        }
        .dancing .game-button-symbol { animation: dance 1s infinite ease-in-out; }
        .combo-1 { --dance-x: 1px; --dance-y: -2px; }
        .combo-2 { --dance-x: 2px; --dance-y: -4px; }
        .combo-3 { --dance-x: 4px; --dance-y: -6px; }
        .bestiary-clear-mark { position: absolute; top: 0.5rem; right: 0.5rem; font-size: 0.75rem; font-weight: bold; color: var(--text-highlight); background-color: var(--bg-secondary); padding: 0.1rem 0.4rem; border-radius: 9999px; border: 1px solid var(--text-highlight); }
        .game-board { width: 100%; max-width: 280px; aspect-ratio: 1 / 1; }
        #monster-hp-bar-bg { background-color: var(--hp-bg); }
        #monster-hp-bar-fill { background-color: var(--hp-fill); transition: width 0.3s ease-out; }
        #monster-hp-bar-damage { background-color: var(--hp-damage); transition: width 0.3s ease-out 0.2s; }
        @keyframes boss-warning { 0%, 100% { background-color: transparent; } 50% { background-color: rgba(239, 68, 68, 0.5); } }
        .boss-warning-flash { animation: boss-warning 0.5s ease-in-out 3; }
        @keyframes monster-hit {
            0%, 100% { transform: translateX(0); }
            10%, 50%, 90% { transform: translateX(-8px) rotate(-2deg); }
            30%, 70% { transform: translateX(8px) rotate(2deg); }
        }
        .monster-hit-animation { animation: monster-hit 0.4s ease-in-out; }
        #main-container.paused { filter: grayscale(100%); transition: filter 0.3s ease-in-out; }
        @keyframes idle-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        .idle .game-button-symbol { animation: idle-bob 2s infinite ease-in-out; }
        #monster-icon.dancing { animation: idle-bob 1.5s infinite ease-in-out; }
        #skill-gauge-bg { background-color: var(--skill-bg); }
        #skill-gauge-fill { background-color: var(--skill-fill); transition: width 0.2s ease-out; }
        #skill-btn.ready { animation: pulse 1.5s infinite; box-shadow: 0 0 15px 5px rgba(59, 130, 246, 0.6); }
        @keyframes shield-up { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        #shield-indicator { animation: shield-up 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes shield-break { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5) rotate(15deg); opacity: 0; } }
        .shield-break-animation { animation: shield-break 0.4s ease-out forwards; }
        @keyframes button-shuffle { 0% { transform: scale(1); } 50% { transform: scale(0.8) rotate(-15deg); } 100% { transform: scale(1) rotate(0); } }
        .shuffling { animation: button-shuffle 0.4s ease-in-out; }
        @keyframes monster-taunt {
            0%, 100% { transform: scale(1) rotate(0); }
            20% { transform: scale(1.1) rotate(-5deg); }
            40% { transform: scale(1.1) rotate(5deg); }
            60% { transform: scale(1.1) rotate(-5deg); }
            80% { transform: scale(1.1) rotate(5deg); }
        }
        .monster-taunt-animation {
            animation: monster-taunt 0.6s ease-in-out;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <div id="main-container" class="w-full max-w-md h-full flex flex-col p-4 gap-4 relative">
        <div id="spark-effect-left" class="absolute top-1/4 left-0 w-1/5 h-1/2 pointer-events-none z-10"></div>
        <!-- 상단: 몬스터 뷰 영역 -->
        <div id="monster-view" class="flex-1 flex flex-col items-center justify-center p-4 relative bg-white dark:bg-slate-800 rounded-2xl shadow-xl">
            <div id="initial-screen-buttons" class="absolute top-2 right-2 flex items-center gap-2">
                <button id="basecamp-btn" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="베이스캠프 열기"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg></button>
                <button id="settings-btn" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="Open settings"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 0118 0z"></path></svg></button>
                <button id="bestiary-btn" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="적대자 도감 보기"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v11.494m-5.247-8.494H6.253a2 2 0 00-2 2v4.494a2 2 0 002 2h.494m10.493 0h.494a2 2 0 002-2V9.253a2 2 0 00-2-2h-.494M12 6.253V4.753m0 14.494V20.25m-5.247-1.494l-1.494-1.494m10.493 0l1.494-1.494M6.253 9.253l-1.494 1.494m13-1.494l1.494 1.494" /></svg></button>
            </div>
            <div id="in-game-buttons" class="absolute top-2 right-2 flex items-center gap-2 hidden">
                 <button id="pause-btn" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="Pause game"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></button>
            </div>
            
            <div class="flex flex-col items-center">
                <div id="monster-icon" class="w-24 h-24 mb-2"></div>
                <h2 id="monster-name" class="text-xl font-bold"></h2>
                <div id="monster-hp-bar-bg" class="w-48 h-4 rounded-full overflow-hidden mt-2">
                    <div id="monster-hp-bar-damage" class="h-full w-full">
                        <div id="monster-hp-bar-fill" class="h-full w-full"></div>
                    </div>
                </div>
                <p id="monster-desc" class="text-sm text-secondary mt-2 text-center px-4"></p>
            </div>
        </div>
        
        <!-- 하단: 컨트롤 영역 -->
        <div id="control-panel" class="flex-1 bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-4 flex flex-col justify-center">
             <div class="flex justify-between items-center mb-2 h-8 px-2">
                <div id="lives-display" class="flex items-center gap-1 relative"></div>
                <div class="text-center">
                    <div id="total-score-display" class="text-2xl font-bold text-highlight">0</div>
                    <div id="unbanked-fragments-display" class="text-sm text-amber-500 font-semibold h-4"></div>
                </div>
                <div id="basecamp-display" class="text-lg font-bold text-secondary flex items-center gap-2 opacity-0 transition-opacity">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 6a3 3 0 013-3h10a1 1 0 01.8 1.6L14.25 8l2.55 3.4A1 1 0 0116 13H6a1 1 0 01-1-1V6z" clip-rule="evenodd" /></svg>
                    <span>0</span>
                </div>
            </div>
            
            <canvas id="rhythm-display" class="w-full h-10 mb-2 rounded-lg"></canvas>

            <div class="game-board mx-auto relative grid grid-cols-2 gap-4">
                <div id="timing-feedback"></div>
                <div id="button-0" class="game-button"></div>
                <div id="button-1" class="game-button"></div>
                <div id="button-2" class="game-button"></div>
                <div id="button-3" class="game-button"></div>
            </div>
            
            <div id="skill-container" class="w-full mt-4 flex items-center gap-3 h-10 hidden">
                <div id="skill-gauge-bg" class="flex-1 h-4 rounded-full overflow-hidden">
                    <div id="skill-gauge-fill" class="h-full w-0"></div>
                </div>
                <button id="skill-btn" class="w-10 h-10 bg-slate-200 dark:bg-slate-600 rounded-full flex items-center justify-center shadow-md disabled:opacity-50 disabled:cursor-not-allowed transition-all" disabled>
                    <svg class="w-6 h-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                </button>
            </div>

            <div id="button-container" class="w-full mt-2 relative h-10">
                <div class="absolute inset-0 flex items-center gap-4">
                    <button id="start-btn" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-5 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg">게임 시작</button>
                </div>
                <div id="in-progress-indicator" class="absolute inset-0 bg-teal-800 rounded-lg hidden"></div>
            </div>
        </div>
        <div id="spark-effect-right" class="absolute top-1/4 right-0 w-1/5 h-1/2 pointer-events-none z-10"></div>
    </div>

    <!-- Modals -->
    <div id="basecamp-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-40">
        <div class="p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-lg mx-4 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">베이스캠프</h2>
                <button id="close-basecamp-btn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="mb-4 text-center p-2 rounded-lg bg-amber-100 dark:bg-amber-900">
                <p class="font-bold text-lg" style="color: var(--essence-color);">
                    보유한 조화의 정수: <span id="harmonic-essence-display">0</span>
                </p>
            </div>
            <div id="upgrade-list" class="grid grid-cols-1 gap-4 overflow-y-auto pr-2" style="max-height: 50vh;"></div>
        </div>
    </div>
    <div id="bestiary-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-20">
        <div class="p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-lg mx-4 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">적대자 도감</h2>
                <button id="close-bestiary-btn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="bestiary-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4 overflow-y-auto pr-2" style="max-height: 60vh;"></div>
        </div>
    </div>
    <div id="rest-stage-modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden z-20">
        <div class="p-8 rounded-2xl shadow-xl w-full max-w-sm mx-4 bg-slate-800 text-slate-200 text-center">
            <div id="announcer" class="w-24 h-24 mx-auto mb-4"></div>
            <h2 id="rest-title" class="text-2xl font-bold mb-2 text-focus-in"></h2>
            <p id="rest-subtitle" class="text-slate-400 mb-6 text-fade-in"></p>
            <button id="rest-continue-btn" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-5 rounded-lg transition-all duration-200">도전하기</button>
        </div>
    </div>
    
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-20">
        <div class="p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-lg mx-4 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">설정</h2>
                <button id="close-settings-btn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="space-y-6">
                <div>
                    <label for="bgm-volume-slider" class="block mb-2 text-sm font-medium">배경음악 볼륨</label>
                    <input id="bgm-volume-slider" type="range" min="-40" max="0" value="-20" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer dark:bg-gray-700">
                </div>
                <div>
                    <label for="sfx-volume-slider" class="block mb-2 text-sm font-medium">효과음 볼륨</label>
                    <input id="sfx-volume-slider" type="range" min="-20" max="10" value="0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer dark:bg-gray-700">
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-sm font-medium">배경음악</label>
                    <button id="bgm-toggle" type="button" class="bg-gray-200 relative inline-flex flex-shrink-0 h-6 w-11 border-2 border-transparent rounded-full cursor-pointer transition-colors ease-in-out duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 dark:bg-slate-600" role="switch" aria-checked="false">
                        <span aria-hidden="true" class="translate-x-0 pointer-events-none inline-block h-5 w-5 rounded-full bg-white shadow transform ring-0 transition ease-in-out duration-200"></span>
                    </button>
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-sm font-medium">다크 모드</label>
                    <button id="theme-toggle" type="button" class="bg-gray-200 relative inline-flex flex-shrink-0 h-6 w-11 border-2 border-transparent rounded-full cursor-pointer transition-colors ease-in-out duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 dark:bg-slate-600" role="switch" aria-checked="false">
                        <span aria-hidden="true" class="translate-x-0 pointer-events-none inline-block h-5 w-5 rounded-full bg-white shadow transform ring-0 transition ease-in-out duration-200"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="pause-modal" class="fixed inset-0 bg-black bg-opacity-70 flex-col items-center justify-center hidden z-30">
        <svg class="w-24 h-24 text-white mb-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.25 9v6m-4.5 0V9M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <button id="resume-btn" class="bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-8 rounded-lg transition-all duration-200 text-lg">계속하기</button>
    </div>


    <script>
        // Anti-debugging and context menu prevention
        (function(){let d=new Date();function c(){try{(function(){if(new Date()-d>100){/*window.location.reload()*/}d=new Date()}).toString().indexOf('debugger')!==-1}catch(e){}setTimeout(c,100)}c();document.addEventListener('keydown',function(e){if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&e.key==='I')){e.preventDefault()}});document.addEventListener('contextmenu',function(e){e.preventDefault()})})();
        
        document.addEventListener('DOMContentLoaded', () => {

            // --- Helper Functions ---
            const sleep = ms => new Promise(res => setTimeout(res, ms));

            // --- Element Selectors (Cached) ---
            const DOM = {
                body: document.body,
                mainContainer: document.getElementById('main-container'),
                startBtn: document.getElementById('start-btn'),
                gameButtons: document.querySelectorAll('.game-button'),
                gameBoard: document.querySelector('.game-board'),
                themeToggle: document.getElementById('theme-toggle'),
                bgmToggle: document.getElementById('bgm-toggle'),
                inProgressIndicator: document.getElementById('in-progress-indicator'),
                basecampDisplay: document.getElementById('basecamp-display'),
                restStageModal: document.getElementById('rest-stage-modal'),
                livesDisplay: document.getElementById('lives-display'),
                totalScoreDisplay: document.getElementById('total-score-display'),
                unbankedFragmentsDisplay: document.getElementById('unbanked-fragments-display'),
                timingFeedback: document.getElementById('timing-feedback'),
                settingsBtn: document.getElementById('settings-btn'),
                settingsModal: document.getElementById('settings-modal'),
                closeSettingsBtn: document.getElementById('close-settings-btn'),
                bgmVolumeSlider: document.getElementById('bgm-volume-slider'),
                sfxVolumeSlider: document.getElementById('sfx-volume-slider'),
                bestiaryBtn: document.getElementById('bestiary-btn'),
                bestiaryModal: document.getElementById('bestiary-modal'),
                closeBestiaryBtn: document.getElementById('close-bestiary-btn'),
                bestiaryList: document.getElementById('bestiary-list'),
                monsterIcon: document.getElementById('monster-icon'),
                monsterName: document.getElementById('monster-name'),
                monsterDesc: document.getElementById('monster-desc'),
                hpBarFill: document.getElementById('monster-hp-bar-fill'),
                hpBarDamage: document.getElementById('monster-hp-bar-damage'),
                sparkEffectLeft: document.getElementById('spark-effect-left'),
                sparkEffectRight: document.getElementById('spark-effect-right'),
                initialScreenButtons: document.getElementById('initial-screen-buttons'),
                inGameButtons: document.getElementById('in-game-buttons'),
                pauseBtn: document.getElementById('pause-btn'),
                pauseModal: document.getElementById('pause-modal'),
                resumeBtn: document.getElementById('resume-btn'),
                skillContainer: document.getElementById('skill-container'),
                skillBtn: document.getElementById('skill-btn'),
                skillGaugeFill: document.getElementById('skill-gauge-fill'),
                basecampBtn: document.getElementById('basecamp-btn'),
                basecampModal: document.getElementById('basecamp-modal'),
                closeBasecampBtn: document.getElementById('close-basecamp-btn'),
                upgradeList: document.getElementById('upgrade-list'),
                harmonicEssenceDisplay: document.getElementById('harmonic-essence-display'),
                rhythmCanvas: document.getElementById('rhythm-display'),
                get rhythmCtx() { return this.rhythmCanvas.getContext('2d'); }
            };

            // --- Game Data & Configuration ---
            const GameData = {
                timingJudgement: {
                    PERFECT: { window: 80, text: "Perfect!", scoreMultiplier: 2, damage: 3, skillGain: 25 },
                    GREAT: { window: 160, text: "Great", scoreMultiplier: 1.5, damage: 2, skillGain: 10 },
                    GOOD: { window: 240, text: "Good", scoreMultiplier: 1, damage: 1, skillGain: 0 },
                    MISS: { window: Infinity, text: "Miss", scoreMultiplier: 0, damage: 0, skillGain: 0 },
                    WRONG: { text: "Wrong!", scoreMultiplier: 0, damage: 0, skillGain: 0 }
                },
                buttonProperties: [
                    { class: 'bg-rose-400', glow: 'rgba(251, 113, 133, 0.7)', symbol: `<svg class="game-button-symbol" viewBox="0 0 32 32"><g><path class="symbol-shape" d="M16 2 L30 16 L16 30 L2 16 Z"/><g class="symbol-face" fill="#1e293b" opacity="0.6"><circle cx="12" cy="14" r="1.5"/><circle cx="20" cy="14" r="1.5"/><path class="mouth" d="M 12 22 Q 16 25 20 22" stroke="#1e293b" stroke-width="1.5" fill="none" stroke-linecap="round"/></g></g></svg>`, color: '#fb7185' },
                    { class: 'bg-sky-400', glow: 'rgba(56, 189, 248, 0.7)', symbol: `<svg class="game-button-symbol" viewBox="0 0 32 32"><g><path class="symbol-shape" d="M16 2 L30 30 L2 30 Z"/><g class="symbol-face" fill="#1e293b" opacity="0.6"><circle cx="12" cy="16" r="1.5"/><circle cx="20" cy="16" r="1.5"/><path class="mouth" d="M 12 23 Q 16 26 20 23" stroke="#1e293b" stroke-width="1.5" fill="none" stroke-linecap="round"/></g></g></svg>`, color: '#38bdf8' },
                    { class: 'bg-amber-400', glow: 'rgba(251, 191, 36, 0.7)', symbol: `<svg class="game-button-symbol" viewBox="0 0 32 32"><g><rect class="symbol-shape" x="4" y="4" width="24" height="24" rx="4"/><g class="symbol-face" fill="#1e293b" opacity="0.6"><circle cx="12" cy="13" r="1.5"/><circle cx="20" cy="13" r="1.5"/><path class="mouth" d="M 12 21 Q 16 24 20 21" stroke="#1e293b" stroke-width="1.5" fill="none" stroke-linecap="round"/></g></g></svg>`, color: '#facc15' },
                    { class: 'bg-emerald-400', glow: 'rgba(52, 211, 153, 0.7)', symbol: `<svg class="game-button-symbol" viewBox="0 0 32 32"><g><circle class="symbol-shape" cx="16" cy="16" r="14"/><g class="symbol-face" fill="#1e293b" opacity="0.6"><circle cx="12" cy="14" r="1.5"/><circle cx="20" cy="14" r="1.5"/><path class="mouth" d="M 12 22 Q 16 25 20 22" stroke="#1e293b" stroke-width="1.5" fill="none" stroke-linecap="round"/></g></g></svg>`, color: '#34d399' }
                ],
                antagonistProfiles: {
                    'Slime': { key: 'slime', name: '슬라임', type: 'normal', maxHp: 3, scoreMultiplier: 1.0, description: '가장 기본적인 적. 특별한 패턴 없이 무작위로 행동합니다.', icon: `<svg viewBox="0 0 100 100"><path d="M20 70 C 20 40, 80 40, 80 70 Q 50 90, 20 70 Z" fill="currentColor"/><circle cx="40" cy="60" r="5" fill="black"/><circle cx="60" cy="60" r="5" fill="black"/></svg>`, color: '#84cc16', generateNext: (pattern) => [1, 1, 1, 1] },
                    'Goblin': { key: 'goblin', name: '고블린', type: 'normal', maxHp: 5, scoreMultiplier: 1.2, description: '단순 반복(A-A)을 피하는 약간의 지능을 가졌습니다.', icon: `<svg viewBox="0 0 100 100"><path d="M50 20 L80 80 L20 80 Z" fill="currentColor"/><path d="M40 50 L60 50" stroke="black" stroke-width="4"/><path d="M30 70 Q 50 60, 70 70" fill="none" stroke="black" stroke-width="4"/></svg>`, color: '#16a34a', generateNext: (pattern) => { let weights = [1, 1, 1, 1]; if (pattern.length > 0) weights[pattern[pattern.length-1]] *= 0.2; return weights; } },
                    'Mimic': { key: 'mimic', name: '흉내쟁이', type: 'normal', maxHp: 6, scoreMultiplier: 1.4, description: '플레이어가 이전에 성공했던 패턴을 교묘하게 따라합니다.', icon: `<svg viewBox="0 0 100 100"><rect x="20" y="20" width="60" height="60" rx="10" fill="currentColor"/><rect x="30" y="10" width="40" height="20" rx="5" fill="currentColor"/><circle cx="50" cy="50" r="10" fill="black"/><path d="M35 65 H 65" stroke="black" stroke-width="5" stroke-linecap="round"/></svg>`, color: '#a16207', generateNext: (pattern) => [1, 1, 1, 1] },
                    'Conductor': { key: 'conductor', name: '변속자', type: 'normal', maxHp: 7, scoreMultiplier: 1.6, description: '한 패턴 내에서 노트의 속도를 자유자재로 바꿉니다.', icon: `<svg viewBox="0 0 100 100"><path d="M20 50 C 40 20, 60 80, 80 50" stroke="currentColor" stroke-width="8" fill="none"/></svg>`, color: '#7c3aed', specialMechanic: 'variableSpeed', generateNext: (pattern) => [1, 1, 1, 1] },
                    'The Destroyer': { key: 'destroyer', name: '파괴자', type: 'boss', maxHp: 10, scoreMultiplier: 1.5, description: '플레이어의 예측(A-B-A 패턴 등)을 파괴하는 데 집중합니다.', color: '#ef4444', icon: `<svg viewBox="0 0 100 100"><path d="M50 10 L90 50 L50 90 L10 50 Z M50 25 L75 50 L50 75 L25 50 Z" fill="currentColor"/></svg>`, generateNext: (pattern) => { let weights = [1, 1, 1, 1]; if (pattern.length < 2) return weights; const last = pattern[pattern.length - 1]; const secondLast = pattern[pattern.length - 2]; if (pattern.length >= 3 && pattern[pattern.length-3] === last) { weights[secondLast] *= 0.1; } weights[last] *= 0.5; return weights; } },
                    'The Rhythm Breaker': { key: 'rhythm_breaker', name: '리듬 파괴자', type: 'boss', maxHp: 15, scoreMultiplier: 2.0, description: 'A-B-A-B 같은 리듬 패턴을 집중적으로 공격합니다.', color: '#3b82f6', icon: `<svg viewBox="0 0 100 100"><path d="M20 80 L30 20 L40 70 L50 30 L60 80 L70 20 L80 80" stroke="currentColor" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`, generateNext: (pattern) => { let weights = [1, 1, 1, 1]; if (pattern.length < 4) return weights; const last = pattern[pattern.length - 1]; const secondLast = pattern[pattern.length - 2]; const thirdLast = pattern[pattern.length - 3]; const fourthLast = pattern[pattern.length - 4]; if (secondLast === fourthLast && last === thirdLast) { weights[secondLast] *= 0.05; } return weights; } },
                    'The Shuffler': { key: 'shuffler', name: '교란자', type: 'boss', maxHp: 12, scoreMultiplier: 1.8, description: '당신의 근육 기억을 비웃으며 버튼의 위치를 뒤섞습니다.', color: '#d946ef', icon: `<svg viewBox="0 0 100 100"><path d="M30 20 L70 80 M70 20 L30 80 M50 20 A 30 30 0 1 0 50 80" stroke="currentColor" stroke-width="8" fill="none"/></svg>`, specialMechanic: 'shuffleButtons', generateNext: (pattern) => [1,1,1,1] }
                },
                get normalMonsters() { return Object.values(this.antagonistProfiles).filter(p => p.type === 'normal') },
                get bossMonsters() { return Object.values(this.antagonistProfiles).filter(p => p.type === 'boss') },
                upgrades: {
                    'bonusLife': { name: '강인함', description: '최대 생명력을 1 늘립니다.', cost: 500, maxLevel: 2 },
                    'startShield': { name: '이지스 쉴드', description: '게임을 시작할 때 실드를 하나 가지고 시작합니다.', cost: 1000, maxLevel: 1 },
                    'fragmentBonus': { name: '탐광자', description: '획득하는 조각의 양을 10% 늘립니다.', cost: 750, maxLevel: 3 },
                    'gaugeBonus': { name: '몰입', description: '스킬 게이지 획득량을 10% 늘립니다.', cost: 600, maxLevel: 3 }
                }
            };
            
            // --- Centralized Game State ---
            const GameState = {
                current: 'MAIN_MENU', // MAIN_MENU, LOADING, PATTERN_PLAYBACK, PLAYER_INPUT, ROUND_SUCCESS, ROUND_FAIL, PAUSED, GAME_OVER
                level: 0,
                roundCounter: 0,
                combo: 0,
                highScore: 0,
                baseCampLevel: 0,
                
                // In-run state
                lives: 0,
                totalScore: 0,
                unbankedFragments: 0,
                lostFragments: { amount: 0, level: -1 },
                
                // Turn-specific state
                gamePattern: [],
                playerPattern: [],
                gameTimings: [],
                playerTimings: [],
                patternStartTime: 0,
                currentPatternDuration: 0,
                lastPressedButtonIndex: -1,
                accumulatedDamage: 0,
                
                // Player state
                isPlayerClicking: false,
                playerHistory: [],
                
                // Antagonist state
                currentAntagonist: null,
                currentMonsterHP: 0,
                maxMonsterHP: 0,

                // Skill state
                skillGauge: 0,
                maxSkillGauge: 100,
                isSkillReady: false,
                isShieldActive: false,

                // Meta-progression state
                harmonicEssence: 0,
                playerUpgrades: {},
                
                // System state
                isBgmPlaying: true,
                currentBgm: 'waiting',
                pauseStartTime: 0,
                buttonMapping: [0, 1, 2, 3],

                // Animation state
                animation: { id: null, startTime: 0, isRunning: false, mode: 'playback' }
            };

            // --- "Modules" for Code Organization ---

            /**
             * GameManager: Controls the main game loop and state transitions.
             */
            const GameManager = {
                init() {
                    SettingsController.init();
                    PersistenceManager.loadAll();
                    UIController.init();
                    AudioManager.init();
                    
                    this.addEventListeners();
                },

                addEventListeners() {
                    DOM.startBtn.addEventListener('click', async () => {
                        await Tone.start(); // Required for audio context
                        this.setState('STARTING_GAME');
                    });
                    
                    DOM.gameButtons.forEach((btn, index) => {
                        btn.addEventListener('click', e => {
                            if (GameState.current !== 'PLAYER_INPUT' || GameState.isPlayerClicking) return;
                            GameState.isPlayerClicking = true;
                            PlayerController.handleInput(index);
                        });
                    });

                    DOM.pauseBtn.addEventListener('click', () => this.setState('PAUSED'));
                    DOM.resumeBtn.addEventListener('click', () => this.setState('RESUMING'));
                    DOM.skillBtn.addEventListener('click', () => PlayerController.activateSkill());
                },

                async setState(newState) {
                    GameState.current = newState;
                    
                    switch (newState) {
                        case 'STARTING_GAME':
                            await this.handleStartGame();
                            break;
                        case 'NEXT_LEVEL':
                            await this.handleNextLevel();
                            break;
                        case 'PATTERN_PLAYBACK':
                            EnemyController.playPattern();
                            break;
                        case 'PLAYER_INPUT':
                            PlayerController.enableInput();
                            break;
                        case 'ROUND_SUCCESS':
                            await this.handleRoundSuccess();
                            break;
                        case 'ROUND_FAIL':
                            await this.handleRoundFail();
                            break;
                        case 'GAME_OVER':
                            this.handleGameOver();
                            break;
                        case 'PAUSED':
                            this.handlePause();
                            break;
                        case 'RESUMING':
                            this.handleResume();
                            break;
                    }
                },

                async handleStartGame() {
                    UIController.showGameScreen();
                    BasecampController.applyUpgrades();
                    
                    // Reset run-specific state
                    GameState.gamePattern = [];
                    GameState.playerPattern = [];
                    GameState.totalScore = 0;
                    GameState.unbankedFragments = 0;
                    GameState.skillGauge = 0;
                    GameState.lostFragments = { amount: 0, level: -1 };

                    if (GameState.baseCampLevel > 0) {
                        GameState.level = GameState.baseCampLevel;
                        GameState.roundCounter = GameState.baseCampLevel;
                        // Pre-populate a long pattern to simulate starting from a checkpoint
                        let tempPattern = [];
                        for (let i = 1; i <= GameState.baseCampLevel; i++) {
                            EnemyController.selectNewAntagonist((i % 4) === 0);
                            for (let j = 0; j < GameState.maxMonsterHP; j++) {
                                tempPattern.push(EnemyController.getNextStep(tempPattern));
                            }
                        }
                        GameState.gamePattern = tempPattern; // This logic needs review for actual gameplay sense
                    } else {
                        GameState.level = 0;
                        GameState.roundCounter = 0;
                    }
                    
                    UIController.renderHearts();
                    UIController.updateAll();
                    await sleep(500);
                    this.setState('NEXT_LEVEL');
                },

                async handleNextLevel() {
                    UIController.clearRhythmCanvas();
                    GameState.playerPattern = [];
                    GameState.combo = 0;
                    GameState.level++;
                    GameState.roundCounter++;
                    GameState.gameTimings = [];
                    GameState.playerTimings = [];
                    GameState.accumulatedDamage = 0;
                    
                    const isBossRound = (GameState.roundCounter % 4) === 0;
                    if (isBossRound) {
                        await UIController.showBossWarning();
                    }
                    
                    EnemyController.selectNewAntagonist(isBossRound);

                    if (GameState.currentAntagonist.specialMechanic === 'shuffleButtons') {
                        await PlayerController.shuffleButtons();
                    }
                    
                    AudioManager.updateBgm();
                    
                    if (GameState.currentAntagonist.key === 'mimic' && GameState.playerHistory.length > 0) {
                        GameState.gamePattern = [...GameState.playerHistory[Math.floor(Math.random() * GameState.playerHistory.length)]];
                    } else {
                        GameState.gamePattern = [];
                        for (let i = 0; i < GameState.maxMonsterHP; i++) {
                            GameState.gamePattern.push(EnemyController.getNextStep(GameState.gamePattern));
                        }
                    }
                    
                    UIController.updateAll();
                    this.setState('PATTERN_PLAYBACK');
                },
                
                async handleRoundSuccess() {
                    UIController.resetButtonAndMonsterStates();
                    UIController.stopRhythmAnimation();
                    AudioManager.playSuccessSound();
                    UIController.flashScreen('success');
                    await sleep(500);

                    if (GameState.accumulatedDamage > 0) {
                        await EnemyController.takeDamage();
                    }

                    GameState.playerHistory.push([...GameState.gamePattern]);
                    if (GameState.playerHistory.length > 10) GameState.playerHistory.shift();

                    if (GameState.level === GameState.lostFragments.level) {
                        GameState.unbankedFragments += GameState.lostFragments.amount;
                        GameState.lostFragments = { amount: 0, level: -1 };
                    }
                    
                    if (GameState.currentAntagonist.type === 'boss') {
                        PersistenceManager.saveClearedBoss(GameState.currentAntagonist.key);
                    }
                    
                    UIController.updateAll();
                    await sleep(800);
                    
                    if (GameState.roundCounter % 4 === 0) {
                        BasecampController.saveCheckpoint();
                        await UIController.showRestStageModal(true);
                        this.setState('NEXT_LEVEL');
                    } else {
                        this.setState('NEXT_LEVEL');
                    }
                },

                async handleRoundFail() {
                    UIController.resetButtonAndMonsterStates();
                    UIController.stopRhythmAnimation();
                    GameState.accumulatedDamage = 0;

                    UIController.showMonsterTaunt();
                    PersistenceManager.saveEncounteredAntagonist(GameState.currentAntagonist.key);
                    
                    UIController.breakHeart();
                    GameState.lives--;
                    AudioManager.playFailSound();
                    UIController.flashScreen('fail');

                    if (GameState.unbankedFragments > 0) {
                        GameState.lostFragments = { amount: GameState.unbankedFragments, level: GameState.level };
                        UIController.showLostFragments(GameState.unbankedFragments);
                        GameState.unbankedFragments = 0;
                    }
                    UIController.updateAll();
                    
                    if (GameState.lives > 0) {
                        await sleep(1000);
                        await UIController.showGetReadySequence();
                        GameState.playerPattern = [];
                        GameState.combo = 0;
                        GameState.gameTimings = [];
                        GameState.playerTimings = [];
                        GameState.accumulatedDamage = 0;
                        UIController.updateAll();
                        this.setState('PATTERN_PLAYBACK');
                    } else {
                        this.setState('GAME_OVER');
                    }
                },

                handleGameOver() {
                    UIController.stopRhythmAnimation();
                    UIController.showMainMenuScreen();
                    BasecampController.calculateEssence();
                    PersistenceManager.saveAll();
                    AudioManager.setBgm('gameover');
                    UIController.updateAllForGameOver();
                },

                handlePause() {
                    if (GameState.current !== 'PLAYER_INPUT' && GameState.current !== 'PATTERN_PLAYBACK') return;
                    GameState.pauseStartTime = performance.now();
                    Tone.Transport.pause();
                    UIController.togglePause(true);
                },

                handleResume() {
                    const pauseDuration = performance.now() - GameState.pauseStartTime;
                    GameState.patternStartTime += pauseDuration;
                    GameState.animation.startTime += pauseDuration;
                    Tone.Transport.start();
                    UIController.togglePause(false);
                    // Set state back to what it was before pausing
                    GameState.current = 'PLAYER_INPUT'; // Assume we only pause during input for simplicity
                    UIController.animateRhythm();
                }
            };
            
            /**
             * UIController: Handles all DOM manipulation and visual feedback.
             */
            const UIController = {
                sparkSide: 'left',

                init() {
                    this.setupCanvas();
                    this.renderButtons();
                    this.updateAll();
                },
                
                setupCanvas() {
                    DOM.rhythmCanvas.width = DOM.rhythmCanvas.offsetWidth * window.devicePixelRatio;
                    DOM.rhythmCanvas.height = DOM.rhythmCanvas.offsetHeight * window.devicePixelRatio;
                    DOM.rhythmCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
                },

                renderButtons() {
                    DOM.gameButtons.forEach((btn, index) => {
                        const originalId = GameState.buttonMapping[index];
                        const props = GameData.buttonProperties[originalId];
                        btn.className = 'game-button';
                        btn.classList.add(props.class);
                        btn.style.setProperty('--glow-color', props.glow);
                        btn.innerHTML = props.symbol;
                    });
                },

                updateAll() {
                    DOM.totalScoreDisplay.textContent = GameState.totalScore.toLocaleString();
                    DOM.unbankedFragmentsDisplay.textContent = GameState.unbankedFragments > 0 ? `+${GameState.unbankedFragments.toLocaleString()}` : '';
                    if (GameState.baseCampLevel > 0) {
                        DOM.basecampDisplay.querySelector('span').textContent = GameState.baseCampLevel;
                        DOM.basecampDisplay.classList.remove('opacity-0');
                    } else {
                        DOM.basecampDisplay.classList.add('opacity-0');
                    }
                    this.updateSkillGauge();
                },
                
                updateAllForGameOver() {
                    const finalScore = GameState.totalScore + GameState.unbankedFragments;
                    DOM.unbankedFragmentsDisplay.textContent = `최종 점수: ${finalScore.toLocaleString()}`;
                    DOM.startBtn.textContent = '다시 시작';
                },

                renderHearts() {
                    DOM.livesDisplay.innerHTML = '';
                    for (let i = 0; i < GameState.lives; i++) {
                        const heart = document.createElement('div');
                        heart.innerHTML = `<svg class="w-6 h-6 text-rose-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>`;
                        DOM.livesDisplay.appendChild(heart);
                    }
                    if (GameState.isShieldActive) PlayerController.addShieldIndicator();
                },

                updateHealthBar() {
                    const hpPercent = (GameState.currentMonsterHP / GameState.maxMonsterHP) * 100;
                    DOM.hpBarFill.style.width = `${hpPercent}%`;
                    setTimeout(() => {
                        DOM.hpBarDamage.style.width = `${hpPercent}%`;
                    }, 200);
                },

                updateSkillGauge() {
                    const percent = (GameState.skillGauge / GameState.maxSkillGauge) * 100;
                    DOM.skillGaugeFill.style.width = `${percent}%`;
                    if (GameState.skillGauge >= GameState.maxSkillGauge && !GameState.isSkillReady) {

                // Rhythm Canvas Animation
                animateRhythm() {
                    if (GameState.current === 'PAUSED' || !GameState.animation.isRunning) return;

                    const W = DOM.rhythmCanvas.offsetWidth;
                    const H = DOM.rhythmCanvas.offsetHeight;
                    const elapsedTime = performance.now() - GameState.animation.startTime;
                    let progress = elapsedTime / GameState.currentPatternDuration;

                    if (GameState.animation.mode === 'input') {
                        progress %= 1.0;
                    } else {
                        progress = Math.min(progress, 1);
                    }
                    
                    const ctx = DOM.rhythmCtx;
                    ctx.clearRect(0, 0, W, H);
                    
                    // Background lines
                    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--rhythm-line') + '30';
                    ctx.lineWidth = 1;
                    for (let i = 0; i < 8; i++) {
                        const y = (H / 8) * i;
                        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
                    }

                    // Main pattern line
                    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--rhythm-line');
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, H / 2);
                    for (let i = 0; i < GameState.gameTimings.length; i++) {
                        const time = GameState.gameTimings[i];
                        const prevTime = i > 0 ? GameState.gameTimings[i-1] : 0;
                        const x = (time / GameState.currentPatternDuration) * W;
                        const prevX = (prevTime / GameState.currentPatternDuration) * W;
                        ctx.lineTo(prevX, H / 2); ctx.lineTo(x, H / 2); ctx.lineTo(x, H / 4); ctx.lineTo(x, H * 3 / 4); ctx.lineTo(x, H / 2);
                    }
                    ctx.lineTo(W, H / 2);
                    ctx.stroke();

                    // Note markers
                    for (let i = 0; i < GameState.gameTimings.length; i++) {
                        const x = (GameState.gameTimings[i] / GameState.currentPatternDuration) * W;
                        ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--rhythm-line');
                        ctx.lineWidth = 4;
                        ctx.beginPath(); ctx.moveTo(x, H / 4); ctx.lineTo(x, H * 3 / 4); ctx.stroke();
                    }
                    
                    // Player input markers
                    if (GameState.animation.mode === 'input') {
                        for (let i = 0; i < GameState.playerTimings.length; i++) {
                            const x = (GameState.playerTimings[i] % GameState.currentPatternDuration / GameState.currentPatternDuration) * W;
                            ctx.fillStyle = '#ffffff';
                            ctx.beginPath(); ctx.arc(x, H / 2, 5, 0, Math.PI * 2); ctx.fill();
                        }
                    }

                    // Playhead
                    const playheadX = progress * W;
                    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--rhythm-playhead');
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(playheadX, 0); ctx.lineTo(playheadX, H); ctx.stroke();
                    
                    if ((GameState.animation.mode === 'playback' && progress >= 1)) {
                        GameState.animation.isRunning = false;
                    } else {
                        GameState.animation.id = requestAnimationFrame(() => this.animateRhythm());
                    }
                },

                startRhythmAnimation(mode, totalDuration) {
                    GameState.animation = {
                        startTime: performance.now(),
                        isRunning: true,
                        mode: mode,
                        id: GameState.animation.id
                    };
                    GameState.currentPatternDuration = totalDuration;
                    if (GameState.animation.id) cancelAnimationFrame(GameState.animation.id);
                    this.animateRhythm();
                },

                stopRhythmAnimation() {
                    if (GameState.animation.id) cancelAnimationFrame(GameState.animation.id);
                    GameState.animation.isRunning = false;
                },
                
                clearRhythmCanvas() {
                    this.stopRhythmAnimation();
                    const W = DOM.rhythmCanvas.offsetWidth;
                    const H = DOM.rhythmCanvas.offsetHeight;
                    DOM.rhythmCtx.clearRect(0, 0, W, H);
                }
            };
            
            /**
             * AudioManager: Handles all Tone.js logic and sound playback.
             */
            const AudioManager = {
                synths: {},
                bgm: {},
                volumes: {},

                init() {
                    const bgmVol = parseInt(localStorage.getItem('bgmVolume')) || -20;
                    const sfxVol = parseInt(localStorage.getItem('sfxVolume')) || 0;

                    this.volumes.bgm = new Tone.Volume(bgmVol).toDestination();
                    this.volumes.sfx = new Tone.Volume(sfxVol).toDestination();

                    DOM.bgmVolumeSlider.value = bgmVol;
                    DOM.sfxVolumeSlider.value = sfxVol;

                    this.synths.player = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 } }).connect(this.volumes.sfx);
                    this.synths.success = new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.01, decay: 0.2, sustain: 0.2, release: 0.2 } }).connect(this.volumes.sfx);
                    this.synths.fail = new Tone.PolySynth(Tone.Synth, { oscillator: { type: 'square' }, envelope: { attack: 0.01, decay: 0.4, sustain: 0, release: 0.4 } }).connect(this.volumes.sfx);
                    this.synths.camp = new Tone.Synth({ oscillator: { type: 'fatsawtooth' }, envelope: { attack: 0.05, decay: 0.5, sustain: 0.4, release: 0.8 }, volume: -10 }).connect(this.volumes.sfx);
                    this.synths.comboAttack = new Tone.PolySynth(Tone.Synth, { oscillator: { type: 'fmsquare' }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.1, release: 0.2 } }).connect(this.volumes.sfx);
                    this.synths.bossScream = new Tone.NoiseSynth({ noise: { type: "pink" }, envelope: { attack: 0.2, decay: 1.5, sustain: 0, release: 1.5 } }).connect(new Tone.Reverb(2.5).connect(this.volumes.sfx));
                    this.synths.shieldUp = new Tone.Synth({ oscillator: { type: 'fmsquare' }, envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.5 } }).connect(this.volumes.sfx);
                    this.synths.shieldBreak = new Tone.MetalSynth({ frequency: 80, envelope: { attack: 0.01, decay: 0.4, release: 0.2 }, harmonicity: 2.5, modulationIndex: 40, resonance: 1500 }).connect(this.volumes.sfx);
                    this.synths.shuffle = new Tone.NoiseSynth({ noise: { type: 'white' }, envelope: { attack: 0.01, decay: 0.2, sustain: 0 } }).connect(this.volumes.sfx);
                    this.synths.sweep = new Tone.Synth({ oscillator: { type: 'sawtooth' }, envelope: { attack: 0.01, decay: 0.5, sustain: 0.1, release: 0.2 } }).connect(this.volumes.sfx);
                    
                    // BGM Setup
                    const bV = -20;
                    const waitingSynth = new Tone.PluckSynth({ attackNoise: 0.5, dampening: 4000, resonance: 0.7, volume: bV + 8 }).connect(this.volumes.bgm);
                    this.bgm.waiting = new Tone.Sequence((t, n) => { waitingSynth.triggerAttack(n, t) }, ["C4", "E4", "G4", "C5", "E5", "G4"], "8n");
                    
                    const normalBass = new Tone.MonoSynth({ oscillator: { type: "fmsine" }, envelope: { attack: 0.01, decay: 0.3, sustain: 0.1, release: 0.5 }, volume: bV }).connect(this.volumes.bgm);
                    this.bgm.normal = new Tone.Sequence((t, n) => { waitingSynth.triggerAttack(n.melody, t); if (n.bass) { normalBass.triggerAttackRelease(n.bass, "8n", t) } }, [{ melody: "C4", bass: "C2" }, { melody: "E4", bass: null }, { melody: "G4", bass: "C2" }, { melody: "G4", bass: "G1" }, { melody: "E4", bass: null }, { melody: "C4", bass: "G1" }], "8n");

                    const hardKick = new Tone.MembraneSynth({ octaves: 4, pitchDecay: 0.1, volume: bV + 2 }).connect(this.volumes.bgm);
                    const hardBass = new Tone.MonoSynth({ oscillator: { type: "sawtooth" }, envelope: { attack: 0.01, decay: 0.3, sustain: 0.1, release: 0.5 }, volume: bV - 4 }).connect(this.volumes.bgm);
                    this.bgm.hard = new Tone.Part((t, v) => { if (v.kick) hardKick.triggerAttackRelease("C1", "8n", t); if (v.bass) hardBass.triggerAttackRelease(v.bass, "8n", t) }, [{ time: "0:0", kick: true, bass: "C2" }, { time: "0:2", bass: "C2" }, { time: "0:3", kick: true }, { time: "0:5", bass: "G1" }, { time: "0:6", kick: true }, { time: "0:8", bass: "G1" }, { time: "0:9", kick: true }, { time: "0:11", bass: "F1" }]);
                    this.bgm.hard.loop = true; this.bgm.hard.loopEnd = "1m";

                    const vhKick = new Tone.MembraneSynth({ octaves: 6, pitchDecay: 0.05, volume: bV }).connect(this.volumes.bgm);
                    const vhHihat = new Tone.MetalSynth({ frequency: 300, envelope: { attack: 0.001, decay: 0.05, release: 0.01 }, harmonicity: 4.1, modulationIndex: 22, resonance: 3000, octaves: 1.5, volume: bV - 10 }).connect(this.volumes.bgm);
                    this.bgm.veryHard = new Tone.Sequence((t, n) => { vhKick.triggerAttackRelease("C1", "8n", t); if (n === 'CH') vhHihat.triggerAttackRelease("C6", "16n", t) }, ['C1', 'CH', 'C1', 'CH'], '4n');

                    const gameOverSynth = new Tone.AMSynth({ harmonicity: 1.5, envelope: { attack: 0.01, decay: 2, sustain: 0.1, release: 2 }, volume: bV - 5 }).connect(this.volumes.bgm);
                    this.bgm.gameover = new Tone.Sequence((t, n) => { gameOverSynth.triggerAttackRelease(n, "1n", t) }, [["C3", "E3"], ["G3", "B3"], ["F3", "A3"]], "1m");

                    const bgmState = localStorage.getItem('bgmState');
                    GameState.isBgmPlaying = (bgmState === 'off') ? false : true;
                    SettingsController.updateBgmToggleUI(GameState.isBgmPlaying);
                    if (GameState.isBgmPlaying && Tone.context.state === 'running') this.setBgm('waiting');
                },

                setBgm(state) {
                    if (!GameState.isBgmPlaying) return;
                    Object.values(this.bgm).forEach(p => p.stop(0));
                    GameState.currentBgm = state;
                    
                    if (state === 'waiting') { Tone.Transport.timeSignature = [6, 8]; Tone.Transport.bpm.value = 90; this.bgm.waiting.start(0); }
                    else if (state === 'normal') { Tone.Transport.timeSignature = [6, 8]; Tone.Transport.bpm.value = 100; this.bgm.normal.start(0); }
                    else if (state === 'hard') { Tone.Transport.timeSignature = [12, 8]; Tone.Transport.bpm.value = 120; this.bgm.hard.start(0); }
                    else if (state === 'veryHard') { Tone.Transport.timeSignature = [4, 4]; Tone.Transport.bpm.value = 140; this.bgm.veryHard.start(0); }
                    else if (state === 'gameover') { Tone.Transport.timeSignature = [6, 8]; Tone.Transport.bpm.value = 70; this.bgm.gameover.start(0); }
                    
                    if (Tone.Transport.state !== 'started') Tone.Transport.start();
                },
                
                stopBgm() {
                    if (Tone.Transport.state === 'started') Tone.Transport.stop();
                    Object.values(this.bgm).forEach(p => p.stop(0));
                },

                updateBgm() {
                    const l = GameState.level;
                    if (l >= 1 && l <= 8) this.setBgm('normal');
                    else if (l >= 9 && l <= 16) this.setBgm('hard');
                    else if (l >= 17) this.setBgm('veryHard');

                playNote(originalId, isPlayer) {
                    const notes = ['C4', 'E4', 'G4', 'A4'];
                    const combo = GameState.combo;
                    if (isPlayer) {
                        const note = Tone.Frequency(notes[originalId]).transpose(combo * 1);
                        this.synths.player.triggerAttackRelease(note, '8n');
                        UIController.createSpark(GameData.buttonProperties[originalId].color);
                    } else {
                        this.synths.player.triggerAttackRelease(notes[originalId], '8n');
                    }
                },
                
                playSuccessSound() { this.synths.success.triggerAttackRelease(['C5', 'E5', 'G5'], '8n'); },
                playSuccessIndicatorSound() { this.synths.success.triggerAttackRelease('G5', '8n'); },
                playFailSound() { this.synths.fail.triggerAttackRelease(['C3', 'C#3'], '4n'); },
                playCampSound() { const n = Tone.now(); this.synths.camp.triggerAttackRelease("A3", "2n", n); this.synths.camp.triggerAttackRelease("E4", "2n", n + 0.1); this.synths.camp.triggerAttackRelease("A4", "2n", n + 0.2); },
                playComboAttackSound() { const now = Tone.now(); this.synths.comboAttack.triggerAttackRelease(['C5', 'E5', 'G5'], '8n', now); },
                playBossScream() { this.synths.bossScream.triggerAttackRelease("2n"); },
                playShieldUpSound() { this.synths.shieldUp.triggerAttackRelease("C5", "8n"); },
                playShieldBreakSound() { this.synths.shieldBreak.triggerAttackRelease("C3", "4n"); },
                playShuffleSound() { this.synths.shuffle.triggerAttackRelease('2n'); },
                playSweepSound() { this.synths.sweep.frequency.value = "C4"; this.synths.sweep.frequency.rampTo("C6", 0.5); this.synths.sweep.triggerAttack(); },
            };
            
            /**
             * EnemyController: Manages antagonist selection, pattern generation, and state.
             */
            const EnemyController = {
                selectNewAntagonist(isBossRound) {
                    const pool = isBossRound ? GameData.bossMonsters : GameData.normalMonsters;
                    GameState.currentAntagonist = pool[Math.floor(Math.random() * pool.length)];
                    
                    DOM.monsterIcon.innerHTML = GameState.currentAntagonist.icon;
                    DOM.monsterIcon.style.color = GameState.currentAntagonist.color;
                    DOM.monsterName.textContent = GameState.currentAntagonist.name;
                    DOM.monsterDesc.textContent = GameState.currentAntagonist.description;
                    
                    GameState.maxMonsterHP = GameState.currentAntagonist.maxHp;
                    GameState.currentMonsterHP = GameState.maxMonsterHP;
                    UIController.updateHealthBar();
                },

                getNextStep(pattern) {
                    const weights = GameState.currentAntagonist.generateNext(pattern.slice());
                    const lastStep = pattern.length > 0 ? pattern[pattern.length - 1] : -1;
                    if (lastStep !== -1) { weights[lastStep] = 0; }
                    
                    const totalWeight = weights.reduce((sum, w) => sum + w, 0);
                    if (totalWeight === 0) {
                        const available = [0, 1, 2, 3].filter(i => i !== lastStep);
                        return available[Math.floor(Math.random() * available.length)];
                    }
                    
                    let random = Math.random() * totalWeight;
                    for (let i = 0; i < weights.length; i++) {
                        if (random < weights[i]) return i;
                        random -= weights[i];
                    }
                    return 3;
                },
                
                playPattern() {
                    UIController.resetButtonAndMonsterStates();
                    DOM.gameButtons.forEach(btn => btn.classList.add('disabled', 'desaturated'));
                    
                    let cumulativeTime = 0;
                    const baseSpeed = 700, speedDecrementPerStage = 80, minSpeed = 150;
                    const stage = Math.floor((GameState.level - 1) / 4);
                    const patternIntervalBase = Math.max(minSpeed, baseSpeed - (stage * speedDecrementPerStage));
                    
                    GameState.gamePattern.forEach(originalId => {
                        let interval = patternIntervalBase;
                        if (GameState.currentAntagonist.specialMechanic === 'variableSpeed') {
                            interval = patternIntervalBase * (Math.random() * 0.8 + 0.6);
                        }
                        setTimeout(() => {
                            const currentIndex = GameState.buttonMapping.indexOf(originalId);
                            this.animateButton(currentIndex, false);
                        }, cumulativeTime);
                        GameState.gameTimings.push(cumulativeTime + interval / 2);
                        cumulativeTime += interval;
                    });
                    
                    GameState.currentPatternDuration = cumulativeTime;
                    UIController.startRhythmAnimation('playback', GameState.currentPatternDuration);
                    
                    setTimeout(() => {
                        if (GameState.current === 'PATTERN_PLAYBACK') {
                             UIController.stopRhythmAnimation();
                             GameManager.setState('PLAYER_INPUT');
                        }
                    }, GameState.currentPatternDuration + 100);
                },

                animateButton(buttonIndex, isPlayer) {
                    const btn = DOM.gameButtons[buttonIndex];
                    const originalId = GameState.buttonMapping[buttonIndex];
                    
                    if (!isPlayer) { btn.classList.remove('desaturated'); }
                    btn.classList.add('active');
                    
                    const glowSize = 15 + GameState.combo * 4;
                    const glowSpread = 2 + GameState.combo * 1;
                    btn.style.boxShadow = `0 0 ${glowSize}px ${glowSpread}px var(--glow-color)`;
                    
                    AudioManager.playNote(originalId, isPlayer);
                    
                    setTimeout(() => {
                        btn.classList.remove('active');
                        btn.style.boxShadow = '';
                        if (!isPlayer) { btn.classList.add('desaturated'); }
                    }, 300);
                },
                
                async takeDamage() {
                    DOM.monsterIcon.classList.add('monster-hit-animation');
                    AudioManager.playComboAttackSound();
                    GameState.currentMonsterHP = Math.max(0, GameState.currentMonsterHP - GameState.accumulatedDamage);
                    UIController.updateHealthBar();
                    GameState.accumulatedDamage = 0;
                    await sleep(400);
                    DOM.monsterIcon.classList.remove('monster-hit-animation');
                }
            };
            
            /**
             * PlayerController: Handles player input, timing, skills, and state.

            const PlayerController = {
                enableInput() {

                    GameState.patternStartTime = performance.now();
                    DOM.gameBoard.classList.add('idle');
                    DOM.gameButtons.forEach(btn => {
                        btn.classList.remove('disabled', 'desaturated');

                        setTimeout(() => btn.classList.remove('pulse'), 400);
                    });
                    UIController.startRhythmAnimation('input', GameState.currentPatternDuration);

                    // --- BUG FIX ---

                    setTimeout(() => {
