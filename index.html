<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도전! 패턴 기억 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- 다크모드 색상 변수 설정 --- */
        :root {
            --bg-primary: #f1f5f9;      /* slate-100 */
            --bg-secondary: #ffffff;    /* white */
            --text-primary: #1e293b;    /* slate-800 */
            --text-secondary: #475569;  /* slate-600 */
            --text-highlight: #0f766e;  /* teal-600 */
            --success-flash-bg: #dcfce7; /* green-100 */
            --fail-flash-bg: #fecaca;    /* red-200 */
        }

        .dark {
            --bg-primary: #0f172a;      /* slate-900 */
            --bg-secondary: #1e293b;    /* slate-800 */
            --text-primary: #e2e8f0;    /* slate-200 */
            --text-secondary: #94a3b8;  /* slate-400 */
            --text-highlight: #2dd4bf;  /* teal-400 */
            --success-flash-bg: #15803d; /* green-700 */
            --fail-flash-bg: #b91c1c;    /* red-700 */
        }
        /* --- 기본 스타일 --- */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        #game-container, #mode-selection {
            background-color: var(--bg-secondary);
            transition: background-color 0.3s ease;
        }
        .text-secondary { color: var(--text-secondary); }
        .text-highlight { color: var(--text-highlight); }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.25rem;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            transition: transform 0.1s ease-in-out;
        }
        .game-button {
            border-radius: 0.75rem;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        .game-button:active { transform: scale(0.96); }
        .game-button.active {
            transform: scale(1.03);
            box-shadow: 0 0 25px 3px var(--glow-color);
            filter: brightness(1.25);
        }
        .disabled { pointer-events: none; opacity: 0.6; }
        
        /* --- 애니메이션 --- */
        @keyframes shake-horizontal { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
        .shake-horizontal { animation: shake-horizontal 0.2s ease-in-out; }
        
        @keyframes shake-vertical { 0%, 100% { transform: translateY(0); } 25% { transform: translateY(-3px); } 75% { transform: translateY(3px); } }
        .shake-vertical { animation: shake-vertical 0.2s ease-in-out; }
        
        @keyframes success-flash { 0%, 100% { background-color: var(--bg-primary); } 50% { background-color: var(--success-flash-bg); } }
        .success-flash { animation: success-flash 0.4s ease-in-out; }
        
        @keyframes gameOverFlash { 0%, 100% { background-color: var(--bg-primary); } 50% { background-color: var(--fail-flash-bg); } }
        .game-over-flash { animation: gameOverFlash 0.4s ease-in-out; }
        
        @keyframes levelUp { 0%, 100% { transform: scale(1); color: var(--text-primary); } 50% { transform: scale(1.3); color: #10b981; } }
        .level-up { animation: levelUp 0.5s ease-in-out; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-lg text-center relative">
        <!-- 다크 모드 토글 버튼 -->
        <button id="theme-toggle" class="absolute top-0 right-0 p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="Toggle dark mode">
            <svg id="theme-toggle-sun-icon" class="w-6 h-6 text-slate-800 dark:text-slate-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <svg id="theme-toggle-moon-icon" class="w-6 h-6 hidden text-slate-800 dark:text-slate-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>

        <h1 class="text-4xl md:text-5xl font-bold mb-4 leading-tight">도전! 패턴 기억 게임</h1>
        
        <!-- 모드 선택 화면 -->
        <div id="mode-selection" class="p-6 md:p-8 rounded-2xl shadow-xl">
            <p class="text-secondary text-base mb-6">플레이할 모드를 선택하세요.</p>
            <div class="flex flex-col sm:flex-row justify-center gap-4 mt-8">
                <button id="normal-mode-btn" class="w-full sm:w-auto text-lg font-bold py-4 px-8 bg-sky-500 hover:bg-sky-600 text-white rounded-lg shadow-lg transition-transform transform hover:scale-105">노말 모드</button>
                <button id="hard-mode-btn" class="w-full sm:w-auto text-lg font-bold py-4 px-8 bg-rose-500 hover:bg-rose-600 text-white rounded-lg shadow-lg transition-transform transform hover:scale-105">하드 모드</button>
            </div>
        </div>

        <!-- 게임 화면 (초기 숨김) -->
        <div id="game-wrapper" class="hidden">
            <p class="text-secondary text-base mb-6">최고 기록에 도전하고, 당신의 한계를 시험하세요!</p>
            <div id="game-container" class="p-6 md:p-8 rounded-2xl shadow-xl">
                <div class="flex justify-between items-center mb-5">
                    <div class="text-lg font-bold">
                        <span id="level-display">레벨: 0</span>
                    </div>
                    <div class="text-lg font-bold text-highlight">
                        <span id="highscore-display">최고 기록: 0</span>
                    </div>
                </div>

                <div class="game-board mx-auto">
                    <div id="button-0" class="game-button bg-rose-400" style="--glow-color: rgba(251, 113, 133, 0.7);"></div>
                    <div id="button-1" class="game-button bg-sky-400" style="--glow-color: rgba(56, 189, 248, 0.7);"></div>
                    <div id="button-2" class="game-button bg-amber-400" style="--glow-color: rgba(251, 191, 36, 0.7);"></div>
                    <div id="button-3" class="game-button bg-emerald-400" style="--glow-color: rgba(52, 211, 153, 0.7);"></div>
                </div>
                
                <div id="message-display" class="mt-5 text-base font-medium text-secondary h-6"></div>
                <button id="start-btn" class="w-full mt-6 bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-5 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg">게임 시작</button>
            </div>
        </div>
    </div>

    <script>
        // --- 다크모드 로직 ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('theme-toggle-sun-icon');
        const moonIcon = document.getElementById('theme-toggle-moon-icon');

        // 테마 변경 함수
        const toggleTheme = (isDark) => {
            if (isDark) {
                document.documentElement.classList.add('dark');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            }
        };

        // 페이지 로드 시 테마 적용
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            toggleTheme(true);
        } else {
            toggleTheme(false);
        }

        // 버튼 클릭 이벤트
        themeToggleBtn.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            toggleTheme(isDark);
        });

        // --- 게임 로직 ---
        // DOM 요소
        const modeSelection = document.getElementById('mode-selection');
        const gameWrapper = document.getElementById('game-wrapper');
        const normalModeBtn = document.getElementById('normal-mode-btn');
        const hardModeBtn = document.getElementById('hard-mode-btn');
        const startBtn = document.getElementById('start-btn');
        const levelDisplay = document.getElementById('level-display');
        const highscoreDisplay = document.getElementById('highscore-display');
        const messageDisplay = document.getElementById('message-display');
        const gameButtons = document.querySelectorAll('.game-button');
        const gameBoard = document.querySelector('.game-board');
        const body = document.body;

        // 게임 상태 변수
        let gameMode = 'normal';
        let gamePattern = [];
        let playerPattern = [];
        let level = 0;
        let highscore = { normal: 0, hard: 0 };
        let isPlayerTurn = false;
        let combo = 0;

        // 오디오 신디사이저
        let synth, successSynth, errorSynth;
        
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        document.addEventListener('DOMContentLoaded', () => {
            loadHighScore();
            setupSynths();
        });

        function setupSynths() {
            synth = new Tone.Synth({ oscillator: { type: 'sine' }, envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 } }).toDestination();
            successSynth = new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.01, decay: 0.2, sustain: 0.2, release: 0.2 } }).toDestination();
            errorSynth = new Tone.PolySynth(Tone.Synth, { oscillator: { type: 'square' }, envelope: { attack: 0.01, decay: 0.4, sustain: 0, release: 0.4 } }).toDestination();
        }

        function loadHighScore() {
            highscore.normal = localStorage.getItem('patternGameHighScore_normal') || 0;
            highscore.hard = localStorage.getItem('patternGameHighScore_hard') || 0;
        }

        function updateHighScoreDisplay() {
            highscoreDisplay.textContent = `최고 기록: ${highscore[gameMode]}`;
        }

        function saveHighScore() {
            const finalLevel = level > 0 ? level - 1 : 0;
            if (finalLevel > highscore[gameMode]) {
                highscore[gameMode] = finalLevel;
                localStorage.setItem(`patternGameHighScore_${gameMode}`, finalLevel);
                messageDisplay.textContent = '최고 기록 경신!';
                showConfetti(true);
            }
        }

        normalModeBtn.addEventListener('click', () => selectMode('normal'));
        hardModeBtn.addEventListener('click', () => selectMode('hard'));
        
        function selectMode(mode) {
            gameMode = mode;
            modeSelection.classList.add('hidden');
            gameWrapper.classList.remove('hidden');
            updateHighScoreDisplay();
        }

        startBtn.addEventListener('click', async () => {
            await Tone.start();
            startGame();
        });

        gameButtons.forEach(button => {
            button.addEventListener('click', (event) => {
                if (!isPlayerTurn) return;
                const clickedButtonId = parseInt(event.target.id.split('-')[1]);
                playerTurn(clickedButtonId);
            });
        });
        
        function startGame() {
            gamePattern = [];
            level = 0;
            startBtn.classList.add('disabled');
            startBtn.textContent = '게임 진행 중...';
            nextLevel();
        }

        function nextLevel() {
            playerPattern = [];
            combo = 0;
            level++;
            levelDisplay.textContent = `레벨: ${level}`;
            isPlayerTurn = false;
            
            const patternsToAdd = Math.floor((level - 1) / 5) + 1;

            if (gameMode === 'hard') {
                const newPatternLength = gamePattern.length + patternsToAdd;
                gamePattern = [];
                for (let i = 0; i < newPatternLength; i++) {
                    let choices = [0, 1, 2, 3];
                    if (gamePattern.length > 0) {
                        const lastButton = gamePattern[gamePattern.length - 1];
                        choices = choices.filter(choice => choice !== lastButton);
                    }
                    const nextButton = choices[Math.floor(Math.random() * choices.length)];
                    gamePattern.push(nextButton);
                }
            } else {
                for (let i = 0; i < patternsToAdd; i++) {
                    let choices = [0, 1, 2, 3];
                    if (gamePattern.length > 0) {
                        const lastButton = gamePattern[gamePattern.length - 1];
                        choices = choices.filter(choice => choice !== lastButton);
                    }
                    const nextButton = choices[Math.floor(Math.random() * choices.length)];
                    gamePattern.push(nextButton);
                }
            }
            playPattern();
        }

        function playPattern() {
            messageDisplay.textContent = '패턴을 기억하세요...';
            let delay = 0;
            const baseSpeed = 700;
            const speedDecrementPerTier = 80;
            const minSpeed = 150;
            const speedLevel = Math.floor((level - 1) / 4);
            const patternInterval = Math.max(minSpeed, baseSpeed - (speedLevel * speedDecrementPerTier));
            
            gamePattern.forEach((buttonId) => {
                setTimeout(() => activateButton(buttonId, false), delay);
                delay += patternInterval;
            });

            setTimeout(() => {
                isPlayerTurn = true;
                messageDisplay.textContent = '당신 차례입니다!';
            }, delay + 100);
        }

        function playerTurn(id) {
            activateButton(id, true);
            playerPattern.push(id);
            checkAnswer(playerPattern.length - 1);
        }

        function checkAnswer(currentIndex) {
            if (playerPattern[currentIndex] !== gamePattern[currentIndex]) {
                gameOver();
                return;
            }

            combo++;
            const comboMessages = ["좋아요!", "계속하세요!", "완벽해요!", "엄청나요!", "신들렸군요!"];
            messageDisplay.textContent = comboMessages[Math.min(combo - 1, comboMessages.length - 1)];

            if (playerPattern.length === gamePattern.length) {
                isPlayerTurn = false;
                levelClearSequence();
            }
        }
        
        async function levelClearSequence() {
            await sleep(350); 
            messageDisplay.textContent = '성공!';
            successSynth.triggerAttackRelease('C5', '8n');

            if (gameMode === 'hard') {
                body.classList.add('success-flash');
                gameBoard.classList.add('shake-vertical');
                setTimeout(() => {
                    body.classList.remove('success-flash');
                    gameBoard.classList.remove('shake-vertical');
                }, 400);
            } else {
                gameBoard.classList.add('shake-horizontal');
                setTimeout(() => gameBoard.classList.remove('shake-horizontal'), 200);
            }

            if (level > 0 && level % 5 === 0) showConfetti(false);
            
            await sleep(600);
            levelDisplay.classList.add('level-up');
            await sleep(500);
            levelDisplay.classList.remove('level-up');

            nextLevel();
        }

        function gameOver() {
            saveHighScore();
            if (messageDisplay.textContent !== '최고 기록 경신!') {
                 const finalLevel = level > 0 ? level - 1 : 0;
                 messageDisplay.textContent = `게임 오버! 최종 레벨: ${finalLevel}`;
            }
           
            errorSynth.triggerAttackRelease(['C3', 'C#3'], '4n');
            body.classList.add('game-over-flash');
            setTimeout(() => body.classList.remove('game-over-flash'), 400);

            startBtn.classList.remove('disabled');
            startBtn.textContent = '다시 시작';
            isPlayerTurn = false;
        }

        const notes = ['C4', 'E4', 'G4', 'A4'];
        function activateButton(id, isPlayer) {
            const button = document.getElementById(`button-${id}`);
            button.classList.add('active');
            if (isPlayer) {
                const note = Tone.Frequency(notes[id]).transpose(combo * 1);
                synth.triggerAttackRelease(note, '8n');
            } else {
                synth.triggerAttackRelease(notes[id], '8n');
            }
            setTimeout(() => button.classList.remove('active'), 300);
        }

        function showConfetti(isHighScore) {
            confetti({
                particleCount: isHighScore ? 250 : 150,
                spread: isHighScore ? 120 : 90,
                origin: { y: 0.6 },
                gravity: 0.8,
                ticks: 300
            });
        }
    </script>
</body>
</html>
