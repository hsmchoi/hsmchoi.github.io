<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>끄적끄적, 나의 개발 여정</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Poor+Story&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gaegu', cursive;
            background-color: #FFFAF0;
            color: #2D3748;
        }
        .font-title { font-family: 'Poor Story', cursive; }
        .grid-card {
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .grid-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            z-index: 1000;
        }
        .modal-overlay.is-open {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            transform: scale(0.9);
            transition: transform 0.4s ease;
            width: 90vw;
            max-width: 1230px;
        }
        @media (max-width: 768px) {
            .modal-content {
                max-width: 420px;
                height: 420px;
                overflow: hidden;
            }
        }
        .modal-overlay.is-open .modal-content {
            transform: scale(1);
        }
    </style>
</head>
<body class="antialiased">

    <div class="container mx-auto px-4 py-12 text-center">
        <h1 class="text-6xl md:text-7xl font-title font-bold text-amber-600">어리둥절,어리의 여정</h1>
        <p class="mt-4 text-2xl md:text-3xl text-gray-600">"각각의 이야기가 담긴, 앱"</p>
    </div>

    <main id="portfolio-grid" class="container mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-12">
    </main>

    <footer class="text-center py-12">
        <p class="text-xl text-gray-600">이야기를 나눠요</p>
        <p class="mt-2 text-lg text-gray-500">@eoeolmin.mk</p>
    </footer>

    <div id="carousel-modal" class="modal-overlay">
        <div id="modal-body" class="modal-content">
        </div>
    </div>

    <script src="./appStories.js"></script>
    <script src="./app.js"></script>
</body>
</html>
