<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가사 암기 전문 도우미</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #121212;
      color: #E0E0E0;
    }
    .pro-mode-bg { background-color: #1E1E1E; }
    .pro-mode-card { background-color: #2C2C2C; }
    .pro-mode-input {
      background-color: #1E1E1E;
      border-color: #4A4A4A;
      color: #E0E0E0;
    }
    .pro-mode-input::placeholder { color: #6B6B6B; }
    .pro-mode-btn {
      background-color: #3E3E3E;
      color: #FFFFFF;
      transition: background-color 0.3s;
    }
    .pro-mode-btn:hover { background-color: #5A5A5A; }
    .pro-mode-btn-active {
      background-color: #4CAF50;
      color: white;
      box-shadow: 0 0 10px #4CAF50;
    }
    .lyrics-display {
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 1.25rem;
      line-height: 2.5rem;
    }
    .slider-track {
      width: 100%;
      height: 8px;
      background: #4A4A4A;
      border-radius: 5px;
    }
  </style>
</head>
<body class="pro-mode-bg">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function App() {
      const [lyrics, setLyrics] = useState('');
      const [savedLyrics, setSavedLyrics] = useState('');
      const [mode, setMode] = useState('full'); // full | blank | first
      const [blankDifficulty, setBlankDifficulty] = useState(0.3);
      const [isLoading, setIsLoading] = useState(true);
      const [toast, setToast] = useState({ show: false, message: '' });

      useEffect(() => {
        const saved = localStorage.getItem("lyrics") || '';
        const savedMode = localStorage.getItem("mode") || 'full';
        const savedDifficulty = parseFloat(localStorage.getItem("blankDifficulty")) || 0.3;
        setLyrics(saved);
        setSavedLyrics(saved);
        setMode(savedMode);
        setBlankDifficulty(savedDifficulty);
        setIsLoading(false);
      }, []);

      const handleSave = () => {
        localStorage.setItem("lyrics", lyrics);
        localStorage.setItem("mode", mode);
        localStorage.setItem("blankDifficulty", blankDifficulty);
        setSavedLyrics(lyrics);
        setToast({ show: true, message: '가사가 성공적으로 저장되었습니다!' });
      };

      const handleModeChange = (newMode) => {
        setMode(newMode);
        localStorage.setItem("mode", newMode);
      };

      const handleDifficultyChange = (e) => {
        const newDifficulty = parseFloat(e.target.value);
        setBlankDifficulty(newDifficulty);
        localStorage.setItem("blankDifficulty", newDifficulty);
      };

      const processedLyrics = useMemo(() => {
        if (!savedLyrics) return "가사를 입력하고 저장 버튼을 눌러주세요.";

        const lines = savedLyrics.split('\n');

        if (mode === 'full') {
          return savedLyrics;
        }

        if (mode === 'first') {
          return savedLyrics.replace(/[가-힣a-zA-Z0-9]+/g, (match) => {
            return match[0] + '＿'.repeat(match.length > 1 ? match.length - 1 : 0);
          });
        }

        if (mode === 'blank') {
          return lines.map(line =>
            line.split(/(\s+)/).map(word => {
              if (word.trim() === '') return word;
              const isBlank = Math.random() < blankDifficulty;
              return isBlank ? '＿'.repeat(word.length) : word;
            }).join('')
          ).join('\n');
        }

        return savedLyrics;
      }, [savedLyrics, mode, blankDifficulty]);

      useEffect(() => {
        if (toast.show) {
          const timer = setTimeout(() => setToast({ show: false, message: '' }), 3000);
          return () => clearTimeout(timer);
        }
      }, [toast]);

      if (isLoading) {
        return (
          <div className="flex justify-center items-center h-screen">
            <i className="fas fa-spinner fa-spin fa-3x"></i>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-4 sm:p-6 md:p-8 flex flex-col items-center">
          {toast.show && (
            <div className="fixed top-5 right-5 bg-green-500 text-white py-2 px-4 rounded-lg shadow-lg z-50 animate-pulse">
              {toast.message}
            </div>
          )}

          <div className="w-full max-w-4xl mx-auto">
            <header className="text-center mb-8">
              <h1 className="text-3xl sm:text-4xl font-bold text-white tracking-tight">
                <i className="fas fa-microphone-alt mr-3 text-green-400"></i>
                가사 암기 전문 도우미
              </h1>
              <p className="text-gray-400 mt-2">프로페셔널을 위한 최고의 연습 파트너</p>
            </header>

            <main className="pro-mode-card rounded-xl shadow-2xl p-4 sm:p-6 md:p-8">
              <div className="mb-6">
                <label htmlFor="lyrics-input" className="block text-lg font-semibold mb-2 text-green-300">
                  가사 입력
                </label>
                <textarea
                  id="lyrics-input"
                  value={lyrics}
                  onChange={(e) => setLyrics(e.target.value)}
                  placeholder="여기에 노래 가사를 붙여넣으세요. (예: 1절, 2절, 후렴 등)"
                  className="w-full h-48 p-4 pro-mode-input rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none transition resize-none"
                ></textarea>
                <button
                  onClick={handleSave}
                  className="w-full mt-4 py-3 font-bold text-lg rounded-lg pro-mode-btn hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-800 focus:ring-white flex items-center justify-center"
                >
                  <i className="fas fa-save mr-2"></i>
                  가사 저장 및 연습 시작
                </button>
              </div>

              <div className="mb-6 p-4 bg-gray-900/50 rounded-lg">
                <div className="flex flex-col sm:flex-row justify-between items-center gap-4">
                  <div className="flex space-x-2 sm:space-x-3" role="group">
                    <button onClick={() => handleModeChange('full')} className={`px-4 py-2 rounded-md font-semibold ${mode === 'full' ? 'pro-mode-btn-active' : 'pro-mode-btn'}`}>
                      <i className="fas fa-eye mr-2"></i>전체 보기
                    </button>
                    <button onClick={() => handleModeChange('blank')} className={`px-4 py-2 rounded-md font-semibold ${mode === 'blank' ? 'pro-mode-btn-active' : 'pro-mode-btn'}`}>
                      <i className="fas fa-edit mr-2"></i>빈칸 채우기
                    </button>
                    <button onClick={() => handleModeChange('first')} className={`px-4 py-2 rounded-md font-semibold ${mode === 'first' ? 'pro-mode-btn-active' : 'pro-mode-btn'}`}>
                      <i className="fas fa-font mr-2"></i>첫 글자 보기
                    </button>
                  </div>
                  {mode === 'blank' && (
                    <div className="w-full sm:w-auto flex items-center gap-3 text-sm">
                      <span className="text-gray-300">쉬움</span>
                      <input
                        type="range"
                        min="0.1"
                        max="0.9"
                        step="0.05"
                        value={blankDifficulty}
                        onChange={handleDifficultyChange}
                        className="w-32 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer slider-track"
                      />
                      <span className="text-gray-300">어려움</span>
                    </div>
                  )}
                </div>
              </div>

              <div>
                <h2 className="text-xl font-semibold mb-4 text-green-300">연습중인 가사</h2>
                <div className="p-6 bg-black/30 rounded-lg min-h-[300px] lyrics-display">
                  {processedLyrics}
                </div>
              </div>
            </main>

            <footer className="text-center mt-8 text-gray-500 text-sm">
              <p>ⓒ 2024 Pro-Vocal Tools. All rights reserved.</p>
            </footer>
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
