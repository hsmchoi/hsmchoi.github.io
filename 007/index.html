<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>저속노화 통합 솔루션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.10.2/lottie.min.js"></script>
    <style>
        :root {
            --bg-color: #1A1A2E;
            --text-color: #E0E0E0;
            --text-secondary-color: #a0a0a0;
            --surface-color: #2D2D44;
            --surface-strong-color: #4C4C6A;
            --primary-color: #FFC0CB; /* Warm, soft pink */
            --primary-color-dark: #FF9AA2;
            --success-color: #82E0AA;
            --error-color: #EF4444;
            --happy-color-start: #FFD479;
            --happy-color-end: #FF9A73;
            --gold-ratio: 1.618;
            --u: 8px; /* Base unit for spacing */
            --spacing-xs: calc(var(--u) * 0.618);
            --spacing-sm: calc(var(--u) * 1);
            --spacing-md: calc(var(--u) * 1.618);
            --spacing-lg: calc(var(--u) * 2.618);
            --spacing-xl: calc(var(--u) * 4.236);
        }
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.5s ease;
        }
        .container-card {
            max-width: calc(600px * var(--gold-ratio));
            border-radius: var(--spacing-lg);
            padding: var(--spacing-xl);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            background-color: var(--surface-color);
            transition: transform 0.3s ease-in-out;
        }
        .section-card {
            background-color: var(--surface-strong-color);
            border-radius: var(--spacing-md);
            padding: var(--spacing-lg);
            border: 1px solid var(--surface-color);
            transition: transform 0.3s ease-in-out;
        }
        .section-card:hover {
            transform: translateY(-5px);
        }
        h1 {
            font-size: calc(1rem * var(--gold-ratio) * var(--gold-ratio)); /* S * phi^2 */
        }
        h2 {
            font-size: calc(1rem * var(--gold-ratio)); /* S * phi^1 */
        }
        h3 {
            font-size: 1rem;
        }
        button {
            border-radius: calc(var(--spacing-md) * 1.618);
            padding-top: var(--spacing-sm);
            padding-bottom: var(--spacing-sm);
            transition: all 0.2s ease-in-out;
            transform-origin: center;
        }
        button:hover {
            opacity: 0.8;
            transform: scale(1.02);
        }
        .cta-button {
            background-color: var(--primary-color);
            color: var(--bg-color);
            font-weight: 600;
        }
        .lottie-container {
            width: 50px;
            height: 50px;
            display: inline-block;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--surface-color);
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--primary-color);
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .happy-mode-bg {
            background: linear-gradient(135deg, var(--happy-color-start) 0%, var(--happy-color-end) 100%);
        }
        .pulse-animation {
            animation: pulse-ring 1.5s infinite;
        }
        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 var(--primary-color);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(255, 192, 203, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 192, 203, 0);
            }
        }
        .fade-in {
            animation: fadeIn 0.8s ease-in-out forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="container-card w-full">
        <h1 class="font-bold text-center mb-4">
            <span class="text-primary-color">Slow-Aging</span>
            <br/>
            <span class="text-text-secondary-color">Solution</span>
        </h1>
        <p class="text-center text-secondary-color mb-8 text-sm">Personalized Diet Coaching</p>

        <div class="section-card mb-8">
            <h2 class="font-semibold mb-4">1. InBody Data</h2>
            <textarea id="inbody-text" rows="6" class="w-full p-4 border-2 border-surface-color rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-color transition-all bg-surface-color text-text-color" placeholder="Paste your InBody text here..."></textarea>
            <div class="mt-4 flex gap-4">
                <input type="file" id="local-file-input" accept=".json" class="hidden" onchange="window.handleFileLoad(event)">
                <button onclick="window.handleLoadData()" id="load-btn" class="w-full bg-blue-600 text-white font-medium">Load</button>
                <button onclick="window.handleSaveData()" id="save-btn" class="w-full bg-success-color text-bg-color font-medium" disabled>Save</button>
            </div>
            <div id="status-message" class="mt-4 text-center text-sm font-semibold text-text-secondary-color"></div>
            <button onclick="window.handleInputData()" id="input-btn" class="w-full bg-primary-color cta-button mt-4 pulse-animation" disabled>
                <span id="input-btn-text">Input Data</span>
                <div id="loading-animation" class="lottie-container hidden"></div>
            </button>
        </div>
        
        <div class="section-card mb-8">
            <h2 class="font-semibold mb-4">2. Today's Status</h2>
            <div class="flex items-center justify-between mb-4">
                <span class="text-text-secondary-color font-medium">Workout Day?</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="is-workout-day-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-text-secondary-color font-medium">Happy Mode?</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="is-happy-mode-toggle" onchange="toggleHappyMode()">
                    <span class="slider"></span>
                </label>
            </div>
            <button onclick="window.runAnalysis()" id="run-analysis-btn" class="w-full bg-primary-color cta-button mt-6" disabled>Start Analysis</button>
        </div>

        <div class="section-card">
            <h2 class="font-semibold mb-4">3. Meal Plan</h2>
            <div id="result-display" class="space-y-6">
                <div id="summary-section" class="bg-surface-color p-4 rounded-lg text-primary-color text-center font-bold text-md hidden fade-in"></div>
                
                <div id="breakfast-plan" class="bg-surface-color p-4 rounded-lg border border-surface-color hidden fade-in">
                    <h3 class="font-bold text-primary-color">Breakfast</h3>
                    <p class="text-text-secondary-color text-sm"></p>
                </div>
                
                <div id="lunch-plan" class="bg-surface-color p-4 rounded-lg border border-surface-color hidden fade-in">
                    <h3 class="font-bold text-primary-color">Lunch</h3>
                    <p class="text-text-secondary-color text-sm"></p>
                </div>
                
                <div id="dinner-plan" class="bg-surface-color p-4 rounded-lg border border-surface-color hidden fade-in">
                    <h3 class="font-bold text-primary-color">Dinner</h3>
                    <p class="text-text-secondary-color text-sm"></p>
                </div>
            </div>
            <div id="message-box" class="mt-4 p-4 rounded-lg hidden"></div>
        </div>

        <div class="mt-8 text-center text-gray-400 text-xs">
            <p>User ID: <span id="user-id" class="font-mono text-secondary-color">...</span></p>
        </div>
    </div>
    
    <script>
        let userData = {
            inbody: {},
            goals: { daily_protein_g: 116.0 },
            supplements: [
                { "name": "베네틴 토핑 프로틴 쉐이크 아이솔레이트", "protein_g": 27.0 },
                { "name": "베네틴 몬스터 프로틴 게이너", "protein_g": 19.0 }
            ],
            inbody_history: [],
            today_log: { is_workout_day: false, is_happy_mode: false }
        };

        const lottie_loading_animation = {
            container: document.getElementById('loading-animation'),
            renderer: 'svg',
            loop: true,
            autoplay: false,
            path: 'https://assets5.lottiefiles.com/packages/lf20_t9u2l4.json'
        };
        const anim = lottie.loadAnimation(lottie_loading_animation);

        function showMessageBox(message, type = 'info') {
            const box = document.getElementById('message-box');
            box.textContent = message;
            box.classList.remove('hidden', 'bg-red-100', 'text-red-800', 'bg-green-100', 'text-green-800', 'bg-yellow-100', 'text-yellow-800');
            if (type === 'success') {
                box.classList.add('bg-success-color', 'text-bg-color');
            } else if (type === 'error') {
                box.classList.add('bg-error-color', 'text-white');
            } else {
                box.classList.add('bg-primary-color-dark', 'text-white');
            }
            box.classList.remove('hidden');
        }

        function downloadJsonFile(data, filename) {
            const jsonStr = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        window.handleFileLoad = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const loadedData = JSON.parse(e.target.result);
                    if (loadedData.inbody_history) {
                        userData = loadedData;
                        showMessageBox("데이터를 성공적으로 불러왔습니다.", 'success');
                        displayDataOnUI(userData);
                        updateButtonStates();
                    } else {
                        showMessageBox("잘못된 파일 형식입니다. 'inbody_history'가 포함된 JSON 파일을 선택하세요.", 'error');
                    }
                } catch (error) {
                    showMessageBox("파일을 읽는 중 오류가 발생했습니다. 유효한 JSON 파일인지 확인하세요.", 'error');
                }
            };
            reader.readAsText(file);
        }

        window.handleLoadData = function() {
            document.getElementById('local-file-input').click();
        }

        window.handleSaveData = function() {
            const today = new Date().toISOString().split('T')[0];
            const filename = `${today}_inbody_data.json`;
            downloadJsonFile(userData, filename);
            showMessageBox(`데이터가 성공적으로 '${filename}' 파일로 저장(다운로드)되었습니다.`, 'success');
        }
        
        window.handleInputData = function() {
            const inbodyText = document.getElementById('inbody-text');
            const inputBtnText = document.getElementById('input-btn-text');
            const loadingAnimation = document.getElementById('loading-animation');
            const statusMessage = document.getElementById('status-message');

            if (inbodyText.value.trim() === '') {
                inbodyText.classList.add('border-error-color');
                setTimeout(() => inbodyText.classList.remove('border-error-color'), 1500);
                showMessageBox("인바디 데이터를 먼저 입력하세요.", 'error');
                return;
            }

            inputBtnText.classList.add('hidden');
            loadingAnimation.classList.remove('hidden');
            anim.play();

            setTimeout(() => {
                const parsedData = parseInbodyText(inbodyText.value);
                if (Object.keys(parsedData).length > 0) {
                    const today = new Date().toISOString().split('T')[0];
                    const lastEntry = userData.inbody_history[userData.inbody_history.length - 1];
                    const newEntry = { ...parsedData, date: today };

                    if (lastEntry && lastEntry.date === today && lastEntry['골격근'] === parsedData['골격근']) {
                        showMessageBox("이미 오늘의 데이터가 저장되어 있습니다.", 'info');
                    } else {
                        if (!userData.inbody_history) {
                            userData.inbody_history = [];
                        }
                        userData.inbody_history.push(newEntry);
                        userData.inbody = parsedData;
                        updateDailyGoals(parsedData);
                        showMessageBox("인바디 데이터가 성공적으로 입력되었습니다.", 'success');
                        displayDataOnUI(userData);
                        updateButtonStates();
                    }
                } else {
                    inbodyText.classList.add('border-error-color');
                    showMessageBox("유효한 인바디 데이터를 찾을 수 없습니다. 형식을 확인하세요.", 'error');
                }

                inputBtnText.classList.remove('hidden');
                loadingAnimation.classList.add('hidden');
                anim.stop();
            }, 1000);
        }

        function displayDataOnUI(data) {
            if (data.inbody && data.inbody['골격근']) {
                document.getElementById('status-message').textContent = `최근 골격근량: ${data.inbody['골격근']}kg / 단백질 목표: ${data.goals.daily_protein_g}g`;
            }
        }

        function parseInbodyText(text_data) {
            const inbody_data = {};
            const patterns = {
                '골격근': /골격근\s*([\d\.]+)kg/i,
                '체지방률': /체지방률\s*([\d\.]+)%/i,
                '체중': /체중\s*([\d\.]+)kg/i,
                '건강 점수': /건강 점수\s*[\d\.]+\s*([\d\.]+)/i
            };

            for (const key in patterns) {
                const match = text_data.match(patterns[key]);
                if (match) {
                    inbody_data[key] = parseFloat(match[1]);
                }
            }
            return inbody_data;
        }

        function getDailyMealPlan(user_data) {
            const is_workout_day = user_data.today_log.is_workout_day;
            const is_happy_mode = user_data.today_log.is_happy_mode;
            
            const lunch_plan = {
                meal: "점심 식사",
                description: "저속 노화 밥(렌틸, 귀리, 현미, 백미) 120g과 함께 충분한 양의 단백질(닭가슴살 250g 또는 두부)을 섭취합니다. '거꾸로 식사법'(채소/나물 -> 단백질 -> 밥 순서)을 반드시 실천합니다. 이는 오후 집중력 유지와 인슐린 저항성 예방에 핵심입니다."
            };

            if (is_workout_day) {
                if (is_happy_mode) {
                    return {
                        breakfast: {
                            meal: "아침 식사",
                            description: "아침 운동 직후, 베네틴 토핑 프로틴 쉐이크(2스쿱)를 섭취하여 근육 회복을 시작하고, 올리브 오일(2스푼)과 영양제를 함께 복용하여 영양 밀도를 높입니다. 소화 부담이 없다면 견과류나 씨앗류를 추가합니다."
                        },
                        lunch: lunch_plan,
                        dinner: {
                            meal: "저녁 식사",
                            description: "오늘은 '행복 모드'이므로, 죄책감 없이 저녁 식사를 즐깁니다. 단, '저속노화 외식 원칙'을 기억하여 채소 먼저, 단백질 위주로 섭취하고 탄수화물과 술은 최소화합니다."
                        }
                    };
                } else {
                    return {
                        breakfast: {
                            meal: "아침 식사",
                            description: "아침 운동 직후, 베네틴 토핑 프로틴 쉐이크(2스쿱)를 섭식하여 근육 회복을 시작하고, 올리브 오일(2스푼)과 영양제를 함께 복용하여 영양 밀도를 높입니다. 소화 부담이 없다면 견과류나 씨앗류를 추가합니다."
                        },
                        lunch: lunch_plan,
                        dinner: {
                            meal: "저녁 식사",
                            description: "운동한 날은 밤사이 근성장을 위한 '전략적 영양 공급'입니다. 베네틴 몬스터 프로틴 게이너(2스쿱)를 섭취하여 잠자는 동안 꾸준히 아미노산을 공급받습니다. 이는 흡수가 느린 '미셀라 카제인'이 포함되어 있기 때문입니다."
                        }
                    };
                }
            } else {
                return {
                    breakfast: {
                        meal: "아침 식사",
                        description: "아침 공복에 유기농 엑스트라 버진 올리브 오일(2스푼)과 영양제를 섭취하여 하루를 시작합니다. 소화에 부담이 없다면 견과류나 씨앗류를 소량 추가하여 영양 밀도를 완성합니다."
                    },
                    lunch: lunch_plan,
                    dinner: {
                        meal: "저녁 식사",
                        description: "휴식하는 날은 세포 정비를 위한 '공복 모드'입니다. 저녁 식사를 생략하여 최소 16시간의 공복을 확보하고 '오토파지' 시스템을 활성화합니다. 이 과정을 통해 세포가 스스로를 정화하고 재활용하도록 돕습니다."
                    }
                };
            }
        }

        function getDailyProteinSummary(meal_plan, user_data) {
            let total_protein = 0;
            const target_protein = user_data.goals.daily_protein_g;

            const supplements_data = {};
            user_data.supplements.forEach(sup => {
                supplements_data[sup.name] = sup.protein_g;
            });

            const lunch_protein = 70.0;
            total_protein += lunch_protein;

            const breakfast_desc = meal_plan.breakfast.description;
            if (breakfast_desc.includes("베네틴 토핑 프로틴")) {
                total_protein += supplements_data["베네틴 토핑 프로틴 쉐이크 아이솔레이트"] || 0;
            }

            const dinner_desc = meal_plan.dinner.description;
            if (dinner_desc.includes("베네틴 몬스터 프로틴")) {
                total_protein += supplements_data["베네틴 몬스터 프로틴 게이너"] || 0;
            } else if (dinner_desc.includes("행복 모드") && user_data.today_log.is_workout_day) {
                total_protein += 20;
            }

            const summary_message = `총 단백질 섭취량: ${total_protein.toFixed(2)}g`;
            const goal_message = total_protein >= target_protein 
                ? `(목표(${target_protein.toFixed(2)}g) 달성!)`
                : `(목표(${target_protein.toFixed(2)}g)에 ${(target_protein - total_protein).toFixed(2)}g 부족)`;
            
            return {
                total_protein_g: parseFloat(total_protein.toFixed(2)),
                target_protein_g: target_protein,
                summary: `${summary_message} ${goal_message}`
            };
        }

        function updateDailyGoals(new_inbody) {
            const current_protein_goal = userData.goals.daily_protein_g;
            const target_muscle = userData.inbody.target_muscle_mass_kg || 31.0;
            
            const new_muscle = new_inbody['골격근'];
            
            if (new_muscle >= target_muscle) {
                userData.goals.daily_protein_g = current_protein_goal + 5.0;
                showMessageBox(`축하합니다! 골격근량 목표(${target_muscle}kg)를 달성했습니다. 새로운 단백질 목표가 ${userData.goals.daily_protein_g}g으로 상향 조정되었습니다.`, 'success');
            } else {
                showMessageBox("목표에 근접했거나 현재 목표를 유지합니다.", 'info');
            }
            
            userData.inbody = new_inbody;
        }

        function displayMealPlan(plan) {
            const plans = {
                breakfast: document.getElementById('breakfast-plan'),
                lunch: document.getElementById('lunch-plan'),
                dinner: document.getElementById('dinner-plan')
            };
            
            for (const key in plans) {
                plans[key].classList.remove('hidden');
                plans[key].querySelector('p').textContent = plan[key].description;
            }
        }

        window.runAnalysis = function() {
            if (!userData.inbody || Object.keys(userData.inbody).length === 0) {
                showMessageBox("분석을 시작하기 전에 인바디 데이터를 입력하거나 불러오세요.", 'error');
                return;
            }

            userData.today_log.is_workout_day = document.getElementById('is-workout-day-toggle').checked;
            userData.today_log.is_happy_mode = document.getElementById('is-happy-mode-toggle').checked;

            const mealPlan = getDailyMealPlan(userData);
            const proteinSummary = getDailyProteinSummary(mealPlan, userData);
            
            displayMealPlan(mealPlan);
            const summarySection = document.getElementById('summary-section');
            summarySection.textContent = proteinSummary.summary;
            summarySection.classList.remove('hidden');
        }

        function updateButtonStates() {
            const inbodyTextarea = document.getElementById('inbody-text');
            const inputBtn = document.getElementById('input-btn');
            const saveBtn = document.getElementById('save-btn');
            const runAnalysisBtn = document.getElementById('run-analysis-btn');

            const hasInbodyText = inbodyTextarea.value.trim() !== '';
            inputBtn.disabled = !hasInbodyText;

            const hasInbodyData = userData.inbody && Object.keys(userData.inbody).length > 0;
            saveBtn.disabled = !hasInbodyData;
            runAnalysisBtn.disabled = !hasInbodyData;
        }

        window.onload = function() {
            document.getElementById('user-id').textContent = '로컬 모드';
            document.getElementById('inbody-text').addEventListener('input', updateButtonStates);
            updateButtonStates();
        };
    </script>
</body>
</html>
