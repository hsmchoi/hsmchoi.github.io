<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행.행.행 - 나의 이야기 블로그</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DF3C2JQDFC"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Poor+Story&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gaegu', cursive;
            background-color: #FFFAF0;
            color: #2D3748;
            overflow-x: hidden;
        }
        .blog-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 4rem 2rem;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1.2s ease-out, transform 1.2s ease-out;
        }
        .blog-section.is-visible {
            opacity: 1;
            transform: translateY(0);
        }
        .font-title {
            font-family: 'Poor Story', cursive;
        }
        .post-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            border: 3px solid #4A5568;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .post-card:hover {
            transform: translateY(-10px) rotate(1deg);
            box-shadow: 0 12px 35px rgba(0,0,0,0.12);
        }
        .post-card-content {
            flex-grow: 1;
        }
        .new-badge {
            background-color: #FBBF24;
            color: #2D3748;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            position: absolute;
            top: -10px;
            right: -10px;
            transform: rotate(10deg);
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            z-index: 1000;
        }
        .modal-overlay.is-open {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: #FFFAF0;
            padding: 2.5rem;
            border-radius: 1.5rem;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.4s ease;
            border: 3px solid #2D3748;
        }
        .modal-overlay.is-open .modal-content {
            transform: scale(1);
        }
        .modal-close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: #2D3748;
        }
        #cookie-consent-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(45, 55, 72, 0.95);
            color: white;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            transform: translateY(100%);
            transition: transform 0.5s ease-in-out;
        }
        #cookie-consent-banner.visible {
            transform: translateY(0);
        }
        .consent-actions button {
            background-color: #FBBF24;
            color: #2D3748;
            border: none;
            padding: 0.75rem 1.5rem;
            margin-left: 1rem;
            border-radius: 9999px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .consent-actions button:hover {
            background-color: #F59E0B;
        }
        .consent-actions button.decline {
            background-color: transparent;
            color: #A0AEC0;
        }
        .consent-actions button.decline:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="antialiased">

    <section class="blog-section is-visible" id="intro">
         <div class="text-center">
            <h1 class="font-title text-7xl md:text-8xl font-bold">행.행.행</h1>
            <p class="text-2xl md:text-3xl mt-4">행복한 행동의 행적</p>
        </div>
    </section>

    <section class="blog-section" id="posts">
        <div class="container mx-auto px-4">
            <h2 class="font-title text-5xl text-center mb-12">나의 이야기들</h2>
            <div id="post-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
        </div>
    </section>

    <section class="blog-section" id="contact">
        <div class="text-center">
            <h2 class="font-title text-5xl mb-8">연락주세요</h2>
            <p class="text-xl">언제나 기다리고 있습니다.</p>
        </div>
    </section>

    <div id="post-modal" class="modal-overlay">
        <div class="modal-content relative">
             <span id="modal-close-btn" class="modal-close-btn">&times;</span>
             <h2 id="modal-title" class="font-title text-4xl mb-2"></h2>
             <p id="modal-date" class="text-gray-500 mb-6"></p>
             <div id="modal-content-body" class="text-lg leading-relaxed whitespace-pre-wrap"></div>
        </div>
    </div>
    
    <div id="cookie-consent-banner">
        <div class="text-center md:text-left">
            <p class="text-lg">🍪 본 사이트는 더 나은 사용자 경험을 제공하기 위해 쿠키를 사용합니다.</p>
        </div>
        <div class="consent-actions mt-4 md:mt-0 flex-shrink-0">
            <button id="consent-decline-btn" class="decline">거부</button>
            <button id="consent-allow-btn">허용</button>
        </div>
    </div>

    <script>
        const GA_MEASUREMENT_ID = 'G-DF3C2JQDFC';
        let isGaInitialized = false;

        const postsData = [
            {
                title: "전주 한옥마을에서의 하루",
                date: "2025-09-14",
                content: "오늘은 전주 한옥마을에 다녀왔다.\n고즈넉한 한옥의 풍경과 맛있는 길거리 음식들이 마음을 사로잡았다.\n특히 떡갈비와 비빔밥은 잊을 수 없는 맛이었다. 다음에 또 와야지!",
                new: true
            },
            {
                title: "코딩, 새로운 취미의 발견",
                date: "2025-09-12",
                content: "요즘 코딩을 배우기 시작했다. 처음에는 복잡하고 어려웠지만, 내가 만든 코드가 실제로 움직이는 것을 보니 정말 신기하고 뿌듯하다. 이 블로그도 내가 직접 만들었다!",
                new: false
            },
            {
                title: "가을 산책, 그리고 생각들",
                date: "2025-09-10",
                content: "선선한 가을바람을 맞으며 공원을 산책했다. 떨어지는 낙엽을 보며 여러 가지 생각에 잠겼다. 복잡했던 마음이 차분해지는 시간이었다.",
                new: false
            }
        ];

        function initializeGA() {
            if (isGaInitialized) return;
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', GA_MEASUREMENT_ID);
            isGaInitialized = true;
            console.log('Google Analytics Initialized.');
        }

        function trackPostView(postTitle) {
            if (!isGaInitialized) return;
            if (typeof gtag === 'function') {
                gtag('event', 'view_post', { 'post_title': postTitle });
                console.log(`Event sent for: ${postTitle}`);
            }
        }

        function renderPosts() {
            const postGrid = document.getElementById('post-grid');
            if (!postGrid) return;

            const today = new Date().toISOString().slice(0, 10);

            postGrid.innerHTML = postsData.map(post => {
                const isNew = post.new || post.date === today;
                return `
                    <div class="post-card relative" data-title="${post.title}" data-date="${post.date}" data-content="${post.content}">
                        ${isNew ? '<div class="new-badge">NEW</div>' : ''}
                        <div class="post-card-content">
                            <h3 class="font-title text-2xl font-bold mb-2">${post.title}</h3>
                            <p class="text-gray-500 text-sm mb-4">${post.date}</p>
                            <p class="text-gray-700">${post.content.substring(0, 100)}...</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function initializeApp() {
            renderPosts();

            const sections = document.querySelectorAll('.blog-section');
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('is-visible');
                });
            }, { threshold: 0.2 });
            sections.forEach(section => observer.observe(section));

            const postGrid = document.getElementById('post-grid');
            const modal = document.getElementById('post-modal');
            const modalTitle = document.getElementById('modal-title');
            const modalDate = document.getElementById('modal-date');
            const modalContentBody = document.getElementById('modal-content-body');
            const closeModalBtn = document.getElementById('modal-close-btn');

            if (postGrid) {
                postGrid.addEventListener('click', (e) => {
                    const card = e.target.closest('.post-card');
                    if (!card) return;

                    const title = card.dataset.title;
                    const date = card.dataset.date;
                    const content = card.dataset.content;
                    
                    trackPostView(title);

                    if(modalTitle) modalTitle.textContent = title;
                    if(modalDate) modalDate.textContent = date;
                    if(modalContentBody) modalContentBody.textContent = content;
                    if(modal) modal.classList.add('is-open');
                });
            }
            
            function closeModal() {
                if(modal) modal.classList.remove('is-open');
            }

            if(closeModalBtn) closeModalBtn.addEventListener('click', closeModal);
            if(modal) modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('is-open')) {
                    closeModal();
                }
            });

            const consentBanner = document.getElementById('cookie-consent-banner');
            const allowBtn = document.getElementById('consent-allow-btn');
            const declineBtn = document.getElementById('consent-decline-btn');
            
            const consentStatus = localStorage.getItem('cookie_consent_given');
            if (consentStatus === 'true') {
                initializeGA();
            } else if (consentStatus !== 'decline') {
                if(consentBanner) consentBanner.classList.add('visible');
            }

            if(allowBtn) {
                allowBtn.addEventListener('click', () => {
                    localStorage.setItem('cookie_consent_given', 'true');
                    if(consentBanner) consentBanner.classList.remove('visible');
                    initializeGA();
                });
            }

            if(declineBtn) {
                declineBtn.addEventListener('click', () => {
                    localStorage.setItem('cookie_consent_given', 'decline');
                    if(consentBanner) consentBanner.classList.remove('visible');
                });
            }
        }
        
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
