<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Multi-framework Test Harness</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; margin: 0; background-color: #f0f0f0; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .main-container { max-width: 1200px; margin: 0 auto; }
        #html-input { width: 100%; height: 200px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 13px; margin-bottom: 20px; resize: vertical; }
        #run-tests-btn { display: block; width: 250px; margin: 0 auto 20px auto; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
        #run-tests-btn:hover { background-color: #0056b3; }
        #dashboard { display: flex; flex-wrap: wrap; justify-content: space-around; gap: 20px; }
        .test-suite { flex: 1; min-width: 350px; border: 1px solid #ccc; border-radius: 8px; background-color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .suite-header { background-color: #444; color: white; padding: 10px; border-top-left-radius: 7px; border-top-right-radius: 7px; font-weight: bold; }
        .iframe-container { flex-grow: 1; }
        iframe { width: 100%; height: 100%; border: none; min-height: 400px; }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>Dynamic Multi-framework Test Harness</h1>
        <textarea id="html-input" placeholder="여기에 테스트할 HTML 코드를 붙여넣으세요..."></textarea>
        <button id="run-tests-btn">Run All Tests</button>
        <div id="dashboard">
            <div class="test-suite">
                <div class="suite-header">QUnit</div>
                <div id="qunit-container" class="iframe-container"></div>
            </div>
            <div class="test-suite">
                <div class="suite-header">Jasmine</div>
                <div id="jasmine-container" class="iframe-container"></div>
            </div>
            <div class="test-suite">
                <div class="suite-header">Mocha</div>
                <div id="mocha-container" class="iframe-container"></div>
            </div>
        </div>
    </div>

    <script>
        // Phase 3에서 정의한 데이터 구조
        const testFrameworks = [
          {
            id: 'qunit',
            name: 'QUnit',
            containerId: 'qunit-container',
            config: {
              css: ['https://code.jquery.com/qunit/qunit-2.20.0.css'],
              js: ['https://code.jquery.com/qunit/qunit-2.20.0.js'],
              setup: ''
            },
            testSource: `
              QUnit.module('Lyric Flow App Basic Tests', function() {
                QUnit.test('DOM Rendering Test', function(assert) {
                  const done = assert.async();
                  // React가 렌더링될 시간을 줍니다.
                  setTimeout(() => {
                    const root = document.getElementById('root');
                    assert.ok(root, '#root element should exist');
                    const appContainer = root.querySelector('.app-container');
                    assert.ok(appContainer, '.app-container should be rendered inside #root');
                    done();
                  }, 1500);
                });
              });
            `
          },
          {
            id: 'jasmine',
            name: 'Jasmine',
            containerId: 'jasmine-container',
            config: {
              css: ['https://cdnjs.cloudflare.com/ajax/libs/jasmine/4.5.0/jasmine.css'],
              js: [
                'https://cdnjs.cloudflare.com/ajax/libs/jasmine/4.5.0/jasmine.js',
                'https://cdnjs.cloudflare.com/ajax/libs/jasmine/4.5.0/jasmine-html.js',
                'https://cdnjs.cloudflare.com/ajax/libs/jasmine/4.5.0/boot.js'
              ],
              setup: ''
            },
            testSource: `
              describe("Lyric Flow App Basic Tests", function() {
                it("should have a root element", function(done) {
                  setTimeout(() => {
                    const root = document.getElementById('root');
                    expect(root).not.toBeNull();
                    done();
                  }, 1500);
                });
              });
            `
          },
          {
            id: 'mocha',
            name: 'Mocha',
            containerId: 'mocha-container',
            config: {
              css: ['https://cdnjs.cloudflare.com/ajax/libs/mocha/9.2.2/mocha.min.css'],
              js: [
                'https://cdnjs.cloudflare.com/ajax/libs/mocha/9.2.2/mocha.min.js',
                'https://cdnjs.cloudflare.com/ajax/libs/chai/4.3.6/chai.min.js'
              ],
              setup: `
                mocha.setup('bdd');
                const expect = chai.expect;
              `
            },
            testSource: `
              describe('Lyric Flow App Basic Tests', function() {
                it('should have an app container', function(done) {
                  this.timeout(2000); // Mocha의 비동기 타임아웃 설정
                  setTimeout(() => {
                    const appContainer = document.querySelector('.app-container');
                    expect(appContainer).to.exist;
                    done();
                  }, 1500);
                });
                
                // mocha.run()은 모든 테스트 스크립트가 로드된 후 마지막에 한 번만 호출되어야 합니다.
                it('should start tests', function() {
                    window.onload = function() {
                        mocha.run();
                    }
                });
              });
            `
          }
        ];

        // --- Main Application Logic ---

        const htmlInput = document.getElementById('html-input');
        const runTestsBtn = document.getElementById('run-tests-btn');

        // 예시 코드를 textarea에 미리 채워넣습니다.
        // 실제 사용 시에는 사용자가 직접 붙여넣게 됩니다.
        htmlInput.value = `<!DOCTYPE html>
                            <html lang="ko">
                            <head>
                                <meta charset="UTF-8" />
                                <title>Test Target</title>
                            </head>
                            <body>
                                <div id="root"></div>
                                <script src="https://unpkg.com/react@18/umd/react.development.js"><\/script>
                                <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"><\/script>
                                <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>
                                <script type="text/babel">
                                    function App() {
                                        return (
                                            <div className="app-container">
                                                <h1>Hello from React!</h1>
                                                <i className="fas fa-folder-open"></i>
                                            </div>
                                        );
                                    }
                                    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
                                <\/script>
                            </body>
                            </html>`;

        runTestsBtn.addEventListener('click', runAllTests);

        function runAllTests() {
            console.log('Button clicked. Preparing to run all tests...');
            // 이 함수는 다음 지시에서 구현될 것입니다.
        }

    </script>
</body>
</html>
