<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>도전! 패턴 기억 게임 v6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f1f5f9; --bg-secondary: #fff; --text-primary: #1e293b; --text-secondary: #475569;
            --text-highlight: #0f766e; --success-flash-bg: #dcfce7; --fail-flash-bg: #fecaca;
            --overlay-bg: rgba(0,0,0,0.5); --overlay-shape: #fff; --pulsing-indicator-start: #0f766e;
            --pulsing-indicator-end: #134e4a; --toast-bg: #1e293b; --toast-text: #e2e8f0;
        }
        .dark {
            --bg-primary: #0f172a; --bg-secondary: #1e293b; --text-primary: #e2e8f0; --text-secondary: #94a3b8;
            --text-highlight: #2dd4bf; --success-flash-bg: #15803d; --fail-flash-bg: #b91c1c;
            --overlay-bg: rgba(0,0,0,0.7); --overlay-shape: #e2e8f0; --pulsing-indicator-start: #134e4a;
            --pulsing-indicator-end: #0f766e; --toast-bg: #e2e8f0; --toast-text: #1e293b;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent;
            overflow: hidden; background-color: var(--bg-primary); color: var(--text-primary);
            transition: background-color .3s ease, color .3s ease;
        }
        #game-container { position: relative; background-color: var(--bg-secondary); transition: background-color .3s ease; perspective: 1000px; }
        .text-secondary { color: var(--text-secondary); }
        .text-highlight { color: var(--text-highlight); }
        .game-board { position: relative; display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem; width: 100%; max-width: 400px; aspect-ratio: 1 / 1; transition: transform 1.5s, opacity .3s, filter .8s ease-in-out; transform-style: preserve-3d; }
        .game-button {
            position: relative; border-radius: .75rem; cursor: pointer;
            transition: transform .1s ease, box-shadow .2s ease, background-color .5s ease, filter .2s ease-in-out, opacity .2s ease-in-out;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
            animation: idle-float 4s ease-in-out infinite;
        }
        .game-button:active { transform: scale(.96); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 1px 2px rgba(0,0,0,0.05); }
        .game-button.active { transform: scale(1.03); filter: brightness(1.25); animation: none; }
        .disabled { pointer-events: none; }
        @keyframes idle-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        @keyframes shake-vertical { 0%, 100% { transform: translateY(0); } 25% { transform: translateY(-3px); } 75% { transform: translateY(3px); } }
        .shake-vertical { animation: shake-vertical .2s ease-in-out; }
        @keyframes shake-horizontal { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake-horizontal { animation: shake-horizontal .3s ease-in-out; }
        @keyframes success-flash { 0%, 100% { background-color: var(--bg-primary); } 50% { background-color: var(--success-flash-bg); } }
        .success-flash { animation: success-flash .4s ease-in-out; }
        @keyframes gameOverFlash { 0%, 100% { background-color: var(--bg-primary); } 50% { background-color: var(--fail-flash-bg); } }
        .game-over-flash { animation: gameOverFlash .4s ease-in-out; }
        @keyframes levelUp { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); color: #fde047; } }
        .level-up { animation: levelUp .5s ease-in-out; }
        @keyframes shrink-out { from { transform: scale(1); opacity: .7; } to { transform: scale(0); opacity: 0; } }
        .shrinking-circle { animation: shrink-out 1.5s cubic-bezier(.7,0,.3,1) forwards; }
        @keyframes pulse { 0% { filter: brightness(1.2); } 100% { filter: brightness(1); } }
        .pulse { animation: pulse .4s ease-in-out; }
        .cube-rotate { transform: rotateY(180deg); }
        .inverted { filter: invert(1); }
        @keyframes get-ready-pulse { 0%, 100% { background-color: var(--bg-secondary); } 50% { background-color: var(--bg-primary); } }
        .get-ready-pulse { animation: get-ready-pulse 1.5s ease-in-out; }
        @keyframes pulsing-indicator { 0% { background-color: var(--pulsing-indicator-start); } 50% { background-color: var(--pulsing-indicator-end); } 100% { background-color: var(--pulsing-indicator-start); } }
        #in-progress-indicator { animation: pulsing-indicator 2s infinite ease-in-out; }
        #countdown-overlay { background-color: var(--overlay-bg); pointer-events: none; }
        #countdown-shape { width: 80%; padding-bottom: 80%; border-radius: 50%; border: 6px solid var(--overlay-shape); }
        .desaturated { filter: saturate(40%); opacity: .6; }
        .answer-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; font-weight: 700; color: #fff; text-shadow: 0 0 5px #000; pointer-events: none; opacity: 0; transition: opacity .2s ease-in-out; }
        .answer-number.visible { opacity: 1; }
        #title-header { transition: max-height .5s ease-in-out, opacity .3s ease-in-out, margin-bottom .5s ease-in-out; max-height: 200px; opacity: 1; overflow: hidden; }
        #game-wrapper { transition: transform .5s ease-in-out; transform-origin: top; }
        .game-started #title-header { max-height: 0; opacity: 0; margin-bottom: 0 !important; }
        .game-started #game-wrapper { transform: scale(1.05); }
        @keyframes announcer-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        #announcer { animation: announcer-float 3s ease-in-out infinite; }
        @keyframes dot-appear { from { transform: scale(.5) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        @keyframes wave-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        .pattern-char { width: 1rem; height: 1rem; opacity: 0; animation: wave-float 2s ease-in-out infinite, dot-appear .5s cubic-bezier(.25,.46,.45,.94) forwards; transform-origin: bottom center; display: inline-block; vertical-align: middle; }
        .pattern-char-body { fill: var(--text-highlight); }
        .pattern-char-eye { fill: #0f172a; }
        @keyframes text-focus-in { 0% { filter: blur(12px); opacity: 0; } 100% { filter: blur(0); opacity: 1; } }
        .text-focus-in { animation: text-focus-in 1s cubic-bezier(.55,.085,.68,.53) both; }
        @keyframes text-fade-in { from { opacity: 0; } to { opacity: 1; } }
        .text-fade-in { animation: text-fade-in 1.2s cubic-bezier(.39,.575,.565,1) .5s both; }
        
        #toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .toast {
            display: flex; align-items: center; gap: 10px; padding: 12px 20px;
            background-color: var(--toast-bg); color: var(--toast-text);
            border-radius: 9999px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
            animation: toast-in .5s cubic-bezier(.25,.46,.45,.94) both;
        }
        @keyframes toast-in { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .achievement-progress-bar { height: 6px; background-color: #e5e7eb; border-radius: 3px; overflow: hidden; }
        .achievement-progress { height: 100%; background-color: var(--text-highlight); transition: width .5s ease; }
        .achievement-locked { filter: grayscale(1); opacity: 0.6; }

        /* NEW: Combo Styles */
        #combo-display { transition: opacity 0.3s ease, transform 0.3s ease; }
        .combo-bounce { animation: combo-bounce 0.3s cubic-bezier(.25,.46,.45,.94); }
        @keyframes combo-bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .combo-break { animation: combo-break 0.5s ease-out forwards; }
        @keyframes combo-break {
            0% { transform: scale(1.2); opacity: 1; color: #ef4444; }
            25% { transform: scale(1.1) rotate(-5deg); }
            50% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(0.5); opacity: 0; color: #ef4444; }
        }
        @keyframes combo-flash { 0%, 100% { box-shadow: none; } 50% { box-shadow: inset 0 0 50px rgba(253, 224, 71, 0.5); } }
        .combo-flash-effect { animation: combo-flash 0.4s ease-in-out; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="main-container" class="w-full max-w-lg text-center relative">
        <div class="absolute top-0 right-0 mt-2 mr-2 z-10 flex items-center space-x-1">
            <button id="theme-change-btn" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="Change theme">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path></svg>
            </button>
            <button id="achievement-btn" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="Show achievements">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
            </button>
            <button id="dashboard-btn" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="Show challenge log">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            </button>
            <button id="bgm-toggle" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="Toggle background music">
                <svg id="bgm-on-icon" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                <svg id="bgm-off-icon" class="w-6 h-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>
            </button>
            <button id="theme-toggle" class="p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500" aria-label="Toggle dark mode">
                <svg id="theme-toggle-sun-icon" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg id="theme-toggle-moon-icon" class="w-6 h-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </div>

        <div id="title-header">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 leading-tight pt-8">도전! 패턴 기억 게임</h1>
            <p class="text-secondary text-base mb-6">최고 기록에 도전하고, 당신의 한계를 시험하세요!</p>
        </div>
        
        <div id="game-wrapper">
            <div id="game-container" class="p-6 md:p-8 rounded-2xl shadow-xl">
                <div class="flex justify-center items-center mb-5 h-7 space-x-4">
                    <div id="basecamp-display" class="text-lg font-bold text-secondary flex items-center gap-2 hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 6a3 3 0 013-3h10a1 1 0 01.8 1.6L14.25 8l2.55 3.4A1 1 0 0116 13H6a1 1 0 01-1-1V6z" clip-rule="evenodd" />
                        </svg>
                        <span>캠프: 0</span>
                    </div>
                    <div class="text-lg font-bold text-highlight">
                        <span id="highscore-display">최고 기록: 0</span>
                    </div>
                </div>

                <div class="game-board mx-auto">
                    <div id="button-0" class="game-button" data-color-id="0"></div>
                    <div id="button-1" class="game-button" data-color-id="1"></div>
                    <div id="button-2" class="game-button" data-color-id="2"></div>
                    <div id="button-3" class="game-button" data-color-id="3"></div>
                </div>
                
                <!-- NEW: Combo Display -->
                <div id="combo-display" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-6xl font-bold text-white opacity-0 transition-opacity pointer-events-none" style="text-shadow: 0 0 10px rgba(0,0,0,0.5);">
                    <span id="combo-count" class="block">0</span>
                    <span class="text-2xl block -mt-2">COMBO</span>
                </div>

                <div id="message-display" class="mt-5 text-base font-medium text-secondary h-6"></div>
                <div id="button-container" class="w-full mt-6 relative h-12">
                    <div class="absolute inset-0 flex items-center gap-4">
                        <button id="show-answer-btn" class="w-1/3 bg-slate-500 hover:bg-slate-600 text-white font-bold py-3 px-5 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg hidden">정답 보기</button>
                        <button id="start-btn" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-5 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg">게임 시작</button>
                    </div>
                    <div id="in-progress-indicator" class="absolute inset-0 bg-teal-800 rounded-lg hidden"></div>
                </div>
                
                <div id="countdown-overlay" class="absolute inset-0 flex items-center justify-center rounded-2xl hidden">
                    <div id="countdown-shape"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="dashboard-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-20">
        <div class="p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-lg mx-4 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">도전 로그</h2>
                <button id="close-dashboard-btn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="log-chart-container" class="w-full h-40 mb-4"></div>
            <div id="log-list" class="overflow-y-auto pr-2" style="max-height: 40vh;"></div>
            <button id="clear-log-btn" class="w-full mt-4 bg-rose-500 hover:bg-rose-600 text-white font-bold py-2 px-4 rounded-lg">기록 삭제</button>
        </div>
    </div>

    <div id="rest-stage-modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden z-20">
        <div class="p-8 rounded-2xl shadow-xl w-full max-w-sm mx-4 bg-slate-800 text-slate-200 text-center">
            <div id="announcer" class="w-24 h-24 mx-auto mb-4">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 90C27.9 90 10 72.1 10 50S27.9 10 50 10s40 17.9 40 40-17.9 40-40 40z" fill="#2dd4bf"/>
                    <circle cx="38" cy="45" r="5" fill="#0f172a"/><circle cx="62" cy="45" r="5" fill="#0f172a"/>
                    <path d="M35 65q15 10 30 0" stroke="#0f172a" stroke-width="4" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-2 text-focus-in">베이스캠프 도착!</h2>
            <p class="text-slate-400 mb-4 text-fade-in">다음 베이스캠프까지의 여정입니다.</p>
            <p id="rest-timer-display" class="text-xs text-slate-500 mb-4 text-fade-in" style="animation-delay: 0.7s;"></p>
            <div id="rest-level-guide" class="space-y-3 my-6"></div>
            <button id="rest-continue-btn" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-5 rounded-lg transition-all duration-200">계속하기</button>
        </div>
    </div>

    <div id="achievement-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-20">
        <div class="p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-lg mx-4 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">업적</h2>
                <button id="close-achievement-btn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="achievement-list" class="overflow-y-auto pr-2 space-y-4" style="max-height: 60vh;"></div>
        </div>
    </div>
    
    <div id="theme-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-20">
        <div class="p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-lg mx-4 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">테마 선택</h2>
                <button id="close-theme-btn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="theme-list" class="overflow-y-auto pr-2 grid grid-cols-1 sm:grid-cols-2 gap-4" style="max-height: 60vh;"></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <!-- 분리된 업적 데이터 파일 (Simulated via script tag) -->
    <script>
    const THEME_DATA = {
        'default': {
            name: '기본',
            colors: ['#fb7185', '#38bdf8', '#fbbf24', '#34d399'],
            glows: ['rgba(251, 113, 133, 0.7)', 'rgba(56, 189, 248, 0.7)', 'rgba(251, 191, 36, 0.7)', 'rgba(52, 211, 153, 0.7)']
        },
        'sunset': {
            name: '해질녘',
            colors: ['#f97316', '#f43f5e', '#a855f7', '#ec4899'],
            glows: ['rgba(249, 115, 22, 0.7)', 'rgba(244, 63, 94, 0.7)', 'rgba(168, 85, 247, 0.7)', 'rgba(236, 72, 153, 0.7)']
        },
        'forest': {
            name: '숲속',
            colors: ['#22c55e', '#16a34a', '#84cc16', '#4d7c0f'],
            glows: ['rgba(34, 197, 94, 0.7)', 'rgba(22, 163, 74, 0.7)', 'rgba(132, 204, 22, 0.7)', 'rgba(77, 124, 15, 0.7)']
        },
    };

    const achievements_data = {
        // --- 1. 진행 및 레벨 (Progression & Levels) ---
        'prog_level_10': { order: 101, name: '열 걸음', description: '최고 기록 10레벨 달성', category: '진행', condition: (stats) => stats.highScoreEver >= 10 },

            const today = new Date().toISOString().split('T')[0];
            if (!gameStats.lastPlayDate) {
                gameStats.consecutivePlayDays = 1;

                const lastDate = new Date(gameStats.lastPlayDate);
                const todayDate = new Date(today);
                const diffTime = todayDate - lastDate;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if (diffDays === 1) {
                    gameStats.consecutivePlayDays++;
                } else if (diffDays > 1) {
                    gameStats.consecutivePlayDays = 1;
                    checkAchievements({ event: 'returnee', days: diffDays });
                }
            }
            gameStats.lastPlayDate = today;
            if (!gameStats.playDays.includes(today)) {
                gameStats.playDays.push(today);
            }

        // --- Sound Synthesis Setup ---

                const icon = isLocked ? 
                    `<svg class="w-10 h-10 text-slate-400 dark:text-slate-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>` :
                    `<svg class="w-10 h-10 text-amber-400 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>`;

                let progressHTML = '';
                if (ach.getProgress) {
                    const { current, target } = ach.getProgress(gameStats);
                    const percent = Math.min(100, (current / target) * 100);
                    progressHTML = `
                        <div class="mt-2">
                            <span class="text-xs text-secondary">${current} / ${target}</span>
                            <div class="achievement-progress-bar">
                                <div class="achievement-progress" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    `;
                }

                wrapper.innerHTML = `
                    ${icon}
                    <div class="flex-grow">
                        <h3 class="font-bold text-base">${ach.name}</h3>
                        <p class="text-sm text-secondary">${ach.description}</p>
                        ${progressHTML}
                    </div>
                `;
                achL.appendChild(wrapper);
            });
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <svg class="w-6 h-6 text-amber-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                <span class="font-medium">${message}</span>
            `;
            toastContainer.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        }

        achBtn.addEventListener('click', () => { renderAchievements(); achM.classList.remove('hidden'); gameStats.uiClicks.achievement++; checkAchievements({event:'uiClick', element:'achievement'}) });
        cAchB.addEventListener('click', () => { achM.classList.add('hidden'); });

        // --- Theme System ---
        function applyTheme(themeId) {
            const theme = THEME_DATA[themeId];
            if (!theme) return;

            gBs.forEach((button, index) => {
                button.style.backgroundColor = theme.colors[index];
                button.style.setProperty('--glow-color', theme.glows[index]);
            });
            localStorage.setItem('patternGameTheme', themeId);
        }

        function renderThemeModal() {
            themeL.innerHTML = '';
            const currentTheme = localStorage.getItem('patternGameTheme') || 'default';

            gameStats.unlockedThemes.forEach(themeId => {
                const theme = THEME_DATA[themeId];
                if (!theme) return;

                const isActive = themeId === currentTheme;
                const themeItem = document.createElement('div');
                themeItem.className = `p-4 rounded-lg cursor-pointer border-2 ${isActive ? 'border-teal-500' : 'border-transparent'} bg-slate-100 dark:bg-slate-700`;
                
                let swatchesHTML = '<div class="flex space-x-2 mb-2">';
                theme.colors.forEach(color => {
                    swatchesHTML += `<div class="w-6 h-6 rounded-full" style="background-color: ${color};"></div>`;
                });
                swatchesHTML += '</div>';

                themeItem.innerHTML = `
                    ${swatchesHTML}
                    <div class="flex justify-between items-center">
                        <span class="font-bold">${theme.name}</span>
                        ${isActive ? '<svg class="w-6 h-6 text-teal-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>' : ''}
                    </div>
                `;
                
                themeItem.addEventListener('click', () => {
                    applyTheme(themeId);
                    renderThemeModal();
                });
                themeL.appendChild(themeItem);
            });
        }

        themeChangeBtn.addEventListener('click', () => {
            renderThemeModal();
            themeM.classList.remove('hidden');
            gameStats.uiClicks.themeChange++;
            checkAchievements({event: 'uiClick', element: 'themeChange'});
        });
        cThemeBtn.addEventListener('click', () => {
            themeM.classList.add('hidden');
        });

        // --- Combo System ---
        function updateComboDisplay() {
            if (combo > 1) {
                comboDisplay.classList.remove('opacity-0');
                comboCount.textContent = combo;
                comboCount.classList.add('combo-bounce');
                setTimeout(() => comboCount.classList.remove('combo-bounce'), 300);

                if (combo === 10 || combo === 20 || combo === 50 || combo === 100) {
                    body.classList.add('combo-flash-effect');
                    setTimeout(() => body.classList.remove('combo-flash-effect'), 400);
                }
            }
        }

        function hideComboDisplay(isBreak) {
            if (isBreak && combo > 1) {
                cBS.triggerAttackRelease("8n");
                comboDisplay.classList.add('combo-break');
                setTimeout(() => {
                    comboDisplay.classList.remove('combo-break');
                    comboDisplay.classList.add('opacity-0');
                }, 500);
            } else {
                comboDisplay.classList.add('opacity-0');
            }
        }

    </script>
</body>
</html>
